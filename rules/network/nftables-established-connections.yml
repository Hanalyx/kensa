id: nftables-established-connections
title: Ensure nftables established connections are configured
description: >
  The nftables ruleset must accept packets belonging to established and
  related connections so that return traffic for permitted outbound
  connections is allowed.
rationale: >
  Without an established/related accept rule, stateful return traffic is
  dropped, breaking legitimate connections or driving operators to overly
  permissive rules. The stateful accept is the basis of a correct
  deny-by-default firewall.
severity: medium
transactional: false
category: network
tags: [firewall, nftables, stateful]

references:
  cis:
    rhel9:  { section: "4.3.2", level: "L1", type: "Manual" }
  nist_800_53: ["SC-7", "AC-4"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        if ! command -v nft >/dev/null 2>&1; then echo "FAIL: nft not available"; exit 1; fi
        if nft list ruleset 2>/dev/null | grep -qiE 'ct state.*(established|related)'; then
          echo "OK: nftables accepts established/related connections"; exit 0
        fi
        echo "FAIL: no established/related accept rule in nftables ruleset"; exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add a stateful accept to the nftables input chain, e.g.
        `nft add rule inet filter input ct state established,related accept`,
        and persist it in the nftables configuration.
