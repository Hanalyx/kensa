spec:
    id: handler-audit-rule-set
    version: 0.3.0
    status: draft
    tier: 1
    context:
        system: kensa
        feature: handler-audit-rule-set
        description: |
            The audit_rule_set handler writes an audit rule to
            /etc/audit/rules.d/ and reloads via augenrules --load.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Write an audit rule file and reload the audit subsystem.
            Rollback restores or removes the prior rule file.
        scope:
            includes:
                - Write to the persist_file drop-in path under /etc/audit/rules.d/
                - augenrules --load
                - capture of prior file state
                - rollback restoring prior file and reloading
            excludes:
                - auditctl direct (runtime-only) rules
    constraints:
        - id: C-01
          description: Apply MUST be idempotent.
          type: technical
          enforcement: error
        - id: C-02
          description: Capture records file_existed and prior_content.
          type: security
          enforcement: error
        - id: C-03
          description: Rollback restores prior file and reloads augenrules.
          type: security
          enforcement: error
        - id: C-04
          description: |
              On the shell path, after augenrules --load Rollback MUST
              check the audit status (auditctl -s) and, when the config is
              immutable (enabled 2), report a verified-partial restore
              (Success=false, PartialRestore=true) with a reboot remedy —
              the file is restored but the live ruleset cannot be
              reconciled. A clean exit alone MUST NOT be reported as success
              when the live ruleset could not change.
          type: security
          enforcement: error
        - id: C-05
          description: |
              audit_rule_set MUST opt into the agent-mode pre-commit gate via
              Footprinter: CapturedFootprint declares the single
              /etc/audit/rules.d drop-in (pre.Data["path"]). On the netlink
              path the drop-in is written through the recorded fsatomic funnel
              (kernelio.WriteFile) and the rule load/unload happens over AUDIT
              netlink (not a filesystem mutation, so not recorded) — so the
              observed footprint is exactly the drop-in and must be a subset of
              the declaration.
          type: security
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: Apply writes the rule file and runs augenrules --load.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: Capture records prior file state.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: Rollback removes file (when absent at capture) and reloads.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: |
              Shell rollback on an immutable audit config (enabled 2)
              reports a verified-partial restore with a reboot remedy
              rather than a clean success.
          references_constraints: [C-04]
          priority: critical
        - id: AC-05
          description: |
              CapturedFootprint declares exactly the single drop-in file from
              the pre-state (and the existing netlink Apply test shows that
              file is written through the kernelio funnel while the rule loads
              over netlink), so the gate sees observed ⊆ captured.
          references_constraints: [C-05]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    tags: [handler, capturable, tier-1, audit]
