id: postfix-local-only
title: Ensure mail transfer agents are configured for local-only mode
description: >
  The mail transfer agent must be configured for local-only mode.
rationale: >
  A mail server listening on external interfaces exposes an unnecessary attack surface if remote mail delivery is not required.
severity: medium
category: services
tags: [postfix, mail, network]

references:
  cis:
    rhel9: { section: "2.1.21", level: "L1", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-230550"
      severity: "CAT II"
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        if ! rpm -q postfix &>/dev/null; then exit 0; fi
        ifaces=$(postconf -h inet_interfaces 2>/dev/null)
        if [ -z "$ifaces" ]; then
          echo "FAIL: cannot query postfix effective config"
          exit 1
        fi
        case "$ifaces" in
          loopback-only|localhost|"127.0.0.1") echo "OK: inet_interfaces=$ifaces"; exit 0 ;;
        esac
        echo "FAIL: inet_interfaces=$ifaces (expected loopback-only)"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/postfix/main.cf"
      key: "inet_interfaces"
      value: "loopback-only"
      separator: " = "
      restart: "postfix"
