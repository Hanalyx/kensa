kind: CheckHandler
metadata:
  name: SystemdTarget
  module: handlers/checks
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Checks the system's default systemd target, verifying it matches
    (or does not match) an expected value.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check via
    CHECK_HANDLERS["systemd_target"]. Implemented in
    runner/handlers/checks/_service.py as _check_systemd_target.
    Supports two modes: positive match (expected) and negative match
    (not_expected). When not_expected is present, it takes precedence.
    Commonly used to verify graphical.target vs multi-user.target.
  dependencies:
    - runner._types.CheckResult
    - runner._types.Evidence
  callers:
    - runner.handlers.checks.run_check
  related_specs:
    - service_state.spec.yaml

objective:
  summary: >
    Execute systemctl get-default on a remote host to determine the
    default systemd target, compare it against an expected or not-expected
    value, and return a CheckResult with structured Evidence.
  acceptance_criteria:
    AC-1: "Default target matching expected returns passed=True with detail 'default target is {actual}'."
    AC-2: "Default target not matching expected returns passed=False with detail 'default target is {actual} (expected {expected})'."
    AC-3: "Default target not matching not_expected returns passed=True with detail 'default target is {actual}'."
    AC-4: "Default target matching not_expected returns passed=False with detail 'default target is {actual} (should not be {not_expected})'."
    AC-5: "Evidence method is always 'systemd_target'."

constraints:
  - "MUST check for 'not_expected' key before 'expected' key (not_expected takes precedence)."
  - "MUST default expected to '' when not provided and not_expected is absent."
  - "MUST redirect stderr to /dev/null in the systemctl command."
  - "MUST strip stdout before comparing."
  - "MUST set evidence.method to 'systemd_target' in all paths."
  - "MUST set evidence.expected to 'not {not_expected}' when in not_expected mode."

input_contract:
  - field: expected
    type: str
    required: false
    default: "''"
    description: "Expected default target (e.g., 'multi-user.target'). Used in positive match mode."
  - field: not_expected
    type: str
    required: false
    description: "Target that should NOT be the default (e.g., 'graphical.target'). Used in negative match mode. Takes precedence over expected."

behavior:
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: systemctl get-default 2>/dev/null."
  - "Execute ssh.run(cmd) to get a Result."
  - "Strip result.stdout to get actual target."
  - >
    If 'not_expected' key is present in c: read not_expected value. Compare
    actual != not_expected. If passed, detail is 'default target is {actual}'.
    If failed, detail is 'default target is {actual} (should not be
    {not_expected})'. Set evidence.expected to 'not {not_expected}'.
  - >
    If 'not_expected' key is absent: read expected from c.get('expected', '').
    Compare actual == expected. If passed, detail is 'default target is
    {actual}'. If failed, detail is 'default target is {actual} (expected
    {expected})'. Set evidence.expected to expected.
  - "Return CheckResult with passed, detail, and Evidence."

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass_expected:
      passed: true
      detail: "'default target is {actual}'"
    pass_not_expected:
      passed: true
      detail: "'default target is {actual}'"
    fail_expected_mismatch:
      passed: false
      detail: "'default target is {actual} (expected {expected})'"
    fail_not_expected_match:
      passed: false
      detail: "'default target is {actual} (should not be {not_expected})'"
  evidence_fields:
    method: "systemd_target"
    command: "systemctl get-default 2>/dev/null"
    stdout: Full raw stdout from systemctl
    stderr: Full raw stderr
    exit_code: Actual exit code from systemctl
    expected: "Expected target string, or 'not {not_expected}' in negative mode"
    actual: "Stripped stdout value (the current default target)"
    timestamp: UTC time captured before command execution
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'systemd_target'."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestSystemdTarget
      - TestSystemdTargetSpecDerived
    count: 5
