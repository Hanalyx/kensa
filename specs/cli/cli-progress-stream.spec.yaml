spec:
    id: cli-progress-stream
    version: 0.1.0
    status: draft
    tier: 3

    context:
        system: kensa
        feature: cli-progress-stream
        description: |
            PR1 pinned the source-agnostic display model (internal/progress:
            Kind, Update, Sink). PR2 opened the emission seams (scan emits a
            per-rule Sink synchronously; detect has DetectWithProgress). PR3
            added the renderer (StreamConsumer — text TTY-aware + events-jsonl).
            PR4 is the FIRST user-visible streaming: it wires `kensa check` and
            `kensa detect` (single host) to the text renderer so an operator on
            a TTY sees live per-rule / per-probe progress while the scan runs.

            The wiring is governed by a new `--progress=auto|always|never` flag:

            - auto (default): progress is ON when stderr is a TTY AND --quiet is
              NOT set. This is the interactive-terminal heuristic. When stderr is
              redirected (piped, CI, file) progress stays OFF so logs are clean.
            - always: progress is ON regardless of the TTY heuristic (operators
              who want the stream captured in a redirected stderr opt in here).
            - never: progress is OFF regardless of the TTY heuristic.

            --quiet WINS over --progress: when --quiet is set, progress is
            suppressed in auto mode (the operator asked for silence). always
            still forces it on — the operator was explicit on both knobs and
            the more-specific always wins, but auto+quiet is the common CI case
            and MUST be silent.

            Two hard invariants from docs/dev/streaming-plan.md are pinned here:

            1. ALL progress bytes (text) go to STDERR, never stdout. stdout is
               reserved for the canonical result in EVERY output format
               (default text, --format json/jsonl, and -o FORMAT[:PATH]). The
               progress stream and the result channel never share a byte stream.

            2. The result is canonical and unchanged. Turning progress on or off
               does not alter the ScanResult / CapabilitySet the command emits
               to stdout — progress is cosmetic and strictly additive. The
               --verbose flag stays scoped to the FINAL text result; it does not
               control the live progress stream.

            check builds the scan runner with scan.WithProgress(textConsumer)
            pointed at stderr; detect calls detect.DetectWithProgress with the
            same renderer. When progress is off, check uses scan.New(nil) (no
            sink) and detect uses detect.Detect — byte-identical to before PR4.

            Tier 3: this is CLI-wrapper / non-mutation display wiring. It mutates
            nothing and the result struct stays authoritative. The reason it is
            spec-pinned at all is the two invariants above: a regression that
            sent progress to stdout, or that let progress change the result,
            would corrupt the canonical result channel scripts depend on.

    objective:
        summary: |
            `kensa check` and `kensa detect` accept --progress=auto|always|never.
            A pure decision helper maps (mode, stderrIsTTY, quiet) to an on/off
            bool: auto = stderrIsTTY && !quiet; always = on; never = off; an
            unrecognized mode is a usage error. When on, check wires a text
            StreamConsumer (to stderr) into scan via WithProgress and detect via
            DetectWithProgress, emitting live per-rule / per-probe lines on
            STDERR. stdout carries only the canonical result, identical in every
            output format whether or not progress is on.
        scope:
            includes:
                - A --progress=auto|always|never flag on check and on detect (default auto)
                - A pure decision helper mapping (mode, stderrIsTTY, quiet) to an on/off bool
                - auto resolving to on only when stderr is a TTY and --quiet is not set
                - always forcing progress on, never forcing it off, regardless of the TTY heuristic
                - --quiet suppressing progress in auto mode
                - An unrecognized --progress value being a usage error (exit 2)
                - The progress text renderer writing only to stderr, never stdout
                - The canonical stdout result being byte-identical whether progress is on or off, in every output format
            excludes:
                - The remediate / rollback wiring (PR5) and inventory streaming (PR6)
                - The events-jsonl variant selection on the CLI (--stream-file is a later PR)
                - Any in-place / carriage-return TTY polish (PR7)
                - Changing the result struct, exit code, or -o FILE serialization based on progress state

    constraints:
        - id: C-01
          description: |
              `kensa check` and `kensa detect` MUST each register a --progress
              flag accepting exactly auto, always, or never, defaulting to auto.
              The flag MUST appear in each command's --help output.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              The progress-on decision MUST be a pure function of three inputs:
              the --progress mode, whether stderr is a TTY, and whether --quiet
              is set. It MUST resolve: auto -> (stderrIsTTY AND NOT quiet);
              always -> on; never -> off. The function MUST NOT probe a real
              terminal itself (the TTY result is injected), so both branches are
              deterministically unit-testable.
          type: technical
          enforcement: error
        - id: C-03
          description: |
              --quiet MUST suppress progress in auto mode (auto+quiet -> off).
              never MUST be off irrespective of TTY or quiet. always MUST be on
              irrespective of TTY or quiet.
          type: technical
          enforcement: error
        - id: C-04
          description: |
              An unrecognized --progress value (anything other than auto,
              always, never) MUST be a usage error (exit code 2), surfaced before
              any SSH transport is opened.
          type: technical
          enforcement: error
        - id: C-05
          description: |
              When progress is on, the renderer the CLI wires MUST write to
              stderr only; no progress byte may be written to stdout. The CLI
              MUST construct the text StreamConsumer against os.Stderr (or a
              writer that is not os.Stdout) and pass it via scan.WithProgress /
              detect.DetectWithProgress.
          type: technical
          enforcement: error
        - id: C-06
          description: |
              The canonical stdout result MUST be independent of progress state:
              for a given run, the bytes written to stdout (the result, in
              whichever output format) MUST be identical whether progress is on
              or off. Progress is additive on stderr only and MUST NOT change the
              result, exit code, or -o FILE serialization.
          type: technical
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: "`kensa check --help` and `kensa detect --help` both list --progress with its auto|always|never choices."
          references_constraints: [C-01]
          priority: high
        - id: AC-02
          description: The decision helper returns on for (auto, tty=true, quiet=false), off for (auto, tty=false, quiet=false), on for (always, tty=false, quiet=true), and off for (never, tty=true, quiet=false).
          references_constraints: [C-02, C-03]
          priority: critical
        - id: AC-03
          description: The decision helper returns off for (auto, tty=true, quiet=true) — --quiet wins over the TTY heuristic in auto mode.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: A --progress value outside {auto, always, never} is rejected as a usage error (exit code 2) on both check and detect, before any transport dial.
          references_constraints: [C-04]
          priority: high
        - id: AC-05
          description: When progress is on, the CLI builds the progress sink as a text StreamConsumer over a non-stdout writer (stderr) and feeds it into the scan runner / DetectWithProgress; the constructed sink renders Updates to that writer and never to stdout.
          references_constraints: [C-05]
          priority: critical
        - id: AC-06
          description: For a fixed scan, the stdout result bytes are identical with progress on (sink wired) versus off (no sink) — progress changes only stderr, not the canonical result on stdout.
          references_constraints: [C-06]
          priority: critical

    depends_on:
        - spec_id: progress-renderer
          relationship: requires
        - spec_id: progress-emission
          relationship: requires
        - spec_id: cli-quiet
          relationship: requires

    tags: [cli, progress, streaming, tier-3]
