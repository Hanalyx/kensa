id: root-access-controlled
title: Ensure root account access is controlled
description: >
  Access to the root account should be controlled by limiting the
  methods by which root can login (e.g., only via su from wheel group).
rationale: >
  Controlling root access reduces the risk of unauthorized root logins
  and ensures accountability for privileged actions.
severity: high
transactional: false
category: access-control
tags: [root, access-control, security, privilege]

references:
  cis:
    rhel9: { section: "5.4.2.4", level: "L1", type: "Automated" }
    rhel10: { section: "5.4.2.4", level: "L1", type: "Automated" }
    rhel8: { section: "5.4.2.4", level: "L1", type: "Automated" }
  nist_800_53: ["AC-6", "IA-2"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # CIS 5.4.2.4: the root account must have a usable password (P) or be
        # locked (L) per `passwd -S root` — an account with no password (NP) is
        # a finding. (SSH root-login restriction is a separate sshd control.)
        status=$(passwd -S root 2>/dev/null | awk '{print $2}')
        case "$status" in
          P|L|LK|PS)
            echo "OK: root account access controlled (passwd -S: $status)"
            exit 0
            ;;
          "")
            echo "FAIL: could not determine root account status (passwd -S root)"
            exit 1
            ;;
          *)
            echo "FAIL: root account status '$status' (must be P/password-set or L/locked, not NP)"
            exit 1
            ;;
        esac
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Set a password for root (passwd root) or lock the account (passwd -l root) per site policy; an account with no password (NP) is a finding."
