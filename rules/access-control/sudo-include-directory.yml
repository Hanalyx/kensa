id: sudo-include-directory
title: Ensure sudoers specifies the default includedir
description: >
  The /etc/sudoers file must use the @includedir or #includedir directive
  to include /etc/sudoers.d/ for modular sudo configuration.
rationale: >
  Centralizing sudoers configuration through an include directory ensures
  consistent and auditable privilege management.
severity: medium
category: access-control
tags: [sudo, configuration, access-control]

depends_on: [package-sudo-installed]

references:
  stig:
    rhel8:
      vuln_id: "V-251711"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "grep -rE '^(@includedir|#includedir|#include)\\s+/etc/sudoers\\.d' /etc/sudoers"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add '@includedir /etc/sudoers.d' to the end of /etc/sudoers
        using visudo.
