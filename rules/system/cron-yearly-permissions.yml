id: cron-yearly-permissions
title: Ensure permissions on /etc/cron.yearly are configured
description: >
  If the /etc/cron.yearly directory exists, it must be owned by root:root and
  mode 0700 so only root can add or alter yearly cron jobs.
rationale: >
  Incorrect permissions on /etc/cron.yearly could allow an unauthorized user to
  schedule or modify privileged jobs.
severity: medium
transactional: false
category: system
tags: [file-permissions, cron, cis]

references:
  cis:
    rhel8:  { section: "2.4.1.7", level: "L1", type: "Automated" }
    rhel10: { section: "2.4.1.7", level: "L1", type: "Automated" }
  nist_800_53: ["CM-6"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        d=/etc/cron.yearly
        [ -e "$d" ] || { echo "NOT APPLICABLE: $d does not exist"; exit 0; }
        mode=$(stat -c '%a' "$d" 2>/dev/null); own=$(stat -c '%U:%G' "$d" 2>/dev/null)
        if [ "$own" = "root:root" ] && [ "$(( 0$mode & 077 ))" -eq 0 ]; then
          echo "OK: $d is $own mode $mode"
          exit 0
        fi
        echo "FAIL: $d is $own mode $mode (want root:root, 0700)"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: file_permissions
      path: "/etc/cron.yearly"
      owner: "root"
      group: "root"
      mode: "0700"
