id: audit-priv-chfn
title: Audit privileged execution of /usr/bin/chfn
description: >
  All uses of the /usr/bin/chfn command must generate an audit record so that
  finger-information changes can be traced to an individual.
rationale: >
  Auditing execution of privileged commands allows detection of misuse
  and supports forensic investigation of privilege escalation.
severity: medium
category: audit
tags: [audit, auditd, privileged]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270779"
      stig_id: "UBTU-24-900080"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260608"
      stig_id: "UBTU-22-654030"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F path=/usr/bin/chfn -F perm=x -F auid>=1000 -F auid!=unset -k privileged-chfn"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/usr/bin/chfn -F perm=x -F auid>=1000 -F auid!=unset -k privileged-chfn"
      persist_file: "/etc/audit/rules.d/50-priv-chfn.rules"
