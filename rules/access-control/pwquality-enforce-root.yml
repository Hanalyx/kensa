id: pwquality-enforce-root
title: Ensure password quality is enforced for the root user
description: >
  The enforce_for_root setting must be configured in /etc/security/pwquality.conf.
rationale: >
  Improper enforce_for_root configuration could weaken system security.
severity: medium
category: access-control
tags: [pam, password, pwquality]

references:
  cis:
    rhel9: { section: "5.3.3.2.7", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: 'grep -qE ''^\s*enforce_for_root\b'' /etc/security/pwquality.conf'
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "sed -i '/^#.*enforce_for_root/s/^#//' /etc/security/pwquality.conf || echo 'enforce_for_root' >> /etc/security/pwquality.conf"
