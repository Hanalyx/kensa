version: "2"
# run.go is intentionally unset: golangci-lint reads the target Go version
# from go.mod (currently 1.26.4). Keeping it unset means the linter tracks
# go.mod automatically, the same sync-free principle as GOTOOLCHAIN=local in CI.
linters:
  default: none
  enable:
    - depguard
    - errcheck
    - gocritic
    - godot
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    depguard:
      # Supply-chain governance: an import not on this allowlist fails the
      # lint gate at PR time. The allowlist mirrors the named direct
      # dependencies in specs/system/supply-chain.spec.yaml — keep the two
      # in sync (a new direct dep updates both, plus the spec's rationale).
      # Indirect deps are not listed: they are pulled in transitively and
      # governed by their direct dep's entry, and our own code does not
      # import them directly.
      rules:
        main:
          list-mode: lax
          allow:
            - $gostd
            - github.com/Hanalyx/kensa
            - github.com/coreos/go-systemd/v22
            - github.com/elastic/go-libaudit/v2
            - github.com/godbus/dbus/v5
            - github.com/google/uuid
            - github.com/johnfercher/maroto/v2
            - github.com/santhosh-tekuri/jsonschema/v6
            - github.com/spf13/pflag
            - golang.org/x/sys
            - golang.org/x/term
            - google.golang.org/protobuf
            - gopkg.in/yaml.v3
            - modernc.org/sqlite
    gocritic:
      enabled-checks:
        - commentFormatting
        - commentedOutCode
        - deferInLoop
        - emptyStringTest
        - sloppyReassign
        - typeAssertChain
        - unnecessaryBlock
        - whyNoLint
      settings:
        commentedOutCode:
          minLength: 30
    godot:
      scope: declarations
      exclude:
        - ^\s*@spec\b
        - ^\s*@ac\b
        - ^\s*@c\b
      capital: true
      period: true
    misspell:
      locale: US
      ignore-rules:
        - kensa
        - openwatch
        - hanalyx
        - rhel
        - sshd
        - sysctl
        - selinux
        - authselect
        - faillock
        - fapolicyd
        - usbguard
        - dnf
        - oscal
    revive:
      severity: error
      enable-all-rules: false
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
        - name: package-comments
        - name: comment-spacings
          arguments:
            - TODO
            - FIXME
            - NOTE
            - Deprecated
        - name: var-naming
        - name: receiver-naming
        - name: unexported-return
        - name: dot-imports
        - name: error-strings
        - name: error-naming
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration
    staticcheck:
      # v2 merged the former standalone gosimple (S*) and stylecheck (ST*)
      # linters into staticcheck; `all` also pulls in the quickfix (QF*)
      # category. We run the full set (SA bug-detection + S simplification +
      # ST style + QF quickfixes) and exclude:
      #   ST1000 — mandatory package-level doc comments; noise for internal pkgs.
      #   QF1001 — "apply De Morgan's law". Opinionated and, at every site we
      #            have, a readability loss: `!(isAlpha || isDigit || isUnder)`
      #            and `if !(posA < posB && posB < posC)` express a single
      #            semantic negation far more clearly than the expanded
      #            `>=`/`||` form, especially in test assertions.
      checks:
        - all
        - -ST1000
        - -QF1001
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        path: _test\.go
        text: exported
      - linters:
          - godot
        path: internal/
      - linters:
          - godot
        path: cmd/
    paths:
      - vendor
      - bin
      - dist
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/Hanalyx/kensa
  exclusions:
    generated: lax
    paths:
      - vendor
      - bin
      - dist
      - third_party$
      - builtin$
      - examples$
