id: chrony-enabled
title: Ensure time synchronization is in use
description: >
  The chronyd service must be enabled and running.
rationale: >
  The chronyd service provides essential system functionality. If it is not running, the system may not meet security requirements.
severity: medium
category: services
tags: [service, ntp, time]

depends_on: [chrony-installed]

references:
  cis:
    rhel9: { section: "2.3.1", level: "L1", type: "Automated" }
    rhel10: { section: "2.3.1", level: "L1", type: "Automated" }
    rhel8: { section: "2.3.1", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-257944"
      stig_id: "RHEL-09-252015"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-280959"
      stig_id: "RHEL-10-200541"
      severity: "CAT II"
  nist_800_53: ["AU-8"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: service_state
      name: "chronyd"
      active: true
      enabled: true
    remediation:
      mechanism: service_enabled
      name: "chronyd"
      start: true
