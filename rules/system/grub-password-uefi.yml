id: grub-password-uefi
title: Set GRUB bootloader password (UEFI)
description: >
  On UEFI systems the GRUB superuser password hash must be present in
  /boot/efi/EFI/redhat/user.cfg (a grub.pbkdf2.sha512 entry) to prevent
  unauthorized boot-parameter changes or single-user access.
rationale: >
  Without a bootloader password an attacker with console access can edit kernel
  parameters or enter single-user mode to gain root.
severity: high
transactional: false
category: system
tags: [grub, bootloader, uefi, physical-security, stig]
references:
  stig:
    rhel8:
      vuln_id: "V-230234"
      stig_id: "RHEL-08-010140"
      severity: "CAT I"
  nist_800_53: ["AC-3"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        if [ ! -d /sys/firmware/efi ]; then
          echo "NOT APPLICABLE: system booted via BIOS, not UEFI"
          exit 0
        fi
        if grep -iqE 'grub2_password|password_pbkdf2' /boot/efi/EFI/redhat/user.cfg 2>/dev/null; then
          echo "OK: UEFI GRUB superuser password is set"
          exit 0
        fi
        echo "FAIL: no GRUB password in /boot/efi/EFI/redhat/user.cfg"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Run grub2-setpassword (writes /boot/efi/EFI/redhat/user.cfg).
