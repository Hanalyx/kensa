spec:
    id: handler-pam-module-arg
    version: 0.2.0
    status: draft
    tier: 1
    context:
        system: kensa
        feature: handler-pam-module-arg
        description: |
            The pam_module_arg handler ensures or removes an argument on a
            PAM module line across one or more /etc/pam.d files, using sed
            with an on-host .bak backup. PAM changes can affect
            authentication and are flagged for control-channel review
            before production use.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Add ("ensure") or strip ("remove") an argument on PAM module
            lines across the listed files. Capture snapshots the affected
            lines; rollback restores them.
        scope:
            includes:
                - Edit PAM module lines in each params.files entry
                - ensure (append arg if missing) and remove (strip arg)
                - capture of the affected lines per file
                - rollback restoring the captured lines (or the .bak copy)
            excludes:
                - adding or removing whole module lines (use pam_module_configure)
    constraints:
        - id: C-01
          description: |
              Apply "ensure" MUST be idempotent — when a matching module
              line already carries the arg, Apply is a no-op for that file.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Apply MUST support "ensure" (append arg to matching module
              lines) and "remove" (strip the arg), applied to every file in
              params.files.
          type: technical
          enforcement: error
        - id: C-03
          description: |
              Capture MUST record each file's WHOLE prior content and its
              existence before Apply edits it (keyed by path), so rollback can
              restore the file byte-perfect across either transport. Legacy
              grep-snapshot pre-states (files_snapshot) MUST remain
              rollback-compatible.
          type: security
          enforcement: error
        - id: C-04
          description: |
              Rollback MUST restore each file to its captured prior content
              verbatim (removing a file that was absent at capture). For a
              legacy snapshot pre-state it MUST fall back to the prior
              line-restore (with the on-host .bak copy when no lines were
              captured for a file).
          type: security
          enforcement: error
        - id: C-05
          description: |
              decodeParams MUST reject missing or invalid required params:
              action in {ensure, remove}, module, arg, and a non-empty
              files list.
          type: technical
          enforcement: error
        - id: C-06
          description: |
              PAM changes affect authentication. Rules using this handler
              should be reviewed for control-channel sensitivity before
              running against production hosts.
          type: security
          enforcement: warning
        - id: C-07
          description: |
              In agent mode (transport implements kernelio.FileTransport),
              Apply MUST edit each PAM file by reading it, transforming the
              content in Go (the sed-equivalent: ensure appends the arg to
              matching module lines, remove strips it — arg taken as an
              extended regex when arg_regex is set), and writing it back
              atomically through the funnel (kernelio.WriteFile) so the
              footprint recorder observes exactly the files it touches; an
              unchanged file is not rewritten. Rollback MUST restore through
              the funnel. CapturedFootprint MUST declare every captured PAM
              file (from files_content, or files_snapshot for a legacy
              pre-state). The direct-SSH sed -i.bak fallback is preserved.
          type: security
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: Apply "ensure" appends the arg to matching module lines when absent.
          references_constraints: [C-02, C-06]
          priority: critical
        - id: AC-02
          description: Apply "ensure" is a no-op when the arg is already present.
          references_constraints: [C-01]
          priority: critical
        - id: AC-03
          description: Apply "remove" strips the arg from matching module lines.
          references_constraints: [C-02]
          priority: critical
        - id: AC-04
          description: Capture records each file's whole prior content and existence.
          references_constraints: [C-03]
          priority: critical
        - id: AC-05
          description: |
              Rollback restores each file's captured content byte-perfect;
              a legacy files_snapshot pre-state still restores via the
              line-restore path.
          references_constraints: [C-04]
          priority: critical
        - id: AC-06
          description: decodeParams rejects missing or invalid params.
          references_constraints: [C-05]
          priority: high
        - id: AC-07
          description: |
              Agent-mode Apply edits PAM files through the funnel (ensure
              appends, remove strips incl. the regex case), is a no-op when
              already satisfied, and round-trip rollback restores byte-perfect
              across multiple files; CapturedFootprint declares every captured
              file (and a legacy snapshot pre-state too).
          references_constraints: [C-07]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    tags: [handler, capturable, tier-1, pam, auth]
