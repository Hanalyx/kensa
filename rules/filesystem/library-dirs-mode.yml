id: library-dirs-mode
title: Ensure library directories have mode 755 or less
description: >
  All shared library directories in /lib, /lib64, /usr/lib, and /usr/lib64
  must have mode 755 or less permissive.
rationale: >
  World-writable library directories could allow insertion of malicious
  libraries that are loaded by system applications. Restrictive permissions
  prevent this.
severity: medium
category: filesystem
tags: [file-permissions, library-files, security]

references:
  stig:
    rhel8:
      vuln_id: "V-251707"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "find /lib /lib64 /usr/lib /usr/lib64 -perm /022 -type d 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: file_permissions
      find_paths:
        - /lib
        - /lib64
        - /usr/lib
        - /usr/lib64
      find_type: d
      find_args: "-perm /022"
      mode: "go-w"
