id: crypto-policy-not-overridden
title: Ensure system-wide crypto policy is not overridden
description: >
  Individual application crypto settings must not override the
  system-wide cryptographic policy set by crypto-policies. The policy
  must be applied consistently across all subsystems.
rationale: >
  If individual applications override the system-wide crypto policy,
  they may use weaker algorithms than required. RHEL 8 must be
  configured so the system-wide policy is enforced for all applications.
severity: critical
category: system
tags: [crypto-policies, fips, cryptography]

references:
  stig:
    rhel8:
      vuln_id: "V-279932"
      severity: "CAT I"
  nist_800_53: ["SC-13", "AC-17"]

platforms:
  - family: rhel
    min_version: 8
    max_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "update-crypto-policies --show 2>/dev/null"
      expected_stdout: "FIPS"
    remediation:
      mechanism: manual
      note: >
        Review and remove any application-specific crypto policy overrides.
        Run: update-crypto-policies --set FIPS to apply the FIPS policy.
        Remove any --set or --set-scope overrides in /etc/crypto-policies/.
