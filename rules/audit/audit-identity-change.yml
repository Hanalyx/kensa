id: audit-identity-change
title: Ensure events that modify user/group information are collected
description: >
  Changes to user and group identity files must be audited.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.3.8", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "auditctl -l 2>/dev/null | grep -qE 'identity'"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-w /etc/group -p wa -k identity"
      persist_file: "/etc/audit/rules.d/50-identity.rules"
