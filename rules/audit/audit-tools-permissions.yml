id: audit-tools-permissions
title: Ensure audit tools mode is configured
description: >
  Audit tool binaries must have restrictive permissions.
rationale: >
  Incorrect ownership or permissions on audit files could allow unauthorized users to tamper with audit evidence.
severity: medium
transactional: false
category: audit
tags: [audit, permissions]

depends_on: [auditd-enabled]

references:
  cis:
    rhel9: { section: "6.3.4.8", level: "L1", type: "Automated" }
    rhel10: { section: "6.3.4.8", level: "L2", type: "Automated" }
    ubuntu24: { section: "6.2.4.8", level: "L2", type: "Automated" }
    ubuntu22: { section: "6.2.4.8", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.4.8", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281094", stig_id: "RHEL-10-400450", severity: "CAT II" }
    rhel9: { vuln_id: "V-257887", stig_id: "RHEL-09-232035", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230472"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270821"
      stig_id: "UBTU-24-901230"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260492"
      stig_id: "UBTU-22-232035"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: command
      run: "stat -c '%a' /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/rsyslogd /sbin/augenrules 2>/dev/null | awk '{if ($1+0 > 755) exit 1}'"
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "chmod 755 /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/rsyslogd /sbin/augenrules"
