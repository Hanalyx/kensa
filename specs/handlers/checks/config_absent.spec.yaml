kind: CheckHandler
metadata:
  name: ConfigAbsent
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Verifies that a configuration key does NOT exist in a file or directory
    of config files. Used for ensuring deprecated or insecure configuration
    options have been removed.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check when
    check["method"] == "config_absent". Implemented in
    runner/handlers/checks/_config.py as _check_config_absent.
  dependencies:
    - runner.shell_util.grep_config_key
    - runner._types.CheckResult
    - runner._types.Evidence
    - runner.ssh.SSHSession
    - datetime
  callers:
    - runner.engine.run_check
  related_specs:
    - config_value.spec.yaml

objective:
  summary: >
    Search for a configuration key using grep_config_key. If the key is
    not found, the check passes. If the key is found, the check fails.
    Supports directory mode via scan_pattern for searching across multiple
    config files.
  acceptance_criteria:
    AC-1: "Key absent (grep fails or stdout empty) returns passed=True."
    AC-2: "Key found (grep succeeds with stdout) returns passed=False."
    AC-3: "Evidence method is always 'config_absent'."
    AC-4: "Detail format is '{key} not found in {path} (as required)' on pass and '{key} found in {path} (should be absent)' on fail."
    AC-5: "Supports scan_pattern for directory mode (default '*.conf')."
    AC-6: "Evidence expected is None and evidence actual is None on pass path."

constraints:
  - "MUST use shell_util.grep_config_key() to search for the key (never construct grep directly)."
  - "MUST capture check_time before executing the SSH command."
  - "MUST set evidence.method to 'config_absent' in all code paths."
  - "MUST set evidence.expected to None in all code paths."
  - "MUST set evidence.actual to None on pass and to the matched line on fail."
  - "MUST default scan_pattern to '*.conf' when not specified."
  - "MUST NOT modify any remote state (pure measurement)."

input_contract:
  - field: path
    type: str
    required: true
    description: File path or directory to search.
  - field: key
    type: str
    required: true
    description: Configuration key that should not exist.
  - field: scan_pattern
    type: str
    required: false
    default: "\"*.conf\""
    description: Glob pattern for directory mode file matching.

behavior:
  - "Extract path from c['path'] and key from c['key'] (both required keys)."
  - "Read scan_pattern from c.get('scan_pattern', '*.conf')."
  - "Capture check_time as datetime.now(timezone.utc)."
  - >
    Execute shell_util.grep_config_key(ssh, path, key,
    scan_pattern=scan_pattern) to search for the key.
  - "Derive command string from result.command if available, otherwise f'grep {key} {path}'."
  - >
    If not result.ok OR result.stdout.strip() is empty (key not found):
    return CheckResult(passed=True) with detail f"{key} not found in
    {path} (as required)" and evidence with expected=None, actual=None.
  - >
    If result.ok AND stdout is non-empty (key found): strip the stdout
    to get the actual matched line. Return CheckResult(passed=False) with
    detail f"{key} found in {path} (should be absent)" and evidence with
    expected=None, actual=stripped stdout.

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass_absent:
      passed: true
      detail: "'{key} not found in {path} (as required)'"
    fail_found:
      passed: false
      detail: "'{key} found in {path} (should be absent)'"
  evidence_fields:
    method: "config_absent"
    command: The grep command executed via grep_config_key
    stdout: Raw grep output
    stderr: Raw stderr
    exit_code: Grep exit code
    expected: "None (always)"
    actual: "None on pass, stripped matched line on fail"
    timestamp: UTC datetime captured before command execution
  detail_formats:
    - "{key} not found in {path} (as required)"
    - "{key} found in {path} (should be absent)"
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'config_absent'."
    - "evidence.expected is always None."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestConfigAbsent
      - TestConfigAbsentSpecDerived
    count: 6
