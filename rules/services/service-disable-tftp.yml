id: service-disable-tftp
title: Disable TFTP server
description: >
  TFTP (Trivial File Transfer Protocol) is a simple file transfer protocol
  with no authentication. It should be disabled unless specifically required.
rationale: >
  TFTP provides no authentication or encryption. An attacker could download
  sensitive files or upload malicious content.
severity: high
category: services
tags: [service, networking, tftp, attack-surface]

references:
  cis:
    rhel8:  { section: "2.1.17", level: "L1", type: "Automated" }
    rhel9:  { section: "2.1.16", level: "L1", type: "Automated" }
    rhel10: { section: "2.1.16", level: "L1", type: "Automated" }
    ubuntu22: { section: "2.1.16", level: "L1", type: "Automated" }
    ubuntu24: { section: "2.1.16", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7", "IA-5"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  # Debian/Ubuntu unit name differs from RHEL (tftpd-hpa vs the default below).
  - when: apt
    check:
      method: service_state
      name: "tftpd-hpa"
      active: false
      enabled: false
    remediation:
      mechanism: service_masked
      name: "tftpd-hpa"
  - default: true
    check:
      method: service_state
      name: "tftp.socket"
      active: false
      enabled: false
    remediation:
      mechanism: service_masked
      name: "tftp.socket"
