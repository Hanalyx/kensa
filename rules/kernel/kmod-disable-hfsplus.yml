id: kmod-disable-hfsplus
title: Disable hfsplus kernel module
description: >
  The hfsplus filesystem type is the Apple Mac OS Extended filesystem, rarely needed on Linux and an unnecessary kernel attack surface.
rationale: >
  Removing support for unneeded filesystem types reduces the local attack surface. If this filesystem type is not needed, it should not be loadable.
severity: low
category: kernel
tags: [kernel-module, attack-surface, cis]

references:
  cis:
    rhel8: { section: "1.1.1.4", level: "L1", type: "Automated" }
    rhel9: { section: "1.1.1.4", level: "L1", type: "Automated" }
    rhel10: { section: "1.1.1.4", level: "L1", type: "Automated" }
    ubuntu22: { section: "1.1.1.4", level: "L1", type: "Automated" }
    ubuntu24: { section: "1.1.1.4", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: kernel_module_state
      name: "hfsplus"
      state: "blacklisted"
    remediation:
      mechanism: kernel_module_disable
      name: "hfsplus"
