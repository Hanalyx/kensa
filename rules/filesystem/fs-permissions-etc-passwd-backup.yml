id: fs-permissions-etc-passwd-backup
title: Set permissions on /etc/passwd-
description: >
  The /etc/passwd- backup file contains user account information and
  must have restrictive permissions to prevent unauthorized modification.
rationale: >
  The passwd- file is a backup of /etc/passwd. Unauthorized access
  could reveal account information or allow recovery of deleted accounts.
severity: medium
category: filesystem
tags: [permissions, passwd, authentication, security]

references:
  cis:
    rhel8_v4:  { section: "6.1.2", level: "L1", type: "Automated" }
    rhel9_v2:  { section: "6.1.2", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "test ! -f /etc/passwd- || stat -c '%a %U %G' /etc/passwd- | grep -E '^644 root root$'"
      expected_exit: 0
    remediation:
      mechanism: file_permissions
      path: "/etc/passwd-"
      mode: "0644"
      owner: "root"
      group: "root"
