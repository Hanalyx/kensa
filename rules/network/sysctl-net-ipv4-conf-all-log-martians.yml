id: sysctl-net-ipv4-conf-all-log-martians
title: Ensure net.ipv4.conf.all.log_martians is set to 1
description: >
  The kernel parameter net.ipv4.conf.all.log_martians must be set to 1 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  stig:
    rhel10:
      vuln_id: "V-281343"
      stig_id: "RHEL-10-800110"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257960"
      stig_id: "RHEL-09-253025"
      severity: "CAT II"
  cis:
    rhel9:
      section: 3.3.9
      level: L1
      type: Automated
  nist_800_53:

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.all.log_martians
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.all.log_martians
      value: "1"
