id: ssh-approved-macs
title: Ensure sshd MACs are configured
description: >
  The sshd MACs directive must specify only approved Message Authentication
  Codes. Every configured MAC is validated against a configurable allowlist
  of secure algorithms.
rationale: >
  Improper SSH MACs configuration could weaken the security of remote access
  to the system. Weak or unapproved MAC algorithms may fail to detect data
  tampering during SSH sessions.
severity: medium
category: access-control
tags: [ssh, sshd, access-control, cryptography]

depends_on: [pkg-openssh-server-present]

references:
  cis:
    rhel9_v2: { section: "5.1.6", level: "L1", type: "Automated" }
  nist_800_53: ["AC-17", "SC-8"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        approved="{{ ssh_approved_macs }}"
        configured=$(sshd -T 2>/dev/null | grep -i '^macs ' | awk '{print $2}')
        if [ -z "$configured" ]; then echo "FAIL: macs not configured"; exit 1; fi
        bad=""
        for alg in $(echo "$configured" | tr ',' ' '); do
          case ",$approved," in
            *",$alg,"*) ;;
            *) bad="$bad $alg" ;;
          esac
        done
        if [ -n "$bad" ]; then
          echo "FAIL: unapproved mac algorithm(s):$bad"
          exit 1
        fi
        echo "OK: all mac algorithms approved ($configured)"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Configure MACs with site-approved algorithms per crypto policy"
