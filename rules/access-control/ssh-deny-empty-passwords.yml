id: ssh-deny-empty-passwords
title: Ensure sshd PermitEmptyPasswords is disabled
description: 'The sshd PermitEmptyPasswords directive must be properly configured.

  '
rationale: 'Improper SSH PermitEmptyPasswords configuration could weaken the security
  of remote access to the system.

  '
severity: medium
category: access-control
tags:
- ssh
- sshd
- access-control
depends_on:
- pkg-openssh-server-present
references:
  cis:
    rhel9:
      section: 5.1.19
      level: L1
      type: Automated
    rhel10:
      section: 5.1.19
      level: L1
      type: Automated
    rhel8:
      section: 5.1.21
      level: L1
      type: Automated
  nist_800_53:
  - AC-17
  - SC-8
  - AC-3
  - IA-2
  stig:
    rhel8:
      vuln_id: V-230380
      stig_id: RHEL-08-020330
      severity: CAT I
      cci:
      - CCI-000366
    rhel9:
      vuln_id: V-257984
      stig_id: RHEL-09-255040
      severity: CAT I
      cci:
      - CCI-000766
platforms:
- family: rhel
  min_version: 8
implementations:
- when: sshd_config_d
  check:
    method: sshd_effective_config
    key: permitemptypasswords
    expected: 'no'
  remediation:
    mechanism: config_set_dropin
    dir: /etc/ssh/sshd_config.d
    file: 00-kensa-permit-empty-passwords.conf
    key: PermitEmptyPasswords
    value: 'no'
    reload: sshd
- default: true
  check:
    method: sshd_effective_config
    key: permitemptypasswords
    expected: 'no'
  remediation:
    mechanism: config_set
    path: /etc/ssh/sshd_config
    key: PermitEmptyPasswords
    value: 'no'
    separator: ' '
    reload: sshd
