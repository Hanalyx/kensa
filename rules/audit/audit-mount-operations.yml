id: audit-mount-operations
title: Audit mount and unmount operations
description: 'The system must audit all mount and unmount operations to track filesystem
  changes.

  '
rationale: 'Unauthorized mounts could be used to access data or bypass security controls.
  Auditing mount operations provides visibility into filesystem changes and potential
  attack attempts.

  '
severity: medium
category: audit
tags:
- audit
- mount
- filesystem
- stig
depends_on:
- auditd-enabled
references:
  stig:
    # RHEL 9 STIG V2R8 has no audit control for the mount() syscall (V-258210
    # audits the /usr/bin/mount COMMAND, not the syscall this rule watches); the
    # prior rhel9 cite pointed at an unrelated mount-option control.
    rhel8:
      vuln_id: V-230423
      severity: CAT II
  nist_800_53:
  - AU-2
  - AU-12
  cis:
    rhel9:
      section: 6.3.3.10
      level: L1
      type: Automated
    rhel10: { section: "6.3.3.21", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.3.10", level: "L2", type: "Automated" }
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: audit_rule_exists
    rule: -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k mounts
  remediation:
    mechanism: audit_rule_set
    rule: -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k mounts
    persist_file: /etc/audit/rules.d/50-mounts.rules
