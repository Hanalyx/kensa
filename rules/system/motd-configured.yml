id: motd-configured
title: Ensure message of the day is configured properly
description: >
  The /etc/motd file contains the message of the day that is displayed to
  users after login. It should not contain OS or kernel version information.
rationale: >
  Displaying OS version information to users provides attackers with details
  about the system that could be used to identify vulnerabilities. The banner
  should contain only authorized use warnings.
severity: low
category: system
tags: [banner, motd, login, security]

references:
  cis:
    rhel9: { section: "1.7.1", level: "L1", type: "Automated" }
  nist_800_53: ["AC-8"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: command
      run: |
        if [ ! -f /etc/motd ]; then
          echo "OK: /etc/motd does not exist"
          exit 0
        fi
        grep -qEi '(\\v|\\r|\\m|\\s|$(grep VERSION /etc/os-release))' /etc/motd 2>/dev/null
        if [ $? -eq 0 ]; then
          echo "FAIL: /etc/motd contains OS information"
          exit 1
        fi
        echo "OK: /etc/motd properly configured"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Remove OS version information from /etc/motd or replace with authorized use warning"
