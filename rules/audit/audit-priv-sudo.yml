id: audit-priv-sudo
title: Audit privileged execution of /usr/bin/sudo (Ubuntu)
description: >
  All uses of the /usr/bin/sudo command must generate an audit record so that
  privileged command execution can be traced to an individual.
rationale: >
  Auditing execution of privileged commands allows detection of misuse
  and supports forensic investigation of privilege escalation.
severity: medium
category: audit
tags: [audit, auditd, privileged]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270788"
      stig_id: "UBTU-24-900170"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260623"
      stig_id: "UBTU-22-654105"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=unset -k priv_cmd"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=unset -k priv_cmd"
      persist_file: "/etc/audit/rules.d/50-priv-sudo.rules"
