id: audit-network-change
title: Ensure events that modify the system's network environment are collected
description: >
  Changes to the network environment must be collected.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.3.5", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "auditctl -l 2>/dev/null | grep -qE 'system-locale'"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S sethostname,setdomainname -k system-locale"
      persist_file: "/etc/audit/rules.d/50-system_locale.rules"
