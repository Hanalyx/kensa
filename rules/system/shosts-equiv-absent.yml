id: shosts-equiv-absent
title: Ensure no shosts.equiv files exist
description: >
  The /etc/hosts.equiv and /etc/shosts.equiv files provide trusted host
  access without requiring passwords. These files must not exist on the
  system.
rationale: >
  The shosts.equiv and hosts.equiv files grant access to remote hosts
  without passwords. An attacker who compromises a listed host gains
  access without authenticating. These files must be removed.
severity: critical
category: system
tags: [authentication, rsh, trust, attack-surface]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230283"
      severity: "CAT I"
  nist_800_53: ["AC-17", "IA-2"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "find / -name shosts.equiv -o -name hosts.equiv 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "find / -name shosts.equiv -o -name hosts.equiv 2>/dev/null -exec rm -f {} +"
