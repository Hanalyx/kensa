id: no-unauthorized-accounts
title: Ensure there are no unauthorized local accounts
description: >
  RHEL 10 must not have unauthorized local interactive user accounts. Because the
  set of authorized accounts is defined by the ISSO and not derivable from the
  system, this control requires manual verification: the check lists the local
  interactive accounts (UID >= 1000) for comparison against the authorized list.
rationale: >
  Unauthorized accounts may be attacker-created backdoors or orphaned accounts
  that expand the attack surface. Every interactive account must be traceable to
  an authorized user.
severity: medium
transactional: false
category: access-control
tags: [accounts, users, authorization, stig, manual]

references:
  stig:
    rhel10:
      vuln_id: "V-281199"
      stig_id: "RHEL-10-600450"
      severity: "CAT II"
  nist_800_53: ["AC-2"]

platforms:
  - family: rhel
    min_version: 10

implementations:
  - default: true
    check:
      method: command
      run: |
        echo "MANUAL REVIEW REQUIRED: compare the local interactive user accounts below (UID >= 1000) against the list of accounts authorized by the ISSO. Any account not on the authorized list is a finding."
        awk -F: '$3 >= 1000 && $3 < 65534 {print "  " $1 " (UID " $3 ", shell " $7 ")"}' /etc/passwd 2>/dev/null
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Remove or disable any local interactive account that is not on the
        ISSO-authorized list (userdel -r <user> for a removable account, or lock
        it if retention is required).
