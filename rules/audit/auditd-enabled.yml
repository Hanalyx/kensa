id: auditd-enabled
title: Ensure auditd service is enabled and active
description: 'The auditd service must be enabled and running.

  '
rationale: 'The auditd service provides essential system functionality. If it is not
  running, the system may not meet security requirements.

  '
severity: high
category: audit
tags:
- service
- audit
- auditd
depends_on:
- auditd-installed
references:
  cis:
    rhel8:
      section: 6.3.1.4
      level: L2
      type: Automated
    rhel9:
      section: 6.3.1.4
      level: L1
      type: Automated
    rhel10: { section: "6.3.1.4", level: "L2", type: "Automated" }
    ubuntu24: { section: "6.2.1.2", level: "L2", type: "Automated" }
    ubuntu22: { section: "6.2.1.2", level: "L2", type: "Automated" }
  stig:
    rhel8:
      # V-244542/RHEL-08-030181 requires the audit service active so
      # records capture event type/source/location/outcome; blocked
      # until the mis-slotted rhel9 id was removed from this slot (#206).
      vuln_id: V-244542
      stig_id: RHEL-08-030181
      severity: CAT II
    rhel9:
      vuln_id: V-258152
      stig_id: RHEL-09-653015
      severity: CAT II
    ubuntu24:
      vuln_id: V-270657
      stig_id: UBTU-24-100410
      severity: CAT II
    ubuntu22:
      vuln_id: V-260591
      stig_id: UBTU-22-653015
      severity: CAT II
    rhel10:
      vuln_id: "V-280994"
      stig_id: "RHEL-10-200661"
      severity: "CAT II"
  nist_800_53:
  - AU-2
  - AU-3
  - AU-12
platforms:
- family: ubuntu
  min_version: 22
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: service_state
    name: auditd
    enabled: true
    active: true
  remediation:
    mechanism: service_enabled
    name: auditd
