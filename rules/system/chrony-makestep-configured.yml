id: chrony-makestep-configured
title: Ensure chrony steps the clock when the offset exceeds one second
description: >
  chrony must be configured with 'makestep 1 -1' so the system steps
  (rather than slews) its clock whenever the offset from the authoritative
  time source is greater than one second.
rationale: >
  Slewing a large clock offset can take a long time to converge, leaving
  security-relevant timestamps inaccurate. Stepping the clock on any offset
  above one second keeps audit and authentication timestamps trustworthy.
severity: low
transactional: false
category: system
tags: [chrony, time, ntp, stig]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270752"
      stig_id: "UBTU-24-600180"
      severity: "CAT III"
      cci: ["CCI-004926"]
    ubuntu22:
      vuln_id: "V-260520"
      stig_id: "UBTU-22-252015"
      severity: "CAT III"
      cci: ["CCI-002046", "CCI-004926"]
  nist_800_53: ["AU-8"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        # STIG: 'grep -ir makestep /etc/chrony*' must yield exactly 'makestep 1 -1'.
        ms=$(grep -rhiE '^[[:space:]]*makestep[[:space:]]' /etc/chrony.conf /etc/chrony/ 2>/dev/null | head -1)
        [ -n "$ms" ] || { echo "FAIL: makestep not configured under /etc/chrony"; exit 1; }
        norm=$(printf '%s\n' "$ms" | tr -s '[:space:]' ' ' | sed 's/^ *//; s/ *$//')
        [ "$norm" = "makestep 1 -1" ] || {
          echo "FAIL: makestep is '$norm', expected 'makestep 1 -1'"; exit 1; }
        echo "OK: $norm"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Set 'makestep 1 -1' in /etc/chrony/chrony.conf (or a file under
        /etc/chrony/conf.d/) and restart chrony: systemctl restart chrony.service
