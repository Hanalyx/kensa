id: audit-priv-apparmor_parser
title: Audit privileged execution of /sbin/apparmor_parser
description: >
  All uses of the /sbin/apparmor_parser command must generate an audit record so that
  AppArmor policy changes can be traced to an individual.
rationale: >
  Auditing execution of privileged commands allows detection of misuse
  and supports forensic investigation of privilege escalation.
severity: medium
category: audit
tags: [audit, auditd, privileged]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270793"
      stig_id: "UBTU-24-900220"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260604"
      stig_id: "UBTU-22-654010"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F path=/sbin/apparmor_parser -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/sbin/apparmor_parser -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng"
      persist_file: "/etc/audit/rules.d/50-priv-apparmor_parser.rules"
