id: audit-log-permissions
title: Set permissions on audit log files
description: >
  All audit log files in /var/log/audit must have restrictive permissions
  (0600 or more restrictive) with root ownership to prevent unauthorized
  access.
rationale: >
  Audit log files contain detailed records of security-relevant events.
  Unauthorized access to these files could reveal security monitoring
  capabilities or allow attackers to tamper with evidence.
severity: high
category: audit
tags: [audit, permissions, logging, security]

depends_on: [auditd-enabled]

references:
  cis:
    rhel9:  { section: "6.3.4.2", level: "L1", type: "Automated" }
    rhel10: { section: "6.3.4.2", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.4.2", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281054", stig_id: "RHEL-10-400185", severity: "CAT II" }
    rhel9: { vuln_id: "V-258167", stig_id: "RHEL-09-653090", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230396"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270827"
      stig_id: "UBTU-24-901300"
      severity: "CAT II"
      cci: ["CCI-000162", "CCI-000163"]
    ubuntu22:
      vuln_id: "V-260597"
      stig_id: "UBTU-22-653045"
      severity: "CAT II"
      cci: ["CCI-000162", "CCI-000163"]
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      # 0600 "or more restrictive": flag a file only if it carries any
      # permission beyond owner read/write (-perm /0177), or is not root-owned.
      # The exact "! -perm 600" form wrongly flagged auditd's rotated logs,
      # which ship 0400 (more restrictive, hence compliant).
      method: command
      run: "find /var/log/audit -type f \\( -perm /0177 -o ! -user root -o ! -group root \\) 2>/dev/null | head -1"
      expected_exit: 0
      expected_stdout: ""
    remediation:
      # Scope to over-permissive files so remediation never LOOSENS a rotated
      # log that is already more restrictive than 0600 (e.g. 0400).
      mechanism: file_permissions
      find_paths:
        - /var/log/audit
      find_type: f
      find_args: "-perm /0177"
      owner: root
      group: root
      mode: "0600"
