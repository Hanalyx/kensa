id: ssh-macs-fips-ubuntu
title: Configure SSH to use FIPS-approved MACs (Ubuntu)
description: >
  The SSH daemon must be configured to use only Message Authentication
  Codes (MACs) employing FIPS 140-3 approved cryptographic hashes. This
  rule carries the Ubuntu STIG references and remediation value.
rationale: >
  FIPS-approved MAC algorithms have been validated for integrity
  protection. Restricting the SSH daemon to the approved set ensures the
  integrity of transmitted information cannot be undermined by a weaker
  hash.
severity: medium
category: access-control
tags: [ssh, fips, macs, cryptography, stig]

depends_on: [pkg-openssh-server-present]

references:
  stig:
    ubuntu24:
      vuln_id: V-270668
      stig_id: UBTU-24-100830
      severity: CAT II
    ubuntu22:
      vuln_id: V-260532
      stig_id: UBTU-22-255055
      severity: CAT II
  nist_800_53: ["SC-8", "SC-13"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        command -v sshd >/dev/null 2>&1 || exit 0
        macs=$(sshd -T 2>/dev/null | awk '/^macs /{print $2}')
        if [ -z "$macs" ]; then
          echo "FAIL: could not read effective MACs (sshd -T needs root)"
          exit 1
        fi
        if echo "$macs" | tr ',' '\n' | grep -qvE '^(hmac-sha2-256|hmac-sha2-512|hmac-sha2-256-etm@openssh\.com|hmac-sha2-512-etm@openssh\.com)$'; then
          echo "FAIL: non-FIPS MAC in effective config: $macs"
          exit 1
        fi
        echo "OK: $macs"
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/ssh/sshd_config.d"
      file: "00-kensa-fips-macs.conf"
      key: "MACs"
      value: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
      restart: sshd
