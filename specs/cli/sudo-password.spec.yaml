spec:
    id: cli-sudo-password-flag
    version: 0.1.0
    status: draft
    tier: 3

    context:
        system: kensa
        feature: cli-sudo-password
        description: |
            sudo-with-password support on the scan/remediate transport.
            Reverses the prior "sudo -n only, no password fallback"
            design decision so Kensa serves organizations that run
            EITHER passwordless sudo OR sudo-with-password seamlessly
            (the latter is common where "no NOPASSWD sudoers" is itself
            an enforced CIS/STIG control).

            See docs/roadmap/SUDO_PASSWORD_SCAN_DECISION.md for the
            founder ratification and the mechanism rationale (`sudo -S`
            over the agentless scan transport, NOT SUDO_ASKPASS/`-A`
            which would need a helper on every target host).

            Operator-facing modes (detect / check / remediate / plan):
              kensa check --sudo --sudo-password=pw ...   (literal)
              kensa check --sudo --sudo-password ...       (TTY prompt)
              KENSA_SUDO_PASSWORD=pw kensa check --sudo ... (env)
              kensa check --sudo ...                        (NOPASSWD;
                                                             sudo -n)

            Wires through api.HostConfig.SudoPassword and
            ssh.Config.SudoPassword. When set AND Sudo is true the
            transport runs `sudo -S -p '' sh -c '<cmd>'` and feeds the
            password over the ssh subprocess's stdin. `-p ''` suppresses
            sudo's prompt. The password is NEVER placed in argv and the
            api.Transport.Run contract has no stdin parameter, so the
            secret cannot reach captured stdout/stderr or recorded
            evidence (CheckEvidence / OSCAL). This matches the existing
            SSH-password precedent (sshpass + SSHPASS env, C-026): same
            secret class, kept out of argv, held in memory only.

    objective:
        summary: |
            Add SudoPassword to api.HostConfig and ssh.Config; switch
            the transport wrap to `sudo -S -p ''` with the password fed
            over stdin when set; generalize the connect-time sudo probe;
            add --sudo-password (+ KENSA_SUDO_PASSWORD env) to the four
            transport-opening subcommands.
        scope:
            includes:
                - api.HostConfig.SudoPassword (additive frozen-api field; MINOR bump)
                - ssh.Config.SudoPassword + the pure sudoWrap() helper
                - sudo -S -p '' wrap with the password on stdin only
                - Connect guard rejecting SudoPassword without Sudo
                - checkSudo probe generalization (password-rejected vs password-required)
                - --sudo-password flag (TTY-prompt sentinel) on detect/check/remediate/plan
                - KENSA_SUDO_PASSWORD env fallback (and the channel for --inventory)
                - resolveSudoPassword / resolveSudoPasswordFor / inventorySudoPassword helpers
            excludes:
                - SUDO_ASKPASS / sudo -A (needs an askpass helper on the target; violates agentless scan model)
                - --sudo-password on kensa rollback (no --password there today either; tracked follow-up)
                - sudo password in evidence envelopes (MUST NOT appear in the audit trail)
                - A wrapped command that also consumes stdin (single-line -S model; no current handler needs it)

    constraints:
        - id: C-01
          description: |
              The sudo password MUST be fed via the ssh subprocess's
              stdin only, NEVER interpolated into the command string
              (argv / /proc / captured stdout/stderr). sudoWrap returns
              the password solely as the stdin payload.
          type: security
          enforcement: error
        - id: C-02
          description: |
              Empty SudoPassword MUST keep the non-interactive
              `sudo -n` behavior, and the api/ field add MUST be
              backward-compatible (no break for callers that don't set
              it).
          type: technical
          enforcement: error
        - id: C-03
          description: |
              A sudo password without sudo enabled is meaningless and
              MUST be rejected: ssh.Connect errors when SudoPassword is
              set with Sudo false, and the CLI errors when
              --sudo-password is passed without --sudo. An ambient
              KENSA_SUDO_PASSWORD env value (flag not given) on a
              non-sudo command MUST be silently ignored, not errored.
          type: business
          enforcement: error
        - id: C-04
          description: |
              A wrong/expired sudo password MUST surface as a clean,
              actionable connect-time error ("sudo password rejected
              … verify …"), not raw sudo stderr and never as rule
              evidence.
          type: business
          enforcement: error
        - id: C-05
          description: |
              --sudo-password inline MUST be rejected with --inventory
              (one secret broadcast across a heterogeneous fleet is a
              footgun, mirroring --password). KENSA_SUDO_PASSWORD env is
              the supported shared-fleet channel and is applied to each
              inventory host.
          type: business
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              sudoWrap(cmd, false, *) passes the command through with no
              stdin payload and never embeds a password. Locked by
              TestSudoWrap (AC-01 subtest).
          references_constraints: [C-01, C-02]
          priority: high
        - id: AC-02
          description: |
              sudoWrap(cmd, true, "") == ("sudo -n sh -c '<cmd>'", ""):
              the NOPASSWD path is byte-for-byte unchanged. Locked by
              TestSudoWrap (AC-02 subtest).
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: |
              sudoWrap(cmd, true, pw) == ("sudo -S -p '' sh -c '<cmd>'",
              pw+"\n") AND the wrapped command string does NOT contain
              the password. The security invariant. Locked by
              TestSudoWrap (AC-03 subtest).
          references_constraints: [C-01]
          priority: critical
        - id: AC-04
          description: |
              api.HostConfig and ssh.Config carry SudoPassword;
              ssh.Factory wires HostConfig.SudoPassword into the
              transport Config. Backward-compatible add. Verified by
              go build of the engine/scan/remediate paths + code
              inspection at factory.go.
          references_constraints: [C-02]
          priority: high
        - id: AC-05
          description: |
              ssh.Connect rejects SudoPassword set with Sudo false,
              before any connection attempt. Locked by
              TestConnect_SudoPasswordRequiresSudo.
          references_constraints: [C-03]
          priority: critical
        - id: AC-06
          description: |
              sudoPasswordRejected detects the `sudo -S`
              authentication-failure signatures, and checkSudo emits the
              "sudo password rejected" error on the password path.
              Locked by TestSudoPasswordRejected.
          references_constraints: [C-04]
          priority: high
        - id: AC-07
          description: |
              resolveSudoPassword: empty → KENSA_SUDO_PASSWORD env
              fallback; literal → pass-through (beats env); sentinel on
              non-TTY → error mentioning TTY. Locked by
              TestResolveSudoPassword_* .
          references_constraints: [C-03]
          priority: high
        - id: AC-08
          description: |
              resolveSudoPasswordFor: an explicitly-passed
              --sudo-password without --sudo is a usage error; an
              ambient env value without --sudo is ignored (returns "");
              with --sudo the value flows through. inventorySudoPassword
              returns the env value only when sudo is on. Locked by
              TestResolveSudoPasswordFor_RequiresSudo + TestInventorySudoPassword.
          references_constraints: [C-03]
          priority: high
        - id: AC-09
          description: |
              --sudo-password inline with --inventory is a usage error
              naming KENSA_SUDO_PASSWORD as the shared-fleet channel;
              the fan-out applies the env value to each host. Spec-locked
              at code-inspection level (check's --inventory guard +
              inventorySudoPassword in the fan-out hostCfg).
          references_constraints: [C-05]
          priority: medium

    tags: [cli, target-options, sudo, password, ssh, tier-3]
