id: audit-tools-owner
title: Ensure audit tools owner is configured
description: >
  Audit tool binaries must be owned by root.
rationale: >
  Incorrect ownership or permissions on audit files could allow unauthorized users to tamper with audit evidence.
severity: medium
transactional: false
category: audit
tags: [audit, permissions]

depends_on: [auditd-enabled]

references:
  cis:
    rhel9: { section: "6.3.4.9", level: "L1", type: "Automated" }
    rhel10: { section: "6.3.4.9", level: "L2", type: "Automated" }
    ubuntu24: { section: "6.2.4.9", level: "L2", type: "Automated" }
    ubuntu22: { section: "6.2.4.9", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.4.9", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281077", stig_id: "RHEL-10-400300", severity: "CAT II" }
    rhel9: { vuln_id: "V-257924", stig_id: "RHEL-09-232220", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230473"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270822"
      stig_id: "UBTU-24-901240"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260507"
      stig_id: "UBTU-22-232110"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: command
      run: "find /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/rsyslogd /sbin/augenrules -type f ! -user root 2>/dev/null | head -1"
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "chown root /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/rsyslogd /sbin/augenrules"
