id: sysctl-net-ipv4-conf-default-accept-source-route
title: Ensure net.ipv4.conf.default.accept_source_route is set to 0
description: >
  The kernel parameter net.ipv4.conf.default.accept_source_route must be set to 0 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  cis:
    rhel8: { section: "3.3.1.15", level: "L1", type: "Automated" }
    rhel10: { section: "3.3.1.15", level: "L1", type: "Automated" }
    ubuntu22: { section: "3.3.1.15", level: "L1", type: "Automated" }
    ubuntu24: { section: "3.3.1.15", level: "L1", type: "Automated" }
  stig:
    rhel10:
      vuln_id: "V-281347"
      stig_id: "RHEL-10-800150"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-244552"
      stig_id: "RHEL-08-040249"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257964"
      stig_id: "RHEL-09-253045"
      severity: "CAT II"

platforms:
  - family: rhel
    min_version: 8

  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.default.accept_source_route
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.default.accept_source_route
      value: "0"
