id: coredump-backtrace-disabled
title: Disable core dump backtraces
description: >
  The systemd coredump service must be configured with ProcessSizeMax=0
  so that core dump backtraces are not generated.
rationale: >
  Disabling core dump backtraces prevents sensitive in-memory data from
  being captured and retained when a process crashes.
severity: medium
category: system
tags: [coredump, memory, information-disclosure]

references:
  cis:
    rhel8: { section: "1.5.9", level: "L1", type: "Automated" }
    rhel10: { section: "1.5.9", level: "L1", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-230315"
      stig_id: "RHEL-08-010675"
      severity: "CAT II"
  nist_800_53: ["CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "systemd-analyze cat-config systemd/coredump.conf 2>/dev/null | grep -E '^ProcessSizeMax=' | tail -1 | grep -q '^ProcessSizeMax=0$'"
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/systemd/coredump.conf.d"
      file: "00-kensa-coredump.conf"
      key: "ProcessSizeMax"
      value: "0"
      section: "[Coredump]"
