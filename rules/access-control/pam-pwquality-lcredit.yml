id: pam-pwquality-lcredit
title: Require lowercase character in password
description: >
  The lcredit parameter in /etc/security/pwquality.conf controls the credit
  given for having lowercase characters in the password. A negative value
  requires at least that many lowercase characters.
rationale: >
  Requiring lowercase characters increases password complexity and makes
  passwords more resistant to dictionary attacks.
severity: medium
category: access-control
tags: [pam, password, authentication, pwquality]

depends_on: [package-libpwquality-installed]

references:
  cis:
    rhel8:  { section: "5.4.1.4", level: "L1", type: "Automated" }
    rhel9:  { section: "5.4.1",   level: "L1", type: "Automated" }
    rhel10: { section: "5.4.1.4", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.4.1.4", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.4.1.4", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258102"
      stig_id: "RHEL-09-611065"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230358"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270727"
      stig_id: "UBTU-24-400270"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260561"
      stig_id: "UBTU-22-611015"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281183"
      stig_id: "RHEL-10-600240"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(a)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "lcredit"
      expected: "-1"
      comparator: "<="
    remediation:
      mechanism: config_set
      path: "/etc/security/pwquality.conf"
      key: "lcredit"
      value: "-1"
      separator: " = "
