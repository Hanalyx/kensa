id: sysctl-net-ipv6-conf-all-accept-ra
title: Ensure net.ipv6.conf.all.accept_ra is set to 0
description: >
  The kernel parameter net.ipv6.conf.all.accept_ra must be set to 0 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  stig:
    rhel10:
      vuln_id: "V-281354"
      stig_id: "RHEL-10-800220"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230541"
      stig_id: "RHEL-08-040261"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257971"
      stig_id: "RHEL-09-254010"
      severity: "CAT II"
  cis:
    rhel9:
      section: 3.3.11
      level: L1
      type: Automated
    rhel8:
      section: 3.3.2.7
      level: L1
      type: Automated
    rhel10: { section: "3.3.2.7", level: "L1", type: "Automated" }
    ubuntu22: { section: "3.3.2.7", level: "L1", type: "Automated" }
    ubuntu24: { section: "3.3.2.7", level: "L1", type: "Automated" }
  nist_800_53:

platforms:
  - family: rhel
    min_version: 8

  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv6.conf.all.accept_ra
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv6.conf.all.accept_ra
      value: "0"
