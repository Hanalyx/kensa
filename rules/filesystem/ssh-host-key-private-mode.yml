id: ssh-host-key-private-mode
title: Ensure SSH private host key files have mode 0640 or less
description: >
  SSH private host key files must have mode 0640 or less permissive and
  be accessible only to root.
rationale: >
  SSH private host keys must be protected from unauthorized access.
  Exposure of private host keys allows impersonation of the server and
  man-in-the-middle attacks.
severity: medium
category: filesystem
tags: [file-permissions, ssh, cryptography]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230287"
      severity: "CAT II"
  nist_800_53: ["AC-6", "SC-28"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "find /etc/ssh -name 'ssh_host_*_key' ! -name '*.pub' -type f -perm /137 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "find /etc/ssh -name 'ssh_host_*_key' ! -name '*.pub' -type f -exec chmod go-rwx {} +"
