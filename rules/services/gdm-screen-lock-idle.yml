id: gdm-screen-lock-idle
title: Ensure GDM screen locks when the user is idle
description: >
  If GNOME Display Manager is in use, the screen should lock
  automatically after a period of inactivity.
rationale: >
  Automatic screen locking prevents unauthorized access when users
  leave their workstations unattended.
severity: medium
category: services
tags: [gdm, gnome, screen-lock, security]

conflicts_with: [gdm-removed]

references:
  cis:
    rhel9_v2: { section: "1.8.4", level: "L1", type: "Automated" }
  nist_800_53: ["AC-11"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if idle lock is configured
        if grep -qr "idle-delay=uint32" /etc/dconf/db/local.d/ 2>/dev/null &&
           grep -qr "lock-delay=uint32" /etc/dconf/db/local.d/ 2>/dev/null; then
          echo "OK: GDM screen lock on idle is configured"
          exit 0
        fi
        echo "FAIL: GDM screen lock on idle is not configured"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Configure screen lock in /etc/dconf/db/local.d/00-screensaver:
        [org/gnome/desktop/session]
        idle-delay=uint32 900
        [org/gnome/desktop/screensaver]
        lock-delay=uint32 5
        Then run: dconf update

  - default: true
    check:
      method: package_state
      name: "gdm"
      state: "absent"
    remediation:
      mechanism: package_absent
      name: "gdm"
