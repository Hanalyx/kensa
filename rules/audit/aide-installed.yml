id: aide-installed
title: Install and initialize AIDE
description: >
  AIDE (Advanced Intrusion Detection Environment) must be installed and its
  database initialized to provide filesystem integrity monitoring. AIDE detects
  unauthorized modifications to system files.
rationale: >
  Without file integrity monitoring, unauthorized modifications to critical
  system files (binaries, libraries, configuration) may go undetected. AIDE
  provides a baseline against which changes are compared.
severity: medium
transactional: false
category: audit
tags: [aide, file-integrity, intrusion-detection]

references:
  cis:
    rhel8:  { section: "6.1.1",  level: "L1", type: "Automated" }
    rhel9:  { section: "6.1.1",  level: "L1", type: "Automated" }
    rhel10:  { section: "6.1.1", level: "L1", type: "Automated" }
  stig:
    rhel8:                                                                   # check verifies AIDE installed (V-230263) AND initialized — aide.db present (V-251710)
      - { vuln_id: "V-230263", stig_id: "RHEL-08-010360", severity: "CAT II" }   # AIDE installed
      - { vuln_id: "V-251710", stig_id: "RHEL-08-010359", severity: "CAT II" }   # AIDE installed + initialized
    rhel9:
      vuln_id: "V-258134"
      stig_id: "RHEL-09-651010"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-280977"
      stig_id: "RHEL-10-200630"
      severity: "CAT II"
    ubuntu24:                                                                # Ubuntu impl verifies AIDE INSTALLED (V-270649). Init/config (V-270650) is a separate control → separate rule (aide-db-initialized), since aideinit belongs in its own transaction.
      vuln_id: "V-270649"
      stig_id: "UBTU-24-100100"
      severity: "CAT II"
      cci: ["CCI-002696"]
    ubuntu22:
      vuln_id: "V-260582"
      stig_id: "UBTU-22-651010"
      severity: "CAT II"
      cci: ["CCI-002696"]
  nist_800_53: ["SC-28", "SI-7"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - when: apt                                                              # Debian/Ubuntu: aide-common package (V-270649 install). Init (aide.db) lives in aide-db-initialized.
    check:
      method: package_state
      name: "aide"
      state: "present"
    remediation:
      mechanism: apt_present
      name: "aide"
  - default: true
    check:
      checks:
        - method: package_state
          name: "aide"
          state: "present"
        - method: file_exists
          path: "/var/lib/aide/aide.db.gz"
    remediation:
      steps:
        - mechanism: package_present
          name: "aide"
        - mechanism: command_exec
          run: "aide --init && mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz"
          unless: "test -f /var/lib/aide/aide.db.gz"
