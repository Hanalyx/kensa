id: var-log-dir-permissions
title: Set permissions on /var/log directory
description: >
  The /var/log directory must have mode 0755 or less permissive and
  be owned by root with group root.
rationale: >
  The /var/log directory stores system and application logs. Improper
  permissions could allow unauthorized access to or modification of
  log data.
severity: medium
category: filesystem
tags: [file-permissions, logging, security]

references:
  stig:
    rhel8:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-230248", severity: "CAT II" }                          # mode 0755
      - { vuln_id: "V-230249", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-230250", severity: "CAT II" }                          # group root
    rhel9:
      - { vuln_id: "V-257885", severity: "CAT II" }                          # mode 0755
      - { vuln_id: "V-257914", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257915", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281033", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-281034", severity: "CAT II" }                          # group root
      - { vuln_id: "V-281061", severity: "CAT II" }                          # mode 0755
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/var/log"
      owner: "root"
      group: "root"
      mode: "0755"
    remediation:
      mechanism: file_permissions
      path: "/var/log"
      owner: "root"
      group: "root"
      mode: "0755"
