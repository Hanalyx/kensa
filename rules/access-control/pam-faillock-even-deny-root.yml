id: pam-faillock-even-deny-root
title: Apply account lockout to root account
description: >
  The account lockout policy must apply to the root account to prevent
  brute-force attacks against the superuser.
rationale: >
  The root account is a high-value target for attackers. Applying
  lockout policies prevents unlimited password guessing attempts
  against the most privileged account.
severity: high
category: access-control
tags: [pam, faillock, root, account-lockout, stig]

depends_on: [pam-faillock-deny]

references:
  cis:
    rhel9: { section: "5.3.3.1.3", level: "L1", type: "Automated" }
    rhel8:  { section: "5.3.3.1.3", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.1.3", level: "L2", type: "Automated" }
    ubuntu22: { section: "5.3.3.1.3", level: "L2", type: "Automated" }
    ubuntu24: { section: "5.3.3.1.3", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281195", stig_id: "RHEL-10-600415", severity: "CAT II" }
    rhel9:
      vuln_id: "V-258055"
      stig_id: "RHEL-09-411080"
      severity: "CAT II"
    rhel8:                                                                   # this check verifies /etc/security/faillock.conf (V-230345); pam.d form (V-230344) pending the alternatives-vs-both-required call
      - { vuln_id: "V-230344", severity: "CAT II" }                              # pam.d form (not verified by this faillock.conf check)
      - { vuln_id: "V-230345", stig_id: "RHEL-08-020023", severity: "CAT II" }   # /etc/security/faillock.conf form
  nist_800_53: ["AC-7"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/faillock.conf"
      key: "even_deny_root"
      expected: ""
    remediation:
      mechanism: config_append
      path: "/etc/security/faillock.conf"
      line: "even_deny_root"
