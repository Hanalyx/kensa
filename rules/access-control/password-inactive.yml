id: password-inactive
title: Ensure inactive password lock is configured
description: >
  Inactive password lock must be configured to disable unused accounts.
rationale: >
  Dormant accounts with valid passwords are attractive targets for attackers.
severity: medium
category: access-control
tags: [password, inactive, account]

references:
  cis:
    rhel9_v2: { section: "5.4.1.5", level: "L1", type: "Automated" }
  nist_800_53: ["AC-2", "IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        val=$(useradd -D 2>/dev/null | grep -oP 'INACTIVE=\K-?\d+')
        if [ -z "$val" ]; then
          echo "FAIL: INACTIVE not found in useradd defaults"
          exit 1
        fi
        if [ "$val" -lt 1 ] || [ "$val" -gt 45 ]; then
          echo "FAIL: INACTIVE=$val (expected 1-45)"
          exit 1
        fi
        echo "OK: INACTIVE=$val"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "useradd -D -f 30"
