id: pam-sha512-rounds-password-auth
title: Configure sufficient SHA-512 hashing rounds in password-auth
description: >
  The pam_unix module in /etc/pam.d/password-auth must be configured
  to use a sufficient number of SHA-512 hashing rounds (at least 100000)
  to increase the computational cost of password cracking.
rationale: >
  Using a low number of hashing rounds makes it easier for attackers to
  crack password hashes offline. Configuring 100000 or more rounds
  significantly increases the time required for brute-force attacks.
severity: medium
category: access-control
tags: [pam, password, sha512, hashing, password-auth]

references:
  stig:
    rhel10: { vuln_id: "V-281220", stig_id: "RHEL-10-600720", severity: "CAT II" }
    rhel9:
      vuln_id: "V-258099"
      stig_id: "RHEL-09-611050"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(c)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        rounds=$(grep -Po '(?<=rounds=)[0-9]+' /etc/pam.d/password-auth 2>/dev/null | head -1)
        [ -n "$rounds" ] && [ "$rounds" -ge {{ shadow_crypt_min_rounds }} ]
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/login.defs"
      key: "SHA_CRYPT_MIN_ROUNDS"
      value: "5000"
