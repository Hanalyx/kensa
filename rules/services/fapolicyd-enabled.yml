id: fapolicyd-enabled
title: Ensure fapolicyd service is enabled
description: >
  The fapolicyd service must be enabled to enforce application
  whitelisting policies.
rationale: >
  Without fapolicyd running, application execution policies
  are not enforced, allowing unauthorized software to run.
severity: medium
category: services
tags: [service, security, application-whitelisting]

depends_on: [pkg-fapolicyd-present]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258090"
      severity: "CAT II"
  nist_800_53: ["CM-7", "CM-11"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: service_state
      name: "fapolicyd"
      enabled: true
      active: true
    remediation:
      mechanism: service_enabled
      name: "fapolicyd"
