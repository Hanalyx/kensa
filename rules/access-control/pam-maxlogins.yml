id: pam-maxlogins
title: Limit concurrent sessions to ten for all accounts
description: >
  The system must limit the number of concurrent sessions to ten
  for all accounts and account types using PAM limits.
rationale: >
  Limiting concurrent sessions reduces the risk of resource exhaustion
  and limits the damage from compromised accounts by preventing an
  attacker from opening many simultaneous sessions.
severity: medium
category: access-control
tags: [pam, sessions, limits, access-control]

references:
  stig:
    rhel10: { vuln_id: "V-281203", stig_id: "RHEL-10-600475", severity: "CAT III" }
    rhel9:
      vuln_id: "V-258069"
      stig_id: "RHEL-09-412040"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230346"
      severity: "CAT III"
    ubuntu24:
      vuln_id: "V-270677"
      stig_id: "UBTU-24-200000"
      severity: "CAT III"
      cci: ["CCI-000054"]
    ubuntu22:
      vuln_id: "V-260552"
      stig_id: "UBTU-22-412020"
      severity: "CAT III"
      cci: ["CCI-000054"]
  nist_800_53: ["AC-10"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        grep -rE '^\*\s+hard\s+maxlogins\s+[0-9]+' /etc/security/limits.conf /etc/security/limits.d/ 2>/dev/null | \
          awk '{print $NF}' | awk 'BEGIN{max=9999} {if ($1+0 < max) max=$1+0} END{if (max <= 10) exit 0; exit 1}'
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/security/limits.d"
      file: "00-kensa-maxlogins.conf"
      key: "* hard maxlogins"
      value: "10"
