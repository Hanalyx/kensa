# Aegis pre-commit configuration
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

default_language_version:
  python: python3

repos:
  # ==========================================================================
  # General file hygiene
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags in rules
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # ==========================================================================
  # Ruff - Fast Python linter and formatter (replaces flake8, isort, black)
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        files: ^(runner|schema|tests)/
        args:
          - '--fix'
          - '--select=E,F,W,I,B,C4,SIM,UP'
          # E,F,W = pyflakes + pycodestyle basics
          # I = isort (import sorting)
          # B = flake8-bugbear (common bugs)
          # C4 = flake8-comprehensions
          # SIM = simplify
          # UP = pyupgrade (modern Python syntax)
          - '--ignore=E501'
          # E501 = line length (handled by formatter)
      - id: ruff-format
        files: ^(runner|schema|tests)/

  # ==========================================================================
  # Mypy - Static type checking
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^(runner|schema)/
        args:
          - '--ignore-missing-imports'
          - '--no-error-summary'
        additional_dependencies:
          - 'types-PyYAML'
          - 'types-paramiko'

  # ==========================================================================
  # Pydocstyle - Docstring style enforcement (Google convention)
  # ==========================================================================
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        files: ^(runner|schema)/
        args:
          - '--convention=google'
          - '--add-ignore=D100,D104,D105,D107'
          # D100 = Missing docstring in public module (too strict)
          # D104 = Missing docstring in public package (__init__.py)
          # D105 = Missing docstring in magic method
          # D107 = Missing docstring in __init__

  # ==========================================================================
  # YAML Schema validation for rules
  # ==========================================================================
  - repo: local
    hooks:
      - id: validate-rules
        name: Validate rule YAML against schema
        entry: bash -c 'PYTHONPATH=. python3 schema/validate.py "$@"' --
        language: system
        files: ^rules/.*\.ya?ml$
        pass_filenames: true
