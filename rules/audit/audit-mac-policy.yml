id: audit-mac-policy
title: Ensure events that modify the system's Mandatory Access Controls are collected
description: >
  Changes to Mandatory Access Controls must be collected.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.3.14", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-k MAC-policy"
    remediation:
      steps:
        - mechanism: audit_rule_set
          rule: "-w /etc/selinux -p wa -k MAC-policy"
          persist_file: "/etc/audit/rules.d/50-MAC-policy.rules"
        - mechanism: audit_rule_set
          rule: "-w /usr/share/selinux -p wa -k MAC-policy"
          persist_file: "/etc/audit/rules.d/50-MAC-policy.rules"
