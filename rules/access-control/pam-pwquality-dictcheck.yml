id: pam-pwquality-dictcheck
title: Enable dictionary check for passwords
description: >
  The dictcheck parameter in /etc/security/pwquality.conf enables checking
  whether passwords are based on dictionary words.
rationale: >
  Dictionary words and common phrases are easily guessed by attackers using
  dictionary attacks. Enabling dictionary checking prevents users from
  using weak passwords based on common words.
severity: medium
category: access-control
tags: [pam, password, authentication, pwquality]

depends_on: [package-libpwquality-installed]

references:
  cis:
    rhel8:  { section: "5.3.3.2.6", level: "L1", type: "Automated" }
    rhel9:  { section: "5.3.3.2.6", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.2.6", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.3.3.2.6", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.3.2.6", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258110"
      stig_id: "RHEL-09-611105"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230377"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270704"
      stig_id: "UBTU-24-300014"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260564"
      stig_id: "UBTU-22-611030"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281191"
      stig_id: "RHEL-10-600320"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(a)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      # Effective dictcheck (base + .conf.d/ drop-ins, last wins) must be
      # explicitly 1 — the STIG requirement (V-258110/V-230377/V-281191/
      # V-260564/V-270704 treat absent/commented as a finding); also satisfies
      # CIS 5.3.3.2.6 (!= 0). Absent -> FAIL (the invisible libpwquality default
      # is not an enforced control on a hardened baseline).
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "dictcheck"
      expected: "1"
      dropin_dir: "/etc/security/pwquality.conf.d"
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/security/pwquality.conf.d"
      file: "50-kensa-dictcheck.conf"
      key: "dictcheck"
      value: "1"
      separator: " = "
