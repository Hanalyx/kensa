kind: CheckHandler
metadata:
  name: FileContentNoMatch
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Verifies that a file does NOT contain a line matching a regex pattern.
    If the file does not exist, the check passes (absent file cannot
    contain a prohibited pattern).
  technical_context: >
    Dispatched by runner.handlers.checks.run_check when
    check["method"] == "file_content_no_match". Implemented in
    runner/handlers/checks/_file.py as _check_file_content_no_match.
  dependencies:
    - runner.shell_util.quote
    - runner.shell_util.file_exists
    - runner._types.CheckResult
    - runner._types.Evidence
    - runner.ssh.SSHSession
    - datetime
  callers:
    - runner.engine.run_check
  related_specs:
    - file_content_match.spec.yaml
    - file_content.spec.yaml
    - file_exists.spec.yaml

objective:
  summary: >
    Verify that a remote file does not contain a prohibited regex pattern.
    Missing files pass automatically. Uses grep -qE to test, with inverted
    pass/fail logic compared to file_content_match.
  acceptance_criteria:
    AC-1: "File absent (does not exist) returns passed=True."
    AC-2: "Pattern not found in existing file returns passed=True."
    AC-3: "Pattern found in file returns passed=False."
    AC-4: "Evidence method is always 'file_content_no_match'."
    AC-5: "File not found detail is '{path}: not found (pattern cannot exist)'."
    AC-6: "Detail format is '{path}: pattern not found (as required)' on pass and '{path}: contains prohibited pattern' on fail."

constraints:
  - "MUST check file existence via shell_util.file_exists() before running grep."
  - "MUST return passed=True when file does not exist (absent file cannot contain pattern)."
  - "MUST use shell_util.quote() to escape both path and pattern."
  - "MUST use grep -qE (extended regex, quiet mode)."
  - "MUST capture check_time before executing any SSH commands."
  - "MUST set evidence.method to 'file_content_no_match' in all code paths."
  - "MUST NOT modify any remote state (pure measurement)."

input_contract:
  - field: path
    type: str
    required: true
    description: Absolute path to the file to search.
  - field: pattern
    type: str
    required: true
    description: Extended regex pattern that should NOT match any line in the file.

behavior:
  - "Extract path from c['path'] and pattern from c['pattern'] (both required keys)."
  - "Capture check_time as datetime.now(timezone.utc)."
  - >
    Check file existence via shell_util.file_exists(ssh, path). If file
    does not exist, return CheckResult(passed=True) with detail
    f"{path}: not found (pattern cannot exist)", evidence
    command=f"test -e {path}", evidence actual="file not found".
  - "Build grep command: f'grep -qE {shell_util.quote(pattern)} {shell_util.quote(path)}'."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If not result.ok (grep found no match): return
    CheckResult(passed=True) with detail f"{path}: pattern not found
    (as required)" and evidence actual="pattern not found".
  - >
    If result.ok (grep found a match): return CheckResult(passed=False)
    with detail f"{path}: contains prohibited pattern" and evidence
    actual="pattern found".

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass_file_absent:
      passed: true
      detail: "'{path}: not found (pattern cannot exist)'"
    pass_no_match:
      passed: true
      detail: "'{path}: pattern not found (as required)'"
    fail_match:
      passed: false
      detail: "'{path}: contains prohibited pattern'"
  evidence_fields:
    method: "file_content_no_match"
    command: "grep -qE {quoted_pattern} {quoted_path} (or test -e {path} on file-absent path)"
    stdout: Raw stdout (empty for grep -q and file-absent paths)
    stderr: Raw stderr
    exit_code: "Actual exit code (0 for match found, 1 for no match or file absent)"
    expected: "does not contain pattern '{pattern}'"
    actual: "'file not found', 'pattern not found', or 'pattern found'"
    timestamp: UTC datetime captured before command execution
  detail_formats:
    - "{path}: not found (pattern cannot exist)"
    - "{path}: pattern not found (as required)"
    - "{path}: contains prohibited pattern"
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'file_content_no_match'."
    - "Missing file always results in passed=True."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestFileContentNoMatch
      - TestFileContentNoMatchSpecDerived
    count: 6
