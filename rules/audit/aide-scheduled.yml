id: aide-scheduled
title: Ensure filesystem integrity is regularly checked
description: >
  Filesystem integrity must be regularly checked using AIDE. The check
  accepts any valid scheduling mechanism: systemd timers (aidecheck.timer
  or aide.timer), cron jobs (/etc/cron.daily/aide, /etc/cron.d/), or
  root's crontab.
rationale: >
  Without regular integrity checks, unauthorized file modifications could
  go undetected indefinitely.
severity: medium
category: audit
tags: [aide, integrity, scheduled]

conflicts_with: [aide-cron-check]
depends_on: [aide-installed]

references:
  cis:
    rhel9_v2: { section: "6.1.2", level: "L1", type: "Automated" }
  nist_800_53: ["SI-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        systemctl is-enabled aidecheck.timer 2>/dev/null | grep -q enabled && echo "OK: aidecheck.timer enabled" && exit 0
        systemctl is-enabled aide.timer 2>/dev/null | grep -q enabled && echo "OK: aide.timer enabled" && exit 0
        test -f /etc/cron.daily/aide && echo "OK: /etc/cron.daily/aide exists" && exit 0
        grep -rq aide /etc/cron.d/ 2>/dev/null && echo "OK: aide in /etc/cron.d/" && exit 0
        crontab -u root -l 2>/dev/null | grep -q aide && echo "OK: aide in root crontab" && exit 0
        echo "FAIL: no AIDE periodic check scheduled"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Enable aidecheck.timer or add AIDE to root crontab or /etc/cron.daily/"
