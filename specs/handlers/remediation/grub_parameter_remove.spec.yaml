kind: RemediationHandler
metadata:
  name: GrubParameterRemove
  module: handlers/remediation
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Removes a kernel boot parameter from GRUB on a remote RHEL host using
    grubby. The parameter is removed from all installed kernels. Changes take
    effect on next boot.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["grub_parameter_remove"]. Implemented in
    runner/handlers/remediation/_system.py as _remediate_grub_parameter_remove.
  dependencies:
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/grub_parameter_set.spec.yaml

objective:
  summary: >
    Remove a kernel boot parameter from GRUB configuration via grubby, applied
    to all installed kernels. Changes take effect on next boot.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would remove
      kernel arg: {key}") and no SSH commands are executed.
    AC-2: >
      Success path: When grubby succeeds, returns (True, "Removed kernel arg:
      {key}").
    AC-3: >
      Grubby failure: When grubby fails (non-zero exit), returns (False,
      "grubby failed: {stderr}").
    AC-4: >
      Shell quoting: The key is passed through shell_util.quote() in the
      grubby command.
    AC-5: >
      All kernels: The grubby command uses --update-kernel=ALL to apply to all
      installed kernels.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for the key in the grubby command.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - Changes require a reboot to take effect; the handler does not reboot the system.
  - The handler does not check whether the parameter is currently present before attempting removal.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "grub_parameter_remove" (used by dispatch, not by handler directly)
  - field: key
    type: str
    required: true
    description: Kernel boot parameter name to remove

behavior:
  - "Extract fields: Read key from the remediation dict."
  - "Dry-run check: If dry_run=True, return (True, \"Would remove kernel arg: {key}\") immediately."
  - "Remove GRUB parameter: Execute grubby --update-kernel=ALL --remove-args={quoted_key} via SSH."
  - "Check result: If grubby fails (non-zero exit), return (False, \"grubby failed: {stderr}\")."
  - "Success return: Return (True, \"Removed kernel arg: {key}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would remove kernel arg: {key}\""
    - "Success: \"Removed kernel arg: {key}\""
    - "Failure: \"grubby failed: {stderr}\""

side_effects:
  - "Modifies GRUB boot configuration to remove a kernel parameter via grubby."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestGrubParameterRemoveSpecDerived
    count: 7
