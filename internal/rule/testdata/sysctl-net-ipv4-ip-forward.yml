id: sysctl-net-ipv4-ip-forward
title: Disable IPv4 forwarding
description: >
  IP forwarding allows the system to act as a router. On non-router hosts
  this must be disabled to prevent traffic redirection attacks.
rationale: >
  An attacker with a compromised host could use IP forwarding to route
  traffic between segmented networks, bypassing firewall controls.
severity: medium
category: kernel
tags: [sysctl, networking, ipv4]

references:
  cis:
    rhel9: { section: "3.3.1", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7", "SC-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: "net.ipv4.ip_forward"
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: "net.ipv4.ip_forward"
      value: "0"
