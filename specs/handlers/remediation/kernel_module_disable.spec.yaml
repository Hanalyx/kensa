kind: RemediationHandler
metadata:
  name: KernelModuleDisable
  module: handlers/remediation
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Blacklists a kernel module on a remote RHEL host by writing a modprobe
    configuration file that prevents the module from loading. Also attempts
    to unload the module from the running kernel if it is currently loaded.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["kernel_module_disable"]. Implemented in
    runner/handlers/remediation/_system.py as _remediate_kernel_module_disable.
  dependencies:
    - runner.shell_util.write_file
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation

objective:
  summary: >
    Blacklist a kernel module by writing a configuration file under
    /etc/modprobe.d/ that contains both a blacklist directive and an install
    redirect to /bin/false. Also attempt to unload the module from the running
    kernel via modprobe -r.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would
      blacklist {name} in {conf_path}") and no SSH commands are executed.
    AC-2: >
      Success path: When write_file succeeds, returns (True, "Blacklisted
      {name}") regardless of modprobe -r result.
    AC-3: >
      Write failure: When write_file returns False, returns (False, "Failed to
      write {conf_path}") and does not attempt modprobe -r.
    AC-4: >
      Config file path: The configuration file path is /etc/modprobe.d/{name}.conf.
    AC-5: >
      Config content: The written file contains exactly "blacklist {name}\n
      install {name} /bin/false\n".
    AC-6: >
      Module unload best-effort: After writing the config, modprobe -r is
      called with 2>/dev/null to suppress errors. The result is intentionally
      discarded; a module may not be currently loaded.
    AC-7: >
      Shell quoting: The module name is passed through shell_util.quote() in
      the modprobe -r command.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The handler does not verify whether the module is currently loaded before attempting modprobe -r.
  - The modprobe -r failure is intentionally ignored; the primary goal is the persistent blacklist.
  - The handler does not create parent directories; /etc/modprobe.d/ is assumed to exist.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "kernel_module_disable" (used by dispatch, not by handler directly)
  - field: name
    type: str
    required: true
    description: Kernel module name to blacklist (e.g., "cramfs", "usb-storage")

behavior:
  - "Extract fields: Read name from the remediation dict."
  - "Compute config path: Build conf_path as /etc/modprobe.d/{name}.conf."
  - "Dry-run check: If dry_run=True, return (True, \"Would blacklist {name} in {conf_path}\") immediately."
  - "Write blacklist config: Construct content as \"blacklist {name}\\ninstall {name} /bin/false\\n\" and write it to conf_path via shell_util.write_file()."
  - "Check write result: If write_file returns False, return (False, \"Failed to write {conf_path}\")."
  - "Attempt unload: Execute modprobe -r {quoted_name} 2>/dev/null via SSH. The result is intentionally discarded."
  - "Success return: Return (True, \"Blacklisted {name}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would blacklist {name} in /etc/modprobe.d/{name}.conf\""
    - "Success: \"Blacklisted {name}\""
    - "Write failure: \"Failed to write /etc/modprobe.d/{name}.conf\""

side_effects:
  - "Writes a modprobe blacklist configuration file under /etc/modprobe.d/."
  - "Attempts to unload the kernel module via modprobe -r (best-effort)."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestKernelModuleDisableSpecDerived
    count: 9
