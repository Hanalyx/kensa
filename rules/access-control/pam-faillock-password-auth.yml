id: pam-faillock-password-auth
title: Configure pam_faillock.so in /etc/pam.d/password-auth
description: >
  The pam_faillock.so module must be configured in /etc/pam.d/password-auth
  to enforce account lockout after repeated failed authentication attempts.
rationale: >
  Without pam_faillock in the password-auth PAM configuration, logins
  using password-auth will not enforce account lockout, leaving the
  system exposed to brute-force attacks.
severity: medium
category: access-control
tags: [pam, authentication, faillock, password-auth]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258096"
      stig_id: "RHEL-09-412065"
      severity: "CAT II"
  nist_800_53: ["AC-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: authselect
    check:
      method: command
      run: 'authselect current 2>/dev/null | grep -q with-faillock'
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "authselect enable-feature with-faillock"
  - default: true
    check:
      method: command
      run: >
        grep -qE '^\s*auth\s+(required|sufficient)\s+pam_faillock\.so'
        /etc/pam.d/password-auth 2>/dev/null
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add pam_faillock.so to the auth stack in /etc/pam.d/password-auth.
        Preferred: use authselect enable-feature with-faillock.
