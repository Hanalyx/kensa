id: kdump-disabled
title: Disable kdump service
description: 'The kdump service must be disabled unless crash dump analysis is required.
  Kdump captures memory on system crash.

  '
rationale: 'Kernel crash dumps may contain sensitive data including credentials and
  should only be enabled when necessary.

  '
severity: medium
category: services
tags:
- service
- systemd
- kdump
references:
  stig:
    rhel9:
      vuln_id: V-257818
      stig_id: RHEL-09-213115
      severity: CAT II
    rhel8:
      vuln_id: V-230310
      severity: CAT II
    rhel10:
      vuln_id: "V-281322"
      stig_id: "RHEL-10-701200"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270746"
      stig_id: "UBTU-24-600070"
      severity: "CAT II"
      cci: ["CCI-001190"]
    ubuntu22:
      vuln_id: "V-260473"
      stig_id: "UBTU-22-213015"
      severity: "CAT II"
      cci: ["CCI-001190"]
  nist_800_53:
  - CM-7
  - SC-7
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- when: apt                                                                # Debian/Ubuntu crash-dump unit is kdump-tools (absent = compliant; no crash dumps)
  check:
    method: service_state
    name: kdump-tools
    active: false
    enabled: false
  remediation:
    mechanism: service_masked
    name: kdump-tools
- default: true
  check:
    method: service_state
    name: kdump
    active: false
    enabled: false
  remediation:
    mechanism: service_masked
    name: kdump
