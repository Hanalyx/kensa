spec:
    id: cli-remediate-stream
    version: 0.2.0
    status: draft
    tier: 2

    context:
        system: kensa
        feature: cli-remediate-stream
        description: |
            PR4 wired the FIRST user-visible streaming: `kensa check` and
            `kensa detect` (single host) feed the text renderer via the
            SYNCHRONOUS progress.Sink (scan.WithProgress / DetectWithProgress).
            Those paths are non-engine and lossless.

            PR5 wires the engine-backed `kensa remediate` (single host) to the
            SAME text renderer, but the source is different: remediate runs
            through the transaction engine, which emits api.Event values onto
            the in-memory event bus (Service.Subscribe). The bus is lossy by
            design — a bounded 64-slot per-subscriber buffer that DROPS rather
            than blocks the engine's hot path. So the engine adapter is a
            translate-and-render goroutine that drains the api.Event channel and
            maps each event into one progress.Update for the renderer.

            Two parts are spec-pinned here:

            1. The pure translation progress.FromEvent(api.Event) -> (Update,
               bool). It maps the four engine-emitted EventKinds to display
               Updates using the RuleID carried on the additive payloads (PR1):
                 - TransactionStarted -> Kind=TxnStarted, RuleID from
                   TransactionStartedData.
                 - PhaseCompleted     -> Kind=TxnPhase, RuleID + Phase + OK
                   from PhaseCompletedData.
                 - RolledBack         -> Kind=TxnDone, OK=false, RuleID from
                   RolledBackData, Detail="rolled back".
                 - Committed          -> Kind=TxnDone, OK=true (Committed has
                   no Data payload; RuleID is empty, which is acceptable — the
                   preceding TxnStarted/TxnPhase lines already named the rule).
               Any other EventKind (the OpenWatch-owned heartbeat/drift kinds,
               deadman kinds) returns ok=false and is NOT rendered. The
               function is pure — no I/O, no goroutines — so every mapping is
               unit-testable without a live engine.

            2. The drain-then-cancel ORDERING contract for the CLI. The CLI
               MUST NOT inline subscribe-then-call-Remediate on one goroutine:
               the bus buffers only 64 events, and a multi-rule remediation
               emits ~4 events per rule, so a synchronous subscribe-then-call
               would let the engine fill and DROP past slot 64 before the CLI
               ever reads. Instead the CLI:
                 (a) Subscribes with a long-lived context (cancelable, NOT the
                     request ctx — it outlives the drain only by an explicit
                     cancel AFTER Remediate returns).
                 (b) Runs svc.Remediate in a goroutine; captures its result+err.
                 (c) Ranges over the api.Event channel ON THE CALLING goroutine,
                     translating via FromEvent and feeding the renderer, until
                     Remediate signals done.
                 (d) Cancels the subscription context AFTER Remediate returns,
                     which closes the bus channel and ends the range.
               The canonical RemediationResult (and its error) come from
               Remediate's return value, NEVER reconstructed from the rendered
               stream. Progress is cosmetic and on stderr only.

            3. Rollback is PLAIN progress, not bus streaming. The engine's
               RollbackTransaction path (internal/engine/rollback.go) emits NO
               events — it has zero publish() calls (verified). So
               `kensa rollback` does NOT subscribe to the bus; it renders plain
               per-transaction progress TEXT to stderr (the rule id and the
               attempt outcome) as it iterates committed transactions. PR5 adds
               NO engine emission to the rollback path.

            Tier 2: the translation adapter and the drain-ordering live on the
            engine-bus-adjacent display surface. They mutate nothing and the
            RemediationResult struct stays authoritative, but a wrong drain
            ordering (inline subscribe-then-call) would silently DROP events,
            and a translation that fabricated an outcome would mislead an
            operator — so both are spec-pinned.

    objective:
        summary: |
            A pure progress.FromEvent maps each engine-emitted api.Event to one
            progress.Update (TxnStarted / TxnPhase / TxnDone) using the RuleID on
            the additive payloads, and returns ok=false for non-transaction
            kinds. `kensa remediate` subscribes to the event bus with a
            long-lived ctx, runs Remediate in a goroutine, drains the channel
            into the text renderer on the calling goroutine, then cancels the
            subscription only after Remediate returns — so events are not dropped
            by an inline subscribe-then-call. The RemediationResult and its error
            are taken from Remediate's return, never the stream. `kensa rollback`
            renders plain per-transaction progress text (no bus subscription),
            because the rollback engine path emits no events.
        scope:
            includes:
                - A pure progress.FromEvent(api.Event) -> (Update, bool) translation
                - TransactionStarted -> TxnStarted with RuleID from the payload
                - PhaseCompleted -> TxnPhase with RuleID, Phase, and OK from the payload
                - RolledBack -> TxnDone OK=false with RuleID from the payload
                - Committed -> TxnDone OK=true (no payload; empty RuleID acceptable)
                - Non-transaction EventKinds returning ok=false (not rendered)
                - "The CLI drain-then-cancel ordering: subscribe (long-lived ctx), Remediate in a goroutine, drain on the caller, cancel after Remediate returns"
                - The RemediationResult and error coming from Remediate's return, not the stream
                - rollback rendering plain per-transaction progress text on stderr (no bus subscription)
            excludes:
                - Any new EventKind on api.Event (the api change was PR1's additive RuleID only)
                - Adding engine event emission to the rollback path (rollback stays event-free)
                - Inventory / multi-host remediate (remediate is single-host; inventory streaming is PR6)
                - events-jsonl selection or --stream-file on remediate (later PR)
                - Changing the RemediationResult struct, exit code, or -o FILE serialization based on progress state

    constraints:
        - id: C-01
          description: |
              progress.FromEvent MUST be a pure function (no I/O, no goroutines,
              no shared state) mapping an api.Event to (progress.Update, bool).
              It MUST map TransactionStarted -> Kind TxnStarted, PhaseCompleted
              -> Kind TxnPhase, RolledBack -> Kind TxnDone (OK=false), and
              Committed -> Kind TxnDone (OK=true), returning ok=true for each.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              For the payload-carrying kinds, FromEvent MUST copy RuleID from the
              additive payload: TransactionStartedData.RuleID for TxnStarted,
              PhaseCompletedData.RuleID (plus Phase and Success->OK) for TxnPhase,
              and RolledBackData.RuleID for TxnDone(rolled back). Committed has no
              Data payload, so its Update RuleID MAY be empty.
          type: technical
          enforcement: error
        - id: C-03
          description: |
              FromEvent MUST return ok=false (no Update rendered) for any
              EventKind outside the four transaction kinds above — in particular
              the OpenWatch-owned HeartbeatPulse / DriftDetected and the
              DeadmanTimerArmed / DeadmanTimerFired kinds. It MUST NOT panic on
              an event whose Data is nil or is a type other than the kind's
              documented payload.
          type: technical
          enforcement: error
        - id: C-04
          description: |
              The CLI remediate streaming MUST NOT inline subscribe-then-call:
              it MUST run svc.Remediate in a goroutine and drain the api.Event
              channel concurrently, cancelling the subscription context only
              AFTER Remediate returns. This prevents the bounded (64-slot) bus
              buffer from filling and dropping events before the CLI reads them.
          type: technical
          enforcement: error
        - id: C-05
          description: |
              The canonical RemediationResult and its error MUST be taken from
              svc.Remediate's return value, never reconstructed from the rendered
              event stream. Turning the stream on or off MUST NOT change the
              result written to stdout, the exit code, or any -o FILE output.
          type: technical
          enforcement: error
        - id: C-06
          description: |
              `kensa rollback` MUST NOT subscribe to the engine event bus for
              progress, because the rollback code path produces no stream to
              drain. When progress is enabled, rollback MUST render plain
              per-transaction progress text (rule id + outcome) to stderr as it
              iterates committed transactions. PR5 changes only the CLI display;
              it does not alter the engine rollback code path.
          type: technical
          enforcement: error
        - id: C-07
          description: |
              The engine bus is lossy by design (bounded 64-slot per-subscriber
              buffer that DROPS rather than blocks). When the remediate stream is
              rendered, the CLI MAY report how many transaction-completion events
              the renderer rendered versus how many the authoritative
              RemediationResult contains; if fewer were rendered than the result
              reports, the difference is the count of completion events the bus
              dropped and MAY be surfaced as one advisory line on stderr. This
              accounting MUST be derived from the canonical RemediationResult
              (the source of truth) and the renderer's own rendered tally — never
              by reconstructing the result from the stream. It MUST NOT change the
              stdout result, the exit code, or any -o FILE serialization, and MUST
              be silent (no line) when nothing was dropped.
          type: technical
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: FromEvent maps TransactionStarted to an Update with Kind=TxnStarted and RuleID copied from TransactionStartedData, returning ok=true.
          references_constraints: [C-01, C-02]
          priority: critical
        - id: AC-02
          description: FromEvent maps PhaseCompleted to an Update with Kind=TxnPhase, RuleID, Phase, and OK all copied from PhaseCompletedData (Success->OK), returning ok=true.
          references_constraints: [C-01, C-02]
          priority: critical
        - id: AC-03
          description: FromEvent maps RolledBack to Kind=TxnDone with OK=false and RuleID from RolledBackData, and Committed to Kind=TxnDone with OK=true (empty RuleID acceptable), each returning ok=true.
          references_constraints: [C-01, C-02]
          priority: critical
        - id: AC-04
          description: FromEvent returns ok=false (no Update) for HeartbeatPulse, DriftDetected, DeadmanTimerArmed, and DeadmanTimerFired, and does not panic when Data is nil or a mismatched type.
          references_constraints: [C-03]
          priority: high
        - id: AC-05
          description: The CLI drain helper runs Remediate in a goroutine and drains the event channel concurrently, so an engine that emits more than the 64-slot buffer of events still has every emitted event delivered to the renderer (no inline subscribe-then-call drop); the renderer observes the events in order and the subscription is cancelled only after Remediate returns.
          references_constraints: [C-04]
          priority: critical
        - id: AC-06
          description: The RemediationResult and error returned by the drain helper are exactly those returned by svc.Remediate; the result is independent of whether the stream was drained (progress on vs a nil renderer).
          references_constraints: [C-05]
          priority: critical
        - id: AC-07
          description: The rollback progress path renders plain per-transaction text (rule id + outcome) to a non-stdout writer without subscribing to the event bus.
          references_constraints: [C-06]
          priority: high
        - id: AC-08
          description: Given a rendered tally of TxnDone events and the authoritative RemediationResult, the dropped-event accounting reports the non-negative difference (result transactions minus rendered completions) to a non-stdout writer, writes nothing when the tally is complete, and never mutates the result, exit code, or output serialization.
          references_constraints: [C-07]
          priority: high

    depends_on:
        - spec_id: progress-renderer
          relationship: requires
        - spec_id: api-event-rule-id
          relationship: requires
        - spec_id: engine-event-bus
          relationship: requires
        - spec_id: cli-progress-stream
          relationship: requires

    tags: [cli, progress, streaming, remediate, rollback, tier-2]
