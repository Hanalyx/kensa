id: nologin-not-in-shells
title: Ensure nologin is not listed in /etc/shells
description: >
  The /etc/shells file should not contain nologin shell paths, as these
  are intended to prevent interactive logins.
rationale: >
  Including nologin in /etc/shells could allow FTP or other services to
  accept logins for accounts that should not have interactive access.
severity: medium
category: access-control
tags: [shells, nologin, authentication, security]

references:
  cis:
    rhel9_v2: { section: "5.4.3.1", level: "L1", type: "Automated" }
  nist_800_53: ["CM-6", "AC-3"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: command
      run: |
        if grep -qE '(nologin|false)$' /etc/shells 2>/dev/null; then
          echo "FAIL: nologin or false found in /etc/shells"
          grep -E '(nologin|false)$' /etc/shells
          exit 1
        fi
        echo "OK: nologin not in /etc/shells"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: command_exec
      command: "sed -i '/nologin$/d; /false$/d' /etc/shells"
