id: mount-removable-nosuid
title: Mount removable media with nosuid option
description: >
  Removable media filesystems must be mounted with the nosuid option to
  prevent setuid and setgid files from being executed from removable media.
rationale: >
  Allowing setuid/setgid execution from removable media could allow an
  attacker to introduce privileged binaries via portable storage devices.
  The nosuid mount option prevents privilege escalation attacks via removable
  media.
severity: medium
transactional: false
category: filesystem
tags: [mount, removable, nosuid, security]

references:
  stig:
    rhel9: { vuln_id: "V-257859", stig_id: "RHEL-09-231090", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230305"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-19"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        bad=""
        for mp in $(lsblk -o RM,MOUNTPOINT -n 2>/dev/null | awk '$1=="1" && $2!="" {print $2}'); do
          opts=$(findmnt "$mp" -o OPTIONS -n 2>/dev/null)
          case ",$opts," in *,nosuid,*) : ;; *) bad="$bad $mp" ;; esac
        done
        if [ -n "$bad" ]; then echo "FAIL: removable mounts missing nosuid:$bad"; exit 1; fi
        echo "OK: no removable mount lacks nosuid"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add nosuid to the mount options for removable media mount points in
        /etc/fstab or udev rules. For automounted removable media, configure
        the automounter to include nosuid in mount options.
