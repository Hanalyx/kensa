id: gdm-autorun-never-override
title: Ensure GDM autorun-never is not overridden
description: >
  If GNOME Display Manager is in use, users should not be able to
  override the autorun-never setting.
rationale: >
  Preventing users from enabling autorun ensures the security policy
  is enforced consistently across all users.
severity: medium
category: services
tags: [gdm, gnome, autorun, security]

depends_on: [gdm-autorun-never]
conflicts_with: [gdm-removed]

references:
  cis:
    rhel9: { section: "1.8.9", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if autorun setting is locked
        if [ -f /etc/dconf/db/local.d/locks/00-media-autorun ]; then
          if grep -q "/org/gnome/desktop/media-handling/autorun-never" /etc/dconf/db/local.d/locks/00-media-autorun 2>/dev/null; then
            echo "OK: GDM autorun-never setting is locked"
            exit 0
          fi
        fi
        echo "FAIL: GDM autorun-never setting can be overridden"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: dconf_set
      schema: org/gnome/desktop/media-handling
      key: autorun-never
      value: "true"
      file: 00-media-autorun
      lock: true

  - default: true
    check:
      method: package_state
      name: "gdm"
      state: "absent"
    remediation:
      mechanism: package_absent
      name: "gdm"
