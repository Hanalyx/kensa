id: fs-permissions-opasswd
title: Set permissions on /etc/security/opasswd
description: >
  The /etc/security/opasswd file stores old password hashes for password
  history enforcement. It must have restrictive permissions to prevent
  unauthorized access to historical password data.
rationale: >
  The opasswd file contains hashes of previous passwords. Access to these
  hashes could enable offline password cracking attacks. Restrictive
  permissions limit access to root only.
severity: high
category: filesystem
tags: [permissions, passwords, security, pam]
conflicts_with:
  - opasswd-permissions

references:
  cis:
    rhel9:  { section: "7.1.10", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/security/opasswd"
      mode: "0600"
      owner: "root"
      group: "root"
    remediation:
      mechanism: file_permissions
      path: "/etc/security/opasswd"
      mode: "0600"
      owner: "root"
      group: "root"
