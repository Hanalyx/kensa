spec:
    id: cli-manpage
    version: 0.1.0
    status: draft
    tier: 3

    context:
        system: kensa-go
        feature: cli-manpage
        description: |
            CLI Phase 5a deliverable C-055. Adds a Unix
            manpage at `kensa(1)` so `man kensa` works
            after package install. Per the founder
            ratification of decision #5: hybrid source-
            of-truth — hand-written wrapper (header +
            footer roff) + generated flag body, single
            `kensa.1` file.

            **Why hybrid.** Pure-generated misses the
            manpage idiom (NAME / SYNOPSIS / DESCRIPTION
            sections, ENVIRONMENT VARIABLES, FILES list,
            EXIT CODES table, SEE ALSO line). Pure-
            hand-written drifts every time a subcommand
            grows a flag. The hybrid lets the prose
            stay hand-curated where it matters and
            auto-derives the per-subcommand flag tables
            from the canonical source (the CLI's --help
            output).

            **Generator approach.** The generator
            program (`docs/man/gen-manpage.go`) spawns
            `bin/kensa <cmd> --help` for each
            registered subcommand, transforms the
            output to roff `.SS <NAME>` subsections,
            and concatenates with the hand-written
            header + footer. Subprocessing the binary
            (rather than importing pflag and walking
            the registry) means the manpage's flag
            text stays byte-identical to what the
            operator sees from `kensa --help`.

            **Drift gate.** A new make target
            (`make manpage-check`) regenerates the
            manpage to a temp file and diffs against
            the committed `docs/man/kensa.1`. Drift fails
            the CI gate so a contributor adding a flag
            without regenerating gets caught at PR
            time, not by a downstream packager.

    objective:
        summary: |
            Add docs/man/kensa.1.header.roff and
            docs/man/kensa.1.footer.roff (hand-written).
            Add docs/man/gen-manpage.go (generator).
            Add Makefile targets `manpage` (build) and
            `manpage-check` (drift gate). Commit
            `docs/man/kensa.1` as the source-of-truth
            shipped artifact. Spec close.
        scope:
            includes:
                - "docs/man/kensa.1.header.roff: NAME, SYNOPSIS, DESCRIPTION (hand-written)"
                - "docs/man/kensa.1.footer.roff: FILES, ENVIRONMENT, EXIT CODES, SEE ALSO, AUTHORS, BUGS (hand-written)"
                - "docs/man/gen-manpage.go: subprocess each subcommand --help, emit .SS subsections"
                - "Makefile target: `make manpage` produces docs/man/kensa.1"
                - "Makefile target: `make manpage-check` regenerates to temp + diffs vs committed; non-zero exit on drift"
                - "Committed docs/man/kensa.1 (source-of-truth artifact for distros to package)"
            excludes:
                - "Per-subcommand split (kensa-check.1, kensa-remediate.1, etc.): single-file approach per founder ratification; revisit if surface doubles"
                - "Manpage section other than 1: kensa is a user-facing tool, not a syscall / library / config-file format"
                - "AsciiDoc / Markdown source pipeline: roff is the manpage idiom, hand-writing it for the wrapper sections is the right scope cut"
                - "Translated manpages: i18n is post-1.0"

    constraints:
        - id: C-01
          description: |
              The committed `docs/man/kensa.1` MUST be
              regenerable from sources via `make
              manpage`. A contributor can't ship a
              manpage that doesn't match the binary —
              manpage-check fails on drift.
          type: business
          enforcement: error
        - id: C-02
          description: |
              The generator MUST cover every
              registered subcommand (detect, check,
              remediate, rollback, history, plan,
              mechanisms, list, info, diff, agent,
              migrate, version). The deprecated
              `coverage` alias is excluded — it
              points at `mechanisms`.
          type: business
          enforcement: error
        - id: C-03
          description: |
              The header roff MUST contain a SYNOPSIS
              line, a DESCRIPTION paragraph naming the
              atomic-transaction product story, and an
              OPTIONS section describing the global
              flags (--db, --help, --version).
          type: business
          enforcement: error
        - id: C-04
          description: |
              The footer roff MUST include FILES
              (config dir search path), ENVIRONMENT
              VARIABLES (KENSA_NO_DEPRECATION_WARNINGS,
              KENSA_NO_REPURPOSE_WARNINGS,
              KENSA_CONFIG_DIR, KENSA_TEST_SSH_*),
              EXIT CODES (0/1/2 with the GNU/POSIX
              convention from C-008), SEE ALSO
              (kensa-rules(5) project URL placeholder
              + openwatch reference), AUTHORS, BUGS.
          type: business
          enforcement: error
        - id: C-05
          description: |
              The generator MUST escape roff special
              characters in help-text content
              (backslash → \\\\, leading dot at line
              start → \\&., minus → \\-, etc.) so
              `man kensa` renders without formatting
              corruption.
          type: technical
          enforcement: error
        - id: C-06
          description: |
              `make manpage` MUST be deterministic
              given the same kensa binary: running
              twice produces byte-identical
              docs/man/kensa.1. Otherwise manpage-check
              produces false positives.
          type: technical
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              `make manpage` produces docs/man/kensa.1
              from sources. Locked by manual
              verification + the manpage-check gate.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: |
              docs/man/kensa.1 contains a .SS subsection
              for every registered subcommand listed
              in C-02. Locked by
              TestGenManpage_AllSubcommandsCovered.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: |
              Header sections (NAME, SYNOPSIS,
              DESCRIPTION) appear in docs/man/kensa.1.
              Locked by
              TestGenManpage_HeaderSectionsPresent.
          references_constraints: [C-03]
          priority: high
        - id: AC-04
          description: |
              Footer sections (FILES, ENVIRONMENT,
              EXIT CODES, SEE ALSO, AUTHORS, BUGS)
              appear in docs/man/kensa.1. Locked by
              TestGenManpage_FooterSectionsPresent.
          references_constraints: [C-04]
          priority: high
        - id: AC-05
          description: |
              The generator escapes roff special
              characters. Locked by
              TestEscapeRoff (unit test on the
              escape helper).
          references_constraints: [C-05]
          priority: high
        - id: AC-06
          description: |
              `make manpage` is deterministic: run
              twice, compare byte-for-byte, equal.
              Locked by
              TestGenManpage_Deterministic.
          references_constraints: [C-06]
          priority: high
        - id: AC-07
          description: |
              `make manpage-check` returns zero on
              clean state and non-zero on drift.
              Verified via the make-target script
              behavior (operator-facing test case).
          references_constraints: [C-01]
          priority: critical
        - id: AC-08
          description: |
              `man -l docs/man/kensa.1` renders without
              roff syntax errors. Verified during
              the C-055 merge workflow (manual
              eyeball-render check).
          references_constraints: [C-05]
          priority: medium

    tags: [docs, manpage, roff, phase-5a, c-055]
