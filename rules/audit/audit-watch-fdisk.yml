id: audit-watch-fdisk
title: Audit access to /usr/sbin/fdisk
description: >
  Modifications to /usr/sbin/fdisk must generate an audit record so that partition-table changes
  can be traced to an individual.
rationale: >
  Auditing this path supports detection of unauthorized changes and
  forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, watch]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270815"
      stig_id: "UBTU-24-900750"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260611"
      stig_id: "UBTU-22-654045"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /usr/sbin/fdisk -p x -k fdisk"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /usr/sbin/fdisk -p x -k fdisk"
      persist_file: "/etc/audit/rules.d/50-watch-fdisk.rules"
