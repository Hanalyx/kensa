id: sudo-restrict-privilege-escalation
title: Restrict overly permissive sudo privilege escalation
description: >
  RHEL 8 must restrict privilege elevation to authorized personnel. Users
  with sudo access must not have unrestricted ALL=(ALL) ALL entries unless
  specifically justified.
rationale: >
  Overly broad sudo rules grant users unrestricted root access which
  violates least-privilege principles.
severity: medium
transactional: false
category: access-control
tags: [sudo, privilege-escalation, access-control, least-privilege]

depends_on: [package-sudo-installed]

references:
  stig:
    rhel10: { vuln_id: "V-281207", stig_id: "RHEL-10-600520", severity: "CAT II" }
    rhel8:
      vuln_id: "V-237641"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-274869"
      stig_id: "UBTU-24-300019"
      severity: "CAT II"
      cci: ["CCI-002038", "CCI-004895"]
    ubuntu22:                                                                # same literal user-ALL wildcard check as u24 V-274869; the when:apt impl already implements it.
      vuln_id: "V-274861"
      stig_id: "UBTU-22-654224"
      severity: "CAT II"
      cci: ["CCI-002038", "CCI-004895"]
  nist_800_53: ["AC-6", "AC-6(5)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  # Ubuntu STIG flags ONLY the literal user-"ALL" wildcard grant
  # ('ALL ALL=(ALL) ALL' / '(ALL:ALL)'), not any specific user's ALL= grant,
  # so the Debian/Ubuntu check is scoped tighter than the RHEL default below.
  - when: apt
    check:
      method: command
      run: |
        bad=$(grep -rhE '^[[:space:]]*ALL[[:space:]]+ALL[[:space:]]*=[[:space:]]*\(ALL(:ALL)?\)[[:space:]]+ALL' /etc/sudoers /etc/sudoers.d/ 2>/dev/null | grep -v '^[[:space:]]*#')
        if [ -n "$bad" ]; then
          echo "FAIL: unrestricted 'ALL ALL=(ALL) ALL' sudo entry present:"; echo "$bad"; exit 1
        fi
        echo "OK: no unrestricted user-ALL sudo entry"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Remove any 'ALL ALL=(ALL) ALL' or 'ALL ALL=(ALL:ALL) ALL' entry from
        /etc/sudoers and files under /etc/sudoers.d/ (edit with visudo).
  - default: true
    check:
      method: command
      run: |
        # Check for overly broad sudo rules granting ALL=(ALL) ALL
        result=$(grep -rE '^\s*[^#%].*ALL\s*=\s*\(ALL(:ALL)?\)\s*ALL' /etc/sudoers /etc/sudoers.d/ 2>/dev/null || true)
        if [ -n "$result" ]; then
          echo "FAIL: Overly broad sudo rules found:"
          echo "$result"
          exit 1
        fi
        echo "OK: No unrestricted ALL=(ALL) ALL entries found"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Review and restrict any overly broad sudo rules that grant
        ALL=(ALL) ALL access. Replace with specific commands and paths
        per least-privilege principles.
