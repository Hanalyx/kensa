id: audit-config-dir-owner
title: Ensure /etc/audit/ is owned by root
description: >
  The /etc/audit/ directory must be owned by root to prevent
  unauthorized modification of audit configuration.
rationale: >
  Unauthorized changes to audit configuration could disable
  auditing or redirect audit records, allowing malicious
  activity to go undetected.
severity: medium
category: audit
tags: [audit, permissions, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9:
      vuln_id: "V-270175"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230400"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/audit"
      owner: "root"
    remediation:
      mechanism: file_permissions
      path: "/etc/audit"
      owner: "root"
