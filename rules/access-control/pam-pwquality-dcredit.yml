id: pam-pwquality-dcredit
title: Require digit in password
description: >
  The dcredit parameter in /etc/security/pwquality.conf controls the credit
  given for having digits in the password. A negative value requires at least
  that many digits.
rationale: >
  Requiring digits increases password complexity and makes passwords more
  resistant to dictionary attacks.
severity: medium
category: access-control
tags: [pam, password, authentication, pwquality]

depends_on: [package-libpwquality-installed]

references:
  cis:
    rhel8:  { section: "5.3.3.2.3", level: "L1", type: "Automated" }
    rhel9:  { section: "5.3.3.2.3", level: "L1", type: "Manual" }
    rhel10: { section: "5.3.2.2.3", level: "L2", type: "Manual" }
    ubuntu24: { section: "5.3.3.2.3", level: "L1", type: "Manual" }
    ubuntu22: { section: "5.3.3.2.3", level: "L1", type: "Manual" }
  stig:
    rhel9:
      vuln_id: "V-258103"
      stig_id: "RHEL-09-611070"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230359"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270728"
      stig_id: "UBTU-24-400280"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260562"
      stig_id: "UBTU-22-611020"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281190"
      stig_id: "RHEL-10-600310"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(a)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "dcredit"
      expected: "-1"
      comparator: "<="
    remediation:
      mechanism: config_set
      path: "/etc/security/pwquality.conf"
      key: "dcredit"
      value: "-1"
      separator: " = "
