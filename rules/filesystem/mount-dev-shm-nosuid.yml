id: mount-dev-shm-nosuid
title: Ensure nosuid option on /dev/shm partition
description: >
  The nosuid mount option prevents setuid/setgid bits from being honored on
  /dev/shm. This prevents privilege escalation via shared memory.
rationale: >
  Setuid programs in shared memory could be used for privilege escalation
  attacks.
severity: medium
category: filesystem
tags: [mount, dev-shm, hardening]

references:
  stig:
    rhel8:
      vuln_id: "V-230509"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257865"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281237"
      severity: "CAT II"
  cis:
    rhel8:  { section: "1.1.2.2.3", level: "L1", type: "Automated" }
    rhel9:  { section: "1.1.2.2.3", level: "L1", type: "Automated" }
    rhel10: { section: "1.1.2.2.3", level: "L1", type: "Automated" }
  nist_800_53: ["CM-6", "AC-3", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: mount_option
      mount_point: "/dev/shm"
      options: ["nosuid"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/dev/shm"
      options: ["nosuid"]
