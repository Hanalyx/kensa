id: etc-passwd-backup-permissions
title: Ensure permissions on /etc/passwd- are configured
description: 'The /etc/passwd- file must have correct ownership and permissions.

  '
rationale: 'Incorrect permissions on /etc/passwd- could allow unauthorized access
  or modification of sensitive system data.

  '
severity: medium
category: filesystem
tags:
- file-permissions
- authentication
references:
  cis:
    rhel9:
      section: 7.1.2
      level: L1
      type: Automated
    rhel8:
      section: 7.1.2
      level: L1
      type: Automated
    rhel10: { section: "7.1.1", level: "L1", type: "Automated" }
  nist_800_53:
  - AC-3
  - MP-2
  - AC-6
  stig:
    rhel9:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-257896", severity: "CAT II" }                          # mode 0644
      - { vuln_id: "V-257908", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257909", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281027", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-281028", severity: "CAT II" }                          # group root
      - { vuln_id: "V-281071", severity: "CAT II" }                          # mode 0644
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: file_permission
    path: /etc/passwd-
    owner: root
    group: root
    mode: '0644'
  remediation:
    mechanism: file_permissions
    path: /etc/passwd-
    owner: root
    group: root
    mode: '0644'
