id: grub-single-user-password
title: Require a GRUB password for single-user and maintenance boot
description: >
  A GRUB superuser password (password_pbkdf2 root) must be present in
  /boot/grub/grub.cfg so that booting into single-user or maintenance mode
  requires authentication.
rationale: >
  Without a bootloader password, anyone with console access can edit the
  kernel command line or boot into single-user (root) mode and bypass all
  operating-system access controls.
severity: high
transactional: false
category: system
tags: [grub, bootloader, single-user, password, stig]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270675"
      stig_id: "UBTU-24-102000"
      severity: "CAT I"
      cci: ["CCI-000213"]
    ubuntu22:
      vuln_id: "V-260470"
      stig_id: "UBTU-22-212010"
      severity: "CAT I"
      cci: ["CCI-000213"]
  nist_800_53: ["AC-3"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        # STIG: a 'password_pbkdf2 root ...' entry must exist in the compiled
        # grub.cfg (needs root to read; run under --sudo).
        if grep -iqE '^[[:space:]]*password_pbkdf2[[:space:]]+root([[:space:]]|$)' /boot/grub/grub.cfg 2>/dev/null; then
          echo "OK: GRUB root password_pbkdf2 is set"; exit 0
        fi
        echo "FAIL: no 'password_pbkdf2 root' entry in /boot/grub/grub.cfg"; exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Generate a hash with grub-mkpasswd-pbkdf2, add
        'set superusers="root"' and 'password_pbkdf2 root <hash>' to
        /etc/grub.d/40_custom, then run update-grub.
