# Specter Project Manifest
# See: https://github.com/Hanalyx/specter
#
# Kensa Go spec discipline is tiered by atomicity risk. Components that the
# atomicity commitment in docs/TRANSACTION_CONTRACT_V1.md depends on run at
# Tier 1 (100% AC-to-test coverage). Everything else defaults to Tier 2.

system:
    name: kensa-go
    tier: 2   # default for unclassified specs

domains:
    core:
        tier: 1         # The transaction coordinator — atomicity lives here
        description: Transaction engine, deadman, evidence envelope, log — rollback-safety-critical.
        specs:
            - engine-transaction
            - deadman-timer
            - evidence-envelope
            - transaction-log
            - handler-interface
    handlers:
        tier: 1         # Every capture/rollback handler is Tier 1
        description: Capture/rollback handlers. A spec/code divergence here is an atomicity violation.
        specs:
            - handler-audit-rule-set
            - handler-config-set
            - handler-config-set-dropin
            - handler-cron-job
            - handler-file-absent
            - handler-file-content
            - handler-file-permissions
            - handler-kernel-module-disable
            - handler-mount-option-set
            - handler-package-absent
            - handler-package-present
            - handler-pam-module-configure
            - handler-selinux-boolean-set
            - handler-service-disabled
            - handler-service-enabled
            - handler-service-masked
            - handler-sysctl-set

settings:
    specs_dir: specs
    coverage:
        tier1: 100   # rollback-safety-critical components — zero unmapped ACs
        tier2: 80    # apply-path / validation components
        tier3: 50    # formatters, CLI wrappers, non-mutation paths
    exclude:
        - node_modules
        - dist
        - .git
        - .claude      # AI worktrees and session state — not source specs
        - vendor
        - fixtures     # fixtures are test data, not specs
        - docs         # prose docs, not spec YAML
