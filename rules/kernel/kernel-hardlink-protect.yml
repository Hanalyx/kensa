id: kernel-hardlink-protect
title: Enable kernel hardlink protection
description: >
  Kernel protection must be enabled to enforce DAC on hardlinks.
  This prevents hardlink-based attacks on privileged files.
rationale: >
  Hardlink protection prevents unprivileged users from creating
  hardlinks to files they cannot read, blocking data exfiltration.
severity: medium
category: kernel
tags: [kernel, sysctl, hardlink, dac]

references:
  cis:
    rhel8: { section: "1.5.2", level: "L1", type: "Automated" }
    rhel10: { section: "1.5.2", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-257801"
      stig_id: "RHEL-09-213030"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230268"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281309"
      stig_id: "RHEL-10-701070"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: "fs.protected_hardlinks"
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: "fs.protected_hardlinks"
      value: "1"
      persist_file: "/etc/sysctl.d/99-kensa-hardlink.conf"
