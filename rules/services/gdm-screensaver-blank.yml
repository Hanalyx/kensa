id: gdm-screensaver-blank
title: Ensure GDM session lock displays a blank or publicly viewable image
description: >
  If GNOME Display Manager is in use, the session lock screen must
  conceal information previously visible on the display by showing
  a blank screen or publicly viewable image.
rationale: >
  Without concealing the screen contents when the session locks,
  sensitive information previously displayed remains visible to
  anyone who approaches the workstation, creating a confidentiality
  risk even when access is otherwise restricted.
severity: medium
category: services
tags: [gdm, gnome, screen-lock, screensaver, security]

conflicts_with: [gdm-removed]

references:
  stig:
    rhel9:
      vuln_id: "V-258027"
      stig_id: "RHEL-09-271070"
      severity: "CAT II"
  nist_800_53: ["AC-11(1)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if picture-options is set to 'none' or picture-uri is empty
        if grep -qr "^picture-options='none'" /etc/dconf/db/local.d/ 2>/dev/null || \
           grep -qr '^picture-options='"'"'none'"'" /etc/dconf/db/local.d/ 2>/dev/null || \
           grep -qr "^picture-uri=''" /etc/dconf/db/local.d/ 2>/dev/null; then
          echo "OK: GDM screensaver is configured to display a blank screen"
          exit 0
        fi
        echo "FAIL: GDM screensaver may display sensitive screen contents"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Configure blank screensaver in /etc/dconf/db/local.d/00-screensaver:
        [org/gnome/desktop/screensaver]
        picture-uri=''
        picture-options='none'
        Then run: dconf update

  - default: true
    check:
      method: package_state
      name: "gdm"
      state: "absent"
    remediation:
      mechanism: package_absent
      name: "gdm"
