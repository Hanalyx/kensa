id: gdm-login-banner
title: Ensure GDM login banner is configured
description: 'If GNOME Display Manager is in use, a login warning banner should be displayed to users before authentication.

  '
rationale: 'Displaying a warning banner ensures users are aware of acceptable use policies and that the system may be monitored.

  '
severity: medium
category: services
tags:
- gdm
- gnome
- banner
- security
conflicts_with:
- gdm-removed
references:
  cis:
    rhel9:
      section: 1.8.2
      level: L1
      type: Automated
  nist_800_53:
  - AC-8
platforms:
- family: rhel
  min_version: 8
implementations:
- when: gdm
  check:
    method: command
    run: "# Check if banner is configured in GDM\nif [ -f /etc/dconf/db/gdm.d/01-banner-message ]; then\n  if grep -q \"banner-message-enable=true\"\
      \ /etc/dconf/db/gdm.d/01-banner-message 2>/dev/null; then\n    echo \"OK: GDM login banner is enabled\"\n    exit 0\n\
      \  fi\nfi\necho \"FAIL: GDM login banner is not configured\"\nexit 1\n"
    expected_exit: 0
  remediation:
    mechanism: dconf_set
    schema: org/gnome/login-screen
    key: banner-message-enable
    value: 'true'
    file: 01-banner-message
    db: gdm
