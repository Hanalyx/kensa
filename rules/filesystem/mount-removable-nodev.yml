id: mount-removable-nodev
title: Ensure nodev option on removable media
description: >
  The nodev mount option must be set on all removable media filesystems
  to prevent device files from being created or used on removable storage.
rationale: >
  Removable media could contain device files that allow bypass of access
  controls. The nodev option prevents interpretation of device special files
  on removable media, reducing the risk of privilege escalation.
severity: medium
transactional: false
category: filesystem
tags: [mount, removable-media, nodev, hardening]

references:
  stig:
    rhel8:
      vuln_id: "V-230303"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-3"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      # A removable-media mount (under /media, /mnt or /run/media) that lacks
      # nodev. Scoping to the removable mount points instead of blocklisting
      # fixed disks avoids flagging fixed LVM/root filesystems; a host with no
      # removable media mounted vacuously passes.
      method: command
      run: "grep -E ' /(media|mnt|run/media)' /proc/mounts 2>/dev/null | grep -v nodev | head -1"
      expected_stdout: ""
    remediation:
      mechanism: manual
      note: >
        Add the nodev option to all removable media mount points in /etc/fstab.
        For automounted media, configure udev rules or autofs to include nodev.
