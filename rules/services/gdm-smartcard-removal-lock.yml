id: gdm-smartcard-removal-lock
title: Ensure GDM smart card removal action cannot be overridden
description: 'If GNOME Display Manager is in use, the smart card removal action must be set to lock the screen and users must
  not be able to override this setting.

  '
rationale: 'Preventing users from overriding the smart card removal action ensures that removing a smart card automatically
  locks the screen, maintaining access control when the authentication token is removed.

  '
severity: medium
category: services
tags:
- gdm
- gnome
- smartcard
- screen-lock
- security
conflicts_with:
- gdm-removed
references:
  stig:
    rhel10: { vuln_id: "V-281276", stig_id: "RHEL-10-700730", severity: "CAT II" }
    rhel9:
      - { vuln_id: "V-258020", stig_id: "RHEL-09-271050", severity: "CAT II" }
      - { vuln_id: "V-258019", stig_id: "RHEL-09-271045", severity: "CAT II" }
    rhel8:
      vuln_id: V-230351
      stig_id: RHEL-08-020050
      severity: CAT II
  nist_800_53:
  - AC-11
  - IA-3
platforms:
- family: rhel
  min_version: 8
implementations:
- when: gdm
  check:
    checks:
    # V-258019: the removal-action VALUE must be 'lock-screen' (in a dconf db keyfile).
    - method: command
      run: |
        if grep -rqE "^[[:space:]]*removal-action[[:space:]]*=[[:space:]]*'lock-screen'" /etc/dconf/db/*.d/ 2>/dev/null; then
          echo "OK: removal-action set to 'lock-screen'"
          exit 0
        fi
        echo "FAIL: removal-action not set to 'lock-screen'"
        exit 1
      expected_exit: 0
    # V-258020: the setting must be LOCKED so users cannot override it.
    - method: command
      run: |
        for lockfile in /etc/dconf/db/*.d/locks/*; do
          if [ -f "$lockfile" ] && grep -q "/org/gnome/settings-daemon/peripherals/smartcard/removal-action" "$lockfile" 2>/dev/null; then
            echo "OK: GDM smart card removal action is locked"
            exit 0
          fi
        done
        echo "FAIL: GDM smart card removal action can be overridden"
        exit 1
      expected_exit: 0
  remediation:
    mechanism: dconf_set
    schema: org/gnome/settings-daemon/peripherals/smartcard
    key: removal-action
    value: '''lock-screen'''
    file: 00-smartcard
    lock: true
