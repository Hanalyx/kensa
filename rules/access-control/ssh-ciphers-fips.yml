id: ssh-ciphers-fips
title: Configure SSH to use FIPS-approved ciphers
description: >
  The SSH daemon must be configured to use only FIPS 140-2 validated
  ciphers for session encryption.
rationale: >
  FIPS-approved ciphers have been validated for cryptographic strength.
  Using only approved ciphers ensures encrypted SSH sessions cannot
  be easily compromised.
severity: high
category: access-control
tags: [ssh, fips, ciphers, cryptography, stig]

depends_on: [pkg-openssh-server-present]
conflicts_with: [ssh-crypto-policy]

references:
  stig:
    rhel9:
      vuln_id: "V-257989"
      stig_id: "RHEL-09-255020"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230252"
      severity: "CAT II"
  nist_800_53: ["SC-12", "SC-13"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        if ! command -v sshd &>/dev/null; then exit 0; fi
        ciphers=$(sshd -T 2>/dev/null | awk '/^ciphers /{print $2}')
        echo "$ciphers" | tr ',' '\n' | grep -qvE '^(aes128-ctr|aes192-ctr|aes256-ctr|aes128-gcm@openssh\.com|aes256-gcm@openssh\.com)$' && {
          echo "FAIL: non-FIPS cipher in effective config: $ciphers"
          exit 1
        }
        echo "OK: $ciphers"
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/ssh/sshd_config.d"
      file: "00-kensa-fips-ciphers.conf"
      key: "Ciphers"
      value: "aes256-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-gcm@openssh.com,aes128-ctr"
      restart: sshd
