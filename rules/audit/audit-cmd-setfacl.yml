id: audit-cmd-setfacl
title: Audit uses of the setfacl command
description: >
  All uses of the setfacl command must be audited. The setfacl command
  sets file access control lists which control permissions.
rationale: >
  Auditing setfacl usage allows detection of ACL modifications
  that could grant unauthorized access to sensitive files.
severity: medium
category: audit
tags: [audit, auditd, privileged, acl]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9: { section: "6.3.3.16", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258182"
      stig_id: "RHEL-09-654160"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230435"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        rule=$(auditctl -l 2>/dev/null | grep 'path=/usr/bin/setfacl')
        if [ -z "$rule" ]; then
          echo "FAIL: no audit rule for /usr/bin/setfacl"
          exit 1
        fi
        if ! echo "$rule" | grep -q 'perm=x'; then
          echo "FAIL: audit rule for /usr/bin/setfacl missing perm=x"
          exit 1
        fi
        echo "OK: /usr/bin/setfacl is audited"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng"
      persist_file: "/etc/audit/rules.d/50-perm_chng.rules"
