# Pre-commit hooks for kensa.
#
# Install:           pip install pre-commit && pre-commit install
# Run defaults:      pre-commit run --all-files
# Run everything:    pre-commit run --all-files --hook-stage manual
#
# Default-stage hooks are file hygiene only — they run fast and need
# no language toolchain. Manual-stage hooks (Go toolchain, Specter)
# require local installation; CI runs them in dedicated jobs (Lint,
# Spec Sync) instead of through pre-commit. This lets `pre-commit
# install` give every contributor instant local hygiene without
# blocking on a Go install.

repos:
  # ─── Default stage: file hygiene (no language toolchain) ─────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
        # Test fixtures contain synthetic ed25519 keys generated at
        # test-time for round-trip verification. They are NOT real
        # secrets and are checked into the repo deliberately. The
        # exclude list calls them out explicitly so a new key in a
        # new file IS detected.
        exclude: ^(pkg/kensa/kensa_test\.go|cmd/kensa-keygen/main_test\.go)$
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Default stage: detect-secrets baseline scan ─────────────────────
  # Track S S-006. Matches the CI "Secret scan (detect-secrets)" job
  # in .github/workflows/ci.yml. Default-stage so contributors see new
  # potential-secret findings before they push. The baseline file at
  # .secrets.baseline pins the 3 known-false-positive findings (an
  # error-message keyword in internal/evidence/signer.go, a test-fixture
  # Ed25519 key in pkg/kensa/kensa_test.go, and the literal word
  # "password" in specs/cli/password.spec.yaml) so the hook only fires
  # on new findings. Real false positives in future PRs run
  # `detect-secrets audit .secrets.baseline` locally to triage + accept.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            KEYS|
            rules/.*|
            \.secrets\.baseline
          )$

  # ─── Manual stage: Go toolchain hooks ────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        stages: [manual]
      - id: go-imports
        stages: [manual]
      - id: go-vet
        stages: [manual]
      - id: go-mod-tidy
        stages: [manual]

  # ─── Manual stage: golangci-lint with comment-style suite ────────────
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint
        args: ["--config=.golangci.yml"]
        stages: [manual]

  # ─── Manual stage: Specter spec validation ──────────────────────────
  # Local developers run via `pre-commit run --hook-stage manual` or
  # via `make spec-sync` directly. NOT default-stage because:
  #   1. Requires specter in PATH (Hanalyx release tarball).
  #   2. The CI Pre-commit Hygiene job is a minimal Python container
  #      without specter; running the hook there fails for environment
  #      reasons, not contract reasons.
  #   3. CI enforces the same checks via the dedicated Spec Sync +
  #      Spec Coverage (strict) jobs — those have specter installed.
  - repo: local
    hooks:
      - id: specter-sync
        name: specter sync
        entry: specter sync
        language: system
        pass_filenames: false
        files: \.spec\.yaml$|specter\.yaml$
        stages: [manual]
