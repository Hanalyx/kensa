# Continuous Integration - runs on all PRs and pushes
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.4.4" mypy types-PyYAML types-paramiko

      - name: Ruff lint
        run: ruff check runner/ schema/ tests/

      - name: Ruff format check
        run: ruff format --check runner/ schema/ tests/

      - name: Mypy type check
        run: mypy runner/ --ignore-missing-imports --explicit-package-bases

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko PyYAML click rich pytest jsonschema

      - name: Run tests
        run: pytest tests/ -x -q

  validate:
    name: Validate Rules & Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema PyYAML paramiko click rich pytest

      - name: Validate rule YAML
        run: python -m schema.validate rules/

      - name: Validate spec YAML
        run: python schema/validate_specs.py

      - name: Check spec-to-test traceability
        run: python scripts/spec_traceability.py

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test, validate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatch hatch-vcs

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  rpm:
    name: Build RPM (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: el8
            image: rockylinux:8
          - distro: el9
            image: rockylinux:9
          - distro: el10
            image: almalinux:10
          - distro: fc
            image: fedora:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM build tools
        run: |
          # Enable EPEL and CRB/PowerTools on EL distros
          if [ "${{ matrix.distro }}" != "fc" ]; then
            dnf install -y epel-release || true
            /usr/bin/crb enable 2>/dev/null \
              || dnf config-manager --set-enabled powertools 2>/dev/null \
              || true
          fi

          # Base RPM build tools
          dnf install -y rpm-build python3-devel python3-pip python3-wheel \
            python3-setuptools pyproject-rpm-macros

          # EL8/EL9: system python3 is too old (3.6/3.9) for requires-python>=3.10
          # Install Python 3.11 from AppStream and use it for the build
          if [ "${{ matrix.distro }}" = "el8" ] || [ "${{ matrix.distro }}" = "el9" ]; then
            dnf install -y python3.11-devel
            dnf install -y python3.11-pip || python3.11 -m ensurepip
            python3.11 -m pip install --prefix=/usr hatchling wheel setuptools
          else
            dnf install -y python3-hatchling 2>/dev/null || pip3 install hatchling wheel
          fi

      - name: Extract version and prepare sources
        id: prep
        run: |
          VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"([^\"]+)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Set up rpmbuild directory structure
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}

          # Create source tarball matching spec expectations
          TARDIR="kensa-${VERSION}"
          mkdir -p "/tmp/${TARDIR}"
          cp -a . "/tmp/${TARDIR}/"
          tar czf ~/rpmbuild/SOURCES/kensa-${VERSION}.tar.gz -C /tmp "${TARDIR}"

          # Copy spec with correct version
          sed "s/^Version:.*/Version:        ${VERSION}/" kensa.spec > ~/rpmbuild/SPECS/kensa.spec

          # Remove python3-hatchling BuildRequires if installed via pip (not RPM)
          if ! rpm -q python3-hatchling &>/dev/null; then
            sed -i '/BuildRequires:.*python3-hatchling/d' ~/rpmbuild/SPECS/kensa.spec
          fi

      - name: Build RPM
        run: |
          if [ "${{ matrix.distro }}" = "el8" ] || [ "${{ matrix.distro }}" = "el9" ]; then
            rpmbuild --define '__python3 /usr/bin/python3.11' -ba ~/rpmbuild/SPECS/kensa.spec
          else
            rpmbuild -ba ~/rpmbuild/SPECS/kensa.spec
          fi

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.distro }}
          path: ~/rpmbuild/RPMS/noarch/*.rpm
