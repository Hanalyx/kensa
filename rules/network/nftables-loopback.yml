id: nftables-loopback
title: Ensure nftables loopback traffic is configured
description: >
  When using nftables directly, loopback traffic should be configured
  to allow localhost communication while blocking spoofed loopback traffic.
rationale: >
  Loopback traffic is essential for local services. However, spoofed
  loopback traffic from external sources should be blocked.
severity: medium
category: network
tags: [firewall, nftables, loopback, security]

references:
  cis:
    rhel9_v2: { section: "4.3.4", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: nftables_active
    check:
      method: command
      run: |
        # Check for loopback accept rule
        ruleset=$(nft list ruleset 2>/dev/null)
        if echo "$ruleset" | grep -qE "iif.*lo.*accept"; then
          echo "OK: nftables loopback traffic is configured"
          exit 0
        fi
        echo "FAIL: nftables loopback traffic not configured"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Configure nftables loopback traffic:
        nft add rule inet filter input iif lo accept
        nft add rule inet filter input ip saddr 127.0.0.0/8 counter drop

  - default: true
    check:
      method: command
      run: "echo 'OK: nftables not active (using firewalld)'; exit 0"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "nftables service is not active."
