id: no-empty-passwords
title: Ensure /etc/shadow password fields are not empty
description: >
  No accounts may have empty password fields in /etc/shadow.
rationale: >
  Empty password fields allow passwordless login, bypassing authentication entirely.
severity: high
category: access-control
tags: [passwd, shadow, authentication]

references:
  cis:
    rhel9_v2: { section: "7.2.2", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: 'awk -F: ''($2 == "") {found=1} END {exit found ? 1 : 0}'' /etc/shadow'
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Lock or set passwords for accounts with empty password fields"
