id: etc-shadow-permissions
title: Ensure permissions on /etc/shadow are configured
description: >
  The /etc/shadow file must have correct ownership and permissions.
rationale: >
  Incorrect permissions on /etc/shadow could allow unauthorized access or modification of sensitive system data.
severity: high
category: filesystem
tags: [file-permissions, authentication]

references:
  cis:
    rhel9_v2: { section: "7.1.5", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "MP-2"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/shadow"
      owner: "root"
      group: "root"
      mode: "0000"
    remediation:
      mechanism: file_permissions
      path: "/etc/shadow"
      owner: "root"
      group: "root"
      mode: "0000"
