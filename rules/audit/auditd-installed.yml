id: auditd-installed
title: Ensure auditd packages are installed
description: 'The audit package must be installed.

  '
rationale: 'The audit package provides essential functionality. Without it, the system cannot meet the corresponding security
  requirements.

  '
severity: medium
category: audit
tags:
- audit
- auditd
- packages
references:
  cis:
    rhel9:
      section: 6.3.1.1
      level: L1
      type: Automated
    rhel10: { section: "6.3.1.1", level: "L2", type: "Automated" }
    ubuntu24: { section: "6.2.1.1", level: "L2", type: "Automated" }
    ubuntu22: { section: "6.2.1.1", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.1.1", level: "L2", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258151"
      stig_id: "RHEL-09-653010"
      severity: "CAT II"
    ubuntu24:
      vuln_id: V-270656
      stig_id: UBTU-24-100400
      severity: CAT II
    ubuntu22:
      vuln_id: V-260590
      stig_id: UBTU-22-653010
      severity: CAT II
    rhel8:
      vuln_id: "V-230411"
      stig_id: "RHEL-08-030180"
      severity: "CAT II"
  nist_800_53:
  - AU-2
  - AU-12
platforms:
- family: ubuntu
  min_version: 22
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: auditd
    state: present
  remediation:
    mechanism: apt_present
    name: auditd
- default: true
  check:
    method: package_state
    name: audit
    state: present
  remediation:
    mechanism: package_present
    name: audit
