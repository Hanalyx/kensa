id: audit-lastlog-write-rhel10
title: Audit write/attribute changes to /var/log/lastlog (syscall form)
description: >
  On RHEL 10, record write and attribute changes to /var/log/lastlog via the syscall-form
  audit rule (RHEL 10 deprecated the legacy -w watch form).
rationale: >
  Auditing changes to last-login files supports detection of unauthorized
  modification and forensic reconstruction.
severity: medium
transactional: false
category: audit
tags: [audit, lastlog, stig]
references:
  stig:
    rhel10: { vuln_id: "V-281162", stig_id: "RHEL-10-500760", severity: "CAT II" }
  nist_800_53: ["AU-12", "AC-6"]
platforms:
  - family: rhel
    min_version: 10
implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F path=/var/log/lastlog -F perm=wa"
    remediation:
      mechanism: manual
      note: "Add `-a always,exit -F arch=b64 -F path=/var/log/lastlog -F perm=wa -k logins` (and the b32 form) to /etc/audit/rules.d/ and augenrules --load."
