name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spec-sync:
    # Specter runs before Go build — specs are the source of truth.
    # A failing spec-sync blocks the build.
    name: Spec Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Specter
        # TODO: once Specter publishes GitHub release artifacts, replace
        # this go-install with a pinned release download. The go-install
        # path assumes the spec-dd module is public and Go-installable.
        # If it isn't yet, this step will fail and the founder should
        # set SPECTER_INSTALL_URL to a binary release tarball.
        run: |
          if [ -n "${SPECTER_INSTALL_URL:-}" ]; then
            curl -sSL "$SPECTER_INSTALL_URL" | tar -xz -C /usr/local/bin
          else
            go install github.com/Hanalyx/spec-dd/cmd/specter@v0.4.1 || {
              echo "::warning::Specter install failed — skipping spec-sync (track via #TBD)"
              exit 0
            }
          fi
          specter --version
      - name: specter doctor
        run: specter doctor
      - name: specter sync
        run: specter sync
      - name: specter check --strict
        run: specter check --strict
      - name: specter resolve --mermaid
        run: specter resolve --mermaid > spec-graph.mmd
        continue-on-error: true
      - name: Upload spec graph
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-graph
          path: spec-graph.mmd
          if-no-files-found: ignore

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: spec-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: spec-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # Future jobs (land as the codebase grows):
  #   integration: real-host RHEL 8/9/10 matrix tests (after Week 4)
  #   fuzz: kensa-fuzz atomicity verification (after Week 7)
  #   parity: Python vs Go fixture comparison (after Week 8)
