id: library-files-group
title: Ensure library files are group-owned by root
description: >
  All shared library files in /lib, /lib64, /usr/lib, and /usr/lib64 must
  be group-owned by root.
rationale: >
  Library files group-owned by non-root accounts could be modified by
  group members. Root group ownership prevents this.
severity: medium
category: filesystem
tags: [file-permissions, library-files, security]

references:
  stig:
    rhel10: { vuln_id: "V-281040", stig_id: "RHEL-10-400115", severity: "CAT II" }
    rhel9: { vuln_id: "V-257921", stig_id: "RHEL-09-232205", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230262"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270699"
      stig_id: "UBTU-24-300009"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260500"
      stig_id: "UBTU-22-232075"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: "find /lib /lib64 /usr/lib /usr/lib64 -name '*.so*' ! -group root -type f 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: file_permissions
      find_paths:
        - /lib
        - /lib64
        - /usr/lib
        - /usr/lib64
      find_name: "*.so*"
      find_type: f
      find_args: "! -group root"
      group: root
