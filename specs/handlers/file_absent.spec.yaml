spec:
    id: handler-file-absent
    version: 0.1.0
    status: draft
    tier: 1

    context:
        system: kensa-go
        feature: handler-file-absent
        description: |
            The file_absent handler removes a file from the target host.
            Capture records full content, mode, ownership, and SELinux
            context before removal so rollback can restore the exact
            prior file. If the file was already absent at capture time,
            apply and rollback are both no-ops.
        related_specs:
            - handler-interface
            - handler-file-content

    objective:
        summary: |
            Ensure a file does not exist on the target host. Capture
            records the full prior file state for rollback. If already
            absent, the transaction is a no-op.
        scope:
            includes:
                - rm -f (apply)
                - Capture of content, mode, owner, group, SELinux context
                - Rollback recreating the file with prior content and attrs
                - No-op when file was already absent
            excludes:
                - Directory removal (rmdir / rm -rf)
                - Partial file edits

    constraints:
        - id: C-01
          description: |
              Apply MUST use `rm -f` so that an already-absent file is
              not an error condition. Idempotent.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Capture MUST record file_existed, content, mode, owner,
              group, and selinux_context. When file_existed=false, all
              other fields are empty strings and rollback is a no-op.
          type: security
          enforcement: error
        - id: C-03
          description: |
              Rollback MUST recreate the file with prior content and
              then restore mode, owner, group, and SELinux context when
              file_existed=true. When file_existed=false, rollback is a
              no-op.
          type: security
          enforcement: error
        - id: C-04
          description: |
              Capture MUST return ErrCaptureIncomplete if stat fails due
              to a permissions error, not merely absence.
          type: security
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              Apply with an existing path runs `rm -f <path>` and
              reports Success.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: |
              Apply against an already-absent path is a no-op and
              reports Success (rm -f is idempotent).
          references_constraints: [C-01]
          priority: high
        - id: AC-03
          description: |
              Capture against an existing file records file_existed=true
              and all five attributes.
          references_constraints: [C-02]
          priority: critical
        - id: AC-04
          description: |
              Capture against an absent path records file_existed=false
              without error.
          references_constraints: [C-02]
          priority: critical
        - id: AC-05
          description: |
              Rollback with file_existed=true recreates the file with
              prior content, mode, owner, group, and SELinux context.
          references_constraints: [C-03]
          priority: critical
        - id: AC-06
          description: |
              Rollback with file_existed=false is a no-op (reports
              Success with no transport calls).
          references_constraints: [C-03]
          priority: high

        - id: AC-07
          description: |
              Capture returns ErrCaptureIncomplete when stat fails due to
              a permissions error (EACCES), not mere absence — the engine
              must not silently treat a denied stat as "file not present".
          references_constraints: [C-04]
          priority: critical

    depends_on:
        - spec_id: handler-interface
          relationship: requires

    trust_level: human_required
    tags: [handler, capturable, tier-1, file]
