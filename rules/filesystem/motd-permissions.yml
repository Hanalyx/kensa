id: motd-permissions
title: Ensure access to /etc/motd is configured
description: >
  The /etc/motd file should have appropriate permissions to prevent
  unauthorized modification of the message of the day.
rationale: >
  If the /etc/motd file permissions are not restrictive, unauthorized
  users could modify it to display misleading or malicious information.
severity: low
category: filesystem
tags: [permissions, motd, banner, security]

references:
  cis:
    rhel9_v2: { section: "1.7.4", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "CM-6"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/motd"
      max_mode: "0644"
      owner: "root"
      group: "root"
      missing_ok: true
    remediation:
      mechanism: file_permissions
      path: "/etc/motd"
      mode: "0644"
      owner: "root"
      group: "root"
