kind: RemediationHandler
metadata:
  name: GrubParameterSet
  module: handlers/remediation
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Adds a kernel boot parameter to GRUB on a remote RHEL host using grubby.
    The parameter is applied to all installed kernels. Supports both key=value
    parameters and standalone flag parameters.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["grub_parameter_set"]. Implemented in
    runner/handlers/remediation/_system.py as _remediate_grub_parameter_set.
  dependencies:
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/grub_parameter_remove.spec.yaml

objective:
  summary: >
    Add a kernel boot parameter to GRUB configuration via grubby, applied to
    all installed kernels. Supports key=value pairs and standalone flags.
    Changes take effect on next boot.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would set
      kernel arg: {arg}") and no SSH commands are executed.
    AC-2: >
      Key-value parameter: When value is provided, the argument is formatted
      as "{key}={value}".
    AC-3: >
      Standalone flag: When value is not provided or is None, the argument is
      just the key.
    AC-4: >
      Success path: When grubby succeeds, returns (True, "Set kernel arg:
      {arg}").
    AC-5: >
      Grubby failure: When grubby fails (non-zero exit), returns (False,
      "grubby failed: {stderr}").
    AC-6: >
      Shell quoting: The composed argument is passed through shell_util.quote()
      in the grubby command.
    AC-7: >
      All kernels: The grubby command uses --update-kernel=ALL to apply to all
      installed kernels.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for the argument in the grubby command.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - Changes require a reboot to take effect; the handler does not reboot the system.
  - The handler does not verify that the parameter is valid or supported by the kernel.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "grub_parameter_set" (used by dispatch, not by handler directly)
  - field: key
    type: str
    required: true
    description: Kernel boot parameter name (e.g., "audit", "audit_backlog_limit")
  - field: value
    type: str
    required: false
    description: Parameter value (e.g., "1", "8192"). If omitted, parameter is a standalone flag.

behavior:
  - "Extract fields: Read key from the remediation dict. Read optional value."
  - "Compose argument: If value is provided, build arg as f\"{key}={value}\". Otherwise, arg is just key."
  - "Dry-run check: If dry_run=True, return (True, \"Would set kernel arg: {arg}\") immediately."
  - "Set GRUB parameter: Execute grubby --update-kernel=ALL --args={quoted_arg} via SSH."
  - "Check result: If grubby fails (non-zero exit), return (False, \"grubby failed: {stderr}\")."
  - "Success return: Return (True, \"Set kernel arg: {arg}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would set kernel arg: {arg}\""
    - "Success: \"Set kernel arg: {arg}\""
    - "Failure: \"grubby failed: {stderr}\""

side_effects:
  - "Modifies GRUB boot configuration to add a kernel parameter via grubby."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestGrubParameterSetSpecDerived
    count: 9
