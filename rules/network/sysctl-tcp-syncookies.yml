id: sysctl-tcp-syncookies
title: Ensure tcp syn cookies is enabled
description: >
  The kernel parameter(s) net.ipv4.tcp_syncookies must be configured to enforce this network security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]
conflicts_with:
  - sysctl-net-ipv4-tcp-syncookies

references:
  cis:
    rhel9_v2: { section: "3.3.10", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7", "CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: sysctl_value
      key: "net.ipv4.tcp_syncookies"
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: "net.ipv4.tcp_syncookies"
      value: "1"
