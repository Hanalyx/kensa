id: cron-enabled
title: Ensure cron daemon is enabled and active
description: >
  The crond service must be enabled and running.
rationale: >
  The crond service provides essential system functionality. If it is not running, the system may not meet security requirements.
severity: medium
category: system
tags: [service, cron, scheduling]

references:
  cis:
    rhel9_v2: { section: "2.4.1.1", level: "L1", type: "Automated" }
  nist_800_53: ["CM-6"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: service_state
      name: "crond"
      state: "running"
      enabled: true
    remediation:
      mechanism: service_enabled
      name: "crond"
      start: true
