id: groups-in-passwd-exist
title: Ensure all groups in /etc/passwd exist in /etc/group
description: >
  All primary groups referenced in /etc/passwd must have corresponding
  entries in /etc/group.
rationale: >
  If a user's primary group does not exist in /etc/group, the user may
  not have proper group membership, leading to access control issues
  and potential security vulnerabilities.
severity: medium
category: system
tags: [accounts, passwd, group, security]

references:
  cis:
    rhel9_v2:  { section: "7.2.3", level: "L1", type: "Automated" }
  nist_800_53: ["IA-2", "AC-2"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        for gid in $(cut -d: -f4 /etc/passwd | sort -u); do
          if ! grep -qE "^[^:]+:[^:]+:${gid}:" /etc/group; then
            echo "Missing GID: ${gid}"
          fi
        done
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: manual
      note: >
        For each missing group, either add the group to /etc/group with
        the correct GID or update the user's primary group in /etc/passwd.
