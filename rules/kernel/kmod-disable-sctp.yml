id: kmod-disable-sctp
title: Disable SCTP kernel module
description: >
  The Stream Control Transmission Protocol (SCTP) kernel module should
  be disabled if not required.
rationale: >
  SCTP is a transport layer protocol that is rarely used on most systems.
  Disabling unused protocols reduces the attack surface and potential
  for exploitation of protocol vulnerabilities.
severity: medium
category: kernel
tags: [kernel-module, sctp, network, attack-surface, stig]

references:
  cis:
    rhel9: { section: "3.2.4", level: "L1", type: "Automated" }
    rhel10: { section: "3.2.6", level: "L1", type: "Automated" }
    rhel8: { section: "3.2.5", level: "L1", type: "Automated" }
    ubuntu22: { section: "3.2.4", level: "L1", type: "Automated" }
    ubuntu24: { section: "3.2.4", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-257807"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230496"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281313"
      stig_id: "RHEL-10-701110"
      severity: "CAT II"
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8

  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: kernel_module_state
      name: "sctp"
      state: "disabled"
    remediation:
      mechanism: kernel_module_disable
      name: "sctp"
