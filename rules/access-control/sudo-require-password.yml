id: sudo-require-password
title: Ensure users must provide password for privilege escalation
description: >
  Users should be required to authenticate with their password when using
  sudo to escalate privileges. NOPASSWD should not be configured.
rationale: >
  Requiring password authentication for sudo provides an additional layer
  of security and ensures that if a user session is compromised, the
  attacker cannot immediately gain elevated privileges.
severity: medium
category: access-control
tags: [sudo, password, authentication, privilege-escalation]

references:
  cis:
    rhel9_v2: { section: "5.2.4", level: "L2", type: "Automated" }
  nist_800_53: ["IA-11", "AC-6"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: command
      command: |
        # Check for NOPASSWD in sudoers files
        if grep -rE '^\s*[^#].*NOPASSWD' /etc/sudoers /etc/sudoers.d/ 2>/dev/null | grep -v '^#'; then
          echo "FAIL: NOPASSWD found in sudoers configuration"
          exit 1
        fi
        echo "OK: No NOPASSWD directives found"
        exit 0
      expected_exit_code: 0
    remediation:
      mechanism: manual
      description: "Remove NOPASSWD from all sudoers entries in /etc/sudoers and /etc/sudoers.d/"
