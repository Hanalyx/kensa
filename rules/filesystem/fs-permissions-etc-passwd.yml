id: fs-permissions-etc-passwd
title: Set permissions on /etc/passwd
description: >
  The /etc/passwd file contains user account information and must have
  restrictive permissions to prevent unauthorized modification.
rationale: >
  The passwd file is critical for user authentication. Unauthorized
  modification could allow attackers to create accounts, change UIDs,
  or modify login shells.
severity: high
category: filesystem
tags: [permissions, passwd, authentication, security]

references:
  cis:
    rhel8_v4:  { section: "6.1.1", level: "L1", type: "Automated" }
    rhel9_v2:  { section: "6.1.1", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-258131"
      stig_id: "RHEL-09-232010"
      severity: "CAT II"
  nist_800_53: ["AC-3", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/passwd"
      mode: "0644"
      owner: "root"
      group: "root"
    remediation:
      mechanism: file_permissions
      path: "/etc/passwd"
      mode: "0644"
      owner: "root"
      group: "root"
