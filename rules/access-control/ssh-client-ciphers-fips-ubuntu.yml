id: ssh-client-ciphers-fips-ubuntu
title: Configure the SSH client to use FIPS-approved ciphers
description: >
  The SSH client (/etc/ssh/ssh_config) must be configured to use only
  FIPS 140-3 approved ciphers.
rationale: >
  Restricting the SSH client to FIPS-approved ciphers prevents negotiation of
  a weaker algorithm when this host initiates an SSH connection.
severity: medium
category: access-control
tags: [ssh, client, fips, ciphers]

depends_on: [pkg-openssh-server-present]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270670"
      stig_id: "UBTU-24-100850"
      severity: "CAT II"
  nist_800_53: ["SC-8", "SC-13"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        val=$(grep -iE '^[[:space:]]*Ciphers ' /etc/ssh/ssh_config 2>/dev/null | awk '{print $2}' | tail -1)
        if [ -z "$val" ]; then
          echo "FAIL: Ciphers not set in /etc/ssh/ssh_config"
          exit 1
        fi
        if echo "$val" | tr ',' '\n' | grep -qvE '^(aes128-ctr|aes256-ctr|aes128-gcm@openssh\.com|aes256-gcm@openssh\.com)$'; then
          echo "FAIL: non-FIPS ciphers in ssh_config: $val"
          exit 1
        fi
        echo "OK: $val"
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: /etc/ssh/ssh_config
      key: Ciphers
      value: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr"
      separator: " "
