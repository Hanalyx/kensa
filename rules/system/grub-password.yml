id: grub-password
title: Set GRUB bootloader password
description: >
  The GRUB bootloader should be protected with a password to prevent
  unauthorized users from modifying boot parameters or accessing
  single-user mode.
rationale: >
  Without a bootloader password, an attacker with physical access can
  boot into single-user mode or modify kernel parameters to gain
  unauthorized root access.
severity: high
category: system
tags: [grub, bootloader, physical-security]

references:
  cis:
    rhel8_v4:  { section: "1.4.1", level: "L1", type: "Automated" }
    rhel9_v2:  { section: "1.4.1", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-257777"
      stig_id: "RHEL-09-212010"
      severity: "CAT I"
  nist_800_53: ["AC-3"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "grep -E '^GRUB2_PASSWORD=' /boot/grub2/user.cfg 2>/dev/null || grep -E '^password' /boot/grub2/grub.cfg 2>/dev/null"
      expected_exit: 0
    remediation:
      mechanism: manual
      description: >
        Set GRUB bootloader password using grub2-setpassword command:
        grub2-setpassword
        This will prompt for a password and create /boot/grub2/user.cfg
