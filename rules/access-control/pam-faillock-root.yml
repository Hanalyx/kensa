id: pam-faillock-root
title: Ensure password failed attempts lockout includes root account
description: >
  Account lockout must include the root account.
rationale: >
  Excluding root from lockout allows unlimited password guessing against the most privileged account.
severity: medium
category: access-control
tags: [pam, authentication, faillock, root]

references:
  cis:
    rhel9_v2: { section: "5.3.3.1.3", level: "L1", type: "Automated" }
  nist_800_53: ["AC-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: 'grep -qE ''^\s*even_deny_root\b'' /etc/security/faillock.conf'
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "sed -i '/^#.*even_deny_root/s/^#//' /etc/security/faillock.conf || echo 'even_deny_root' >> /etc/security/faillock.conf"
