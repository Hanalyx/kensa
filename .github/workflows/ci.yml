name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Build discipline (deliverables L-001 and L-002):
#   CGO_ENABLED=0      ensures the binary talks directly to the kernel ABI
#                      rather than going through glibc, so the same binary
#                      runs on RHEL 8 (glibc 2.28) through RHEL 12 and on
#                      Alpine (musl), with no glibc compatibility floor.
#   GODEBUG=netdns=go  defense-in-depth runtime hint that selects the
#                      pure-Go DNS resolver. The compile-time guarantee
#                      comes from the `-tags netgo` build flag in the
#                      Makefile; this env var ensures any DNS lookups
#                      during go test / go run also go through the pure-Go
#                      path, keeping CI consistent with the shipped binary.
# Both inherited by all jobs and steps below.
env:
  CGO_ENABLED: '0'
  GODEBUG: 'netdns=go'
  # Read-only modules: every `go` invocation refuses to mutate go.mod
  # or go.sum. Catches CI steps that would silently `go get` a new dep
  # under the contributor's nose. Track S S-014.
  GOFLAGS: '-mod=readonly'
  # Specter pin per P-012. The release tarball URL is used by the
  # spec-sync + spec-coverage-strict jobs. v0.12.1 is the earliest
  # version that supports the tier-threshold strictness mode P-012
  # enforces (settings.strictness: threshold in specter.yaml).
  SPECTER_VERSION: 'v0.12.1'

jobs:
  spec-sync:
    # Specter runs before Go build — specs are the source of truth.
    # Hanalyx publishes Specter release tarballs at
    # github.com/Hanalyx/specter/releases (pinned to v0.12.1 above);
    # the install step uses the tarball first, falling back to
    # go install only if the release URL is unreachable. This job is
    # now REQUIRED (no continue-on-error) since v0.12.1 install is
    # reliable per P-012's CI validation.
    name: Spec Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install Specter
        id: install
        run: |
          set -eo pipefail

          # Priority 1: GoReleaser tarball from the pinned release.
          tarball_url="${SPECTER_INSTALL_URL:-https://github.com/Hanalyx/specter/releases/download/${SPECTER_VERSION}/specter_${SPECTER_VERSION#v}_linux_amd64.tar.gz}"
          echo "Trying release tarball: $tarball_url"
          tmp_dir=$(mktemp -d)
          if curl -fsSL "$tarball_url" | tar -xz -C "$tmp_dir"; then
            sudo mv "$tmp_dir/specter" /usr/local/bin/specter
            sudo chmod +x /usr/local/bin/specter
            rm -rf "$tmp_dir"
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "method=tarball" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rm -rf "$tmp_dir"

          # Priority 2: go install fallback.
          mkdir -p "$HOME/go/bin"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          for path in \
              github.com/Hanalyx/specter/cmd/specter@${SPECTER_VERSION} \
              github.com/Hanalyx/specter@${SPECTER_VERSION}; do
            echo "Trying: go install $path"
            if go install "$path" 2>/dev/null; then
              echo "installed=true" >> "$GITHUB_OUTPUT"
              echo "method=go-install" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "::error::Specter ${SPECTER_VERSION} could not be installed via tarball OR go install. Check that the release exists at github.com/Hanalyx/specter/releases."
          exit 1
      - name: specter --version
        run: specter --version
      - name: specter doctor
        run: specter doctor
      - name: specter sync
        run: specter sync
      - name: specter check --strict
        run: specter check --strict
      - name: specter resolve --mermaid
        run: specter resolve --mermaid > spec-graph.mmd
      - name: Upload spec graph
        uses: actions/upload-artifact@v4
        with:
          name: spec-graph
          path: spec-graph.mmd
          if-no-files-found: ignore

  spec-coverage-strict:
    # P-012 deliverable: enforce tier-threshold coverage as a CI gate.
    # Tier 1 (atomicity-critical) requires 100% AC coverage; Tier 2
    # (apply-path / agent / rule-store) requires 80%; Tier 3 (CLI /
    # output formatters) requires 50%. Per the
    # `settings.strictness: threshold` mode in specter.yaml.
    #
    # Runs after spec-sync (which validates spec structure) and unit
    # (which produces fresh test results). We re-run go test ./... here
    # because the spec-coverage gate needs JSON output, which the unit
    # job doesn't publish as an artifact today. The duplicate run is
    # ~30s; trade-off is simpler workflow plumbing vs sharing
    # go-test.json across jobs.
    name: Spec Coverage (strict)
    runs-on: ubuntu-latest
    needs: [spec-sync, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install Specter
        run: |
          set -eo pipefail
          tarball_url="${SPECTER_INSTALL_URL:-https://github.com/Hanalyx/specter/releases/download/${SPECTER_VERSION}/specter_${SPECTER_VERSION#v}_linux_amd64.tar.gz}"
          tmp_dir=$(mktemp -d)
          curl -fsSL "$tarball_url" | tar -xz -C "$tmp_dir"
          sudo mv "$tmp_dir/specter" /usr/local/bin/specter
          sudo chmod +x /usr/local/bin/specter
          rm -rf "$tmp_dir"
          specter --version
      # protoc + protoc-gen-go required for the wire-protocol tests
      # that exercise compiled pb.go (same shape as the unit job).
      - name: Install protoc
        run: |
          PROTOC_VERSION="25.3"
          curl -sSLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # Build bin/kensa before running tests — some tests in
      # internal/agent/dispatcher/setup_test.go skip when
      # bin/kensa isn't present (they exercise a local-stub
      # OpenAgent path that exec's the real binary). Skipped tests
      # don't count toward coverage, so the agent-cli-env-var spec
      # drops below its Tier 2 80% threshold without this step.
      - name: Build kensa binary
        run: make build
      - name: Run spec-coverage-strict
        run: make spec-coverage-strict
      - name: Upload .specter-results.json on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: specter-results
          path: .specter-results.json
          if-no-files-found: warn

  unit:
    # Independent of spec-sync during the Specter-install-TBD window.
    # Once Specter is installable in CI, restore `needs: spec-sync`.
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      # protoc + protoc-gen-go installed BEFORE `go test ./...` so
      # TestCodegenSync (the L-007 wire-protocol codegen-drift gate)
      # actually runs instead of self-skipping. The test fails hard
      # under CI when protoc is missing — that's the belt; running
      # the install here is the suspenders.
      - name: Install protoc
        run: |
          PROTOC_VERSION="25.3"
          curl -sSLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          protoc --version
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify wire.pb.go in sync with wire.proto
        # Belt-and-suspenders for TestCodegenSync: even if a future
        # test refactor accidentally weakens the Go-side gate, the
        # Make target keeps wire-schema drift from landing silently.
        run: make proto-check
      - run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # install-mode: goinstall builds the linter from source using
          # the runner's Go (1.25). Required because our deps
          # (modernc/sqlite) require Go 1.25 and pre-built linter
          # binaries shipped before that toolchain release can't read
          # 1.25 export data.
          install-mode: goinstall
          # Read .golangci.yml from the repo root. Comment-style rules
          # (revive exported, godot, misspell, gocritic) enforce
          # Google's Go Style Guide on the api/ surface.
          args: --config=.golangci.yml --timeout=5m

  comment-lint:
    # Fails when a NEW Go // comment carries a planning label (Phase 3,
    # Option B, ...) — those point into plans a future reader can't resolve.
    # Lints only lines added vs origin/main, so legacy comments are
    # grandfathered. fetch-depth: 0 + the explicit fetch give the diff a
    # merge-base to work from. See CONTRIBUTING.md, "Comments".
    name: Comment lint (no planning labels in new comments)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Ensure base ref is present
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
      - name: comment-lint (added lines vs origin/main)
        run: make comment-lint

  pre-commit:
    # Mirror the pre-commit framework checks contributors run locally.
    # Default-stage hooks in .pre-commit-config.yaml are file hygiene
    # only (no Go toolchain). Manual-stage hooks (Go fmt/vet/lint,
    # Specter) are handled by the Lint and Spec Sync jobs above.
    name: Pre-commit hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit==3.7.1
      - name: Run default-stage hooks
        run: pre-commit run --all-files --show-diff-on-failure

  build-static-verify:
    # Deliverable L-003: proves the
    # CGO_ENABLED=0 + -tags netgo discipline (L-001 + L-002) is honored
    # on every CI run by building all three binaries and asserting each
    # one is statically linked. Fails the workflow immediately if a
    # transitive dependency reintroduces dynamic linking.
    name: Build & Static Linking Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build all binaries
        run: make build
      - name: Verify static linking via ldd
        run: |
          set -e
          ok=0
          fail=0
          for bin in bin/kensa bin/kensa-fuzz bin/kensa-validate; do
            # ldd exits non-zero on static binaries; capture both streams
            # and look for the canonical message. We also accept `file`
            # output as a secondary signal.
            ldd_out=$(ldd "$bin" 2>&1 || true)
            file_out=$(file "$bin")
            if echo "$ldd_out" | grep -q "not a dynamic executable" \
               || echo "$file_out" | grep -q "statically linked"; then
              echo "  ✓ $bin: statically linked"
              ok=$((ok+1))
            else
              echo "  ✗ $bin: dynamically linked — regression!"
              echo "    ldd:  $ldd_out"
              echo "    file: $file_out"
              fail=$((fail+1))
            fi
          done
          echo ""
          echo "Result: $ok passed, $fail failed"
          if [ "$fail" -gt 0 ]; then
            echo "::error::At least one binary is dynamically linked. Likely causes: (1) a new go.mod dependency pulls cgo; (2) the Makefile build target lost CGO_ENABLED=0 or -tags netgo; (3) something built with raw 'go build' instead of 'make build'. The canonical build entrypoint is 'make build' — direct go build invocations bypass the discipline."
            exit 1
          fi

  build-portability-glibc228:
    # Deliverable L-004: proves the static
    # binary actually runs on a glibc 2.28 system (RHEL 8 vintage). This
    # is the supported "oldest glibc" floor; if the binary fails here, a
    # transitive dependency or build-flag regression has reintroduced
    # libc symbol dependencies that the L-001/L-002 discipline was
    # supposed to prevent.
    #
    # Note: uses `kensa version` (subcommand) rather than `kensa --version`
    # (flag) because the GNU/POSIX flag form is added in CLI Phase 1
    # (deliverable C-001). Functionally equivalent for portability
    # verification — both exercise the same startup path.
    name: Portability — glibc 2.28 (RHEL 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build static binary
        run: make build
      - name: Verify binary runs in rockylinux:8 (glibc 2.28)
        run: |
          set -e
          # Confirm the container's glibc version matches the target.
          glibc_version=$(docker run --rm rockylinux:8 \
            bash -c '/lib64/libc.so.6 | head -1')
          echo "Target container glibc: $glibc_version"
          if ! echo "$glibc_version" | grep -q "version 2.28"; then
            echo "::error::Expected glibc 2.28 in rockylinux:8 but got: $glibc_version"
            exit 1
          fi

          # Run the static binary inside the glibc 2.28 container.
          out=$(docker run --rm -v "$PWD/bin:/kensa-bin:ro" rockylinux:8 \
            /kensa-bin/kensa version 2>&1)
          echo "Output: $out"
          if echo "$out" | grep -q "kensa "; then
            echo "  ✓ kensa version succeeded on glibc 2.28"
          else
            echo "::error::Binary failed to run on glibc 2.28 — L-001/L-002 regression. Output: $out"
            exit 1
          fi

  cli-smoke:
    # Deliverable C-010: runs the
    # GNU/POSIX exit-code smoke test on every PR, catching regressions
    # in --help / --version / bad-flag / unknown-subcommand paths
    # before they reach operators. Fast (~5s) and network-free.
    name: CLI Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build all binaries
        run: make build
      - name: Run cli-smoke.sh
        run: make cli-smoke

  build-portability-alpine:
    # Deliverable L-005: proves the static
    # binary runs on Alpine (musl libc), not just glibc-based distros.
    # Together with L-004 (glibc 2.28), this verifies kensa's binary
    # is libc-independent end-to-end — the "compile once, run anywhere
    # Linux" claim.
    #
    # Note: uses `kensa version` (subcommand) rather than `kensa --version`
    # (flag) because the GNU/POSIX flag form is added in CLI Phase 1
    # (deliverable C-001). Functionally equivalent for portability —
    # both exercise the same Go runtime startup path.
    name: Portability — Alpine (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build static binary
        run: make build
      - name: Verify binary runs in alpine:3 (musl libc)
        run: |
          set -e
          out=$(docker run --rm -v "$PWD/bin:/kensa-bin:ro" alpine:3 \
            /kensa-bin/kensa version 2>&1)
          echo "Output: $out"
          if echo "$out" | grep -q "kensa "; then
            echo "  ✓ kensa version succeeded on Alpine (musl)"
          else
            echo "::error::Binary failed to run on Alpine musl — L-001/L-002 regression. The binary may have a glibc-specific symbol or the static-link discipline broke. Output: $out"
            exit 1
          fi

  release-snapshot:
    # Catches breakage in .goreleaser.yaml + the rules-corpus packaging
    # before tag time. Runs goreleaser in snapshot mode (no publish, no
    # sign) so it exercises the build matrix, archive layout, both nfpm
    # blocks (kensa amd64+arm64 rpm+deb, kensa-rules noarch rpm+deb)
    # and the checksum step. Skips: publish (no GitHub release),
    # sign (no cosign secrets available on PR runs). The release-time
    # workflow (.github/workflows/release.yml) re-runs without the
    # skips and adds GPG + cosign signing.
    name: Release snapshot (no publish, no sign)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for version templating
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install goreleaser
        # Pinned to the version that has `archives.formats`,
        # `archives.ids`, and `nfpms.ids` (the post-rename field names
        # this config uses). v2.5.1 was too old and `goreleaser check`
        # rejected them. Keep this in lockstep with the
        # GORELEASER_VERSION in .github/workflows/release.yml.
        run: |
          go install github.com/goreleaser/goreleaser/v2@v2.15.4
          goreleaser --version
      - name: goreleaser check
        run: goreleaser check
      - name: goreleaser release --snapshot --skip=publish,sign
        run: goreleaser release --snapshot --clean --skip=publish,sign
      - name: List artifacts
        run: |
          ls -lh dist/*.{tar.gz,rpm,deb,sha256} 2>/dev/null || true
          echo "Artifact count: $(ls dist/*.{tar.gz,rpm,deb,sha256} 2>/dev/null | wc -l)"
      - name: Verify expected artifact set (11 files)
        run: |
          # 2 binary-only tarballs + 2 with-rules tarballs + 4 binary
          # packages (rpm/deb × amd64/arm64) + 2 noarch packages (kensa-rules
          # rpm/deb) + 1 checksum file = 11. Update this count if the
          # archives or nfpms blocks in .goreleaser.yaml gain a new variant.
          got=$(ls dist/*.tar.gz dist/*.rpm dist/*.deb dist/*.sha256 2>/dev/null | wc -l)
          if [ "$got" != "11" ]; then
            echo "::error::expected 11 release artifacts, got $got"
            ls -lh dist/
            exit 1
          fi
          echo "✓ 11/11 expected artifacts present"

  vulnerability-scan:
    # Track S S-005: govulncheck against the binary call graph. Blocks
    # merge on a CALLED vulnerability (uncalled stdlib/dep vulns are
    # reported as informational only by govulncheck and do not fail).
    # Invoked via `go run` so go.mod's toolchain directive controls
    # which Go version compiles + runs govulncheck — required because
    # govulncheck installed via `go install` on Go N can't typecheck
    # source written against Go N+1.
    name: Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'  # auto-toolchain promotes to go.mod's 1.26.3
      - name: govulncheck
        # GOFLAGS unset for this step so `go run` can populate the
        # module cache (the top-level `-mod=readonly` would reject any
        # cache hit that requires a new download). The actual analysis
        # runs against committed go.mod / go.sum unchanged.
        env:
          GOFLAGS: ''
        run: |
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  module-drift-check:
    # Track S S-014: verify go.mod + go.sum match `go mod tidy` output.
    # Drift signals a missing indirect, a leftover require, or a
    # checksum the contributor didn't commit — all supply-chain
    # smells. Fails loudly with a one-line "run go mod tidy locally" fix.
    name: Module drift check (go mod tidy is a no-op)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'  # auto-toolchain promotes to go.mod's 1.26.3
      - name: go mod tidy + diff
        env:
          GOFLAGS: ''  # tidy needs write access to go.mod / go.sum
        run: make mod-tidy-check

  secret-scan:
    # Track S S-006: detect-secrets baseline drift. Compares the current
    # working tree against .secrets.baseline; any new finding not on the
    # baseline fails the job. Contributors who hit a real false positive
    # run `detect-secrets audit .secrets.baseline` locally to triage +
    # accept the finding before re-pushing.
    name: Secret scan (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0
      - name: Scan for new secrets
        run: |
          # Scan against the committed baseline. New findings not in the
          # baseline fail the job. The --baseline-tmp file is the rescan
          # output; if it differs from .secrets.baseline (modulo metadata),
          # there's a new secret somewhere.
          detect-secrets scan --baseline .secrets.baseline
          # The above mutates .secrets.baseline in place when it works.
          # Failure on new findings is built-in to the exit code.
          if ! git diff --quiet .secrets.baseline; then
            echo "::error::detect-secrets found new potential secrets not in the baseline."
            echo "Run 'detect-secrets audit .secrets.baseline' locally, triage, and commit."
            git diff .secrets.baseline | head -50
            exit 1
          fi
          echo "✓ no new secret findings vs baseline"

  # Future jobs (land as the codebase grows):
  #   integration: real-host RHEL 8/9/10 matrix tests (after Week 4)
  #   fuzz: kensa-fuzz atomicity verification (after Week 7)
  #   parity: Python vs Go fixture comparison (after Week 8)
