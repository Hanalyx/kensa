id: no-duplicate-uids
title: Ensure no duplicate UIDs exist
description: >
  No duplicate UIDs may exist.
rationale: >
  Duplicate UIDs make it impossible to distinguish between users for access control and auditing.
severity: medium
category: access-control
tags: [uid, accounts, integrity]

references:
  cis:
    rhel9_v2: { section: "7.2.4", level: "L1", type: "Automated" }
  nist_800_53: ["AC-2", "IA-2"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "awk -F: '{print $3}' /etc/passwd | sort | uniq -d | head -1 | grep -q . && exit 1 || exit 0"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Resolve duplicate UIDs by assigning unique UIDs to each account"
