id: pwquality-minlen
title: Ensure password length is configured
description: >
  The minlen setting in /etc/security/pwquality.conf must be properly configured.
rationale: >
  Improper minlen configuration could weaken system security controls.
severity: medium
category: access-control
tags: [pam, password, pwquality]

references:
  cis:
    rhel9_v2: { section: "5.3.3.2.2", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "minlen"
      expected: "{{ pam_pwquality_minlen }}"
      comparator: ">="
    remediation:
      mechanism: config_set
      path: "/etc/security/pwquality.conf"
      key: "minlen"
      value: "{{ pam_pwquality_minlen }}"
      separator: " = "
