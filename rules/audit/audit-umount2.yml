id: audit-umount2
title: Audit uses of the umount2 system call
description: >
  Successful and unsuccessful uses of the umount2 system call must
  generate an audit record to detect unauthorized filesystem unmounting.
rationale: >
  The umount2 syscall is a variant of umount used for forceful or lazy
  unmounting. Auditing it ensures comprehensive coverage of unmount
  operations that could indicate an attacker removing security controls
  or log partitions.
severity: medium
category: audit
tags: [audit, auditd, syscall, mount]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258216"
      stig_id: "RHEL-09-654270"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F arch=b64 -S umount2"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S umount2 -F auid>=1000 -F auid!=unset -k privileged-umount"
      persist_file: "/etc/audit/rules.d/50-mounts.rules"
