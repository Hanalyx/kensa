id: accounts-no-empty-passwords
title: Ensure no accounts have empty passwords
description: >
  All accounts in /etc/shadow must have a password hash or be locked.
  Empty password fields allow password-less authentication which is a
  critical security vulnerability.
rationale: >
  Accounts with empty passwords can be accessed without authentication,
  providing trivial entry points for attackers. This is especially
  dangerous for accounts with elevated privileges or shell access.
severity: critical
category: access-control
tags: [accounts, passwords, authentication, security]

references:
  cis:
    rhel9:  { section: "7.2.2", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "awk -F: '($2 == \"\") {print $1}' /etc/shadow"
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: manual
      note: >
        Lock accounts with empty passwords using 'passwd -l <username>' or
        set a strong password. Review each account to determine appropriate
        action - some may be system accounts that should be locked, others
        may need passwords set.
