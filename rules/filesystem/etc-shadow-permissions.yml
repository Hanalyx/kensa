id: etc-shadow-permissions
title: Ensure permissions on /etc/shadow are configured
description: 'The /etc/shadow file must have correct ownership and permissions.

  '
rationale: 'Incorrect permissions on /etc/shadow could allow unauthorized access or
  modification of sensitive system data.

  '
severity: high
category: filesystem
tags:
- file-permissions
- authentication
references:
  cis:
    rhel9:
      section: 7.1.5
      level: L1
      type: Automated
    rhel8:
      section: 7.1.5
      level: L1
      type: Automated
    rhel10:
      section: 7.1.3
      level: L1
      type: Automated
  nist_800_53:
  - AC-3
  - MP-2
  stig:
    # RHEL 8 STIG V2R7 has no /etc/shadow owner/group/mode control (V-230256 was
    # not in the source — RHEL 9 introduced the granular file-permission controls).
    rhel9:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-257934", severity: "CAT II" }                          # mode 0000
      - { vuln_id: "V-257910", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257911", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281076", severity: "CAT II" }                          # mode 0000
      - { vuln_id: "V-281029", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-281030", severity: "CAT II" }                          # group root
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: file_permission
    path: /etc/shadow
    owner: root
    group: root
    mode: '0000'
  remediation:
    mechanism: file_permissions
    path: /etc/shadow
    owner: root
    group: root
    mode: '0000'
