id: audit-tools-permissions
title: Ensure audit tools mode is configured
description: >
  Audit tool binaries must have restrictive permissions.
rationale: >
  Incorrect ownership or permissions on audit files could allow unauthorized users to tamper with audit evidence.
severity: medium
category: audit
tags: [audit, permissions]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.4.8", level: "L1", type: "Automated" }
  stig:
    rhel8_v2r6:
      vuln_id: "V-230472"
      severity: "CAT II"
  nist_800_53: ["AU-9"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "stat -c '%a' /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules 2>/dev/null | awk '{if ($1+0 > 755) exit 1}'"
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "chmod 755 /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules"
