id: pkg-opensc-present
title: Ensure opensc package is installed
description: >
  The opensc package must be installed to provide smart card
  driver support.
rationale: >
  OpenSC provides a set of libraries and utilities to work with
  smart cards. It is required for CAC and PIV smart card
  authentication on RHEL systems.
severity: medium
category: services
tags: [package, smartcard, authentication, pki]

references:
  stig:
    rhel9:
      vuln_id: "V-258126"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230273"
      severity: "CAT II"
  nist_800_53: ["IA-2(1)", "IA-2(2)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: package_state
      name: "opensc"
      state: "present"
    remediation:
      mechanism: package_present
      name: "opensc"
