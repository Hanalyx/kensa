id: audit-sudo-log
title: Ensure events that modify the sudo log file are collected
description: >
  The sudo log file must be monitored for tampering.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-enabled]

references:
  cis:
    rhel9: { section: "6.3.3.3", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /var/log/sudo.log"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /var/log/sudo.log -p wa -k sudo_log"
      persist_file: "/etc/audit/rules.d/50-sudo.rules"
