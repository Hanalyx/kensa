id: shell-timeout-600
title: Ensure interactive shells time out after 10 minutes of inactivity
description: >
  A TMOUT value of 600 seconds (or less, but non-zero) must be configured in
  /etc/profile or an /etc/profile.d/*.sh script so idle interactive shell
  sessions are terminated automatically.
rationale: >
  An unattended, still-authenticated shell is an open door for anyone with
  physical or session access. Terminating idle shells after 10 minutes bounds
  that exposure.
severity: medium
transactional: false
category: access-control
tags: [session, timeout, tmout, hardening, stig]

references:
  stig:
    rhel10: { vuln_id: "V-281295", stig_id: "RHEL-10-700920", severity: "CAT II" }
    rhel8:
      vuln_id: "V-279929"
      stig_id: "RHEL-08-020360"
      severity: "CAT II"
  nist_800_53: ["SC-10", "AC-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # Smallest TMOUT= value across /etc/profile and /etc/profile.d/*.sh.
        val=$(grep -hE '^[[:space:]]*(declare[[:space:]]+-[a-zA-Z]+[[:space:]]+|readonly[[:space:]]+|export[[:space:]]+|typeset[[:space:]]+-[a-zA-Z]+[[:space:]]+)?TMOUT=' \
                /etc/profile /etc/profile.d/*.sh 2>/dev/null \
                | grep -oE 'TMOUT=[0-9]+' | cut -d= -f2 | sort -n | head -1)
        if [ -z "$val" ]; then
          echo "FAIL: no TMOUT set in /etc/profile or /etc/profile.d/*.sh"
          exit 1
        fi
        if [ "$val" -gt 0 ] && [ "$val" -le 600 ]; then
          echo "OK: TMOUT=$val (<= 600, non-zero)"
          exit 0
        fi
        echo "FAIL: TMOUT=$val (must be 1-600)"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/profile.d/tmout.sh"
      key: "typeset -xr TMOUT"
      value: "600"
      separator: "="
