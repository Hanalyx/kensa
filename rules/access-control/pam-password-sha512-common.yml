id: pam-password-sha512-common
title: Store passwords using a SHA-512 hash via PAM
description: >
  The pam_unix.so line in /etc/pam.d/common-password must use the sha512
  hashing algorithm, and where a rounds value is set it must be at least
  100000, so that stored password representations are strongly hashed.
rationale: >
  Storing only strongly hashed representations of passwords protects them if
  the shadow database is exposed. On Debian-family systems the password
  hashing algorithm is selected on the pam_unix.so line in common-password.
severity: medium
transactional: false
category: access-control
tags: [pam, password, sha512, hashing, stig]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270725"
      stig_id: "UBTU-24-400220"
      severity: "CAT II"
      cci: ["CCI-004062"]
    ubuntu22:
      vuln_id: "V-260569"
      stig_id: "UBTU-22-611055"
      severity: "CAT II"
      cci: ["CCI-000196", "CCI-004062"]
  nist_800_53: ["IA-5(1)"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        line=$(grep -E '^[^#]*pam_unix\.so' /etc/pam.d/common-password 2>/dev/null | head -1)
        [ -n "$line" ] || { echo "FAIL: no active pam_unix.so line in common-password"; exit 1; }
        printf '%s\n' "$line" | grep -qw sha512 || { echo "FAIL: sha512 missing from pam_unix.so line"; exit 1; }
        # STIG: a finding only if rounds IS set and is below 100000.
        r=$(printf '%s\n' "$line" | grep -oE 'rounds=[0-9]+' | grep -oE '[0-9]+' | head -1)
        if [ -n "$r" ]; then
          [ "$r" -ge 100000 ] 2>/dev/null || { echo "FAIL: rounds=$r is below 100000"; exit 1; }
        fi
        echo "OK: pam_unix.so uses sha512${r:+ rounds=$r}"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Set the pam_unix.so line in /etc/pam.d/common-password to use sha512,
        e.g. 'password [success=1 default=ignore] pam_unix.so obscure sha512
        shadow rounds=100000'.
