id: sudo-require-password
title: Ensure users must provide password for privilege escalation
description: >
  Users should be required to authenticate with their password when using
  sudo to escalate privileges. NOPASSWD should not be configured.
rationale: >
  Requiring password authentication for sudo provides an additional layer
  of security and ensures that if a user session is compromised, the
  attacker cannot immediately gain elevated privileges.
severity: medium
category: access-control
tags: [sudo, password, authentication, privilege-escalation]

depends_on: [package-sudo-installed]

references:
  cis:
    rhel9: { section: "5.2.4", level: "L2", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-237642"
      severity: "CAT II"
  nist_800_53: ["IA-11", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        fail=0
        # Check for NOPASSWD in sudoers files
        if grep -rE '^\s*[^#].*NOPASSWD' /etc/sudoers /etc/sudoers.d/ 2>/dev/null | grep -v '^#'; then
          echo "FAIL: NOPASSWD found in sudoers"
          fail=1
        fi
        # Check for !targetpw, !rootpw, !runaspw (STIG requirement)
        for opt in targetpw rootpw runaspw; do
          if grep -rqE "^\s*Defaults\s+!${opt}" /etc/sudoers /etc/sudoers.d/ 2>/dev/null; then
            :
          elif grep -rqE "^\s*Defaults\s+${opt}" /etc/sudoers /etc/sudoers.d/ 2>/dev/null; then
            echo "FAIL: Defaults $opt is set (should be !$opt or absent)"
            fail=1
          fi
        done
        [ "$fail" -eq 0 ] && echo "OK: password required for privilege escalation"
        exit $fail
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Remove NOPASSWD from all sudoers entries. Ensure targetpw, rootpw,
        and runaspw are not enabled in /etc/sudoers or /etc/sudoers.d/.
        Add if needed: Defaults !targetpw, Defaults !rootpw, Defaults !runaspw
