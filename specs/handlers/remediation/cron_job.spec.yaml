kind: RemediationHandler
metadata:
  name: CronJob
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Creates a cron job file in /etc/cron.d/ on a remote RHEL host. The handler
    writes a system crontab entry with schedule, user, and command fields.
    Overwrites any existing file with the same name.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["cron_job"]. Implemented in
    runner/handlers/remediation/_system.py as _remediate_cron_job.
  dependencies:
    - runner.shell_util.write_file
    - runner.shell_util.set_file_mode
  callers:
    - runner.handlers.remediation._dispatch_remediation

objective:
  summary: >
    Create a cron job file in /etc/cron.d/ containing a system crontab entry
    with the specified schedule, user, and command. Set the file permissions to
    644 after creation.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would create
      {cron_file} with: {cron_line}") and no SSH commands are executed.
    AC-2: >
      Success path: When write_file succeeds, returns (True, "Created cron job:
      {cron_file}").
    AC-3: >
      Write failure: When write_file returns False, returns (False, "Failed to
      create cron job") and does not attempt to set permissions.
    AC-4: >
      Default user: When user is not provided, defaults to "root".
    AC-5: >
      Default name: When name is not provided, defaults to "kensa-managed".
    AC-6: >
      Cron file path: The cron file is created at /etc/cron.d/{name}.
    AC-7: >
      Cron line format: The file contains exactly "{schedule} {user} {command}\n".
    AC-8: >
      File permissions: After successful write, file permissions are set to 644
      via set_file_mode.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The handler overwrites the entire file; it does not append to existing cron entries.
  - The handler does not validate the cron schedule syntax.
  - The handler does not create parent directories; /etc/cron.d/ is assumed to exist.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "cron_job" (used by dispatch, not by handler directly)
  - field: schedule
    type: str
    required: true
    description: Cron schedule expression (e.g., "0 5 * * *")
  - field: command
    type: str
    required: true
    description: Shell command to execute on schedule
  - field: user
    type: str
    required: false
    default: root
    description: User to run the cron command as
  - field: name
    type: str
    required: false
    default: kensa-managed
    description: Job name used as the filename in /etc/cron.d/

behavior:
  - "Extract fields: Read schedule and command from the remediation dict. Read user with default \"root\" and name with default \"kensa-managed\"."
  - "Compute cron file path: Build cron_file as /etc/cron.d/{name}."
  - "Compose cron line: Build cron_line as \"{schedule} {user} {command}\"."
  - "Dry-run check: If dry_run=True, return (True, \"Would create {cron_file} with: {cron_line}\") immediately."
  - "Write cron file: Call shell_util.write_file(ssh, cron_file, cron_line + \"\\n\")."
  - "Check write result: If write_file returns False, return (False, \"Failed to create cron job\")."
  - "Set permissions: Call shell_util.set_file_mode(ssh, cron_file, \"644\")."
  - "Success return: Return (True, \"Created cron job: {cron_file}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would create /etc/cron.d/{name} with: {schedule} {user} {command}\""
    - "Success: \"Created cron job: /etc/cron.d/{name}\""
    - "Write failure: \"Failed to create cron job\""

side_effects:
  - "Creates or overwrites a cron job file under /etc/cron.d/."
  - "Sets file permissions to 644."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestCronJobSpecDerived
    count: 10
