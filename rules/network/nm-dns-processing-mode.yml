id: nm-dns-processing-mode
title: Ensure NetworkManager DNS processing mode is not dnsmasq
description: >
  NetworkManager's "dns" key under [main] must be set (and not to "dnsmasq"),
  so a local caching resolver is not silently interposed.
rationale: >
  The dnsmasq local resolver can mask DNS misconfiguration and is not the
  approved DNS processing mode.
severity: medium
transactional: false
category: network
tags: [dns, networkmanager, stig]
references:
  stig:
    rhel10: { vuln_id: "V-281362", stig_id: "RHEL-10-800300", severity: "CAT II" }
  nist_800_53: ["SC-20", "SC-21"]
platforms:
  - family: rhel
    min_version: 10
implementations:
  - default: true
    check:
      method: command
      run: |
        dns=$(NetworkManager --print-config 2>/dev/null | awk -F= '/^[[:space:]]*dns[[:space:]]*=/{gsub(/[[:space:]]/,"",$2);print $2;exit}')
        if [ -z "$dns" ] || [ "$dns" = "dnsmasq" ]; then echo "FAIL: NM dns mode is '${dns:-unset}'"; exit 1; fi
        echo "OK: NM dns mode is $dns"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Set dns=none (or default) under [main] in /etc/NetworkManager/NetworkManager.conf, then reload NetworkManager."
