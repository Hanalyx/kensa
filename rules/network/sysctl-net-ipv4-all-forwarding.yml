id: sysctl-net-ipv4-all-forwarding
title: Ensure net.ipv4.conf.all.forwarding is set to 0
description: >
  The kernel parameter net.ipv4.conf.all.forwarding must be set to 0 on systems
  that are not routers, so the host does not forward IPv4 packets between
  interfaces.
rationale: >
  IPv4 packet forwarding on a non-router host can be abused to bridge networks,
  bypass segmentation controls, or relay attack traffic. It must be disabled
  unless the system is an authorized router.
severity: medium
category: network
tags: [sysctl, networking, forwarding, hardening, stig]

references:
  stig:
    rhel8:
      vuln_id: "V-250317"
      stig_id: "RHEL-08-040259"
      severity: "CAT II"
  nist_800_53: ["CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.all.forwarding
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.all.forwarding
      value: "0"
