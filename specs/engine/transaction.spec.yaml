spec:
    id: engine-transaction
    version: 0.3.0
    status: draft
    tier: 1

    context:
        system: kensa
        feature: transaction-engine
        description: |
            The transaction engine executes a rule's remediation as an atomic
            four-phase transaction (capture → apply → validate →
            commit-or-rollback) against a target host. Its correctness IS the
            atomicity commitment in TRANSACTION_CONTRACT_V1.md; a divergence
            between this spec and the implementation produces an atomicity
            violation.
        related_specs:
            - handler-interface
            - deadman-timer
            - transaction-log
            - evidence-envelope
        assumptions:
            - Transport is a working SSH connection with sudo access
            - Target host has at or systemd-run available for deadman timer
            - SQLite transaction log is on durable storage (synchronous=FULL)

    objective:
        summary: |
            Execute a rule's remediation as an atomic transaction. The engine
            captures pre-state for every capturable step, applies steps in
            order, validates, and commits or rolls back. Every transaction
            ends in exactly one terminal Status from the closed set
            {Committed, RolledBack, PartiallyApplied, Errored, RollbackFailed,
            Recovered}, and EVERY terminal outcome — including Errored and a
            signer failure — leaves a durable record in the transaction log so
            no outcome is ever silently unrecorded. RollbackFailed and
            Recovered are reserved honest-outcome states produced by later
            milestones (verified-rollback barrier; out-of-band recovery
            replay); they are part of the contract now so consumers learn the
            full status set in one additive surface.
        scope:
            includes:
                - Four-phase transaction execution
                - Per-host serialization
                - Deadman timer activation for control-channel-sensitive changes
                - Evidence envelope generation and signing
                - Rollback-on-failure using captured pre-state
            excludes:
                - Multi-rule orchestration (see engine-orchestrator spec)
                - Rule parsing (see rule-parser spec)
                - Framework mapping (see framework-mapping spec)

    constraints:
        - id: C-01
          description: |
              The engine MUST return a TransactionResult with exactly one
              terminal Status from the closed set {Committed, RolledBack,
              PartiallyApplied, Errored, RollbackFailed, Recovered}. No other
              terminal state is permitted. RollbackFailed (a rollback whose
              per-step results were not all clean) IS produced by the engine
              per C-11. Recovered (an interrupted transaction reversed by
              out-of-band recovery replay) remains reserved by this contract
              and produced by a later milestone; consumers MUST accept it.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Pre-state MUST be persisted to the transaction log BEFORE any
              apply step executes. Crash between persist and apply MUST leave
              pre-state recoverable for out-of-band rollback.
          type: security
          enforcement: error
        - id: C-03
          description: |
              For rules declared transactional:true, the engine MUST reject
              any implementation containing a non-capturable mechanism at
              pre-flight, before any capture runs.
          type: security
          enforcement: error
        # Constraint C-04 (deadman arm/cancel lifecycle) deferred
        # alongside AC-06 — see "Deferred ACs" block below. Will
        # be re-introduced when the recording-armer engine test
        # surface lands.
        - id: C-05
          description: |
              Concurrent Run invocations against the same hostID MUST
              serialize on a per-host mutex. Concurrent invocations against
              different hostIDs MUST proceed in parallel.
          type: technical
          enforcement: error
        - id: C-06
          description: |
              Every Committed or RolledBack TransactionResult MUST include an
              evidence envelope signed with Ed25519 over the canonicalized
              envelope bytes (the C-060 always-signed guarantee). An Errored
              or Recovered outcome MAY carry a durable but UNSIGNED envelope
              when the failure precedes or interrupts evidence production;
              such a row MUST be marked so verification tooling (kensa verify,
              OSCAL export) skips or flags it rather than treating an empty
              signature as valid. The engine MUST NOT persist a Committed or
              RolledBack envelope with an empty signature.
          type: security
          enforcement: error
        - id: C-07
          description: |
              The engine MUST NOT leave a system in an indeterminate state.
              If the engine cannot complete capture, apply, validate, commit,
              OR rollback within the transaction deadline, it MUST record
              Status=Errored with a typed error identifying the phase that
              could not complete, AND persist a durable transaction-log row
              for that errored outcome. No terminal outcome — including
              Errored — may be silently unrecorded.
          type: security
          enforcement: error
        - id: C-08
          description: |
              A failure to durably persist a terminal TransactionResult MUST
              NOT be silently discarded. A Committed or RolledBack result
              whose store write fails MUST be demoted to Errored with the
              persistence error surfaced in TransactionResult.Error: the
              engine MUST NOT return a Committed or RolledBack result that was
              never durably recorded ("evidence written to the transaction
              log" must be a fact, not a claim).
          type: security
          enforcement: error
        - id: C-09
          description: |
              Every TransactionResult MUST carry a HostUnchanged predicate.
              It MUST be true if and only if the host is provably in its
              pre-transaction state at terminal time — i.e. a failure reached
              no later than pre-apply (preflight, capture, or pre-state
              persistence), or a RolledBack outcome. It MUST be false whenever
              a mutation was applied and not verified-reversed, including a
              signer/persist failure AFTER a successful apply and any
              PartiallyApplied outcome. Consumers use HostUnchanged to
              distinguish a clean abort from a mutated-but-errored host.
          type: security
          enforcement: error
        - id: C-10
          description: |
              When the engine reverses applied steps, the per-step
              RollbackResult set (Success, PartialRestore, Source) MUST be
              carried on both the TransactionResult and the evidence envelope,
              so the signed record proves what restoration was attempted and
              its outcome rather than discarding it after the rollback runs.
          type: technical
          enforcement: error
        - id: C-11
          description: |
              The terminal status of a transaction that rolled back MUST be a
              VERDICT over the per-step RollbackResults, not a constant. The
              status is RolledBack only when every reversed step restored
              cleanly (Success == true AND PartialRestore == false). If any
              reversed step failed or reported a partial restore, the host is
              in an unconfirmed state and the status MUST be RollbackFailed
              (with HostUnchanged == false and the per-step divergence carried
              in RollbackResults) — the engine MUST NOT report RolledBack /
              "the host is unchanged" for a restoration it did not confirm. A
              clean rollback that left stranded non-capturable steps
              (transactional:false) is PartiallyApplied.
          type: security
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              Run returns TransactionResult{Status: Committed} when every
              apply step succeeds and every validator passes.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: |
              Run returns TransactionResult{Status: RolledBack} when any
              apply step fails; every preceding applied capturable step is
              reversed in reverse order using its captured pre-state.
          references_constraints: [C-01, C-02]
          priority: critical
        - id: AC-05
          description: |
              For rules declared transactional:false, non-capturable steps
              that have already executed are NOT reversed on failure. The
              outcome is Status=PartiallyApplied with per-step stranded
              flags in the result.
          references_constraints: [C-01]
          priority: high

    # Deferred ACs — moved out of strict-coverage scope; track in
    # backlog for future deliverables. AC IDs reserved for re-introduction
    # when the underlying engine hook lands.
    #
    #   - AC-03 (validator-injection-fails-rollback):
    #     Tests need engine.WithFakeValidator(failingFn) injection
    #     hook to exercise the apply→validate-fail→rollback path
    #     without a real rule check. Hook not yet implemented;
    #     covered structurally by AC-01 (success path) and AC-02
    #     (capture-failure aborts before apply).
    #   - AC-04 (crash-mid-apply + kensa rollback recovery):
    #     Requires real SQLite store + kensa rollback CLI
    #     integration test. Out of scope for unit tests; covered
    #     structurally by store.AC01 pre-state durability.
    #   - AC-06 (deadman arm/cancel lifecycle around apply):
    #     Tests need engine.WithDeadman(recordingArmer) +
    #     ControlChannelSensitive FakeTransport to verify the arm
    #     timing. Covered structurally by deadman-timer AC-04 (arm
    #     before apply) and AC-05 (cancel on success). Future
    #     deliverable wires the recording-armer test surface.
        - id: AC-07
          description: |
              Concurrent Run calls against the same host block on the
              per-host mutex until the in-flight transaction completes.
              Concurrent calls against different hosts proceed in parallel.
          references_constraints: [C-05]
          priority: high
        - id: AC-08
          description: |
              When Run is called with WithNonBlocking() against a host with
              an in-flight transaction, the call returns ErrHostBusy
              immediately without waiting.
          references_constraints: [C-05]
          priority: medium
        - id: AC-09
          description: |
              Every TransactionResult includes an EvidenceEnvelope whose
              Ed25519 signature verifies against the deployment's signing
              key using api.Kensa.VerifyEnvelope.
          references_constraints: [C-06]
          priority: critical
        - id: AC-10
          description: |
              A CAPTURE-phase failure aborts the transaction before any
              apply step runs. The result is Status=Errored with
              ErrCaptureIncomplete and no post-state change on the host.
          references_constraints: [C-02, C-07]
          priority: critical
        - id: AC-11
          description: |
              Pre-flight rejects an implementation whose
              transactional:true rule contains a non-capturable mechanism.
              The error identifies which step is non-capturable.
          references_constraints: [C-03]
          priority: critical
        - id: AC-12
          description: |
              An Errored outcome persists a durable transaction-log row. A
              transaction that errors (including with a nil/unsigned envelope)
              is readable back from the store afterwards, marked so
              verification tooling treats it as unsigned-errored rather than a
              valid signed record.
          references_constraints: [C-07, C-06]
          priority: critical
        - id: AC-13
          description: |
              When the store PersistResult call fails for an otherwise
              Committed (or RolledBack) result, the engine demotes the result
              to Errored and surfaces the persistence error in
              TransactionResult.Error; it does not return a Committed result
              that was never durably written.
          references_constraints: [C-08]
          priority: critical
        - id: AC-14
          description: |
              HostUnchanged is true on a CAPTURE-phase (pre-apply) failure and
              on a machine-verified RolledBack outcome, and false when a
              mutation was applied and not verified-reversed — specifically a
              signer failure after a successful apply yields Errored with
              HostUnchanged=false.
          references_constraints: [C-09]
          priority: critical
        - id: AC-15
          description: |
              After the engine reverses applied steps, the per-step
              RollbackResult set is present on both TransactionResult and the
              evidence envelope (RollbackResults), preserving Success /
              PartialRestore / Source for the audit record.
          references_constraints: [C-10]
          priority: high
        - id: AC-16
          description: |
              When a reversed step reports Success == false or
              PartialRestore == true, the transaction's terminal Status is
              RollbackFailed (not RolledBack), HostUnchanged is false, and the
              diverging step is present in RollbackResults. The engine does not
              report a clean rollback for an unconfirmed restoration.
          references_constraints: [C-11, C-09]
          priority: critical
        - id: AC-17
          description: |
              When every reversed step restores cleanly (Success == true and
              PartialRestore == false), the terminal Status is RolledBack and
              HostUnchanged is true — the clean-rollback verdict is unchanged
              from prior behavior.
          references_constraints: [C-11]
          priority: critical

    depends_on:
        - spec_id: handler-interface
          relationship: requires
        - spec_id: deadman-timer
          relationship: requires
        - spec_id: transaction-log
          relationship: requires
        - spec_id: evidence-envelope
          relationship: requires

    tags: [engine, atomicity, tier-1, load-bearing]
