kind: CLICommand
metadata:
  name: Coverage
  module: cli
  version: 1.0.0
  status: released
  system_spec: system.spec.yaml@1.0.0
  created: "2025-02-10"
  updated: "2025-02-25"

context:
  description: >
    Show coverage report for a framework mapping. Reports which framework
    sections have rules, which are explicitly unimplemented, and which have
    missing rules.
  technical_context: >
    Module runner/cli.py -> coverage(). Click decorators: @main.command(),
    individual options.
  dependencies:
    - runner.mappings.load_all_mappings
    - runner.mappings.check_coverage
    - runner.engine.load_rules
  callers:
    - CLI entry point (kensa coverage)

objective:
  summary: >
    Show coverage report for a framework mapping. Reports which framework
    sections have rules, which are explicitly unimplemented, and which have
    missing rules.
  acceptance_criteria:
    AC-1: "Valid framework exits 0 with coverage stats displayed."
    AC-2: "'--json' outputs valid JSON with framework metadata and coverage."
    AC-3: "Unknown framework exits 1 with available frameworks listed."
    AC-4: "Invalid rules path exits 1 with error."
    AC-5: "Missing manifest shows warning in terminal output."
    AC-6: "Missing rules (referenced in mapping but absent) are listed."
    AC-7: "'--json' includes 'is_complete' and 'has_manifest' fields."
    AC-8: "Coverage percentages are rounded to 1 decimal place in JSON."

constraints:
  - "MUST require '--framework' flag."
  - "MUST exit 1 for unknown framework or rule load failure."
  - "MUST show available frameworks on unknown framework error."

input_contract:
  - field: --framework / -f
    type: str
    required: true
    default: null
    description: "Framework mapping ID (e.g., cis-rhel9-v2.0.0)"
  - field: --rules / -r
    type: str
    required: false
    default: null
    description: >
      Rules directory path. If not specified, auto-resolves via
      get_rules_path() (env var KENSA_RULES_PATH, ./rules, installed package).
  - field: --json
    type: bool
    required: false
    default: "false"
    description: Output as JSON

behavior:
  - "Load all framework mappings via load_all_mappings()."
  - "If '--framework' not in mappings: print error with available frameworks, exit 1."
  - "Load rules from '--rules' path via load_rules()."
  - "If rules load fails (ValueError or FileNotFoundError): print error, exit 1."
  - "Call check_coverage(mapping, available_rules) to generate report."
  - "If '--json': output JSON with framework metadata, coverage stats, unaccounted controls, missing rules."
  - >
    If terminal:
    (a) Print framework title.
    (b) If no manifest, print warning.
    (c) Print coverage stats (total, implemented, unimplemented, unaccounted).
    (d) Print coverage percentages.
    (e) If unaccounted controls <= 20, list them; otherwise show count with hint to use --json.
    (f) If missing rules, list them.

exit_codes:
  - code: 0
    condition: "Normal completion"
  - code: 1
    condition: "Unknown framework, rule load error"

output_contract:
  returns: Terminal output or JSON
  modes:
    terminal: "Framework title, optional manifest warning, coverage stats, coverage percentages, optional unaccounted/missing lists."
    json: >
      JSON object with framework (id, title), coverage (total_controls,
      implemented, unimplemented, unaccounted, coverage_percent,
      accounted_percent, is_complete, has_manifest), unaccounted_controls,
      missing_rules.

side_effects:
  - "None. Read-only operation."

testing:
  spec_derived:
    file: tests/test_cli_spec.py
    classes:
      - TestCoverageSpecDerived
    count: 8
