id: sysctl-net-ipv4-conf-all-rp-filter
title: Enable reverse path filtering on all interfaces
description: >
  Reverse path filtering validates that the source address of incoming packets
  is reachable through the interface on which it was received. This protects
  against IP spoofing attacks.
rationale: >
  Without reverse path filtering, an attacker can send packets with spoofed
  source addresses that bypass access controls based on source IP.
severity: medium
category: network
tags: [sysctl, networking, ipv4, spoofing-protection]
conflicts_with:
  - sysctl-rp-filter

references:
  stig:
    rhel8:
      vuln_id: "V-230549"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257962"
      severity: "CAT II"
  cis:
    rhel8: { section: "3.3.1.12", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7", "SC-5", "SC-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: "net.ipv4.conf.all.rp_filter"
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: "net.ipv4.conf.all.rp_filter"
      value: "1"
