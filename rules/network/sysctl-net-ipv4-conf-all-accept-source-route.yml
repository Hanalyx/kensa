id: sysctl-net-ipv4-conf-all-accept-source-route
title: Ensure net.ipv4.conf.all.accept_source_route is set to 0
description: >
  The kernel parameter net.ipv4.conf.all.accept_source_route must be set to 0 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  stig:
    rhel10:
      vuln_id: "V-281342"
      stig_id: "RHEL-10-800100"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-244551"
      stig_id: "RHEL-08-040239"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257959"
      stig_id: "RHEL-09-253020"
      severity: "CAT II"
  cis:
    rhel9:
      section: 3.3.8
      level: L1
      type: Automated
    rhel8:
      section: 3.3.1.14
      level: L1
      type: Automated
    rhel10: { section: "3.3.1.14", level: "L1", type: "Automated" }
  nist_800_53:

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.all.accept_source_route
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.all.accept_source_route
      value: "0"
