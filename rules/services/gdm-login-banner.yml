id: gdm-login-banner
title: Ensure GDM login banner is configured
description: >
  If GNOME Display Manager is in use, a login warning banner should
  be displayed to users before authentication.
rationale: >
  Displaying a warning banner ensures users are aware of acceptable
  use policies and that the system may be monitored.
severity: medium
category: services
tags: [gdm, gnome, banner, security]

references:
  cis:
    rhel9_v2: { section: "1.8.2", level: "L1", type: "Automated" }
  nist_800_53: ["AC-8"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if banner is configured in GDM
        if [ -f /etc/dconf/db/gdm.d/01-banner-message ]; then
          if grep -q "banner-message-enable=true" /etc/dconf/db/gdm.d/01-banner-message 2>/dev/null; then
            echo "OK: GDM login banner is enabled"
            exit 0
          fi
        fi
        echo "FAIL: GDM login banner is not configured"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Configure GDM login banner in /etc/dconf/db/gdm.d/01-banner-message:
        [org/gnome/login-screen]
        banner-message-enable=true
        banner-message-text='Your warning message'
        Then run: dconf update

  - default: true
    check:
      method: command
      command: "echo 'OK: GDM not installed, banner not required'; exit 0"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "GDM is not installed. No banner configuration needed."
