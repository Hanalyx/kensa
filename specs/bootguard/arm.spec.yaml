spec:
    id: bootguard-arm
    version: 0.1.0
    status: draft
    tier: 1
    context:
        system: kensa
        feature: bootguard-arm
        description: |
            StageRevert stages, on the target, everything a BOOT-TIME revert
            needs to restore the captured boot state without the controller:
            a backup of each captured file plus a self-contained POSIX revert
            script. Boot-time revert is shell, not Go — the target has no
            kensa binary at boot — so revert.sh mirrors bootguard.Restore in
            shell. Disarm removes the staged artifacts. The family-specific
            boot marker/hook that triggers the script is a separate increment.
            Part of the gated #14 mechanism (design §11). Must run over a
            privileged (sudo) transport. NOT wired into any handler.
        related_specs:
            - bootguard-capture
            - bootguard-restore
    objective:
        summary: |
            Stage a self-contained, boot-time revert artifact (backups +
            revert.sh) from a captured Snapshot; remove it on Disarm.
        scope:
            includes:
                - Back up /etc/default/grub and (BLS) the entry files to a state dir
                - Generate a flavor-aware POSIX revert.sh and make it executable
                - Disarm removes the staged state dir
            excludes:
                - The boot marker/hook that triggers revert.sh (separate increment)
                - The confirm step (separate increment)
    constraints:
        - id: C-01
          description: |
              StageRevert MUST back up /etc/default/grub and, on BLS, each
              captured entry file, to the on-host state dir.
          type: security
          enforcement: error
        - id: C-02
          description: |
              StageRevert MUST write a self-contained POSIX revert script and
              make it executable. (Boot-time revert is shell, not Go.)
          type: security
          enforcement: error
        - id: C-03
          description: |
              The revert script MUST restore /etc/default/grub from the backup;
              on BLS it MUST copy the entry files back and MUST NOT regenerate;
              on legacy it MUST regenerate via update-grub/grub-mkconfig.
          type: security
          enforcement: error
        - id: C-04
          description: Disarm MUST remove the staged revert artifacts.
          type: technical
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: StageRevert backs up /etc/default/grub and (BLS) the entry files.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: StageRevert writes an executable revert script.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: The revert script restores files — BLS copies entries back with no regenerate; legacy regenerates.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: Disarm removes the staged state dir.
          references_constraints: [C-04]
          priority: high
    depends_on:
        - spec_id: bootguard-restore
          relationship: requires
    tags: [bootguard, grub, boot-safety, tier-1, arm, mutating, gated]
