id: gdm-automount-disabled
title: Ensure GDM automatic mounting of removable media is disabled
description: >
  If GNOME Display Manager is in use, automatic mounting of removable
  media should be disabled.
rationale: >
  Automatic mounting of removable media can allow unauthorized data
  transfer or execution of malicious code. Disabling it improves security.
severity: medium
category: services
tags: [gdm, gnome, automount, security]

references:
  cis:
    rhel9_v2: { section: "1.8.6", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if automount is disabled
        if grep -qr "automount=false" /etc/dconf/db/local.d/ 2>/dev/null; then
          echo "OK: GDM automount is disabled"
          exit 0
        fi
        echo "FAIL: GDM automount is not disabled"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Disable automount in /etc/dconf/db/local.d/00-media-automount:
        [org/gnome/desktop/media-handling]
        automount=false
        automount-open=false
        Then run: dconf update

  - default: true
    check:
      method: command
      run: "echo 'OK: GDM not installed'; exit 0"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "GDM is not installed."
