id: pam-password-sha512
title: Ensure pam_unix includes a strong password hashing algorithm
description: >
  PAM must use a strong password hashing algorithm (SHA-512).
rationale: >
  Weak hashing algorithms allow faster offline cracking of password hashes.
severity: medium
category: access-control
tags: [pam, password, hashing]

references:
  cis:
    rhel9: { section: "5.3.3.4.3", level: "L1", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-230360"
      severity: "CAT II"
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: 'grep -qE ''^\s*password.*pam_unix\.so.*sha512'' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null'
      expected_exit: 0
    remediation:
      mechanism: pam_module_arg
      action: ensure
      module: pam_unix.so
      arg: sha512
      type: password
      files:
        - /etc/pam.d/system-auth
        - /etc/pam.d/password-auth
