id: pkg-cronie-present
title: Ensure the cronie package is installed
description: >
  The cronie package must be installed to provide the cron daemon used to schedule periodic security jobs.
rationale: >
  Scheduled jobs such as AIDE integrity checks and log maintenance depend on cron; without cronie they silently do not run.
severity: medium
category: services
tags: [package, cron]
references:
  stig:
    rhel10: { vuln_id: "V-281000", stig_id: "RHEL-10-200700", severity: "CAT II" }
  nist_800_53: ["CM-7"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: package_state
      name: cronie
      state: present
    remediation:
      mechanism: package_present
      name: cronie
