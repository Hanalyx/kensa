id: service-disable-dhcpd
title: Disable DHCP server
description: >
  The DHCP server provides IP address configuration to network clients. Unless
  the system is a designated DHCP server, this service should be disabled.
rationale: >
  Running an unnecessary DHCP server could interfere with network operations
  or be exploited to provide malicious configuration to clients.
severity: high
category: services
tags: [service, networking, attack-surface]

references:
  cis:
    rhel8:  { section: "2.1.4", level: "L1", type: "Automated" }
    rhel9:  { section: "2.1.3", level: "L1", type: "Automated" }
    rhel10: { section: "2.1.4", level: "L1", type: "Automated" }
    ubuntu22: { section: "2.1.3", level: "L1", type: "Automated" }
    ubuntu24: { section: "2.1.3", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  # Debian/Ubuntu unit name differs from RHEL (isc-dhcp-server vs the default below).
  - when: apt
    check:
      method: service_state
      name: "isc-dhcp-server"
      active: false
      enabled: false
    remediation:
      mechanism: service_masked
      name: "isc-dhcp-server"
  - default: true
    check:
      method: service_state
      name: "dhcpd"
      active: false
      enabled: false
    remediation:
      mechanism: service_masked
      name: "dhcpd"
