spec:
    id: cli-session-diff
    version: 0.1.0
    status: draft
    tier: 3

    context:
        system: kensa-go
        feature: cli-session-diff
        description: |
            CLI Phase 4 deliverable C-048. Adds `kensa diff
            SESSION1 SESSION2` — a session-aware drift
            report showing per-rule status changes, rules
            present in only one session ("added" or
            "removed" relative to the diff direction), and
            optionally rules with unchanged status.

            The motivating workflow: an operator runs
            `kensa check --store` Monday and again Friday,
            then asks "what's drifted?" The diff is the
            answer that compliance dashboards have wanted
            for years — not "current snapshot," but "what
            changed since last time."

            **Diff direction.** SESSION1 is "before";
            SESSION2 is "after." A rule whose status was
            committed in SESSION1 and rolled_back in
            SESSION2 is reported as a status change with
            from=committed → to=rolled_back. Rules in
            SESSION1 only are "removed" (the corpus or
            filter shrunk). Rules in SESSION2 only are
            "added" (corpus or filter grew). This
            ordering matches `git diff` convention; an
            operator reversing the args inverts the
            report.

            **Cross-host comparison.** A session is host-
            scoped (denormalized hostname column). The
            diff doesn't enforce hostname equality: an
            operator comparing `host-a Monday` vs `host-b
            Friday` may legitimately want the cross-host
            view. We emit a stderr note when hostnames
            differ so the comparison's scope is visible
            without blocking.

            **Multiple txns per rule.** Today
            persistScanResult writes one transaction per
            rule per session, but a future engine may
            emit retry transactions for the same rule
            within one session. The diff dedups by rule_id
            keeping the LAST transaction (latest
            started_at), so the "as of session end" status
            is what shows in the report.

    objective:
        summary: |
            Add internal/diff/ package with RuleChange +
            SessionDiff types and ComputeSessionDiff
            (slim SessionTxn slices in → SessionDiff out).
            Add (*SQLite) TransactionsForSession to the
            store. Wire `kensa diff S1 S2 [--show-
            unchanged] [--format {text,json}]` in
            cmd/kensa/main.go via runDiff. Text output
            groups changes / additions / removals;
            JSON emits the structured shape for
            programmatic consumers.
        scope:
            includes:
                - "internal/diff/diff.go: RuleChange / SessionDiff / ComputeSessionDiff"
                - "internal/store/sessions.go: TransactionsForSession + SessionTxn"
                - "cmd/kensa/diff.go: runDiff + writeDiffText + printDiffUsage"
                - "case 'diff' in cmd/kensa/main.go dispatch"
                - "Validation: 2 positional UUID args required; bad UUIDs rejected with usage error"
                - "Both sessions MUST exist; missing → exit 1 (runtime, not 2 / usage)"
                - "--show-unchanged flag: includes Unchanged rules in output"
                - "--format {text,json} validated like C-045/C-046/C-047"
                - "Cross-hostname stderr note (informational)"
                - "Help text on `kensa diff --help`"
            excludes:
                - "Diffing more than two sessions: out of scope; future N-way diff is its own deliverable"
                - "Diffing by hostname (auto-pick latest two sessions per host): out of scope; the operator names the IDs"
                - "Status semantics interpretation (committed=passed for check, rolled_back=non-compliant): operators read raw status; the C-042 stats footer-legend convention applies"
                - "Per-step or per-mechanism drift detail: out of scope; the diff is rule-level"
                - "Rule metadata in the diff (title / severity from corpus): out of scope; diff uses only what's in the transaction log. Operators wanting metadata can `kensa info --rule X`"

    constraints:
        - id: C-01
          description: |
              `kensa diff` MUST require exactly 2
              positional UUID args. Zero, one, or
              three+ rejected with usage error.
              UUIDs that fail uuid.Parse rejected
              with usage error.
          type: business
          enforcement: error
        - id: C-02
          description: |
              Either session not found in the store
              MUST exit 1 (runtime), NOT exit 2
              (usage). The invocation was
              syntactically correct; the lookup is
              empty. Mirrors C-047's ErrNotFound
              contract.
          type: business
          enforcement: error
        - id: C-03
          description: |
              Output MUST be deterministic across
              runs: rule IDs sorted alphabetically
              within each section (added / removed /
              changed / unchanged).
          type: technical
          enforcement: error
        - id: C-04
          description: |
              Multiple transactions for the same
              rule_id within one session MUST
              dedup on the latest started_at, so
              the diff reports the "as of session
              end" status. A future engine emitting
              retry transactions doesn't break the
              shape.
          type: technical
          enforcement: error
        - id: C-05
          description: |
              When the two sessions have different
              hostnames, the diff MUST emit a
              stderr note disclosing the cross-host
              scope. NOT a usage error — operators
              may legitimately want cross-host
              drift.
          type: business
          enforcement: error
        - id: C-06
          description: |
              JSON output MUST use snake_case fields
              for parity with PruneReport /
              store.Stats / FrameworkSummary /
              CoverageReport / RuleDetails.
          type: technical
          enforcement: error
        - id: C-07
          description: |
              --show-unchanged controls TEXT
              rendering only: when set, the text
              output gains an Unchanged section.
              JSON output ALWAYS includes every
              section as an array (never null) —
              consumer code shouldn't have to
              special-case "field present" vs
              "field meaningful." Peer review
              caught the omitempty trap.
          type: business
          enforcement: error
        - id: C-08
          description: |
              "Session not found" errors MUST emit
              an operator-actionable message
              ("session X not found in store; try
              'kensa list sessions' to find
              candidate IDs") — NOT the leaky SQL
              path "store: GetSession: sql: no
              rows in result set". Peer review
              caught the abstraction leak.
          type: business
          enforcement: error
        - id: C-09
          description: |
              Session UUIDs MUST be discoverable.
              `kensa list sessions` (added to the
              C-046 list namespace) prints the
              session_id column for diff
              consumption. Help text on `kensa
              diff` MUST point operators at the
              discovery command.
          type: business
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              `kensa diff S1 S2` with two valid
              session IDs prints the drift report.
              Locked by TestRunDiff_Basic.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: |
              Session in S1 only → "removed";
              session in S2 only → "added"; same
              rule, status differs → "changed
              from→to". Locked by
              TestComputeSessionDiff_AllSections.
          references_constraints: []
          priority: critical
        - id: AC-03
          description: |
              0/1/3+ positional args rejected with
              usage error. Locked by
              TestRunDiff_BadArgCount.
          references_constraints: [C-01]
          priority: high
        - id: AC-04
          description: |
              Bad UUID rejected with usage error.
              Locked by TestRunDiff_BadUUID.
          references_constraints: [C-01]
          priority: high
        - id: AC-05
          description: |
              Missing session exits 1 (runtime,
              ErrNotFound), NOT 2 (usage). Locked
              by TestRunDiff_MissingSessionExitCode.
          references_constraints: [C-02]
          priority: critical
        - id: AC-06
          description: |
              Output deterministic across runs.
              Locked by
              TestComputeSessionDiff_Deterministic.
          references_constraints: [C-03]
          priority: medium
        - id: AC-07
          description: |
              Multiple transactions per rule_id
              within one session dedup to the
              last one. Locked by
              TestComputeSessionDiff_DedupesRetries.
          references_constraints: [C-04]
          priority: high
        - id: AC-08
          description: |
              Cross-hostname diff produces a
              stderr note (informational, not an
              error). Locked by
              TestRunDiff_CrossHostnameNote.
          references_constraints: [C-05]
          priority: medium
        - id: AC-09
          description: |
              JSON output snake_case shape via
              --format json. Locked by
              TestRunDiff_JSONShape.
          references_constraints: [C-06]
          priority: high
        - id: AC-10
          description: |
              --show-unchanged includes the
              Unchanged section; default off
              suppresses it. Locked by
              TestRunDiff_ShowUnchanged.
          references_constraints: [C-07]
          priority: medium
        - id: AC-11
          description: |
              Live verification: persist two
              `kensa check --store` runs against
              the same host, then diff the two
              sessions. Verified during the C-048
              merge workflow.
          references_constraints: [C-01, C-02]
          priority: critical
        - id: AC-12
          description: |
              Missing-session error message is
              clean (no SQL leak; mentions 'kensa
              list sessions'). Locked by
              TestRunDiff_MissingSessionMessageIsClean.
          references_constraints: [C-08]
          priority: high
        - id: AC-13
          description: |
              JSON shape always populates every
              section (even unchanged when flag
              unset). Locked by
              TestRunDiff_JSONShapeAlwaysHasUnchanged.
          references_constraints: [C-07]
          priority: high
        - id: AC-14
          description: |
              `kensa list sessions` prints the
              session_id column. Locked by
              TestRunListSessions_Basic and
              TestRunListSessions_JSONShape.
          references_constraints: [C-09]
          priority: critical
        - id: AC-15
          description: |
              Dedup-by-last-started_at is
              exercised through the full store
              roundtrip (not just slice position).
              Locked by
              TestRunDiff_DedupsRetriesViaStore.
          references_constraints: [C-04]
          priority: high

    tags: [cli, diff, session, store, phase-4, c-048]
