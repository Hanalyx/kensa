id: mount-boot-efi-nosuid
title: Ensure nosuid option on /boot/efi partition
description: >
  The nosuid mount option must be set on the /boot/efi partition to prevent
  setuid programs from being executed from the EFI System Partition.
rationale: >
  The /boot/efi partition contains EFI boot loader files. Preventing setuid
  execution on /boot/efi reduces the attack surface by ensuring no setuid
  programs can be run from the EFI filesystem.
severity: medium
category: filesystem
tags: [mount, boot-efi, nosuid, hardening]

references:
  stig:
    rhel8:
      vuln_id: "V-244530"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: mount_option
      mount_point: "/boot/efi"
      options: ["nosuid"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/boot/efi"
      options: ["nosuid"]
