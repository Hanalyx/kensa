# Automatic Release - runs on push to main with conventional commits
#
# Uses conventional commits to determine version bumps:
#   - feat: -> minor version bump (0.1.0 -> 0.2.0)
#   - fix:  -> patch version bump (0.1.0 -> 0.1.1)
#   - feat!: or BREAKING CHANGE: -> major version bump (0.1.0 -> 1.0.0)
#
# Manual trigger available to force a specific version bump.
#
# Branch protection prevents direct pushes to main, so this workflow:
#   1. Determines the next version via semantic-release (no commit/push)
#   2. Bumps pyproject.toml on a release branch and opens a PR
#   3. Creates a GitHub release + tag via the API (tags are not branch-protected)
#   4. Builds and attaches RPMs to the release

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - 'rules/**'
      - 'schema/rule.schema.json'
      - 'schema/validate.py'
      - 'schema/validators/**'
      - 'mappings/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'kensa.spec'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force version bump type'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a release is needed (dry run)
          if [ -n "${{ inputs.force_version }}" ]; then
            NEXT=$(semantic-release --strict version --print --${{ inputs.force_version }} 2>/dev/null || echo "")
          else
            NEXT=$(semantic-release --strict version --print 2>/dev/null || echo "")
          fi

          if [ -z "$NEXT" ]; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No release needed"
            exit 0
          fi

          # Skip if this version already has a complete release (tag + assets)
          if git tag -l "v${NEXT}" | grep -q .; then
            ASSET_COUNT=$(gh release view "v${NEXT}" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
            if [ "$ASSET_COUNT" -gt "0" ]; then
              echo "released=false" >> $GITHUB_OUTPUT
              echo "Version v${NEXT} already released with ${ASSET_COUNT} assets — skipping"
              exit 0
            fi
            echo "Tag v${NEXT} exists but release is missing or has no assets — rebuilding"
          fi

          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "released=true" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Bump version and create release branch
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          # Skip version bump if pyproject.toml already has the correct version
          CURRENT=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Version already set to ${VERSION} in pyproject.toml — skipping bump"
            exit 0
          fi

          BRANCH="release/v${VERSION}"

          # Clean up stale remote branch from a previous failed run
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"

          # Bump version in pyproject.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

          # Generate changelog update
          python3 scripts/update_changelog.py --version "${VERSION}" --skip-if-exists

          git add pyproject.toml CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${VERSION} [skip ci]"
          else
            echo "No version changes to commit — skipping release branch PR"
            exit 0
          fi
          git push origin "$BRANCH"

          # Create and auto-merge the version bump PR
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): ${VERSION}" \
            --body "Automated version bump to ${VERSION}. This PR is auto-merged by the release workflow.")

          # Enable auto-merge (will merge once CI passes)
          gh pr merge "$PR_URL" --auto --merge || true

      - name: Build package
        if: steps.semrel.outputs.released == 'true'
        env:
          VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          # Build from the release branch if it exists, otherwise from the tag
          if git rev-parse --verify "release/v${VERSION}" &>/dev/null; then
            git checkout "release/v${VERSION}"
          elif git rev-parse --verify "origin/release/v${VERSION}" &>/dev/null; then
            git checkout "origin/release/v${VERSION}"
          else
            git checkout "v${VERSION}"
          fi
          python -m build

      - name: Create GitHub Release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          # Determine the commit to tag — prefer the release branch (has bumped version)
          if git rev-parse --verify "release/v${VERSION}" &>/dev/null; then
            TARGET_SHA=$(git rev-parse "release/v${VERSION}")
          elif git rev-parse --verify "origin/release/v${VERSION}" &>/dev/null; then
            TARGET_SHA=$(git rev-parse "origin/release/v${VERSION}")
          else
            TARGET_SHA=$(git rev-parse HEAD)
          fi

          # Upload to existing release, or create a new one
          if gh release view "v${VERSION}" &>/dev/null; then
            gh release upload "v${VERSION}" dist/* --clobber
          else
            gh release create "v${VERSION}" \
              --title "Release v${VERSION}" \
              --generate-notes \
              --target "$TARGET_SHA" \
              dist/*
          fi

  rpm:
    name: Build RPM (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: el8
            image: rockylinux:8
          - distro: el9
            image: rockylinux:9
          - distro: el10
            image: almalinux:10
          - distro: fc
            image: fedora:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install RPM build tools
        run: |
          # Enable EPEL and CRB/PowerTools on EL distros
          if [ "${{ matrix.distro }}" != "fc" ]; then
            dnf install -y epel-release || true
            /usr/bin/crb enable 2>/dev/null \
              || dnf config-manager --set-enabled powertools 2>/dev/null \
              || true
          fi

          # Base RPM build tools
          dnf install -y rpm-build python3-devel python3-pip python3-wheel \
            python3-setuptools pyproject-rpm-macros

          # EL8/EL9: system python3 is too old (3.6/3.9) for requires-python>=3.10
          # Install Python 3.11 from AppStream and use it for the build
          if [ "${{ matrix.distro }}" = "el8" ] || [ "${{ matrix.distro }}" = "el9" ]; then
            dnf install -y python3.11-devel
            dnf install -y python3.11-pip || python3.11 -m ensurepip
            python3.11 -m pip install --prefix=/usr hatchling wheel setuptools
          else
            dnf install -y python3-hatchling 2>/dev/null || pip3 install hatchling wheel
          fi

      - name: Prepare sources and build RPM
        run: |
          VERSION="${{ needs.release.outputs.version }}"

          # Set up rpmbuild directory structure
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}

          # Create source tarball matching spec expectations
          TARDIR="kensa-${VERSION}"
          mkdir -p "/tmp/${TARDIR}"
          cp -a . "/tmp/${TARDIR}/"
          tar czf ~/rpmbuild/SOURCES/kensa-${VERSION}.tar.gz -C /tmp "${TARDIR}"

          # Copy spec with correct version
          sed "s/^Version:.*/Version:        ${VERSION}/" kensa.spec > ~/rpmbuild/SPECS/kensa.spec

          # Remove python3-hatchling BuildRequires if installed via pip (not RPM)
          if ! rpm -q python3-hatchling &>/dev/null; then
            sed -i '/BuildRequires:.*python3-hatchling/d' ~/rpmbuild/SPECS/kensa.spec
          fi

          # Build RPM
          if [ "${{ matrix.distro }}" = "el8" ] || [ "${{ matrix.distro }}" = "el9" ]; then
            rpmbuild --define '__python3 /usr/bin/python3.11' -ba ~/rpmbuild/SPECS/kensa.spec
          else
            rpmbuild -ba ~/rpmbuild/SPECS/kensa.spec
          fi

      - name: Attach RPM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dnf install -y gh || {
            dnf install -y 'dnf-command(config-manager)' || true
            dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
            dnf install -y gh
          }
          gh release upload "v${{ needs.release.outputs.version }}" \
            ~/rpmbuild/RPMS/noarch/*.rpm \
            --repo "${{ github.repository }}"
