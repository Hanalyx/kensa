id: pam-unix-no-remember
title: Ensure pam_unix does not include remember
description: >
  The pam_unix module should not include the remember option as password
  history should be handled by pam_pwhistory instead.
rationale: >
  Using remember in pam_unix is deprecated. Password history should be
  managed by pam_pwhistory for proper enforcement and configuration.
severity: medium
category: access-control
tags: [pam, password, history, security]

references:
  cis:
    rhel9_v2: { section: "5.3.3.4.2", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: authselect
    check:
      method: command
      run: |
        if grep -E 'pam_unix\.so.*remember' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null | grep -v '^#'; then
          echo "FAIL: remember option found in pam_unix configuration"
          exit 1
        fi
        echo "OK: pam_unix does not include remember"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Remove 'remember' from pam_unix.so configuration. On authselect-managed
        systems, use authselect to regenerate PAM files without the remember option.

  - default: true
    check:
      method: command
      run: |
        if grep -E 'pam_unix\.so.*remember' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null | grep -v '^#'; then
          echo "FAIL: remember option found in pam_unix configuration"
          exit 1
        fi
        echo "OK: pam_unix does not include remember"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "sed -i 's/\\bremember=[0-9]*//g' /etc/pam.d/system-auth /etc/pam.d/password-auth"
