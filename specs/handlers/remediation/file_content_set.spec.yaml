kind: RemediationHandler
metadata:
  name: FileContentSet
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Writes complete content to a file on a remote host. Creates or overwrites
    the file entirely. Optionally sets ownership and permissions after writing.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["file_content"]. Implemented in
    runner/handlers/remediation/_file.py as _remediate_file_content. Note: the
    mechanism name in the registry is "file_content" (not "file_content_set").
  dependencies:
    - runner.shell_util.write_file
    - runner.shell_util.set_file_owner
    - runner.shell_util.set_file_mode
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/file_permissions.spec.yaml
    - specs/handlers/remediation/file_absent.spec.yaml

objective:
  summary: >
    Write specified content to a file on a remote host, creating or overwriting
    it. Optionally set ownership (owner/group) and permissions (mode) after
    writing. In dry-run mode, describe the intended changes.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would write
      content to {path}") and no SSH commands are executed.
    AC-2: >
      Success path: When write_file succeeds, returns (True, "Wrote content to
      {path}").
    AC-3: >
      Write failure: When write_file returns False, returns (False, "Failed to
      write {path}") and does not attempt to set ownership or permissions.
    AC-4: >
      Owner set after write: When owner is specified and write succeeds,
      set_file_owner is called with the owner.
    AC-5: >
      Group set after write: When group is specified and write succeeds,
      set_file_owner is called with the group.
    AC-6: >
      Mode set after write: When mode is specified and write succeeds,
      set_file_mode is called with the octal mode.
    AC-7: >
      No ownership change without owner/group: When neither owner nor group is
      specified, set_file_owner is not called.
    AC-8: >
      No mode change without mode: When mode is not specified, set_file_mode is
      not called.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST NOT attempt to set ownership or permissions if write_file failed.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The handler overwrites the entire file; it does not merge with existing content.
  - The handler does not create parent directories; the parent directory is assumed to exist.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "file_content" (used by dispatch, not by handler directly)
  - field: path
    type: str
    required: true
    description: Absolute path to the file on the remote host
  - field: content
    type: str
    required: true
    description: Complete file content to write
  - field: owner
    type: str
    required: false
    description: File owner to set after writing
  - field: group
    type: str
    required: false
    description: File group to set after writing
  - field: mode
    type: str
    required: false
    description: Octal file mode to set after writing (e.g., "0644")

behavior:
  - "Extract fields: Read path and content from the remediation dict."
  - "Dry-run check: If dry_run=True, return (True, \"Would write content to {path}\") immediately."
  - "Write file: Call shell_util.write_file(ssh, path, content)."
  - "Check write result: If write_file returns False, return (False, \"Failed to write {path}\"). Do not proceed to ownership or mode changes."
  - "Set ownership: If owner or group is specified in the dict, call shell_util.set_file_owner(ssh, path, owner, group) to set ownership."
  - "Set permissions: If mode is specified in the dict, call shell_util.set_file_mode(ssh, path, mode) to set file permissions."
  - "Success return: Return (True, \"Wrote content to {path}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would write content to {path}\""
    - "Success: \"Wrote content to {path}\""
    - "Write failure: \"Failed to write {path}\""

side_effects:
  - "Creates or overwrites a file on the remote host with specified content."
  - "Optionally sets file ownership via chown."
  - "Optionally sets file permissions via chmod."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestFileContentSetSpecDerived
    count: 11
