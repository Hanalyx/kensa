id: fapolicyd-deny-all
title: Configure fapolicyd to employ a deny-all allow-by-exception policy
description: >
  The fapolicyd daemon must be configured to employ a deny-all,
  allow-by-exception policy to prevent unauthorized application execution.
rationale: >
  An allow-all policy provides no protection against unauthorized applications.
  A deny-all policy ensures only explicitly permitted executables can run,
  significantly reducing the risk from malware and unauthorized software.
severity: medium
category: services
tags: [fapolicyd, allow-by-exception, application-control]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-244546"
      severity: "CAT II"
  nist_800_53: ["CM-7", "SI-3"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: >
        grep -qE '^\s*deny_audit\s+perm=any\s+all\s*:\s*all\s*$'
        /etc/fapolicyd/fapolicyd.rules 2>/dev/null ||
        grep -qE '^\s*deny\s+perm=any\s+all\s*:\s*all\s*$'
        /etc/fapolicyd/rules.d/*.rules 2>/dev/null
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Configure fapolicyd with a deny-all rule as the final rule in the
        policy. Add to /etc/fapolicyd/fapolicyd.rules:
        deny_audit perm=any all : all
        Then restart fapolicyd: systemctl restart fapolicyd
