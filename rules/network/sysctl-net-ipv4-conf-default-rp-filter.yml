id: sysctl-net-ipv4-conf-default-rp-filter
title: Ensure net.ipv4.conf.default.rp_filter is set to 1
description: >
  The kernel parameter net.ipv4.conf.default.rp_filter must be set to 1 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  cis:
    rhel8: { section: "3.3.1.13", level: "L1", type: "Automated" }
    rhel10: { section: "3.3.1.13", level: "L1", type: "Automated" }
  stig:
    rhel10:
      vuln_id: "V-281348"
      stig_id: "RHEL-10-800160"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257965"
      stig_id: "RHEL-09-253050"
      severity: "CAT II"

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.default.rp_filter
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.default.rp_filter
      value: "1"
