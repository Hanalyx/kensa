id: logfiles-access-configured
title: Ensure access to all logfiles has been configured
description: >
  Access to log files should be restricted to prevent unauthorized
  users from viewing or modifying log data.
rationale: >
  Log files contain sensitive information about system activities.
  Restricting access protects the integrity of audit trails.
severity: medium
category: logging
tags: [logging, permissions, security]

references:
  cis:
    rhel9_v2: { section: "6.2.4.1", level: "L1", type: "Automated" }
  nist_800_53: ["AU-9"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: command
      run: |
        # Check for world-readable log files
        bad_perms=$(find /var/log -type f -perm /o+r 2>/dev/null | head -5)
        if [ -n "$bad_perms" ]; then
          echo "FAIL: Found world-readable log files:"
          echo "$bad_perms"
          exit 1
        fi
        echo "OK: Log file permissions are properly configured"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      description: >
        Review and fix permissions on log files. Remove world-readable
        permissions: find /var/log -type f -perm /o+r -exec chmod o-r {} \;
