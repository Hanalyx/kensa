kind: RemediationHandler
metadata:
  name: FileAbsent
  module: handlers/remediation
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Removes a file from a remote host if it exists. The handler is idempotent:
    if the file is already absent, it returns success without modification.
    Uses rm -f for safe removal.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["file_absent"]. Implemented in
    runner/handlers/remediation/_file.py as _remediate_file_absent.
  dependencies:
    - runner.shell_util.path_exists
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/file_content_set.spec.yaml

objective:
  summary: >
    Ensure a file does not exist on a remote host. If the file is already
    absent, return success immediately. If the file exists, remove it with
    rm -f. In dry-run mode, describe the intended action.
  acceptance_criteria:
    AC-1: >
      Already absent: When path_exists returns False, returns (True, "{path}:
      already absent") without any modification and without checking dry_run.
    AC-2: >
      Dry-run with file present: When the file exists and dry_run=True, returns
      (True, "Would remove {path}") without executing rm.
    AC-3: >
      Success path: When the file exists and rm -f succeeds, returns (True,
      "Removed {path}").
    AC-4: >
      Removal failure: When rm -f fails, returns (False, "Failed to remove
      {path}: {stderr}").
    AC-5: >
      Shell quoting: The path is passed through shell_util.quote() in the rm
      command.

constraints:
  - MUST NOT execute rm when dry_run=True.
  - MUST use shell_util.quote() for the path in shell commands.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The early-return for absent file runs before the dry_run check; this is by design for idempotent behavior.
  - Uses rm -f (force) to suppress errors for non-existent files; combined with the path_exists check this is safe.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "file_absent" (used by dispatch, not by handler directly)
  - field: path
    type: str
    required: true
    description: Absolute path to the file to remove on the remote host

behavior:
  - "Extract fields: Read path from the remediation dict."
  - "Existence check: Call shell_util.path_exists(ssh, path). If the file does not exist, return (True, \"{path}: already absent\") immediately."
  - "Dry-run check: If dry_run=True, return (True, \"Would remove {path}\") immediately."
  - "Remove file: Execute rm -f {quoted_path} via SSH where quoted_path is shell_util.quote(path)."
  - "Check result: If rm fails (not ok), return (False, \"Failed to remove {path}: {stderr}\")."
  - "Success return: Return (True, \"Removed {path}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Already absent: \"{path}: already absent\""
    - "Dry-run: \"Would remove {path}\""
    - "Success: \"Removed {path}\""
    - "Removal failure: \"Failed to remove {path}: {stderr}\""

side_effects:
  - "Removes a file from the remote host via rm -f."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestFileAbsentSpecDerived
    count: 8
