id: sysctl-icmp-redirects-disabled
title: Ensure icmp redirects are not accepted
description: 'The kernel parameter(s) net.ipv4.conf.all.accept_redirects, net.ipv4.conf.default.accept_redirects,
  net.ipv6.conf.all.accept_redirects, net.ipv6.conf.default.accept_redirects must
  be configured to enforce this network security control.

  '
rationale: 'Improper network kernel parameters can allow network-based attacks including
  packet redirection, source routing, and denial of service.

  '
severity: medium
category: network
tags:
- sysctl
- networking
- hardening
references:
  cis:
    rhel9:
      section: 3.3.5
      level: L1
      type: Automated
    rhel8:
      section: 3.3.1.8
      level: L1
      type: Automated
  nist_800_53:
  - SC-7
  - CM-7
  - SC-5
  stig:
    rhel8:
      vuln_id: V-230543
      severity: CAT II
    rhel9:
      vuln_id: V-257958
      severity: CAT II
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    checks:
    - method: sysctl_value
      key: net.ipv4.conf.all.accept_redirects
      expected: '0'
    - method: sysctl_value
      key: net.ipv4.conf.default.accept_redirects
      expected: '0'
    - method: sysctl_value
      key: net.ipv6.conf.all.accept_redirects
      expected: '0'
    - method: sysctl_value
      key: net.ipv6.conf.default.accept_redirects
      expected: '0'
  remediation:
    steps:
    - mechanism: sysctl_set
      key: net.ipv4.conf.all.accept_redirects
      value: '0'
    - mechanism: sysctl_set
      key: net.ipv4.conf.default.accept_redirects
      value: '0'
    - mechanism: sysctl_set
      key: net.ipv6.conf.all.accept_redirects
      value: '0'
    - mechanism: sysctl_set
      key: net.ipv6.conf.default.accept_redirects
      value: '0'
