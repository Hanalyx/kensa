id: auditd-loginuid-immutable
title: Protect audit logon UIDs from unauthorized change
description: >
  The audit system must be configured to protect logon UIDs
  from unauthorized change by setting --loginuid-immutable.
rationale: >
  The loginuid tracks the original user who logged in, even
  across su/sudo. Making it immutable prevents attackers from
  changing their login UID to mask their identity in audit
  records.
severity: medium
category: audit
tags: [audit, auditd, integrity, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258228"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: command
      run: "grep -c '\\-\\-loginuid-immutable' /etc/audit/rules.d/audit.rules"
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "grep -q '\\-\\-loginuid-immutable' /etc/audit/rules.d/audit.rules || echo '--loginuid-immutable' >> /etc/audit/rules.d/audit.rules"
