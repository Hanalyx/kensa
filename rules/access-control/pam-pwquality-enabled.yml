id: pam-pwquality-enabled
title: Ensure pam_pwquality module is enabled
description: >
  The pam_pwquality module must be enabled in the PAM configuration.
rationale: >
  pam_pwquality enforces password complexity requirements, preventing weak passwords.
severity: medium
category: access-control
tags: [pam, authentication, pwquality]

references:
  cis:
    rhel9: { section: "5.3.2.3", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - when: authselect
    check:
      method: command
      run: |
        if authselect current 2>/dev/null | grep -q with-pwquality; then
          echo "OK: pwquality enabled via authselect"
          exit 0
        fi
        if grep -qE '^\s*(password|auth).*pam_pwquality\.so' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null; then
          echo "OK: pam_pwquality configured in PAM files"
          exit 0
        fi
        echo "FAIL: pam_pwquality not enabled"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "authselect enable-feature with-pwquality"

  - default: true
    check:
      method: command
      run: |
        if grep -qE '^\s*(password|auth).*pam_pwquality\.so' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null; then
          echo "OK: pam_pwquality configured"
          exit 0
        fi
        echo "FAIL: pam_pwquality not enabled"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "Add pam_pwquality.so to the password stack in /etc/pam.d/system-auth and /etc/pam.d/password-auth"
