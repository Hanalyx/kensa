id: aide-acl-check
title: Ensure the file integrity tool verifies Access Control Lists
description: >
  The AIDE file integrity tool must be configured to verify Access
  Control Lists (ACLs) on monitored files and directories.
rationale: >
  Without ACL verification, an attacker could modify file ACLs to
  grant unauthorized access without triggering file integrity alerts.
  Including ACL checks in AIDE ensures that any modification to
  access permissions is detected.
severity: medium
category: filesystem
tags: [aide, file-integrity, acl, security]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258138"
      stig_id: "RHEL-09-651020"
      severity: "CAT II"
  nist_800_53: ["AU-7", "CM-3", "SI-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # Check if AIDE is configured with acl option
        if grep -qiE 'acl' /etc/aide.conf /etc/aide.d/*.conf 2>/dev/null; then
          echo "OK: AIDE is configured to verify ACLs"
          exit 0
        fi
        echo "FAIL: AIDE is not configured to verify ACLs"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add 'acl' to the AIDE check groups in /etc/aide.conf.
        For example, add to your NORMAL or PERMS rule set:
        PERMS = p+i+u+g+acl+xattrs+sha256
        Then reinitialize the AIDE database: aide --init
