id: etc-gshadow-permissions
title: Ensure permissions on /etc/gshadow are configured
description: 'The /etc/gshadow file must have correct ownership and permissions.

  '
rationale: 'Incorrect permissions on /etc/gshadow could allow unauthorized access
  or modification of sensitive system data.

  '
severity: high
category: filesystem
tags:
- file-permissions
- authentication
references:
  cis:
    rhel9:
      section: 7.1.7
      level: L1
      type: Automated
    rhel8:
      section: 7.1.7
      level: L1
      type: Automated
    rhel10: { section: "7.1.7", level: "L1", type: "Automated" }
  nist_800_53:
  - AC-3
  - MP-2
  - AC-6
  stig:
    rhel9:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-257893", severity: "CAT II" }                          # mode 0000
      - { vuln_id: "V-257902", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257903", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281021", stig_id: "RHEL-10-400020", severity: "CAT II" }  # owner root
      - { vuln_id: "V-281022", severity: "CAT II" }                          # group root
      - { vuln_id: "V-281068", severity: "CAT II" }                          # mode 0000
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: file_permission
    path: /etc/gshadow
    owner: root
    group: root
    mode: '0000'
  remediation:
    mechanism: file_permissions
    path: /etc/gshadow
    owner: root
    group: root
    mode: '0000'
