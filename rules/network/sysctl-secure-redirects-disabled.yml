id: sysctl-secure-redirects-disabled
title: Ensure secure icmp redirects are not accepted
description: >
  The kernel parameter(s) net.ipv4.conf.all.secure_redirects, net.ipv4.conf.default.secure_redirects must be configured to enforce this network security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  cis:
    rhel9_v2: { section: "3.3.6", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7", "CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      checks:
        - method: sysctl_value
          key: "net.ipv4.conf.all.secure_redirects"
          expected: "0"
        - method: sysctl_value
          key: "net.ipv4.conf.default.secure_redirects"
          expected: "0"
    remediation:
      steps:
        - mechanism: sysctl_set
          key: "net.ipv4.conf.all.secure_redirects"
          value: "0"
        - mechanism: sysctl_set
          key: "net.ipv4.conf.default.secure_redirects"
          value: "0"
