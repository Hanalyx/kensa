id: password-min-age
title: Ensure minimum password days is configured
description: 'The PASS_MIN_DAYS setting in /etc/login.defs must be properly configured.

  '
rationale: 'Improper PASS_MIN_DAYS configuration could weaken system security controls.

  '
severity: medium
category: access-control
tags:
- password
- login-defs
- aging
references:
  cis:
    rhel9:
      section: 5.4.1.2
      level: L1
      type: Manual
    rhel8:
      section: 5.6.1.2
      level: L1
      type: Automated
    rhel10: { section: "5.4.1.2", level: "L2", type: "Manual" }
    ubuntu24: { section: "5.4.1.2", level: "L2", type: "Manual" }
    ubuntu22: { section: "5.4.1.2", level: "L2", type: "Manual" }
  nist_800_53:
  - IA-5
  - IA-5(1)(d)
  stig:
    rhel9:
      vuln_id: V-257955
      stig_id: RHEL-09-411030
      severity: CAT II
    rhel8:
      vuln_id: V-230364
      severity: CAT II
    ubuntu24:
      vuln_id: V-270730
      stig_id: UBTU-24-400300
      severity: CAT II
    ubuntu22:
      vuln_id: V-260545
      stig_id: UBTU-22-411025
      severity: CAT II
    rhel10:
      vuln_id: "V-281180"
      stig_id: "RHEL-10-600210"
      severity: "CAT II"
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    method: config_value
    delimiter: " "
    path: /etc/login.defs
    key: PASS_MIN_DAYS
    expected: '{{ login_defs_pass_min_days }}'
    comparator: '>='
  remediation:
    mechanism: config_set
    path: /etc/login.defs
    key: PASS_MIN_DAYS
    value: '{{ login_defs_pass_min_days }}'
    separator: "\t"
