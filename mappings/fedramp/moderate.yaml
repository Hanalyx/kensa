# ── Implemented Controls ─────────────────────────────────────────────────────
# Controls mapped to Aegis rules (many-to-many: one control -> multiple rules).
controls:
  # ════════════════════════════════════════════════════════════════════════════
  # ACCESS CONTROL (AC)
  # ════════════════════════════════════════════════════════════════════════════

  "AC-2":
    title: "Account Management"
    rules:
      - accounts-no-uid-zero
      - nologin-system-accounts
      - inactive-password-lock
      - root-gid
      - default-group-root
      - accounts-no-empty-passwords

  "AC-2(1)":
    title: "Account Management | Automated System Account Management"
    rules:
      - nologin-system-accounts
      - inactive-password-lock

  "AC-2(2)":
    title: "Account Management | Automated Temporary and Emergency Account Management"
    rules:
      - inactive-password-lock

  "AC-2(3)":
    title: "Account Management | Disable Accounts"
    rules:
      - inactive-password-lock
      - pam-faillock-deny
      - pam-faillock-unlock-time

  "AC-2(4)":
    title: "Account Management | Automated Audit Actions"
    rules:
      - audit-user-group-changes
      - audit-file-passwd
      - audit-file-shadow
      - audit-sudoers-changes

  "AC-2(5)":
    title: "Account Management | Inactivity Logout"
    rules:
      - shell-timeout
      - ssh-client-alive-interval
      - ssh-client-alive-count-max

  "AC-3":
    title: "Access Enforcement"
    rules:
      - selinux-enforcing
      - selinux-policy-targeted
      - fs-permissions-etc-passwd
      - fs-permissions-etc-shadow
      - fs-permissions-etc-group
      - fs-permissions-etc-gshadow
      - sudo-use-pty
      - su-require-wheel

  "AC-4":
    title: "Information Flow Enforcement"
    rules:
      - service-enable-firewalld
      - selinux-enforcing
      - sysctl-net-ipv4-conf-all-accept-redirects
      - sysctl-net-ipv4-conf-default-accept-redirects
      - sysctl-net-ipv4-conf-all-send-redirects
      - sysctl-net-ipv4-conf-default-send-redirects

  "AC-5":
    title: "Separation of Duties"
    rules:
      - su-require-wheel
      - sudo-require-auth
      - accounts-no-uid-zero

  "AC-6":
    title: "Least Privilege"
    rules:
      - sudo-use-pty
      - sudo-require-auth
      - sudo-timeout
      - su-require-wheel
      - nologin-system-accounts
      - selinux-enforcing

  "AC-6(1)":
    title: "Least Privilege | Authorize Access to Security Functions"
    rules:
      - su-require-wheel
      - sudo-require-auth
      - selinux-enforcing

  "AC-6(2)":
    title: "Least Privilege | Non-Privileged Access for Nonsecurity Functions"
    rules:
      - nologin-system-accounts
      - accounts-no-uid-zero

  "AC-6(5)":
    title: "Least Privilege | Privileged Accounts"
    rules:
      - ssh-disable-root-login
      - accounts-no-uid-zero
      - su-require-wheel

  "AC-6(9)":
    title: "Least Privilege | Log Use of Privileged Functions"
    rules:
      - audit-privileged-commands
      - audit-cmd-sudo
      - audit-sudoers-changes
      - sudo-logfile

  "AC-6(10)":
    title: "Least Privilege | Prohibit Non-Privileged Users from Executing Privileged Functions"
    rules:
      - sudo-require-auth
      - su-require-wheel
      - selinux-enforcing

  "AC-7":
    title: "Unsuccessful Logon Attempts"
    rules:
      - pam-faillock-deny
      - pam-faillock-fail-interval
      - pam-faillock-unlock-time
      - pam-faillock-even-deny-root

  "AC-8":
    title: "System Use Notification"
    rules:
      - ssh-banner
      - banner-ssh-dod
      - banner-dod-consent

  "AC-11":
    title: "Device Lock"
    rules:
      - shell-timeout

  "AC-11(1)":
    title: "Device Lock | Pattern-Hiding Displays"
    rules:
      - shell-timeout

  "AC-12":
    title: "Session Termination"
    rules:
      - ssh-client-alive-interval
      - ssh-client-alive-count-max
      - shell-timeout

  "AC-17":
    title: "Remote Access"
    rules:
      - ssh-ciphers-fips
      - ssh-macs-fips
      - ssh-kex-fips
      - ssh-crypto-policy
      - ssh-disable-root-login

  "AC-17(1)":
    title: "Remote Access | Monitoring and Control"
    rules:
      - audit-login-logout
      - audit-session-initiation
      - ssh-log-level

  "AC-17(2)":
    title: "Remote Access | Protection of Confidentiality and Integrity Using Encryption"
    rules:
      - ssh-ciphers-fips
      - ssh-macs-fips
      - ssh-kex-fips
      - crypto-policy-fips

  "AC-17(4)":
    title: "Remote Access | Privileged Commands and Access"
    rules:
      - audit-cmd-sudo
      - audit-privileged-commands
      - sudo-logfile

  "AC-18":
    title: "Wireless Access"
    rules:
      - wireless-disabled

  "AC-18(1)":
    title: "Wireless Access | Authentication and Encryption"
    rules:
      - kmod-disable-bluetooth

  "AC-18(3)":
    title: "Wireless Access | Disable Wireless Networking"
    rules:
      - wireless-disabled

  # ════════════════════════════════════════════════════════════════════════════
  # AUDIT AND ACCOUNTABILITY (AU)
  # ════════════════════════════════════════════════════════════════════════════

  "AU-2":
    title: "Event Logging"
    rules:
      - auditd-service-enabled
      - audit-rules-immutable
      - audit-login-logout
      - audit-session-initiation
      - audit-privileged-commands
      - audit-user-group-changes

  "AU-3":
    title: "Content of Audit Records"
    rules:
      - auditd-service-enabled
      - audit-time-change

  "AU-3(1)":
    title: "Content of Audit Records | Additional Audit Information"
    rules:
      - audit-time-change
      - audit-user-group-changes

  "AU-4":
    title: "Audit Log Storage Capacity"
    rules:
      - auditd-max-log-file
      - auditd-max-log-file-action
      - auditd-space-action
      - auditd-admin-space-action

  "AU-5":
    title: "Response to Audit Logging Process Failures"
    rules:
      - auditd-disk-full-action
      - auditd-disk-error-action
      - auditd-action-mail-acct

  "AU-6":
    title: "Audit Record Review, Analysis, and Reporting"
    rules:
      - rsyslog-service-enabled
      - pkg-rsyslog-present

  "AU-8":
    title: "Time Stamps"
    rules:
      - chrony-installed
      - chrony-user
      - audit-time-change

  "AU-9":
    title: "Protection of Audit Information"
    rules:
      - audit-log-permissions
      - audit-log-dir-permissions
      - audit-config-permissions
      - rsyslog-default-permissions

  "AU-9(4)":
    title: "Protection of Audit Information | Access by Subset of Privileged Users"
    rules:
      - audit-log-permissions
      - audit-log-dir-permissions

  "AU-11":
    title: "Audit Record Retention"
    rules:
      - auditd-max-log-file
      - auditd-max-log-file-action

  "AU-12":
    title: "Audit Record Generation"
    rules:
      - auditd-service-enabled
      - audit-rules-immutable
      - audit-privileged-commands
      - audit-suid-files
      - audit-sgid-files
      - audit-kernel-modules
      - audit-mount-operations
      - audit-permission-changes
      - audit-file-deletion
      - audit-unsuccessful-access
      - audit-unsuccessful-perm

  # ════════════════════════════════════════════════════════════════════════════
  # CONFIGURATION MANAGEMENT (CM)
  # ════════════════════════════════════════════════════════════════════════════

  "CM-2":
    title: "Baseline Configuration"
    rules:
      - aide-installed
      - aide-cron-check
      - repo-gpgcheck-enabled

  "CM-3":
    title: "Configuration Change Control"
    rules:
      - audit-sudoers-changes
      - audit-network-changes
      - audit-permission-changes

  "CM-5":
    title: "Access Restrictions for Change"
    rules:
      - sudo-require-auth
      - su-require-wheel
      - audit-sudoers-changes

  "CM-5(1)":
    title: "Access Restrictions for Change | Automated Access Enforcement and Audit Records"
    rules:
      - audit-sudoers-changes
      - audit-permission-changes
      - sudo-logfile

  "CM-6":
    title: "Configuration Settings"
    rules:
      - ssh-disable-root-login
      - ssh-permit-empty-passwords
      - ssh-hostbased-authentication
      - ssh-ignore-rhosts
      - ssh-strict-modes
      - sysctl-net-ipv4-conf-all-send-redirects
      - sysctl-net-ipv4-conf-default-send-redirects
      - aslr-enabled
      - coredump-restricted
      - ctrl-alt-del-disabled

  "CM-6(1)":
    title: "Configuration Settings | Automated Management, Application, and Verification"
    rules:
      - aide-installed
      - aide-cron-check

  "CM-7":
    title: "Least Functionality"
    rules:
      - service-disable-cups
      - service-disable-avahi-daemon
      - service-disable-dhcpd
      - service-disable-httpd
      - service-disable-named
      - service-disable-nfs
      - service-disable-samba
      - service-disable-squid
      - service-disable-vsftpd
      - service-disable-telnet
      - service-disable-tftp
      - package-telnet-removed
      - package-ftp-removed

  "CM-7(1)":
    title: "Least Functionality | Periodic Review"
    rules:
      - aide-installed
      - aide-cron-check

  "CM-7(2)":
    title: "Least Functionality | Prevent Program Execution"
    rules:
      - selinux-enforcing
      - aslr-enabled

