id: audit-delete
title: Ensure file deletion events by users are collected
description: 'File deletion events must be collected to detect unauthorized data destruction.

  '
rationale: 'Without auditing these events, malicious activity could go undetected,
  compromising forensic capabilities.

  '
severity: medium
category: audit
tags:
- audit
- auditd
depends_on:
- auditd-enabled
references:
  cis:
    rhel9:
      section: 6.3.3.13
      level: L1
      type: Automated
    rhel8: { section: "6.3.3.13", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281165", stig_id: "RHEL-10-500810", severity: "CAT II" }
    rhel9:
      vuln_id: V-258187
      stig_id: RHEL-09-654065
      severity: CAT II
    rhel8:
      vuln_id: V-230439
      severity: CAT II
  nist_800_53:
  - AU-2
  - AU-12
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: command
    run: "auditctl -l 2>/dev/null | grep -E '(-k|key=)delete([[:space:]]|$)' | grep -q -- '-S [a-z0-9,]*unlink'"
    expected_exit: 0
  remediation:
    mechanism: audit_rule_set
    rule: -a always,exit -F arch=b64 -S rename,unlink,unlinkat,renameat -F auid>=1000
      -F auid!=unset -k delete
    persist_file: /etc/audit/rules.d/50-delete.rules
