id: audit-sudoers
title: Ensure changes to system administration scope (sudoers) is collected
description: >
  Changes to sudoers files must be audited to detect privilege escalation attempts.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.3.1", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "auditctl -l 2>/dev/null | grep -qE 'sudoers.*scope'"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-w /etc/sudoers -p wa -k scope"
      persist_file: "/etc/audit/rules.d/50-scope.rules"
