id: sysctl-ip-forward-disabled
title: Ensure ip forwarding is disabled
description: >
  The kernel parameter(s) net.ipv4.ip_forward, net.ipv6.conf.all.forwarding must be configured to enforce this network security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]
conflicts_with:
  - sysctl-net-ipv6-conf-all-forwarding

references:
  cis:
    rhel9_v2: { section: "3.3.1", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7", "CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      checks:
        - method: sysctl_value
          key: "net.ipv4.ip_forward"
          expected: "0"
        - method: sysctl_value
          key: "net.ipv6.conf.all.forwarding"
          expected: "0"
    remediation:
      steps:
        - mechanism: sysctl_set
          key: "net.ipv4.ip_forward"
          value: "0"
        - mechanism: sysctl_set
          key: "net.ipv6.conf.all.forwarding"
          value: "0"
