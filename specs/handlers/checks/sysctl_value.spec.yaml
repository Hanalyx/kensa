kind: CheckHandler
metadata:
  name: SysctlValue
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Reads a kernel sysctl parameter value over SSH and compares it
    to an expected value.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check via
    CHECK_HANDLERS["sysctl_value"]. Implemented in
    runner/handlers/checks/_system.py as _check_sysctl_value.
    Uses shell_util.quote() for safe parameter interpolation.
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
  callers:
    - runner.handlers.checks.run_check
  related_specs:
    - kernel_module_state.spec.yaml
    - grub_parameter.spec.yaml

objective:
  summary: >
    Execute sysctl -n to read a kernel parameter on a remote host,
    compare the result to an expected value, and return a CheckResult
    with structured Evidence.
  acceptance_criteria:
    AC-1: "Sysctl value matching expected returns passed=True with detail '{key}={actual}'."
    AC-2: "Sysctl value not matching expected returns passed=False with detail '{key}={actual} (expected {expected})'."
    AC-3: "Sysctl command failing (not result.ok) returns passed=False with detail 'sysctl {key}: not available'."
    AC-4: "Evidence method is always 'sysctl_value'."
    AC-5: "Detail format on pass is '{key}={actual}'; on mismatch is '{key}={actual} (expected {expected})'."
    AC-6: "Evidence timestamp is a UTC datetime captured before the command executes."

constraints:
  - "MUST read key as a required key (KeyError if absent)."
  - "MUST convert expected to string via str() before comparison."
  - "MUST use shell_util.quote() on the key to prevent shell injection."
  - "MUST strip stdout before comparing to expected."
  - "MUST redirect stderr to /dev/null in the sysctl command."
  - "MUST set evidence.method to 'sysctl_value' in all paths."
  - "MUST set evidence.actual to None when sysctl command fails."

input_contract:
  - field: key
    type: str
    required: true
    description: Sysctl parameter name (e.g., "net.ipv4.ip_forward").
  - field: expected
    type: str
    required: true
    description: Expected parameter value (converted to string for comparison).

behavior:
  - "Read key from c['key'] (required key)."
  - "Read expected from c['expected'] and convert to str."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: sysctl -n {quoted_key} 2>/dev/null."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If not result.ok: return FAIL with detail 'sysctl {key}: not available'
    and evidence.actual=None.
  - "Strip result.stdout to get actual value."
  - "Compare actual == expected to determine passed."
  - >
    Build detail: if passed, '{key}={actual}'; if not, '{key}={actual}
    (expected {expected})'.
  - "Return CheckResult with passed, detail, and Evidence."

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass:
      passed: true
      detail: "'{key}={actual}'"
    fail_mismatch:
      passed: false
      detail: "'{key}={actual} (expected {expected})'"
    fail_not_available:
      passed: false
      detail: "'sysctl {key}: not available'"
  evidence_fields:
    method: "sysctl_value"
    command: "sysctl -n {quoted_key} 2>/dev/null"
    stdout: Full raw stdout from sysctl
    stderr: Full raw stderr
    exit_code: Actual exit code from sysctl
    expected: "The expected value string"
    actual: "Stripped stdout value on success, None on command failure"
    timestamp: UTC time captured before command execution
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'sysctl_value'."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestSysctlValue
      - TestSysctlValueSpecDerived
    count: 6
