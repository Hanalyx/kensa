id: banner-dod-consent
title: Configure login warning banner
description: >
  The system must display an authorized-use warning banner before granting
  local or remote access. The banner text is written to /etc/issue, which
  sshd displays via the Banner directive (see ssh-banner rule).
  Customize the text by setting the banner_text variable in rules/rules.d/.
rationale: >
  A pre-authentication banner establishes the legal basis for monitoring
  and prosecution of unauthorized access. Without a warning banner, an
  attacker may claim they were unaware the system was restricted.
severity: medium
category: system
tags: [banner, compliance, login]

references:
  cis:
    rhel9_v2: { section: "1.7.2", level: "L1", type: "Automated" }
    rhel8_v4:  { section: "1.7.1", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-257779"
      severity: "CAT II"
  nist_800_53: ["AC-8"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "grep -Ei 'authorized|consent|monitoring|privacy|activity' /etc/issue 2>/dev/null"
      expected_exit: 0
    remediation:
      mechanism: file_content
      path: "/etc/issue"
      content: "{{ banner_text }}"
      owner: "root"
      group: "root"
      mode: "0644"
