id: pam-pwquality-dictcheck
title: Enable dictionary check for passwords
description: >
  The dictcheck parameter in /etc/security/pwquality.conf enables checking
  whether passwords are based on dictionary words.
rationale: >
  Dictionary words and common phrases are easily guessed by attackers using
  dictionary attacks. Enabling dictionary checking prevents users from
  using weak passwords based on common words.
severity: medium
category: access-control
tags: [pam, password, authentication, pwquality]

depends_on: [package-libpwquality-installed]

references:
  cis:
    rhel8:  { section: "5.4.1.10", level: "L1", type: "Automated" }
    rhel9:  { section: "5.4.1",    level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258110"
      stig_id: "RHEL-09-611105"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230377"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270704"
      stig_id: "UBTU-24-300014"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260564"
      stig_id: "UBTU-22-611030"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281191"
      stig_id: "RHEL-10-600320"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(a)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "dictcheck"
      expected: "1"
    remediation:
      mechanism: config_set
      path: "/etc/security/pwquality.conf"
      key: "dictcheck"
      value: "1"
      separator: " = "
