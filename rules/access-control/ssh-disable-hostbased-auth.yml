id: ssh-disable-hostbased-auth
title: Ensure sshd HostbasedAuthentication is disabled
description: 'The sshd HostbasedAuthentication directive must be properly configured.

  '
rationale: 'Improper SSH HostbasedAuthentication configuration could weaken the security
  of remote access to the system.

  '
severity: medium
category: access-control
tags:
- ssh
- sshd
- access-control
depends_on:
- pkg-openssh-server-present
references:
  cis:
    rhel9:
      section: 5.1.12
      level: L1
      type: Automated
    rhel10:
      section: 5.1.10
      level: L1
      type: Automated
    rhel8:
      section: 5.1.12
      level: L1
      type: Automated
  nist_800_53:
  - AC-17
  - SC-8
  - CM-6
  - AC-3
  stig:
    rhel8:
      vuln_id: V-230332
      stig_id: RHEL-08-010860
      severity: CAT II
      cci:
      - CCI-000366
    rhel9:
      vuln_id: V-257987
      stig_id: RHEL-09-255055
      severity: CAT II
      cci:
      - CCI-000366
platforms:
- family: rhel
  min_version: 8
implementations:
- when: sshd_config_d
  check:
    method: sshd_effective_config
    key: hostbasedauthentication
    expected: 'no'
  remediation:
    mechanism: config_set_dropin
    dir: /etc/ssh/sshd_config.d
    file: 00-kensa-hostbased-authentication.conf
    key: HostbasedAuthentication
    value: 'no'
    reload: sshd
- default: true
  check:
    method: sshd_effective_config
    key: hostbasedauthentication
    expected: 'no'
  remediation:
    mechanism: config_set
    path: /etc/ssh/sshd_config
    key: HostbasedAuthentication
    value: 'no'
    separator: ' '
    reload: sshd
