id: accounts-password-shadowed
title: Ensure accounts use shadowed passwords
description: >
  All user accounts in /etc/passwd must have their password field set to 'x',
  indicating that the actual password hash is stored in /etc/shadow. Direct
  password hashes in /etc/passwd are a security vulnerability.
rationale: >
  The /etc/passwd file is world-readable while /etc/shadow has restricted
  permissions. Storing password hashes in /etc/passwd exposes them to all
  users on the system, enabling offline password cracking attacks.
severity: high
category: access-control
tags: [accounts, passwords, shadow, security]

references:
  cis:
    rhel9_v2:  { section: "7.2.1", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-258117"
      severity: "CAT II"
  nist_800_53: ["IA-5", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "awk -F: '($2 != \"x\") {print $1}' /etc/passwd"
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: manual
      note: >
        Use 'pwconv' to convert any unshadowed passwords to the shadow
        password file. Alternatively, manually set the password field in
        /etc/passwd to 'x' and ensure corresponding entries exist in
        /etc/shadow.
