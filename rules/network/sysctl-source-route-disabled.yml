id: sysctl-source-route-disabled
title: Ensure source routed packets are not accepted
description: 'The kernel parameter(s) net.ipv4.conf.all.accept_source_route, net.ipv4.conf.default.accept_source_route,
  net.ipv6.conf.all.accept_source_route, net.ipv6.conf.default.accept_source_route
  must be configured to enforce this network security control.

  '
rationale: 'Improper network kernel parameters can allow network-based attacks including
  packet redirection, source routing, and denial of service.

  '
severity: medium
category: network
tags:
- sysctl
- networking
- hardening
references:
  cis:
    rhel9:
      section: 3.3.8
      level: L1
      type: Automated
    rhel8:
      section: 3.3.1.14
      level: L1
      type: Automated
  nist_800_53:
  - SC-7
  - CM-7
  - SC-5
  stig:
    rhel8:
      vuln_id: V-244551
      severity: CAT II
    rhel9:
      vuln_id: V-257959
      severity: CAT II
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    checks:
    - method: sysctl_value
      key: net.ipv4.conf.all.accept_source_route
      expected: '0'
    - method: sysctl_value
      key: net.ipv4.conf.default.accept_source_route
      expected: '0'
    - method: sysctl_value
      key: net.ipv6.conf.all.accept_source_route
      expected: '0'
    - method: sysctl_value
      key: net.ipv6.conf.default.accept_source_route
      expected: '0'
  remediation:
    steps:
    - mechanism: sysctl_set
      key: net.ipv4.conf.all.accept_source_route
      value: '0'
    - mechanism: sysctl_set
      key: net.ipv4.conf.default.accept_source_route
      value: '0'
    - mechanism: sysctl_set
      key: net.ipv6.conf.all.accept_source_route
      value: '0'
    - mechanism: sysctl_set
      key: net.ipv6.conf.default.accept_source_route
      value: '0'
