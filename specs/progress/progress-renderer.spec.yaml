spec:
    id: progress-renderer
    version: 0.1.0
    status: draft
    tier: 2

    context:
        system: kensa
        feature: progress-renderer
        description: |
            PR1 pinned the source-agnostic display model (internal/progress:
            Kind, Update, Sink). PR2 opened the emission seams (scan/detect emit
            a Sink synchronously; the engine stamps RuleID on its payloads). PR3
            adds the RENDERER: a StreamConsumer that implements progress.Sink and
            renders each Update incrementally as it arrives.

            Two renderer implementations share one consumer contract:

            1. text — a human-readable line renderer for an interactive terminal.
               It writes to an io.Writer the caller points at STDERR (never
               stdout). It is TTY-aware via an INJECTED isTTY bool, NOT a runtime
               os.Stdout.Fd() probe, so both the TTY branch and the non-TTY
               (plain/piped/CI) branch are unit-testable deterministically.

            2. events-jsonl — a machine-readable NDJSON renderer: one compact
               JSON object per Update, newline-terminated, written to an
               io.Writer the caller points at stderr or a dedicated
               --stream-file. It is NEVER stdout and is NEVER named "jsonl"
               (jsonl is already a registered --output RESULT format; the event
               stream is a distinct, display-only concern named events-jsonl).

            Both renderers are display-only and lossy-tolerant: they render the
            live stream of Updates and nothing else. The FINAL summary — counts,
            exit code, any -o FILE serialization — is produced from the canonical
            ScanResult / RemediationResult struct by the existing output writers,
            NEVER reconstructed from the rendered stream. PR3 therefore renders
            no summary; it only renders Updates.

            It is Tier 2: the renderer is on the apply-path-adjacent CLI display
            surface but carries no atomicity exposure (it mutates nothing and the
            result struct remains authoritative). A renderer that panicked or
            wrote to stdout would corrupt the canonical result channel, so the
            stdout/stderr separation and write-error tolerance are pinned here.

    objective:
        summary: |
            internal/progress provides a StreamConsumer constructed for either a
            text renderer (writing to an injected io.Writer, TTY-awareness via an
            injected isTTY bool that selects verbose vs plain line formatting) or
            an events-jsonl renderer (one compact newline-terminated JSON object
            per Update to an injected io.Writer). Both implement progress.Sink so
            Update is rendered incrementally, both write only to the writer the
            caller supplies (the CLI points it at stderr or a stream file, never
            stdout), and neither emits any final summary — the summary comes from
            the result struct.
        scope:
            includes:
                - A StreamConsumer that implements progress.Sink and renders each Update incrementally
                - A text renderer writing to an injected io.Writer, TTY-aware via an injected isTTY bool
                - The isTTY=true branch and the isTTY=false branch both render and are both unit-testable
                - An events-jsonl renderer emitting one compact, newline-terminated JSON object per Update
                - The events-jsonl line carrying the Update's display fields (host, kind, rule id, index, total, ok, phase, detail)
                - Both renderers writing ONLY to the supplied io.Writer (caller routes to stderr / --stream-file)
                - Rendering being tolerant of an io.Writer that returns a write error (no panic)
            excludes:
                - Choosing or owning the destination file descriptor (the CLI wires stderr / --stream-file in PR4/PR5)
                - Rendering any final summary, counts, or exit code (those come from the result struct)
                - Reusing the name "jsonl" for the event stream (jsonl is a result --output format)
                - Writing any progress byte to stdout
                - Subscribing to the api event bus (the engine adapter in PR5 drains it into Updates)

    constraints:
        - id: C-01
          description: |
              internal/progress MUST provide a StreamConsumer that implements
              progress.Sink, rendering each Update to the configured io.Writer at
              the moment Update is called (incrementally), not buffering until an
              end-of-stream signal.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              The text renderer MUST be constructed with an injected io.Writer
              and an injected isTTY bool. It MUST NOT probe a real terminal at
              render time. Both isTTY=true and isTTY=false MUST render each
              Update to the writer (the two branches differ only in formatting),
              so both branches are unit-testable against a bytes.Buffer.
          type: technical
          enforcement: error
        - id: C-03
          description: |
              The text renderer MUST render the distinct Update kinds it receives
              (scan start, rule checked, probe done, transaction started,
              transaction phase, transaction done, scan end) as human-readable
              lines that include the rule id (when set) and the OK/phase outcome,
              so a reader can follow per-rule progress.
          type: technical
          enforcement: error
        - id: C-04
          description: |
              The events-jsonl renderer MUST emit exactly one JSON object per
              Update, each on its own line terminated by a single newline
              (NDJSON). Each line MUST be valid JSON and MUST carry the Update's
              display fields (at least host, kind, rule id, index, total, ok,
              phase, detail). The kind MUST be rendered as a stable string token,
              not a raw integer enum value.
          type: technical
          enforcement: error
        - id: C-05
          description: |
              Neither renderer MUST write to os.Stdout: both render strictly to
              the io.Writer supplied at construction. The constructor surface
              MUST NOT default a writer to stdout. (The CLI points the writer at
              stderr or a --stream-file; this constraint pins that the renderer
              never reaches stdout itself.)
          type: technical
          enforcement: error
        - id: C-06
          description: |
              Rendering MUST tolerate an io.Writer whose Write returns an error:
              a write error MUST NOT panic and MUST NOT abort the consumer —
              progress is cosmetic and strictly subordinate to the canonical
              result. Subsequent Updates may still be delivered without panic.
          type: technical
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: A StreamConsumer implements progress.Sink and renders to its io.Writer incrementally — after delivering N Updates the writer has received output for each, before any end-of-stream signal.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: The text renderer constructed with isTTY=true and the one constructed with isTTY=false each render a delivered Update to their bytes.Buffer (non-empty output), confirming both branches are exercised without probing a real terminal.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: The text renderer's output for a RuleChecked Update includes the rule id and reflects the OK outcome; a TxnPhase Update includes the phase; distinct kinds produce distinct human-readable lines.
          references_constraints: [C-03]
          priority: high
        - id: AC-04
          description: The events-jsonl renderer emits one newline-terminated JSON object per Update; each line parses as JSON and carries host, kind (as a string token), rule id, index, total, ok, phase, and detail fields.
          references_constraints: [C-04]
          priority: critical
        - id: AC-05
          description: Both renderers write only to the injected io.Writer; no constructor accepts or defaults to os.Stdout, and a render captured in a bytes.Buffer leaves stdout untouched.
          references_constraints: [C-05]
          priority: critical
        - id: AC-06
          description: Delivering Updates to a renderer whose underlying io.Writer always returns an error does not panic and does not abort the consumer; a following Update is still accepted.
          references_constraints: [C-06]
          priority: high

    depends_on:
        - spec_id: progress-types
          relationship: requires
        - spec_id: progress-emission
          relationship: requires

    tags: [progress, renderer, streaming, events-jsonl, tier-2]
