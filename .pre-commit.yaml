# Aegis pre-commit configuration
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

default_language_version:
  python: python3

repos:
  # ==========================================================================
  # General file hygiene
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags in rules
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # ==========================================================================
  # Ruff - Fast Python linter and formatter (replaces flake8, isort, black)
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        files: ^(runner|schema)/
        args:
          - '--fix'
          - '--select=E,F,W,I,B,C4,S,SIM,RET,ARG,PTH,PL,UP'
          # E,F,W = pyflakes + pycodestyle basics
          # I = isort (import sorting)
          # B = flake8-bugbear (common bugs)
          # C4 = flake8-comprehensions
          # S = bandit security checks (critical for shell injection)
          # SIM = simplify
          # RET = return statement issues
          # ARG = unused arguments
          # PTH = pathlib suggestions
          # PL = pylint subset
          # UP = pyupgrade (modern Python syntax)
          - '--ignore=E501,PLR0913,PLR2004'
          # E501 = line length (handled by formatter)
          # PLR0913 = too many arguments (acceptable for CLI tools)
          # PLR2004 = magic values (too noisy)
      - id: ruff-format
        files: ^(runner|schema)/

  # ==========================================================================
  # MyPy - Static type checking (gradual strictness)
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^(runner|schema)/
        additional_dependencies:
          - types-PyYAML
          - types-paramiko
        args:
          - '--ignore-missing-imports'
          - '--explicit-package-bases'
          # Phase 1: Keep these disabled initially
          - '--disable-error-code=no-untyped-def'
          - '--disable-error-code=var-annotated'
          # Phase 2: Remove these as you fix issues
          # - '--disable-error-code=arg-type'
          # - '--disable-error-code=return-value'
          # - '--disable-error-code=assignment'

  # ==========================================================================
  # YAML Schema validation for rules
  # ==========================================================================
  - repo: local
    hooks:
      - id: validate-rules
        name: Validate rule YAML against schema
        entry: python3 schema/validate.py
        language: system
        files: ^rules/.*\.ya?ml$
        pass_filenames: true

  # ==========================================================================
  # Security-focused custom checks (critical for Aegis)
  # ==========================================================================
  - repo: local
    hooks:
      - id: no-broad-except
        name: No bare 'except Exception'
        entry: bash -c 'grep -rn "except Exception:" --include="*.py" runner/ schema/ && echo "ERROR: Use specific exceptions (OSError, SSHException, etc.)" && exit 1 || exit 0'
        language: system
        files: \.py$
        pass_filenames: false

      - id: shell-injection-check
        name: Check for potential shell injection
        entry: bash -c '
          # Find f-strings that might be used in shell commands without shlex.quote
          # This is a heuristic check - manual review still needed
          files=$(git diff --cached --name-only --diff-filter=ACM | grep "\.py$" | grep -E "^(runner|schema)/")
          if [ -z "$files" ]; then exit 0; fi

          # Look for patterns like: f"...{var}..." near run/exec/command calls
          # Exclude lines that already use shlex.quote
          suspicious=$(echo "$files" | xargs grep -n "f[\"'\''].*{" 2>/dev/null | grep -v "shlex.quote" | grep -iE "(\.run|exec|command|cmd)" || true)

          if [ -n "$suspicious" ]; then
            echo "WARNING: Possible unquoted shell variables detected:"
            echo "$suspicious"
            echo ""
            echo "Ensure all user/rule-derived values are quoted with shlex.quote()"
            echo "See CLAUDE.md Security Rules for details."
            # Warning only - does not block commit
          fi
          exit 0
        '
        language: system
        files: ^(runner|schema)/.*\.py$
        pass_filenames: false

      - id: no-password-logging
        name: No password/credential logging
        entry: bash -c 'grep -rn -E "(password|credential|secret|key_path).*log" --include="*.py" runner/ schema/ | grep -v "# noqa" && echo "ERROR: Never log credentials" && exit 1 || exit 0'
        language: system
        files: \.py$
        pass_filenames: false
