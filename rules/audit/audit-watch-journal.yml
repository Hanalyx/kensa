id: audit-watch-journal
title: Audit access to /var/log/journal
description: >
  Modifications to /var/log/journal must generate an audit record so that access to the systemd journal
  can be traced to an individual.
rationale: >
  Auditing this path supports detection of unauthorized changes and
  forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, watch]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270715"
      stig_id: "UBTU-24-300029"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260640"
      stig_id: "UBTU-22-654190"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /var/log/journal -p wa -k systemd_journal"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /var/log/journal -p wa -k systemd_journal"
      persist_file: "/etc/audit/rules.d/50-watch-journal.rules"
