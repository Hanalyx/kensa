id: pcscd-enabled
title: Ensure pcscd service is active
description: >
  The pcscd service must be active to provide smart card reader
  communication.
rationale: >
  The PC/SC Smart Card Daemon manages connections to smart card
  readers. Without it running, smart card authentication cannot
  function.
severity: medium
category: services
tags: [service, smartcard, authentication, pki]

depends_on: [pkg-pcsc-lite-present]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258125"
      severity: "CAT II"
  nist_800_53: ["IA-2(1)", "IA-2(2)"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: service_state
      name: "pcscd"
      enabled: true
      active: true
    remediation:
      mechanism: service_enabled
      name: "pcscd"
