id: kmod-disable-uvcvideo
title: Disable uvcvideo kernel module
description: >
  The uvcvideo kernel module provides driver support for USB Video
  Class devices such as built-in and attached cameras. On systems
  where the camera is not required, the module must be disabled so
  the device cannot be activated.
rationale: >
  Disabling an unused camera driver prevents the collaborative
  computing device from being activated unexpectedly and reduces the
  kernel attack surface.
severity: medium
category: kernel
tags: [kernel-module, camera, attack-surface]

references:
  stig:
    rhel8:
      vuln_id: V-230493
      stig_id: RHEL-08-040020
      severity: CAT II
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: kernel_module_state
      name: "uvcvideo"
      state: "blacklisted"
    remediation:
      mechanism: kernel_module_disable
      name: "uvcvideo"
