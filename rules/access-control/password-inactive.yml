id: password-inactive
title: Ensure inactive password lock is configured
description: 'Inactive password lock must be configured to disable unused accounts.

  '
rationale: 'Dormant accounts with valid passwords are attractive targets for attackers.

  '
severity: medium
category: access-control
tags:
- password
- inactive
- account
references:
  cis:
    rhel9:
      section: 5.4.1.5
      level: L1
      type: Automated
    rhel8:
      section: 5.6.1.4
      level: L1
      type: Automated
  nist_800_53:
  - AC-2
  - IA-5
  - AC-2(3)
  stig:
    rhel9:
      vuln_id: V-257939
      stig_id: RHEL-09-411035
      severity: CAT II
    rhel8:
      vuln_id: V-230373
      severity: CAT II
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: command
    run: "val=$(useradd -D 2>/dev/null | grep -oP 'INACTIVE=\\K-?\\d+')\nif [ -z \"\
      $val\" ]; then\n  echo \"FAIL: INACTIVE not found in useradd defaults\"\n  exit\
      \ 1\nfi\nif [ \"$val\" -lt 1 ] || [ \"$val\" -gt 45 ]; then\n  echo \"FAIL:\
      \ INACTIVE=$val (expected 1-45)\"\n  exit 1\nfi\necho \"OK: INACTIVE=$val\"\n\
      exit 0\n"
    expected_exit: 0
  remediation:
    mechanism: command_exec
    run: useradd -D -f 30
