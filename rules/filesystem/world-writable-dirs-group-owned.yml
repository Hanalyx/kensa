id: world-writable-dirs-group-owned
title: Ensure world-writable directories are group-owned by a system account
description: >
  All world-writable directories must be group-owned by root, sys, bin, or an
  application group to prevent unauthorized file creation and manipulation.
rationale: >
  A world-writable directory group-owned by a non-system group can be exploited
  by members of that group for privilege escalation or denial-of-service, and
  weakens the accountability the sticky bit provides.
severity: medium
category: filesystem
tags: [filesystem, permissions, world-writable, ownership, stig]

references:
  stig:
    rhel8:
      vuln_id: "V-230319"
      stig_id: "RHEL-08-010710"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # World-writable directories group-owned by a non-system group (GID > 999)
        result=$(find / -xdev -type d -perm -0002 -gid +999 -print 2>/dev/null || true)
        if [ -n "$result" ]; then
          echo "FAIL: World-writable directories group-owned by non-system groups:"
          echo "$result"
          exit 1
        fi
        echo "OK: All world-writable directories are group-owned by system accounts"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: file_permissions
      find_paths: ["/"]
      find_type: "d"
      find_args: "-xdev -perm -0002 -gid +999"
      group: "root"
