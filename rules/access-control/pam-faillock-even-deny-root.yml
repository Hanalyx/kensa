id: pam-faillock-even-deny-root
title: Apply account lockout to root account
description: >
  The account lockout policy must apply to the root account to prevent
  brute-force attacks against the superuser.
rationale: >
  The root account is a high-value target for attackers. Applying
  lockout policies prevents unlimited password guessing attempts
  against the most privileged account.
severity: high
category: access-control
tags: [pam, faillock, root, account-lockout, stig]

depends_on: [pam-faillock-deny]

references:
  cis:
    rhel9: { section: "5.3.3.1.3", level: "L1", type: "Automated" }
    rhel8:  { section: "5.3.3.4.4", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258055"
      stig_id: "RHEL-09-411085"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230344"
      severity: "CAT II"
  nist_800_53: ["AC-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/faillock.conf"
      key: "even_deny_root"
      expected: ""
    remediation:
      mechanism: config_append
      path: "/etc/security/faillock.conf"
      line: "even_deny_root"
