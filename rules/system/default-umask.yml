id: default-umask
title: Configure default umask for user accounts
description: >
  The default umask for all users must be configured to 077 to prevent
  newly created files and directories from being accessible by other users
  by default.
rationale: >
  A weak umask allows users to create world-readable or group-readable
  files, potentially exposing sensitive information. Setting umask to 077
  ensures new files have the most restrictive permissions by default.
severity: medium
category: system
tags: [umask, permissions, security]

references:
  stig:
    rhel8:
      vuln_id: "V-230385"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270716"
      stig_id: "UBTU-24-300030"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260555"
      stig_id: "UBTU-22-412035"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-258074"
      stig_id: "RHEL-09-412065"
      severity: "CAT II"
  nist_800_53: ["AC-3", "CM-6"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      delimiter: " "
      path: "/etc/login.defs"
      key: "UMASK"
      expected: "{{ login_defs_umask }}"
    remediation:
      mechanism: config_set
      path: "/etc/login.defs"
      key: "UMASK"
      value: "{{ login_defs_umask }}"
      separator: " "
