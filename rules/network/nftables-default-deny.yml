id: nftables-default-deny
title: Ensure nftables default deny firewall policy
description: >
  When using nftables directly, the default policy should be to deny
  all traffic that is not explicitly allowed.
rationale: >
  A default deny policy ensures that only explicitly allowed traffic
  can pass through the firewall, reducing the attack surface.
severity: high
category: network
tags: [firewall, nftables, security]

references:
  cis:
    rhel9_v2: { section: "4.3.3", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: nftables_active
    check:
      method: command
      command: |
        # Check for drop policy on input and forward chains
        ruleset=$(nft list ruleset 2>/dev/null)
        if echo "$ruleset" | grep -qE "chain input.*policy drop" &&
           echo "$ruleset" | grep -qE "chain forward.*policy drop"; then
          echo "OK: nftables default deny policy is configured"
          exit 0
        fi
        echo "FAIL: nftables default deny policy not configured"
        exit 1
      expected_exit_code: 0
    remediation:
      mechanism: manual
      description: >
        Configure nftables default deny policy:
        nft chain inet filter input { policy drop \; }
        nft chain inet filter forward { policy drop \; }

  - default: true
    check:
      method: command
      command: "echo 'OK: nftables not active (using firewalld)'; exit 0"
      expected_exit_code: 0
    remediation:
      mechanism: manual
      description: "nftables service is not active."
