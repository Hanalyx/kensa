id: pam-wheel-su-configured
title: Ensure the su command requires wheel-group membership (pam_wheel)
description: >
  /etc/pam.d/su must contain `auth required pam_wheel.so use_uid` so that only
  members of the wheel group may use su. (STIG expects the wheel group to hold
  the authorized administrators — it does NOT require an empty wheel group; the
  empty-wheel form is the stricter CIS 5.2.7 variant, covered by pam-wheel-su.)
rationale: >
  Without pam_wheel, any user can attempt su to another account; restricting su
  to the wheel group limits privilege escalation to authorized administrators.
severity: medium
transactional: false
category: access-control
tags: [pam, su, wheel, privilege-escalation, stig]
references:
  stig:
    rhel9: { vuln_id: "V-258088", stig_id: "RHEL-09-432035", severity: "CAT II" }
  nist_800_53: ["AC-6"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "grep -qE '^[[:space:]]*auth[[:space:]]+required[[:space:]]+pam_wheel\\.so([[:space:]]|$).*use_uid|^[[:space:]]*auth[[:space:]]+required[[:space:]]+pam_wheel\\.so[[:space:]]+use_uid' /etc/pam.d/su"
      expected_exit: 0
    remediation:
      mechanism: pam_module_configure
      service: su
      module: pam_wheel.so
      type: auth
      control: required
      args: use_uid
