id: pkg-telnet-server-absent
title: Ensure telnet-server package is not installed
description: 'The telnet-server package provides the telnet daemon which allows remote logins using the insecure telnet protocol.
  This package must not be installed.

  '
rationale: 'Telnet transmits all data including authentication credentials in cleartext. The telnet server must not be installed
  as it provides an insecure remote access mechanism.

  '
severity: critical
category: services
tags:
- package
- telnet
- server
- attack-surface
references:
  stig:
    rhel10: { vuln_id: "V-280944", stig_id: "RHEL-10-200020", severity: "CAT I" }
    rhel9:
      vuln_id: V-257831
      stig_id: RHEL-09-215040
      severity: CAT I
    rhel8:
      vuln_id: V-230487
      severity: CAT I
    ubuntu24:
      vuln_id: V-270647
      stig_id: UBTU-24-100030
      severity: CAT I
    ubuntu22:
      vuln_id: V-260483
      stig_id: UBTU-22-215035
      severity: CAT I
  nist_800_53:
  - CM-7
  - SC-8
  - IA-5
platforms:
- family: ubuntu
  min_version: 22
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: telnetd
    state: absent
  remediation:
    mechanism: apt_absent
    name: telnetd
- default: true
  check:
    method: package_state
    name: telnet-server
    state: absent
  remediation:
    mechanism: package_absent
    name: telnet-server
