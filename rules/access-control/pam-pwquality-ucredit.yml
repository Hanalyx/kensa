id: pam-pwquality-ucredit
title: Require uppercase character in password
description: >
  The ucredit parameter in /etc/security/pwquality.conf controls the credit
  given for having uppercase characters in the password. A negative value
  requires at least that many uppercase characters.
rationale: >
  Requiring uppercase characters increases password complexity and makes
  passwords more resistant to dictionary attacks.
severity: medium
category: access-control
tags: [pam, password, authentication, pwquality]

depends_on: [package-libpwquality-installed]

references:
  cis:
    rhel8:  { section: "5.3.3.2.3", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.2.3", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.3.2.3", level: "L1", type: "Manual" }
    ubuntu22: { section: "5.3.3.2.3", level: "L1", type: "Manual" }
    rhel9:  { section: "5.3.3.2.3", level: "L1", type: "Manual" }
  stig:
    rhel9:
      vuln_id: "V-258111"
      stig_id: "RHEL-09-611110"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230357"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270726"
      stig_id: "UBTU-24-400260"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260560"
      stig_id: "UBTU-22-611010"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281184"
      stig_id: "RHEL-10-600250"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(a)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "ucredit"
      expected: "-1"
      comparator: "<="
      dropin_dir: "/etc/security/pwquality.conf.d"
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/security/pwquality.conf.d"
      file: "50-kensa-ucredit.conf"
      key: "ucredit"
      value: "-1"
      separator: " = "
