id: gdm-no-autologin
title: Disable automatic logon via graphical user interface
description: >
  The GNOME Display Manager (GDM) must not be configured to allow unattended
  or automatic logon. The AutomaticLoginEnable setting in /etc/gdm/custom.conf
  must be set to false.
rationale: >
  Unattended or automatic logon bypasses authentication mechanisms and allows
  anyone with physical access to the system to gain access without credentials.
  This eliminates accountability and audit trail for physical access.
severity: high
category: system
tags: [gdm, graphical, autologin, authentication, stig]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230329"
      severity: "CAT I"
  nist_800_53: ["AC-3", "IA-2", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: >
        if ! rpm -q gdm &>/dev/null; then exit 0; fi
        val=$(grep -i '^\s*AutomaticLoginEnable\s*=' /etc/gdm/custom.conf 2>/dev/null |
              awk -F= '{print $2}' | tr -d ' ' | tr '[:upper:]' '[:lower:]')
        [ "$val" = "false" ] || [ -z "$val" ]
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/gdm/custom.conf"
      key: "AutomaticLoginEnable"
      value: "false"
      separator: "="
