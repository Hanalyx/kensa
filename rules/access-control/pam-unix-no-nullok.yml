id: pam-unix-no-nullok
title: Ensure pam_unix does not include nullok
description: >
  The pam_unix module should not include the nullok option, which allows
  users with empty passwords to authenticate.
rationale: >
  The nullok option permits users to login without a password if their
  password field is empty. This is a significant security risk.
severity: high
category: access-control
tags: [pam, authentication, password, security]

references:
  cis:
    rhel9_v2: { section: "5.3.3.4.1", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: authselect
    check:
      method: command
      run: |
        if grep -rE 'pam_unix\.so.*nullok' /etc/pam.d/ 2>/dev/null | grep -v '^#'; then
          echo "FAIL: nullok found in pam_unix configuration"
          exit 1
        fi
        echo "OK: nullok not configured for pam_unix"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "authselect enable-feature without-nullok"

  - default: true
    check:
      method: command
      run: |
        if grep -rE 'pam_unix\.so.*nullok' /etc/pam.d/ 2>/dev/null | grep -v '^#'; then
          echo "FAIL: nullok found in pam_unix configuration"
          exit 1
        fi
        echo "OK: nullok not configured for pam_unix"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "sed -i 's/nullok//g' /etc/pam.d/system-auth /etc/pam.d/password-auth"
