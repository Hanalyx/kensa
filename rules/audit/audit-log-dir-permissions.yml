id: audit-log-dir-permissions
title: Set permissions on audit log directory
description: >
  The /var/log/audit directory must have restrictive permissions (0700 or
  more restrictive) to prevent unauthorized access to audit logs.
rationale: >
  Audit logs contain sensitive security information about system activity.
  Unrestricted access could allow attackers to read logs to understand
  detection capabilities or modify/delete logs to cover their tracks.
severity: high
category: audit
tags: [audit, permissions, logging, security]

depends_on: [auditd-enabled]

references:
  cis:
    rhel9:  { section: "6.3.4.1", level: "L1", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-230399"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270830"
      stig_id: "UBTU-24-901380"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260600"
      stig_id: "UBTU-22-653060"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281051"
      stig_id: "RHEL-10-400170"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-258166"
      stig_id: "RHEL-09-653085"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: ubuntu
    min_version: 22
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/var/log/audit"
      mode: "0700"
      owner: "root"
      group: "root"
    remediation:
      mechanism: file_permissions
      path: "/var/log/audit"
      mode: "0700"
      owner: "root"
      group: "root"
