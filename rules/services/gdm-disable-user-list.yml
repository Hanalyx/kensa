id: gdm-disable-user-list
title: Ensure GDM disable-user-list option is enabled
description: >
  If GNOME Display Manager is in use, the user list should be disabled
  to prevent username enumeration.
rationale: >
  Displaying usernames at login provides information that could be
  used in brute force attacks. Disabling the list improves security.
severity: medium
category: services
tags: [gdm, gnome, user-list, security]

conflicts_with: [gdm-removed]

references:
  cis:
    rhel9_v2: { section: "1.8.3", level: "L1", type: "Automated" }
  nist_800_53: ["AC-9"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if user list is disabled
        if grep -qr "disable-user-list=true" /etc/dconf/db/gdm.d/ 2>/dev/null; then
          echo "OK: GDM user list is disabled"
          exit 0
        fi
        echo "FAIL: GDM user list is not disabled"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Disable GDM user list in /etc/dconf/db/gdm.d/00-login-screen:
        [org/gnome/login-screen]
        disable-user-list=true
        Then run: dconf update

  - default: true
    check:
      method: package_state
      name: "gdm"
      state: "absent"
    remediation:
      mechanism: package_absent
      name: "gdm"
