spec:
    id: handler-kernel-module-disable
    version: 0.2.0
    status: draft
    tier: 1
    context:
        system: kensa
        feature: handler-kernel-module-disable
        description: |
            The kernel_module_disable handler blacklists a kernel module
            in /etc/modprobe.d/ and unloads it from the running kernel.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Blacklist a kernel module persistently and unload it.
            Rollback removes the blacklist file.
        scope:
            includes:
                - blacklist + install /bin/true in /etc/modprobe.d/
                - modprobe -r (best-effort unload)
                - capture of prior blacklist file state and module load-state
                - rollback removing/restoring the blacklist file
                - rollback re-loading a was-loaded module (modprobe) and verifying via /proc/modules
            excludes:
                - reimplementing the module loader (modprobe is reused for re-load)
    constraints:
        - id: C-01
          description: Apply MUST write blacklist and install entries. Idempotent.
          type: technical
          enforcement: error
        - id: C-02
          description: Capture records file_existed, prior_content, and was_loaded.
          type: security
          enforcement: error
        - id: C-03
          description: |
              Rollback removes the blacklist file when file_existed=false
              or restores prior_content when file_existed=true.
          type: security
          enforcement: error
        - id: C-04
          description: |
              When the module was loaded at capture (was_loaded=true),
              Rollback MUST re-load it via modprobe and verify it is loaded
              again by reading /proc/modules back: a confirmed re-load is a
              clean success; a module that does not return is a
              verified-partial restore (Success=false, PartialRestore=true)
              with a remedy. A module not loaded at capture needs no re-load.
          type: security
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: Apply writes blacklist file and runs modprobe -r.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: Capture records prior blacklist file state.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: Rollback removes blacklist file when absent at capture.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: |
              Capture records was_loaded; rollback re-loads a was-loaded
              module and verifies via /proc/modules — a confirmed re-load is
              a clean success, a module that stays unloaded is a
              verified-partial restore with a remedy.
          references_constraints: [C-04]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    tags: [handler, capturable, tier-1, kernel, module]
