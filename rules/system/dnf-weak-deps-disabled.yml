id: dnf-weak-deps-disabled
title: Ensure weak dependencies are not installed by dnf
description: >
  DNF must be configured with install_weak_deps=False in /etc/dnf/dnf.conf so
  optional "weak" dependencies (Recommends/Suggests) are not installed, keeping
  the package footprint minimal.
rationale: >
  Weak dependencies pull in software that was not explicitly requested, enlarging
  the attack surface with packages the operator did not intend to install.
severity: low
transactional: false
category: system
tags: [dnf, packages, weak-deps, attack-surface, cis]
references:
  cis:
    rhel8: { section: "1.2.1.5", level: "L2", type: "Automated" }
    rhel10: { section: "1.2.1.5", level: "L2", type: "Automated" }
  nist_800_53: ["CM-7"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "grep -qiE '^[[:space:]]*install_weak_deps[[:space:]]*=[[:space:]]*(False|0|no)[[:space:]]*$' /etc/dnf/dnf.conf"
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/dnf/dnf.conf"
      key: "install_weak_deps"
      value: "False"
      separator: "="
