id: pam-pwhistory-use-authtok
title: Ensure pam_pwhistory includes use_authtok
description: >
  The pam_pwhistory module should use the use_authtok option to use
  the password from the previous PAM module in the stack.
rationale: >
  The use_authtok option ensures password history checking uses the
  password that was already validated by earlier PAM modules.
severity: medium
category: access-control
tags: [pam, password, pwhistory, security]

depends_on: [pam-pwhistory-enabled]

references:
  cis:
    rhel9: { section: "5.3.3.3.3", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: authselect
    check:
      method: command
      run: |
        # Check pwhistory.conf for use_authtok (authselect-managed)
        if grep -qE '^\s*use_authtok' /etc/security/pwhistory.conf 2>/dev/null; then
          echo "OK: use_authtok set in pwhistory.conf"
          exit 0
        fi
        if grep -qE 'pam_pwhistory\.so.*use_authtok' /etc/pam.d/system-auth 2>/dev/null; then
          echo "OK: use_authtok set in system-auth"
          exit 0
        fi
        echo "FAIL: pam_pwhistory does not include use_authtok"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_append
      path: "/etc/security/pwhistory.conf"
      line: "use_authtok"

  - default: true
    check:
      method: command
      run: |
        if grep -qE 'pam_pwhistory\.so.*use_authtok' /etc/pam.d/system-auth 2>/dev/null; then
          echo "OK: pam_pwhistory includes use_authtok"
          exit 0
        fi
        echo "FAIL: pam_pwhistory does not include use_authtok"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_append
      path: "/etc/security/pwhistory.conf"
      line: "use_authtok"
