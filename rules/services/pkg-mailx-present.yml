id: pkg-mailx-present
title: Ensure mailx package is installed
description: >
  The mailx package provides the mail command used to send email
  notifications. It must be installed so the system can deliver
  administrative and audit alerts.
rationale: >
  Several controls depend on the system being able to send email
  alerts, such as audit storage warnings and account-action
  notifications. Without a mail-sending command like mailx, those
  notifications cannot be delivered.
severity: medium
category: services
tags: [package, mail, notification]

references:
  stig:
    rhel8:
      vuln_id: V-256974
      stig_id: RHEL-08-010358
      severity: CAT II
  nist_800_53: ["CM-3(5)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: package_state
      name: mailx
      state: present
    remediation:
      mechanism: package_present
      name: mailx
