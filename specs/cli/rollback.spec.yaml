kind: CLICommand
metadata:
  name: Rollback
  module: cli
  version: 1.0.0
  status: approved
  system_spec: system.spec.yaml@1.0.0
  created: "2025-02-10"
  updated: "2025-02-25"

context:
  description: >
    Inspect past remediation sessions and optionally execute rollback from
    stored pre-state snapshots. Three mutually exclusive modes: list sessions,
    show session details, or execute rollback.
  technical_context: >
    Module runner/cli.py -> rollback(). Click decorators: @main.command(),
    individual options (no shared option groups). Three sub-modes: --list,
    --info ID, --start ID (mutually exclusive).
  dependencies:
    - runner.storage.ResultStore
    - runner.inventory (for --start)
    - runner._host_runner (for --start SSH)
    - runner._orchestration.rollback_from_stored
  callers:
    - CLI entry point (kensa rollback)

objective:
  summary: >
    Inspect past remediation sessions and optionally execute rollback from
    stored pre-state snapshots. Three mutually exclusive modes: list sessions,
    show session details, or execute rollback.
  acceptance_criteria:
    AC-1: "No mode flag exits 1 with 'Specify --list, --info ID, or --start ID'."
    AC-2: "Multiple mode flags exits 1 with 'Only one of' error."
    AC-3: "'--list' with no sessions prints 'No remediation sessions found'."
    AC-4: "'--list' with sessions exits 0 and displays table."
    AC-5: "'--list --json' outputs valid JSON array."
    AC-6: "'--info' with valid session exits 0 and displays session metadata."
    AC-7: "'--info' with nonexistent session exits 1 with 'not found'."
    AC-8: "'--info --json' outputs valid JSON object."
    AC-9: "'--info --detail' includes per-step pre-state data."
    AC-10: "'--start' without '--host'/'--limit' exits 1."
    AC-11: "'--start' with host not in session exits 1 with stored hosts listed."
    AC-12: "'--start' with stale snapshot (>7 days) without '--force' exits 1."
    AC-13: "'--start --force' overrides stale snapshot warning."
    AC-14: "'--start --dry-run' shows what would be rolled back without executing."
    AC-15: "'--list --host' filters sessions by host."
    AC-16: "'--info --rule' filters to a specific rule."
    AC-17: "Already-rolled-back steps are skipped unless '--force'."
    AC-18: "'--start' with nonexistent session exits 1."

constraints:
  - "MUST require exactly one of '--list', '--info', '--start'."
  - "MUST require '--host' or '--limit' for '--start' mode."
  - "MUST check stale snapshot age (>7 days) and require '--force' to proceed."
  - "MUST report non-rollbackable (non-capturable) steps in '--info' output."

input_contract:
  - field: --list
    type: bool
    required: false
    default: "false"
    description: List recent remediation sessions
  - field: --info
    type: int
    required: false
    default: null
    description: Show details for a remediation session
  - field: --start
    type: int
    required: false
    default: null
    description: Execute rollback from stored snapshots
  - field: --detail
    type: bool
    required: false
    default: "false"
    description: Show per-step pre-state data (with --info)
  - field: --rule
    type: str
    required: false
    default: null
    description: Filter to a specific rule
  - field: --host / -h
    type: str
    required: false
    default: null
    description: Target host (--start) or filter (--list/--info)
  - field: --inventory / -i
    type: str
    required: false
    default: null
    description: Inventory file for SSH credentials
  - field: --limit / -l
    type: str
    required: false
    default: null
    description: Host glob pattern
  - field: --max / -n
    type: int
    required: false
    default: "20"
    description: Max sessions to list
  - field: --json
    type: bool
    required: false
    default: "false"
    description: Output as JSON
  - field: --user / -u
    type: str
    required: false
    default: null
    description: SSH username
  - field: --key / -k
    type: str
    required: false
    default: null
    description: SSH private key path
  - field: --password / -p
    type: str
    required: false
    default: null
    description: SSH password
  - field: --port / -P
    type: int
    required: false
    default: "22"
    description: SSH port
  - field: --sudo
    type: bool
    required: false
    default: "false"
    description: Run commands via sudo
  - field: --strict-host-keys / --no-strict-host-keys
    type: bool
    required: false
    default: "false"
    description: Verify SSH host keys
  - field: --dry-run
    type: bool
    required: false
    default: "false"
    description: Show what would be rolled back (--start)
  - field: --force
    type: bool
    required: false
    default: "false"
    description: Override stale/already-rolled-back warnings

behavior:
  - "Validate exactly one mode flag is set; exit 1 if zero or >1."
  - "'--list' mode: Query ResultStore.list_remediation_sessions(), display table or JSON."
  - "'--info' mode: Query session by ID, display detailed remediation info or JSON."
  - >
    '--start' mode:
    (a) Require --host or --limit; exit 1 if missing.
    (b) Validate session exists and has remediations for the target host.
    (c) Check for stale snapshots (>7 days); exit 1 unless --force.
    (d) Check for already-rolled-back steps; skip unless --force.
    (e) Connect via SSH and execute rollback from stored pre-state data.

exit_codes:
  - code: 0
    condition: "Successful list/info/start"
  - code: 1
    condition: "No mode specified, multiple modes, session not found, host not found in session, host mismatch, stale snapshot (without --force), SSH failure"

output_contract:
  returns: Terminal output or JSON
  modes:
    list_terminal: "Rich table with columns: ID, Timestamp, Host(s), Rules, Fixed, Fail, Rolled Back."
    list_json: "JSON array of session objects."
    info_terminal: "Session metadata, counts, remediated rules summary, non-rollbackable steps, optional step details."
    info_json: "JSON object with session data, summary, remediations array."
    start_terminal: "Per-step rollback progress, success/fail summary."

side_effects:
  - "SQLite reads: All modes read from .kensa/results.db."
  - "SQLite writes: --start records rollback events."
  - "Remote changes: --start executes rollback commands over SSH."

testing:
  spec_derived:
    file: tests/test_cli_spec.py
    classes:
      - TestRollbackSpecDerived
    count: 12
