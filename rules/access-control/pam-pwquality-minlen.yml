id: pam-pwquality-minlen
title: Set minimum password length
description: 'The minlen parameter in /etc/security/pwquality.conf sets the minimum
  acceptable size for new passwords. Longer passwords are more resistant to brute-force
  attacks.

  '
rationale: 'Password length is one of the most important factors in password strength.
  A minimum of 14 characters is recommended for strong security.

  '
severity: high
category: access-control
tags:
- pam
- password
- authentication
- pwquality
depends_on:
- package-libpwquality-installed
references:
  cis:
    rhel8:
      section: 5.3.3.2.2
      level: L1
      type: Automated
    rhel9:  { section: "5.3.3.2.2", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.2.2", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.3.2.2", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.3.3.2.2", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: V-258107
      stig_id: RHEL-09-611090
      severity: CAT II
    rhel8:
      vuln_id: V-230369
      severity: CAT II
    ubuntu24:
      vuln_id: V-270732
      stig_id: UBTU-24-400320
      severity: CAT II
    ubuntu22:
      vuln_id: V-260565
      stig_id: UBTU-22-611035
      severity: CAT II
    rhel10:
      vuln_id: "V-281181"
      stig_id: "RHEL-10-600220"
      severity: "CAT II"
  nist_800_53:
  - IA-5(1)(a)
  - IA-5
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    method: config_value
    path: /etc/security/pwquality.conf
    key: minlen
    expected: '{{ pam_pwquality_minlen }}'
    comparator: '>='
    dropin_dir: /etc/security/pwquality.conf.d
  remediation:
    mechanism: config_set_dropin
    dir: /etc/security/pwquality.conf.d
    file: 50-kensa-minlen.conf
    key: minlen
    value: '{{ pam_pwquality_minlen }}'
    separator: ' = '
