id: rsyslog-service-enabled
title: Enable rsyslog service
description: 'The rsyslog service must be enabled and running to provide system logging
  capabilities.

  '
rationale: 'Rsyslog collects and processes system log messages which are essential
  for security monitoring and incident response.

  '
severity: medium
category: services
tags:
- service
- logging
- rsyslog
depends_on:
- pkg-rsyslog-present
references:
  cis:
    rhel9:
      section: 6.2.3.2
      level: L1
      type: Automated
    rhel8:
      section: 6.2.2.2
      level: L1
      type: Automated
  stig:
    rhel9:
      vuln_id: V-258142
      stig_id: RHEL-09-652020
      severity: CAT II
    rhel8:
      vuln_id: V-230298
      severity: CAT II
    ubuntu24:
      vuln_id: V-270653
      stig_id: UBTU-24-100200
      severity: CAT II
    ubuntu22:
      vuln_id: V-260588
      stig_id: UBTU-22-652010
      severity: CAT II
  nist_800_53:
  - AU-4
  - AU-12
  - AU-2
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    method: service_state
    name: rsyslog
    active: true
    enabled: true
  remediation:
    mechanism: service_enabled
    name: rsyslog
    start: true
