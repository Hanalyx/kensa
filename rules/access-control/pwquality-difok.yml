id: pwquality-difok
title: Ensure password number of changed characters is configured
description: >
  The difok setting in /etc/security/pwquality.conf must be properly configured.
rationale: >
  Improper difok configuration could weaken system security controls.
severity: medium
category: access-control
tags: [pam, password, pwquality]

references:
  cis:
    rhel9: { section: "5.3.3.2.1", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "difok"
      expected: "{{ pam_pwquality_difok }}"
      comparator: ">="
    remediation:
      mechanism: config_set
      path: "/etc/security/pwquality.conf"
      key: "difok"
      value: "{{ pam_pwquality_difok }}"
      separator: " = "
