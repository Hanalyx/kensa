id: auditd-flush
title: Configure auditd to periodically flush audit records to disk
description: >
  The auditd freq parameter must be configured to periodically
  flush audit records to disk.
rationale: >
  Without periodic flushing, audit records held only in memory
  could be lost during a system crash, destroying evidence of
  security events that occurred before the crash.
severity: medium
category: audit
tags: [audit, auditd, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9:
      vuln_id: "V-258168"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AU-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/audit/auditd.conf"
      key: "freq"
      expected: "50"
    remediation:
      mechanism: config_set
      path: "/etc/audit/auditd.conf"
      key: "freq"
      value: "50"
      separator: " = "
      restart: "auditd"
