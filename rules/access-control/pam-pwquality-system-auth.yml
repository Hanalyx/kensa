id: pam-pwquality-system-auth
title: Enable pam_pwquality module in /etc/pam.d/system-auth
description: >
  The pam_pwquality.so module must be enabled in /etc/pam.d/system-auth
  to enforce password complexity requirements during password changes.
rationale: >
  Without pam_pwquality in the system-auth PAM configuration, password
  complexity rules will not be enforced for authentication paths that use
  system-auth, allowing weak passwords to be set.
severity: medium
category: access-control
tags: [pam, pwquality, password-complexity, system-auth]

references:
  stig:
    rhel9:
      vuln_id: "V-258098"
      stig_id: "RHEL-09-611020"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-251713"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: authselect
    check:
      method: command
      run: >
        grep -qE '^\s*password\s+.*pam_pwquality\.so'
        /etc/pam.d/system-auth 2>/dev/null
      expected_exit: 0
    remediation:
      mechanism: authselect_feature_enable
      feature: with-pwquality
  - default: true
    check:
      method: command
      run: >
        grep -qE '^\s*password\s+.*pam_pwquality\.so'
        /etc/pam.d/system-auth 2>/dev/null
      expected_exit: 0
    remediation:
      mechanism: pam_module_configure
      service: system-auth
      module: pam_pwquality.so
      type: password
      control: requisite
      args: "local_users_only"
