id: service-disable-smb
title: Ensure samba file server services are not in use
description: >
  The smb service should be stopped and masked unless required by the organization.
rationale: >
  Unnecessary services increase the attack surface. Disabling unused services reduces the number of potential entry points.
severity: medium
category: services
tags: [service, attack-surface]

references:
  cis:
    rhel9_v2: { section: "2.1.6", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: service_state
      name: "smb"
      active: false
      enabled: false
    remediation:
      mechanism: service_masked
      name: "smb"
