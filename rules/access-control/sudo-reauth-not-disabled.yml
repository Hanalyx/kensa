id: sudo-reauth-not-disabled
title: Ensure re-authentication for privilege escalation is not disabled globally
description: >
  The sudo timestamp_timeout should not be set to a negative value, which
  would disable re-authentication requirements entirely.
rationale: >
  Disabling sudo re-authentication by setting a negative timeout means
  users only need to authenticate once per session, reducing security.
severity: medium
transactional: false
category: access-control
tags: [sudo, authentication, timeout, privilege-escalation]

depends_on: [package-sudo-installed]

references:
  cis:
    rhel8: { section: "5.2.5", level: "L1", type: "Automated" }
    rhel9: { section: "5.2.5", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.2.5", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.2.5", level: "L1", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-251712"
      severity: "CAT II"
    ubuntu24:                                                                # rule checks 'no !authenticate' (+ non-negative timestamp_timeout); V-270707 is the !authenticate control.
      vuln_id: "V-270707"
      stig_id: "UBTU-24-300021"
      severity: "CAT II"
      cci: ["CCI-000366"]
    ubuntu22:                                                                # V-260558's check is 'egrep -iR !authenticate' — the same !authenticate control this rule verifies (its title also names NOPASSWD, but the check is !authenticate only).
      vuln_id: "V-260558"
      stig_id: "UBTU-22-432010"
      severity: "CAT II"
      cci: ["CCI-002038", "CCI-004895"]
  nist_800_53: ["IA-11", "AC-6"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        fail=0
        # Check for negative timestamp_timeout (disables re-auth)
        timeout=$(sudo -V 2>/dev/null | grep -i 'timestamp timeout' | grep -oE '[-]?[0-9]+\.?[0-9]*' || echo "5")
        timeout_int=$(echo "$timeout" | cut -d. -f1)
        if [ "$timeout_int" -lt 0 ] 2>/dev/null; then
          echo "FAIL: timestamp_timeout is negative ($timeout), re-auth disabled"
          fail=1
        fi
        # Check for !authenticate in sudoers
        if grep -rE '^\s*[^#].*!authenticate' /etc/sudoers /etc/sudoers.d/ 2>/dev/null; then
          echo "FAIL: !authenticate found in sudoers"
          fail=1
        fi
        # PAM sudo configuration is verified by sudoers-reauth-required;
        # standard RHEL uses "auth include system-auth" in /etc/pam.d/sudo,
        # so grepping for direct module lines here false-fails compliant hosts.
        [ "$fail" -eq 0 ] && echo "OK: re-authentication not disabled"
        exit $fail
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Remove negative timestamp_timeout values and !authenticate from
        sudoers. PAM configuration for sudo is covered separately by
        sudoers-reauth-required.
