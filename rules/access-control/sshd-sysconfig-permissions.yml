id: sshd-sysconfig-permissions
title: Ensure access to /etc/sysconfig/sshd is configured
description: >
  The /etc/sysconfig/sshd file (SSH daemon environment settings) must be owned by
  root:root and mode 0640 or more restrictive (no group write/execute, no access
  for others), so only root can alter the SSH daemon's startup configuration.
rationale: >
  A writable or world-readable /etc/sysconfig/sshd could let a non-root user alter
  SSH daemon behavior or learn its configuration.
severity: medium
transactional: false
category: access-control
tags: [ssh, permissions, sysconfig, cis]
references:
  cis:
    rhel8: { section: "5.1.3", level: "L1", type: "Automated" }
  nist_800_53: ["AC-6", "CM-6"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        f=/etc/sysconfig/sshd
        [ -e "$f" ] || { echo "NOT APPLICABLE: $f absent"; exit 0; }
        mode=$(stat -c '%a' "$f" 2>/dev/null); own=$(stat -c '%U:%G' "$f" 2>/dev/null)
        # 0640 or more restrictive: no group write/exec, no access for others.
        if [ "$own" = "root:root" ] && [ "$(( 0$mode & 037 ))" -eq 0 ]; then
          echo "OK: $f is $own mode $mode"
          exit 0
        fi
        echo "FAIL: $f is $own mode $mode (want root:root, 0640 or more restrictive)"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: file_permissions
      path: "/etc/sysconfig/sshd"
      owner: "root"
      group: "root"
      mode: "0640"
