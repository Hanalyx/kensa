id: usbguard-enabled
title: Ensure USBGuard service is enabled
description: >
  The usbguard service must be enabled to enforce USB device
  authorization policies.
rationale: >
  Without USBGuard running, USB device authorization policies
  are not enforced, allowing any USB device to connect.
severity: medium
category: services
tags: [service, usb, security]

depends_on: [pkg-usbguard-present]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258036"
      severity: "CAT II"
  nist_800_53: ["CM-7", "IA-3"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: service_state
      name: "usbguard"
      enabled: true
      active: true
    remediation:
      mechanism: service_enabled
      name: "usbguard"
