id: selinux-no-unconfined-services
title: Ensure no unconfined services exist
description: >
  No running service should be in the unconfined_service_t SELinux domain.
  Unconfined services run without SELinux policy restriction and defeat the
  mandatory-access-control protection SELinux provides.
rationale: >
  A service running unconfined is not constrained by SELinux policy, so a
  compromise of that service is not contained by the mandatory-access-control
  layer. Every service should run in a confined domain.
severity: medium
transactional: false
category: access-control
tags: [selinux, mandatory-access-control, services]

references:
  cis:
    rhel9:  { section: "1.3.1.6", level: "L2", type: "Manual" }
    rhel8:  { section: "1.3.1.6", level: "L2", type: "Manual" }
    rhel10: { section: "1.3.1.6", level: "L2", type: "Manual" }
  nist_800_53: ["AC-6", "SC-3"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        n=$(ps -eZ 2>/dev/null | grep -c unconfined_service_t)
        if [ "$n" -ne 0 ]; then
          echo "FAIL: $n service(s) running in unconfined_service_t"
          exit 1
        fi
        echo "OK: no unconfined services"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Investigate each service reported by `ps -eZ | grep
        unconfined_service_t` and confine it with an appropriate SELinux
        policy module, or remove the service if unneeded.
