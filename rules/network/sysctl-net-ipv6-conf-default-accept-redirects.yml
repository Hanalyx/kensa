id: sysctl-net-ipv6-conf-default-accept-redirects
title: Ensure net.ipv6.conf.default.accept_redirects is set to 0
description: >
  The kernel parameter net.ipv6.conf.default.accept_redirects must be set to 0 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  stig:
    rhel10:
      vuln_id: "V-281359"
      stig_id: "RHEL-10-800270"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230535"
      stig_id: "RHEL-08-040210"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257976"
      stig_id: "RHEL-09-254035"
      severity: "CAT II"

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv6.conf.default.accept_redirects
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv6.conf.default.accept_redirects
      value: "0"
