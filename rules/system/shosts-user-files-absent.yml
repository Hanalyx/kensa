id: shosts-user-files-absent
title: Ensure no .shosts files exist in user home directories
description: >
  Per-user .shosts files grant trusted access to remote hosts without
  password authentication. These files must not exist in any user's
  home directory.
rationale: >
  User .shosts files allow remote rsh/rlogin access without authentication
  from trusted hosts. An attacker controlling a trusted host can gain
  access to local accounts. All .shosts files must be removed.
severity: critical
category: system
tags: [authentication, rsh, trust, attack-surface]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230284"
      severity: "CAT I"
  nist_800_53: ["AC-17", "IA-2"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "find /home /root -name .shosts 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "find /home /root -name .shosts 2>/dev/null -exec rm -f {} +"
