kind: CheckHandler
metadata:
  name: FileNotExists
  module: handlers/checks
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Verifies that a file does NOT exist on a remote host. Used for ensuring
    insecure or deprecated files have been removed.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check when
    check["method"] == "file_not_exists". Implemented in
    runner/handlers/checks/_file.py as _check_file_not_exists.
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
    - runner.ssh.SSHSession
    - datetime
  callers:
    - runner.engine.run_check
  related_specs:
    - file_exists.spec.yaml
    - file_permission.spec.yaml

objective:
  summary: >
    Execute test -e on a remote path and return pass when the file is
    absent, fail when it exists. Returns a CheckResult with structured
    Evidence for audit purposes.
  acceptance_criteria:
    AC-1: "File absent (exit code non-zero) returns passed=True."
    AC-2: "File present (exit code 0) returns passed=False."
    AC-3: "Evidence method is always 'file_not_exists'."
    AC-4: "Detail format is '{path}: not present (as required)' on pass and '{path}: exists (should be absent)' on fail."
    AC-5: "Evidence expected is always 'absent'."

constraints:
  - "MUST use shell_util.quote() to escape the path for safe shell interpolation."
  - "MUST capture check_time before executing the SSH command."
  - "MUST set evidence.method to 'file_not_exists' in all code paths."
  - "MUST set evidence.expected to 'absent' in all code paths."
  - "MUST set evidence.actual to 'absent' on pass and 'exists' on fail."
  - "MUST NOT modify any remote state (pure measurement)."

input_contract:
  - field: path
    type: str
    required: true
    description: Absolute path to the file that should not exist.

behavior:
  - "Extract path from c['path'] (required key)."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: f'test -e {shell_util.quote(path)}'."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If not result.ok (file absent): return CheckResult(passed=True) with
    detail f"{path}: not present (as required)" and evidence
    actual="absent".
  - >
    If result.ok (file present): return CheckResult(passed=False) with
    detail f"{path}: exists (should be absent)" and evidence
    actual="exists".

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass_absent:
      passed: true
      detail: "'{path}: not present (as required)'"
    fail_exists:
      passed: false
      detail: "'{path}: exists (should be absent)'"
  evidence_fields:
    method: "file_not_exists"
    command: "test -e {quoted_path}"
    stdout: Raw stdout from test command
    stderr: Raw stderr from test command
    exit_code: Actual exit code from test command
    expected: "absent"
    actual: "'absent' on pass, 'exists' on fail"
    timestamp: UTC datetime captured before command execution
  detail_formats:
    - "{path}: not present (as required)"
    - "{path}: exists (should be absent)"
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'file_not_exists'."
    - "evidence.expected is always 'absent'."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestFileNotExists
      - TestFileNotExistsSpecDerived
    count: 5
