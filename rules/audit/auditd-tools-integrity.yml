id: auditd-tools-integrity
title: Ensure cryptographic mechanisms are used to protect the integrity of audit
  tools
description: 'AIDE or another file integrity monitoring tool should verify the integrity
  of audit binaries to detect unauthorized modifications.

  '
rationale: 'Audit tools are critical for security. If an attacker modifies them, they
  could hide malicious activity. Integrity checking ensures tampering is detected.

  '
severity: high
category: audit
tags:
- audit
- integrity
- aide
- security
depends_on:
- auditd-enabled
references:
  cis:
    rhel8:
      section: 6.1.3
      level: L1
      type: Automated
    rhel9:
      section: 6.1.3
      level: L1
      type: Automated
  stig:
    rhel8:
      vuln_id: V-230475
      severity: CAT II
  nist_800_53:
  - AU-9
  - SI-7
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: command
    run: "# Check if AIDE is configured to monitor audit binaries\nif [ -f /etc/aide.conf\
      \ ]; then\n  missing=\"\"\n  for bin in auditctl aureport ausearch autrace auditd\
      \ rsyslogd augenrules; do\n    if ! grep -qE \"/sbin/$bin|/usr/sbin/$bin\" /etc/aide.conf\
      \ 2>/dev/null; then\n      missing=\"$missing $bin\"\n    fi\n  done\n  if [\
      \ -z \"$missing\" ]; then\n    echo \"OK: AIDE monitors all audit tools\"\n\
      \    exit 0\n  fi\nfi\necho \"FAIL: Audit tool integrity monitoring not configured${missing:+\
      \ (missing:$missing)}\"\nexit 1\n"
    expected_exit: 0
  remediation:
    mechanism: manual
    note: 'Configure AIDE to monitor audit binaries. Add to /etc/aide.conf: /sbin/auditctl
      p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/rsyslogd p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512

      '
