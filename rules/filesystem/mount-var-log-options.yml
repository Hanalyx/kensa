id: mount-var-log-options
title: Set mount options on /var/log
description: >
  The /var/log partition should have nodev, nosuid, and noexec
  mount options set to prevent device files, setuid binaries, and
  executable files in the log directory.
rationale: >
  Restrictive mount options on /var/log prevent execution of
  malicious code that might be placed in or disguised as log files
  and limit privilege escalation vectors.
severity: medium
category: filesystem
tags: [mount, logging, security]

references:
  cis:
    # one rule sets nodev+nosuid+noexec -> three CIS sub-controls
    rhel9:
      - { section: "1.1.2.6.2", level: "L1", type: "Automated" }   # nodev
      - { section: "1.1.2.6.3", level: "L1", type: "Automated" }   # nosuid
      - { section: "1.1.2.6.4", level: "L1", type: "Automated" }   # noexec
    rhel10: { section: "1.1.2.6.2", level: "L1", type: "Automated" }
    rhel8: { section: "1.1.2.6.2", level: "L1", type: "Automated" }
  stig:
    rhel8:                                                                   # one mount rule sets nodev+nosuid+noexec -> three STIG controls
      - { vuln_id: "V-230514", stig_id: "RHEL-08-040126", severity: "CAT II" }   # nodev
      - { vuln_id: "V-230515", stig_id: "RHEL-08-040127", severity: "CAT II" }   # nosuid
      - { vuln_id: "V-230516", stig_id: "RHEL-08-040128", severity: "CAT II" }   # noexec
    rhel9:
      - { vuln_id: "V-257870", stig_id: "RHEL-09-231145", severity: "CAT II" }   # nodev
      - { vuln_id: "V-257871", stig_id: "RHEL-09-231150", severity: "CAT II" }   # noexec
      - { vuln_id: "V-257872", stig_id: "RHEL-09-231155", severity: "CAT II" }   # nosuid
    rhel10:
      - { vuln_id: "V-281242", stig_id: "RHEL-10-700170", severity: "CAT II" }   # nodev
      - { vuln_id: "V-281243", stig_id: "RHEL-10-700175", severity: "CAT II" }   # noexec
      - { vuln_id: "V-281244", stig_id: "RHEL-10-700180", severity: "CAT II" }   # nosuid
  nist_800_53: ["AC-6", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      checks:
        - method: mount_option
          mount_point: "/var/log"
          options: ["nodev"]
        - method: mount_option
          mount_point: "/var/log"
          options: ["nosuid"]
        - method: mount_option
          mount_point: "/var/log"
          options: ["noexec"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/var/log"
      options: ["nodev", "nosuid", "noexec"]
