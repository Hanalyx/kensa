id: mount-boot-nosuid
title: Ensure nosuid option on /boot partition
description: >
  The nosuid mount option must be set on the /boot partition to prevent
  setuid programs from being executed from the boot filesystem.
rationale: >
  The /boot partition contains boot loader files and kernel images.
  Preventing setuid execution on /boot reduces the attack surface
  by ensuring no setuid programs can be run from the boot filesystem.
severity: medium
category: filesystem
tags: [mount, boot, nosuid, hardening]

references:
  stig:
    rhel8:
      vuln_id: "V-230300"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: mount_option
      mount_point: "/boot"
      options: ["nosuid"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/boot"
      options: ["nosuid"]
