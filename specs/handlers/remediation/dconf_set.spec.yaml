kind: RemediationHandler
metadata:
  name: DconfSet
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-03-13"
  updated: "2026-03-13"

context:
  description: >
    Sets a dconf key in a system database drop-in file, optionally locks
    the setting, and runs dconf update. Used for GDM/GNOME desktop policy
    configuration on RHEL systems.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["dconf_set"]. Implemented in
    runner/handlers/remediation/_system.py as _remediate_dconf_set.
  dependencies:
    - runner.shell_util.quote
    - runner.shell_util.write_file
  callers:
    - runner.handlers.remediation._dispatch_remediation

objective:
  summary: >
    Write a dconf key-value setting to a system database drop-in file,
    optionally create a lock file to prevent user override, and run
    dconf update to apply changes. Supports dry-run preview.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True,
      "Would set dconf {schema}/{key}={value}") and no SSH commands
      are executed.
    AC-2: >
      Setting file written: Writes the key-value pair to
      /etc/dconf/db/{db}.d/{file} in INI format with the schema as
      section header: [{schema}]\n{key}={value}.
    AC-3: >
      Value type prefix: When value_type is provided, the value is
      written as "{value_type} {value}" (e.g., "uint32 900").
    AC-4: >
      Lock file created: When lock is true, creates a lock file at
      /etc/dconf/db/{db}.d/locks/{file} containing the full dconf
      path /{schema}/{key}.
    AC-5: >
      Dconf update executed: After writing files, runs "dconf update"
      to apply the changes to the system database.
    AC-6: >
      Success path: Returns (True, "Set dconf {schema}/{key}={value}")
      when all operations succeed.
    AC-7: >
      Write failure: Returns (False, "Failed to write dconf setting:
      {stderr}") when the file write fails.
    AC-8: >
      Default database: When db is not specified, defaults to "local".
    AC-9: >
      Lock directory creation: Creates the locks directory if it does
      not exist before writing the lock file.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for all path interpolation.
  - MUST run dconf update after writing files.
  - MUST return a 2-tuple (bool, str) from the handler.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "dconf_set"
  - field: schema
    type: str
    required: true
    description: >
      Dconf schema path without leading slash
      (e.g., "org/gnome/login-screen")
  - field: key
    type: str
    required: true
    description: Dconf key name (e.g., "banner-message-enable")
  - field: value
    type: str
    required: true
    description: Value to set (e.g., "true", "900")
  - field: value_type
    type: str
    required: false
    description: >
      Optional dconf value type prefix (e.g., "uint32").
      When present, value is written as "{value_type} {value}".
  - field: file
    type: str
    required: true
    description: >
      Drop-in file name (e.g., "00-security-settings").
      Written to /etc/dconf/db/{db}.d/{file}.
  - field: db
    type: str
    required: false
    description: >
      Dconf database name. Defaults to "local".
      Common values: "local", "gdm".
  - field: lock
    type: bool
    required: false
    description: >
      When true, creates a lock file to prevent user override.

behavior:
  - "Extract fields: Read schema, key, value, file from dict. Read db with default 'local'. Read optional value_type and lock."
  - "Compose value string: If value_type is set, compose '{value_type} {value}'. Otherwise, use value as-is."
  - "Dry-run check: If dry_run=True, return preview."
  - "Write setting file: Write '[{schema}]\\n{key}={composed_value}\\n' to /etc/dconf/db/{db}.d/{file}."
  - "Write lock file: If lock is true, mkdir -p /etc/dconf/db/{db}.d/locks/ and write '/{schema}/{key}\\n' to /etc/dconf/db/{db}.d/locks/{file}."
  - "Run dconf update."
  - "Return success or failure."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would set dconf {schema}/{key}={value}\""
    - "Success: \"Set dconf {schema}/{key}={value}\""
    - "Failure: \"Failed to write dconf setting: {stderr}\""

side_effects:
  - "Creates or overwrites dconf database drop-in files on the remote host."
  - "Optionally creates lock files to prevent user override."
  - "Runs dconf update to recompile the system database."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestDconfSetSpecDerived
    count: 9
