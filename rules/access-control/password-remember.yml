id: password-remember
title: Enforce password history
description: >
  The remember parameter in /etc/security/pwhistory.conf configures PAM
  to remember a specified number of previous passwords and prevent their reuse.
rationale: >
  Password history prevents users from reusing their old passwords, which
  reduces the risk of password-based attacks if old passwords were compromised.
  A minimum of 5 remembered passwords is recommended.
severity: medium
category: access-control
tags: [pam, password, authentication, pwhistory]

references:
  cis:
    rhel8:  { section: "5.4.3", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258052"
      stig_id: "RHEL-09-611115"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)(e)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwhistory.conf"
      key: "remember"
      expected: "5"
      comparator: ">="
    remediation:
      mechanism: config_set
      path: "/etc/security/pwhistory.conf"
      key: "remember"
      value: "5"
      separator: " = "
