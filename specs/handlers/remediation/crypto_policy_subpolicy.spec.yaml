kind: RemediationHandler
metadata:
  name: CryptoPolicySubpolicy
  module: handlers/remediation
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-03-14"
  updated: "2026-03-23"

context:
  description: >
    Appends a subpolicy modifier to the current system crypto policy.
    Unlike crypto_policy_set which sets an explicit policy+subpolicy,
    this handler reads the current policy and appends a subpolicy to it,
    preserving the base policy and any existing subpolicies. Handles
    deduplication by stripping the target subpolicy before re-appending.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["crypto_policy_subpolicy"]. Implemented in
    runner/handlers/remediation/_system.py as _remediate_crypto_policy_subpolicy.
  dependencies:
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation

objective:
  summary: >
    Append a subpolicy modifier (e.g., NO-SHA1, NO-CBC, NO-WEAKMAC) to
    whatever crypto policy is currently active, without overriding the
    base policy. Supports dry-run preview and an `unless` guard.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True,
      "Would append subpolicy :{subpolicy} to current crypto policy")
      and no SSH commands are executed.
    AC-2: >
      Subpolicy appended: Reads current policy, strips existing
      :{subpolicy} if present, appends :{subpolicy}, runs
      update-crypto-policies --set, and returns (True, "Set crypto
      policy to {new_policy}").
    AC-3: >
      Unless guard: When `unless` is provided and the guard command
      succeeds (exit 0), returns (True, "Subpolicy :{subpolicy}
      already active (skipped)") without modifying the policy.
    AC-4: >
      Current policy read failure: When `update-crypto-policies --show`
      fails, returns (False, "Failed to read current crypto policy").
    AC-5: >
      Policy set failure: When `update-crypto-policies --set` fails,
      returns (False, "update-crypto-policies --set failed: {stderr}").
    AC-6: >
      Deduplication: If the current policy already contains :{subpolicy},
      the subpolicy is stripped before re-appending so it appears exactly
      once in the resulting policy string.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for policy strings in shell commands.
  - MUST strip existing instances of the subpolicy before appending.
  - MUST return a 2-tuple (bool, str) from the handler.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "crypto_policy_subpolicy"
  - field: subpolicy
    type: str
    required: true
    description: >
      Subpolicy modifier to append (e.g., "NO-SHA1", "NO-CBC",
      "NO-WEAKMAC").
  - field: unless
    type: str
    required: false
    description: >
      Shell command guard. If this command succeeds (exit 0), the
      operation is skipped. Typically checks if the subpolicy is
      already active.

behavior:
  - "Extract subpolicy from remediation dict."
  - "Dry-run check: If dry_run=True, return preview message."
  - "Unless guard: If `unless` is provided, run it. If exit 0, return skip message."
  - "Read current policy via `update-crypto-policies --show`."
  - "Strip existing :{subpolicy} from current policy string."
  - "Append :{subpolicy} to stripped policy."
  - "Run `update-crypto-policies --set {new_policy}`."
  - "Return success or failure tuple."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would append subpolicy :{subpolicy} to current crypto policy\""
    - "Success: \"Set crypto policy to {new_policy}\""
    - "Skipped: \"Subpolicy :{subpolicy} already active (skipped)\""
    - "Read failure: \"Failed to read current crypto policy\""
    - "Set failure: \"update-crypto-policies --set failed: {stderr}\""

side_effects:
  - "Changes the system-wide cryptographic policy on the remote host."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestCryptoPolicySubpolicySpecDerived
    count: 6
