kind: RemediationHandler
metadata:
  name: SelinuxBooleanSet
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Sets a SELinux boolean value on a remote RHEL host using setsebool.
    Supports both persistent (survives reboot) and runtime-only changes.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["selinux_boolean_set"]. Implemented in
    runner/handlers/remediation/_security.py as _remediate_selinux_boolean_set.
  dependencies:
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/selinux_state_set.spec.yaml

objective:
  summary: >
    Set a SELinux boolean to on or off via setsebool, with optional persistence
    across reboots. In dry-run mode, describe the intended setsebool command.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would run:
      setsebool {-P }{name} {value_str}") and no SSH commands are executed.
    AC-2: >
      Dry-run includes -P when persistent: When persistent=True (default), the
      dry-run message includes "-P " in the setsebool command.
    AC-3: >
      Dry-run without -P: When persistent=False, the dry-run message does not
      include "-P ".
    AC-4: >
      Success path persistent: When setsebool succeeds and persistent=True,
      returns (True, "Set {name} = {value_str} (persistent)").
    AC-5: >
      Success path non-persistent: When setsebool succeeds and persistent=False,
      returns (True, "Set {name} = {value_str}") without "(persistent)".
    AC-6: >
      Setsebool failure: When setsebool fails (non-zero exit), returns (False,
      "setsebool failed: {stderr}").
    AC-7: >
      Default value: When value is not provided, defaults to True (on).
    AC-8: >
      Default persistent: When persistent is not provided, defaults to True.
    AC-9: >
      Value conversion: Boolean True maps to "on", False maps to "off".
    AC-10: >
      Shell quoting: The boolean name is passed through shell_util.quote() in
      the setsebool command.
    AC-11: >
      Extended timeout: The setsebool command uses a 60-second timeout to
      accommodate persistent SELinux operations.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for the boolean name in the setsebool command.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The handler does not verify that SELinux is enabled before attempting setsebool.
  - The handler does not verify that the boolean name is valid.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "selinux_boolean_set" (used by dispatch, not by handler directly)
  - field: name
    type: str
    required: true
    description: SELinux boolean name (e.g., "httpd_can_network_connect")
  - field: value
    type: bool
    required: false
    default: true
    description: Boolean value to set (True for on, False for off)
  - field: persistent
    type: bool
    required: false
    default: true
    description: Whether to persist the change across reboots (-P flag)

behavior:
  - "Extract fields: Read name from the remediation dict. Read value with default True. Read persistent with default True."
  - "Convert value: Map boolean value to string: True -> \"on\", False -> \"off\"."
  - "Dry-run check: If dry_run=True, compute flag as \"-P \" if persistent else \"\". Return (True, \"Would run: setsebool {flag}{name} {value_str}\")."
  - "Execute setsebool: Construct command as setsebool {-P }{quoted_name} {value_str} with a 60-second timeout. Execute via SSH."
  - "Check result: If setsebool fails (non-zero exit), return (False, \"setsebool failed: {stderr}\")."
  - "Success return: Return (True, \"Set {name} = {value_str}{' (persistent)' if persistent else ''}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run persistent: \"Would run: setsebool -P {name} {on|off}\""
    - "Dry-run non-persistent: \"Would run: setsebool {name} {on|off}\""
    - "Success persistent: \"Set {name} = {on|off} (persistent)\""
    - "Success non-persistent: \"Set {name} = {on|off}\""
    - "Failure: \"setsebool failed: {stderr}\""

side_effects:
  - "Sets a SELinux boolean via setsebool."
  - "When persistent=True, the change is written to the SELinux policy store."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestSelinuxBooleanSetSpecDerived
    count: 13
