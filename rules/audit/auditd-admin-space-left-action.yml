id: auditd-admin-space-left-action
title: Configure action at 95% audit storage capacity
description: >
  The admin_space_left_action parameter in /etc/audit/auditd.conf must
  be set to SINGLE or HALT to take action when the remaining audit
  storage volume reaches a critically low threshold (typically 5% remaining).
rationale: >
  When audit storage is nearly full, the system must take action to
  prevent loss of audit data. Halting or entering single-user mode
  ensures the system does not continue operating without audit capability.
severity: medium
category: audit
tags: [audit, auditd, storage, failure-action]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258159"
      stig_id: "RHEL-09-653040"
      severity: "CAT II"
  nist_800_53: ["AU-5(1)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "grep -qiE '^\\s*admin_space_left_action\\s*=\\s*(SINGLE|HALT)' /etc/audit/auditd.conf"
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/audit/auditd.conf"
      key: "admin_space_left_action"
      value: "SINGLE"
      separator: " = "
      restart: "auditd"
