# Automatic Release - runs on push to main with conventional commits
#
# Uses conventional commits to determine version bumps:
#   - feat: -> minor version bump (0.1.0 -> 0.2.0)
#   - fix:  -> patch version bump (0.1.0 -> 0.1.1)
#   - feat!: or BREAKING CHANGE: -> major version bump (0.1.0 -> 1.0.0)
#
# Manual trigger available to force a specific version bump.

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - 'rules/**'
      - 'schema/**'
      - 'mappings/**'
      - 'pyproject.toml'
      - 'setup.cfg'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force version bump type'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic Release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine version bump
          if [ -n "${{ inputs.force_version }}" ]; then
            echo "Forcing ${{ inputs.force_version }} version bump"
            semantic-release version --${{ inputs.force_version }} --no-push
          else
            semantic-release version --no-push
          fi

          # Get the new version if created
          NEW_VERSION=$(semantic-release version --print 2>/dev/null || echo "")
          if [ -n "$NEW_VERSION" ]; then
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
            echo "New version: $NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No release needed"
          fi

      - name: Build package
        if: steps.semrel.outputs.released == 'true'
        run: python -m build

      - name: Push version bump
        if: steps.semrel.outputs.released == 'true'
        run: |
          git push origin main
          git push origin --tags

      - name: Create GitHub Release
        if: steps.semrel.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semrel.outputs.version }}
          name: Release v${{ steps.semrel.outputs.version }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.semrel.outputs.released == 'true'
        run: |
          # Create pip-installable release asset info
          echo "Package can be installed with:"
          echo "  pip install git+https://github.com/${{ github.repository }}.git@v${{ steps.semrel.outputs.version }}"
