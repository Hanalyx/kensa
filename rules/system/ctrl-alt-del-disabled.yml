id: ctrl-alt-del-disabled
title: Disable Ctrl-Alt-Delete reboot
description: >
  The Ctrl-Alt-Delete key combination should be disabled to prevent
  unauthorized reboots from the console.
rationale: >
  Allowing users to reboot with Ctrl-Alt-Delete could cause denial of
  service or allow attackers with physical access to disrupt operations
  and potentially boot into single-user mode.
severity: medium
category: system
tags: [console, reboot, physical-security]

references:
  cis:
  stig:
    rhel9:
      vuln_id: "V-257784"
      severity: "CAT I"
    ubuntu24:
      vuln_id: "V-270712"
      stig_id: "UBTU-24-300026"
      severity: "CAT I"
    ubuntu22:
      vuln_id: "V-260469"
      stig_id: "UBTU-22-211015"
      severity: "CAT I"
    rhel10:
      vuln_id: "V-281299"
      stig_id: "RHEL-10-700960"
      severity: "CAT I"
    rhel8:
      vuln_id: "V-230529"
      stig_id: "RHEL-08-040170"
      severity: "CAT I"
  nist_800_53: ["AC-6"]

platforms:
  - family: ubuntu
    min_version: 22
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: service_state
      name: "ctrl-alt-del.target"
      enabled: false
    remediation:
      mechanism: service_masked
      name: "ctrl-alt-del.target"
