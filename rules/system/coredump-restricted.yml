id: coredump-restricted
title: Restrict core dumps
description: >
  Core dumps should be restricted to prevent sensitive information
  from being written to disk when a program crashes.
rationale: >
  Core dumps may contain sensitive data like passwords, encryption keys,
  or other confidential information from program memory. Restricting
  core dumps prevents this data from being written to disk.
severity: medium
category: system
tags: [coredump, security, memory, privacy]

references:
  cis:
    rhel8:  { section: "1.5.1", level: "L1", type: "Automated" }
    rhel9:  { section: "1.5.1", level: "L1", type: "Automated" }
    rhel10: { section: "1.5.1", level: "L1", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281319", stig_id: "RHEL-10-701170", severity: "CAT II" }
    rhel9: { vuln_id: "V-257814", stig_id: "RHEL-09-213095", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230313"
      stig_id: "RHEL-08-010673"
      severity: "CAT II"
  nist_800_53: ["SC-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      # '* hard core 0' may be written with arbitrary whitespace between fields
      # and may live in limits.conf OR any /etc/security/limits.d/*.conf (both
      # STIG-valid). A config_value match on the space-containing key "* hard
      # core" false-FAILs a compliant host, so grep the pattern directly.
      run: |
        if grep -rqsE '^[[:space:]]*\*[[:space:]]+hard[[:space:]]+core[[:space:]]+0([[:space:]]|$)' \
             /etc/security/limits.conf /etc/security/limits.d/ 2>/dev/null; then
          exit 0
        fi
        echo "FAIL: '* hard core 0' not set in limits.conf or limits.d"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/security/limits.conf"
      key: "* hard core"
      value: "0"
      separator: " "
