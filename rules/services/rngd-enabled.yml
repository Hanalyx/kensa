id: rngd-enabled
title: Ensure rngd service is enabled
description: >
  The rngd service must be enabled to gather entropy from
  hardware random number generators.
rationale: >
  The hardware random number generator entropy gatherer daemon
  feeds data from hardware RNG devices into the kernel entropy
  pool, improving the quality of random numbers used for
  cryptographic operations.
severity: low
category: services
tags: [service, crypto, rng, entropy]

depends_on: [pkg-rng-tools-present]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-257782"
      severity: "CAT III"
    rhel8_v2r6:
      vuln_id: "V-230285"
      severity: "CAT III"
  nist_800_53: ["SC-13"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: service_state
      name: "rngd"
      enabled: true
      active: true
    remediation:
      mechanism: service_enabled
      name: "rngd"
