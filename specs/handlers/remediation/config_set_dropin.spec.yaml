kind: RemediationHandler
metadata:
  name: ConfigSetDropin
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Writes a configuration key-value pair to a file in a drop-in directory
    (.d-style configuration). Creates or overwrites a named file within the
    specified directory containing the key-value line.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["config_set_dropin"]. Implemented in
    runner/handlers/remediation/_config.py as _remediate_config_set_dropin.
  dependencies:
    - runner.shell_util.write_file
    - runner.shell_util.service_action
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/config_set.spec.yaml

objective:
  summary: >
    Write a key-value configuration line to a named file within a drop-in
    directory on a remote host. The file is created or overwritten entirely.
    Optionally reload or restart a service after writing.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would write
      '{key}{sep}{value}' to {dir}/{file}") and no SSH commands are executed.
    AC-2: >
      Success path: When write_file succeeds, returns (True, "Wrote
      '{key}{sep}{value}' to {dir}/{file}").
    AC-3: >
      Write failure: When write_file returns False, returns (False, "Failed to
      write {dir}/{file}") and does not proceed to service action.
    AC-4: >
      Separator default: When separator is not provided, defaults to a single
      space " ".
    AC-5: >
      Custom separator: When separator is provided, the composed line uses the
      specified separator between key and value.
    AC-6: >
      Service reload on success: When reload is specified and write succeeds,
      the handler calls service_action to reload the named service.
    AC-7: >
      Service restart on success: When restart is specified and write succeeds,
      the handler calls service_action to restart the named service.
    AC-8: >
      No service action on failure: When write_file fails, service_action is
      not called.
    AC-9: >
      File content: The written file contains exactly "{key}{sep}{value}\n"
      (trailing newline appended by the handler).

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST NOT call service_action if write_file failed.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller (run_remediation).
  - The handler overwrites the entire file; it does not merge with existing content.
  - The handler does not create parent directories; the drop-in directory is assumed to exist.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "config_set_dropin" (used by dispatch, not by handler directly)
  - field: dir
    type: str
    required: true
    description: Absolute path to the drop-in directory (e.g., /etc/sshd_config.d)
  - field: file
    type: str
    required: true
    description: Filename to create within the drop-in directory
  - field: key
    type: str
    required: true
    description: Configuration key to set
  - field: value
    type: str
    required: true
    description: Value to assign to the key
  - field: separator
    type: str
    required: false
    default: '" "'
    description: String placed between key and value in the line
  - field: reload
    type: str
    required: false
    description: Service name to reload after modification
  - field: restart
    type: str
    required: false
    description: Service name to restart after modification

behavior:
  - "Extract fields: Read dir, file, key, value from the remediation dict. Read separator with default \" \"."
  - "Compute full path: Build full_path as f\"{dir}/{file}\"."
  - "Compose target line: Build the desired line as f\"{key}{separator}{value}\"."
  - "Dry-run check: If dry_run=True, return (True, \"Would write '{line}' to {full_path}\") immediately without executing any remote commands."
  - "Write file: Call shell_util.write_file(ssh, full_path, line + \"\\n\") to create or overwrite the drop-in file."
  - "Check write result: If write_file returns False, return (False, \"Failed to write {full_path}\") immediately. Do not proceed to service action."
  - "Service action: Call shell_util.service_action(ssh, r) which checks for reload or restart keys and performs the corresponding systemctl operation."
  - "Success return: Return (True, \"Wrote '{line}' to {full_path}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would write '{key}{sep}{value}' to {dir}/{file}\""
    - "Success: \"Wrote '{key}{sep}{value}' to {dir}/{file}\""
    - "Write failure: \"Failed to write {dir}/{file}\""

side_effects:
  - "Creates or overwrites a file in a drop-in configuration directory on the remote host."
  - "Optionally reloads or restarts a systemd service via systemctl."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestConfigSetDropinSpecDerived
    count: 12
