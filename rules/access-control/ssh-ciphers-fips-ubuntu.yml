id: ssh-ciphers-fips-ubuntu
title: Configure SSH to use FIPS-approved ciphers (Ubuntu)
description: >
  The SSH daemon must be configured to use only FIPS 140-3 approved
  ciphers for session encryption. Ubuntu's approved cipher set differs
  from RHEL's (it excludes aes192-ctr), so this rule carries the
  Ubuntu-specific allowlist and remediation value.
rationale: >
  FIPS-approved ciphers have been validated for cryptographic strength.
  Restricting the SSH daemon to the Ubuntu-approved set ensures encrypted
  sessions cannot be downgraded to a weaker algorithm.
severity: high
category: access-control
tags: [ssh, fips, ciphers, cryptography, stig]

depends_on: [pkg-openssh-server-present]

references:
  stig:
    ubuntu24:
      vuln_id: V-270667
      stig_id: UBTU-24-100820
      severity: CAT II
    ubuntu22:
      vuln_id: V-260531
      stig_id: UBTU-22-255050
      severity: CAT II
  nist_800_53: ["SC-8", "SC-13"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        command -v sshd >/dev/null 2>&1 || exit 0
        ciphers=$(sshd -T 2>/dev/null | awk '/^ciphers /{print $2}')
        if [ -z "$ciphers" ]; then
          echo "FAIL: could not read effective ciphers (sshd -T needs root)"
          exit 1
        fi
        if echo "$ciphers" | tr ',' '\n' | grep -qvE '^(aes128-ctr|aes256-ctr|aes128-gcm@openssh\.com|aes256-gcm@openssh\.com)$'; then
          echo "FAIL: non-FIPS cipher in effective config: $ciphers"
          exit 1
        fi
        echo "OK: $ciphers"
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/ssh/sshd_config.d"
      file: "00-kensa-fips-ciphers.conf"
      key: "Ciphers"
      value: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr"
      restart: sshd
