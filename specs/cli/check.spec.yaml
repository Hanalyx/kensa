kind: CLICommand
metadata:
  name: Check
  module: cli
  version: 1.0.0
  status: released
  system_spec: system.spec.yaml@1.0.0
  created: "2025-02-10"
  updated: "2025-02-25"

context:
  description: >
    Run compliance checks on target hosts over SSH, evaluate YAML rules against
    host state, and report pass/fail/skip results. Optionally write output to
    files (CSV, JSON, PDF) and/or persist results to SQLite.
  technical_context: >
    Module runner/cli.py -> check(). Click decorators: @main.command(),
    @target_options, @rule_options, @output_options, @click.option("--store").
    Option groups: target_options, rule_options (--rules, --rule, --severity,
    --tag, --category, --framework, --var, --control, --config-dir),
    output_options (--output, --quiet).
  dependencies:
    - runner._host_runner
    - runner._rule_selection
    - runner.engine
    - runner.inventory
    - runner.output
    - runner.storage
  callers:
    - CLI entry point (kensa check)

objective:
  summary: >
    Run compliance checks on target hosts over SSH, evaluate YAML rules against
    host state, and report pass/fail/skip results. Optionally write output to
    files (CSV, JSON, PDF) and/or persist results to SQLite.
  acceptance_criteria:
    AC-1: "Check with one host and one passing rule exits 0, output contains 'PASS' and '1 pass'."
    AC-2: "Check with one host and one failing rule exits 0, output contains 'FAIL' and '1 fail'."
    AC-3: "Check with no target hosts exits 1 with 'No target hosts' error."
    AC-4: "Check with no rules (no --rules, no --rule) exits 1 with 'Specify --rules or --rule' error."
    AC-5: "Check with bad rules path exits 1."
    AC-6: "'--quiet' suppresses terminal output (result.output is empty or minimal)."
    AC-7: "'-o json' writes JSON to stdout containing host results."
    AC-8: "'--store' creates a session in ResultStore."
    AC-9: "Connection failure prints error and continues; exit code remains 0."
    AC-10: "'--severity' filter reduces the rule set to matching severities only."
    AC-11: "Multi-host run prints summary line with host count and totals."
    AC-12: "'--framework auto' applies platform-based framework selection."
    AC-13: "'--var KEY=VALUE' overrides rule variables."
    AC-14: "'--control' filters to rules for a specific framework control."
    AC-15: "Parallel execution ('--workers 2') produces results for all hosts."
    AC-16: "'-o csv:path' writes a CSV file to the specified path."
    AC-17: "Invalid output format exits 1 with error."
    AC-18: "'--framework' sorts results by framework section order."

constraints:
  - "MUST exit 0 on normal completion, even with check failures or connection errors."
  - "MUST exit 1 only for argument validation / rule loading errors."
  - "MUST NOT store results unless '--store' is explicitly passed."
  - "MUST suppress terminal output when '--quiet' is set."
  - "MUST apply per-host variable resolution when config is available."

input_contract:
  - field: --rules / -r
    type: str
    required: false
    default: null
    description: Rules directory path
  - field: --rule
    type: str
    required: false
    default: null
    description: Single rule file path
  - field: --severity / -s
    type: str (multiple)
    required: false
    default: "()"
    description: Severity filter
  - field: --tag / -t
    type: str (multiple)
    required: false
    default: "()"
    description: Tag filter
  - field: --category / -c
    type: str
    required: false
    default: null
    description: Category filter
  - field: --framework / -f
    type: str
    required: false
    default: null
    description: Framework mapping filter
  - field: --var / -V
    type: str (multiple)
    required: false
    default: "()"
    description: Variable overrides KEY=VALUE
  - field: --control
    type: str
    required: false
    default: null
    description: "Control filter (e.g., cis-rhel9-v2.0.0:5.1.12)"
  - field: --config-dir
    type: str
    required: false
    default: null
    description: Config directory path
  - field: --output / -o
    type: str (multiple)
    required: false
    default: "()"
    description: Output format specs
  - field: --quiet / -q
    type: bool
    required: false
    default: "false"
    description: Suppress terminal output
  - field: --store
    type: bool
    required: false
    default: "false"
    description: Persist results to SQLite

behavior:
  - "Resolve target hosts via _resolve_hosts()."
  - "Load and filter rules via select_rules()."
  - "Parse capability overrides."
  - >
    For each host (sequential or parallel based on --workers):
    (a) Connect via SSH.
    (b) Detect platform and capabilities.
    (c) Apply --framework auto on first host if specified.
    (d) Apply platform-aware control filtering.
    (e) Resolve per-host variables from config hierarchy.
    (f) Run checks via run_checks().
    (g) Collect results into RunResult.
  - "Print per-host summary (rules | pass | fail | skip)."
  - "Print multi-host summary if >1 host."
  - "Sort results by framework section if --framework is active."
  - "Write output files via _write_outputs()."
  - "Store results via _store_results() if --store."

exit_codes:
  - code: 0
    condition: "Normal completion -- even when checks fail, hosts unreachable, or all checks skip"
  - code: 1
    condition: "Target resolution error (no hosts), rule loading error (no rules, bad path), output format error"

output_contract:
  returns: Terminal output or file output
  modes:
    terminal: "Per-host: Host header, platform, capability detail (verbose), per-rule PASS/FAIL/SKIP, host summary line. Multi-host: Grand summary line with totals."
    quiet: "Suppresses all terminal output. Useful with -o."
    json: "JSON to stdout with RunResult schema."
    json_file: "JSON written to file via -o json:path."
    csv: "CSV format via -o csv or -o csv:path."
    pdf: "PDF report via -o pdf:path (requires filepath)."

side_effects:
  - "SQLite (only with --store): Creates session + results records in .kensa/results.db."
  - "File writes (only with -o fmt:path): Writes output files."

testing:
  spec_derived:
    file: tests/test_cli_spec.py
    classes:
      - TestCheckSpecDerived
    count: 14
