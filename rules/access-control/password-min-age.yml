id: password-min-age
title: Ensure minimum password days is configured
description: >
  The PASS_MIN_DAYS setting in /etc/login.defs must be properly configured.
rationale: >
  Improper PASS_MIN_DAYS configuration could weaken system security controls.
severity: medium
category: access-control
tags: [password, login-defs, aging]

references:
  cis:
    rhel9_v2: { section: "5.4.1.2", level: "L1", type: "Manual" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/login.defs"
      key: "PASS_MIN_DAYS"
      expected: "{{ login_defs_pass_min_days }}"
      comparator: ">="
    remediation:
      mechanism: config_set
      path: "/etc/login.defs"
      key: "PASS_MIN_DAYS"
      value: "{{ login_defs_pass_min_days }}"
      separator: "	"
