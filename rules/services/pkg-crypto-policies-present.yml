id: pkg-crypto-policies-present
title: Ensure crypto-policies package is installed
description: 'The crypto-policies package must be installed to provide system-wide cryptographic policy management.

  '
rationale: 'Centralized cryptographic policy ensures consistent use of approved algorithms across all system components.

  '
severity: medium
category: services
tags:
- package
- crypto
- security
references:
  stig:
    rhel10: { vuln_id: "V-281007", stig_id: "RHEL-10-300000", severity: "CAT I" }
    rhel9:
      vuln_id: V-258234
      stig_id: RHEL-09-215100
      severity: CAT II
    rhel8:
      vuln_id: V-279933
      severity: CAT I
  nist_800_53:
  - SC-13
  - IA-7
  - AC-17
platforms:
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: crypto-policies
    state: present
  remediation:
    mechanism: apt_present
    name: crypto-policies
- default: true
  check:
    method: package_state
    name: crypto-policies
    state: present
  remediation:
    mechanism: package_present
    name: crypto-policies
