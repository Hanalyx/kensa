id: pwquality-dictcheck
title: Ensure password dictionary check is enabled
description: >
  The dictcheck setting in /etc/security/pwquality.conf must be properly configured.
rationale: >
  Improper dictcheck configuration could weaken system security controls.
severity: medium
category: access-control
tags: [pam, password, pwquality]

references:
  cis:
    rhel9_v2: { section: "5.3.3.2.6", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/security/pwquality.conf"
      key: "dictcheck"
      expected: "1"
    remediation:
      mechanism: config_set
      path: "/etc/security/pwquality.conf"
      key: "dictcheck"
      value: "1"
      separator: " = "
