id: pkg-fapolicyd-present
title: Ensure fapolicyd package is installed
description: >
  The fapolicyd package must be installed to provide application
  whitelisting capabilities.
rationale: >
  Fapolicyd (File Access Policy Daemon) controls execution of
  applications based on a user-defined policy, preventing
  unauthorized software from running on the system.
severity: medium
category: services
tags: [package, security, application-whitelisting]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258089"
      severity: "CAT II"
    rhel8_v2r6:
      vuln_id: "V-230523"
      severity: "CAT II"
  nist_800_53: ["CM-7", "CM-11"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: package_state
      name: "fapolicyd"
      state: "present"
    remediation:
      mechanism: package_present
      name: "fapolicyd"
