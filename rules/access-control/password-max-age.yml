id: password-max-age
title: Ensure password expiration is configured
description: >
  The PASS_MAX_DAYS setting in /etc/login.defs must be properly configured.
rationale: >
  Improper PASS_MAX_DAYS configuration could weaken system security controls.
severity: medium
category: access-control
tags: [password, login-defs, aging]

references:
  cis:
    rhel9_v2: { section: "5.4.1.1", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/login.defs"
      key: "PASS_MAX_DAYS"
      expected: "{{ login_defs_pass_max_days }}"
      comparator: "<="
    remediation:
      mechanism: config_set
      path: "/etc/login.defs"
      key: "PASS_MAX_DAYS"
      value: "{{ login_defs_pass_max_days }}"
      separator: "	"
