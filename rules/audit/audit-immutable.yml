id: audit-immutable
title: Ensure the audit configuration is immutable
description: >
  The audit configuration must be set immutable so it cannot be changed at runtime.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: high
category: audit
tags: [audit, auditd, immutable, hardening]

supersedes: [audit-rules-immutable]
depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9: { section: "6.3.3.20", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-9", "AU-12", "AC-6"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "auditctl -s 2>/dev/null | grep -qE '^enabled\\s+2'"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-e 2"
      persist_file: "/etc/audit/rules.d/99-finalize.rules"
