id: sysctl-net-ipv4-conf-default-log-martians
title: Ensure net.ipv4.conf.default.log_martians is set to 1
description: >
  The kernel parameter net.ipv4.conf.default.log_martians must be set to 1 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  cis:
    rhel8: { section: "3.3.1.17", level: "L1", type: "Automated" }
  stig:
    rhel10:
      vuln_id: "V-281344"
      stig_id: "RHEL-10-800120"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257961"
      stig_id: "RHEL-09-253030"
      severity: "CAT II"

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.default.log_martians
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.default.log_martians
      value: "1"
