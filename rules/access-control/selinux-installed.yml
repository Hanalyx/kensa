id: selinux-installed
title: Ensure SELinux is installed
description: >
  The libselinux package must be installed so the system has the
  userspace library and tooling required to load and enforce an SELinux
  policy.
rationale: >
  SELinux provides mandatory access control that confines processes to
  the minimum privileges they require. Without libselinux present the
  kernel cannot apply an SELinux policy, so the confinement the other
  SELinux controls assume is unavailable. This checks that the package
  is installed, independent of the runtime enforcing state verified by
  selinux-not-disabled and selinux-enforcing.
severity: medium
category: access-control
tags: [selinux, mandatory-access-control, packages]

references:
  cis:
    rhel9:  { section: "1.3.1.1", level: "L1", type: "Automated" }
    rhel8: { section: "1.3.1.1", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: package_state
      name: libselinux
      state: present
    remediation:
      mechanism: package_present
      name: libselinux
