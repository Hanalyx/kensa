id: mount-var-log-separate-fs
title: Ensure /var/log is on a separate filesystem
description: >
  The /var/log directory must be on a separate filesystem or logical volume.
  A dedicated partition for /var/log prevents log growth from consuming
  the /var or root filesystem.
rationale: >
  Without a separate /var/log filesystem, log file accumulation could fill
  the /var or root filesystem, potentially disrupting system operations and
  preventing further audit logging. A separate partition provides isolation.
severity: low
category: filesystem
tags: [mount, var-log, filesystem, hardening]

references:
  cis:
    rhel9:  { section: "1.1.2.6.1", level: "L2", type: "Automated" }
  stig:
    rhel8:
      vuln_id: "V-230293"
      severity: "CAT III"
  nist_800_53: ["CM-6", "AU-4"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "findmnt /var/log 2>/dev/null | grep -v '^TARGET' | awk '{print $1}' | grep -q '/var/log$'"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Create a separate partition or logical volume for /var/log and add it
        to /etc/fstab. Migrate existing log data to the new partition.
