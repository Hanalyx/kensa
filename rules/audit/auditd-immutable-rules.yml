id: auditd-immutable-rules
title: Protect audit rules from unauthorized change
description: >
  The audit system must be configured to make audit rules
  immutable by setting -e 2 as the final rule.
rationale: >
  Making audit rules immutable prevents runtime changes to
  the audit configuration. A reboot is required to modify
  rules, ensuring that an attacker who gains access cannot
  silently disable auditing.
severity: medium
category: audit
tags: [audit, auditd, integrity, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9:
      vuln_id: "V-258229"
      severity: "CAT II"
  nist_800_53: ["AU-9"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: command
      run: "tail -1 /etc/audit/rules.d/audit.rules"
      expected_exit: 0
      expected_stdout: "-e 2"
    remediation:
      mechanism: config_append
      path: "/etc/audit/rules.d/audit.rules"
      line: "-e 2"
