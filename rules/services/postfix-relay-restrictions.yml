id: postfix-relay-restrictions
title: Ensure postfix prevents unrestricted mail relaying
description: >
  If postfix is installed, smtpd_client_restrictions must reject connections
  from unknown/untrusted networks — i.e. contain only permit_mynetworks and
  reject.
rationale: >
  An MTA that accepts mail from arbitrary clients can be abused as an open
  relay for spam or to spoof internal mail. Restricting to permit_mynetworks
  then reject confines relaying to trusted networks.
severity: medium
transactional: false
category: services
tags: [postfix, mail, relay, stig]

references:
  stig:
    rhel10: { vuln_id: "V-280999", stig_id: "RHEL-10-200692", severity: "CAT II" }
    rhel9: { vuln_id: "V-257951", stig_id: "RHEL-09-252050", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230550"
      severity: "CAT II"
  nist_800_53: ["CM-7", "SC-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        if ! rpm -q postfix >/dev/null 2>&1; then exit 0; fi
        val=$(postconf -h smtpd_client_restrictions 2>/dev/null)
        if [ -z "$val" ]; then
          echo "FAIL: smtpd_client_restrictions not configured"
          exit 1
        fi
        # STIG V-257951/V-230550: a finding if any entry other than
        # permit_mynetworks / reject is present (undocumented).
        bad=$(printf '%s' "$val" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' |
          grep -vE '^(permit_mynetworks|reject)?$')
        if [ -n "$bad" ]; then
          echo "FAIL: smtpd_client_restrictions has unexpected entries: $bad"
          exit 1
        fi
        echo "OK: smtpd_client_restrictions=$val"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/postfix/main.cf"
      key: "smtpd_client_restrictions"
      value: "permit_mynetworks,reject"
      separator: " = "
      restart: "postfix"
