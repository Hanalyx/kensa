kind: CLICommand
metadata:
  name: Diff
  module: cli
  version: 1.0.0
  status: approved
  system_spec: system.spec.yaml@1.0.0
  created: "2025-02-10"
  updated: "2025-02-25"

context:
  description: >
    Compare two scan sessions to show compliance drift. Categorizes each rule
    result as regression, resolved, new failure, new pass, or unchanged.
  technical_context: >
    Module runner/cli.py -> diff(). Click decorators: @main.command(),
    @click.argument("session1"), @click.argument("session2").
  dependencies:
    - runner.storage.ResultStore
    - runner.storage.diff_sessions
  callers:
    - CLI entry point (kensa diff)

objective:
  summary: >
    Compare two scan sessions to show compliance drift. Categorizes each rule
    result as regression, resolved, new failure, new pass, or unchanged.
  acceptance_criteria:
    AC-1: "Diff of two valid sessions exits 0 with summary and changes."
    AC-2: "'--json' outputs valid JSON with session metadata and changes."
    AC-3: "'--show-unchanged' includes unchanged results in output."
    AC-4: "'--host' filters changes to specified host only."
    AC-5: "No changes between sessions prints 'No changes between sessions'."
    AC-6: "Invalid session ID exits 1 with error."
    AC-7: "Regressions (pass -> fail) appear as REGRESSION status."
    AC-8: "Resolved (fail -> pass) appear as RESOLVED status."
    AC-9: "'--json' '--show-unchanged' includes unchanged entries in JSON."
    AC-10: "Missing positional arguments shows Click usage error."

constraints:
  - "MUST use positional arguments for session IDs (not flags)."
  - "MUST group changes by status in terminal output."
  - "MUST filter unchanged results by default (opt-in with '--show-unchanged')."
  - "MUST exit 1 only for invalid session references."

input_contract:
  - field: SESSION1
    type: int
    required: true
    default: null
    description: Older session ID (positional)
  - field: SESSION2
    type: int
    required: true
    default: null
    description: Newer session ID (positional)
  - field: --host / -h
    type: str
    required: false
    default: null
    description: Filter by host
  - field: --show-unchanged
    type: bool
    required: false
    default: "false"
    description: Include unchanged results
  - field: --json
    type: bool
    required: false
    default: "false"
    description: Output as JSON

behavior:
  - "Open ResultStore and call diff_sessions(store, session1, session2)."
  - "If '--json': output JSON with session metadata, summary, and changes array."
  - >
    If terminal:
    (a) Print diff header with session IDs and timestamps.
    (b) Print summary counts (regressions, resolved, new failures, new passes, unchanged).
    (c) Filter by --host if specified.
    (d) Filter out unchanged unless --show-unchanged.
    (e) Display changes table grouped by status.
  - "On ValueError from diff_sessions: print error, exit 1."

exit_codes:
  - code: 0
    condition: "Normal completion (even with no changes)"
  - code: 1
    condition: "Invalid session IDs (ValueError from diff_sessions)"

output_contract:
  returns: Terminal output or JSON
  modes:
    terminal: >
      Diff header, summary section, changes table with columns: Status, Host,
      Rule, Old, New. Status categories: REGRESSION (red), NEW FAIL (red),
      RESOLVED (green), NEW PASS (green), UNCHANGED (dim).
    json: "JSON object with session1, session2, summary, and changes array."

side_effects:
  - "SQLite reads only. No writes."

testing:
  spec_derived:
    file: tests/test_cli_spec.py
    classes:
      - TestDiffSpecDerived
    count: 7
