# NIST SP 800-53 Rev. 5 Control Mapping for Kensa
#
# This mapping associates NIST 800-53 security controls with Kensa rules.
# NIST controls are many-to-many: one control may require multiple rules,
# and one rule may satisfy multiple controls.
#
# Control families covered:
#   AC  - Access Control
#   AU  - Audit and Accountability
#   CM  - Configuration Management
#   IA  - Identification and Authentication
#   SC  - System and Communications Protection
#   SI  - System and Information Integrity

id: nist-800-53-r5
framework: nist_800_53
title: "NIST SP 800-53 Rev. 5 Security Controls"
published: 2020-09-23

# No platform constraint - NIST controls are OS-agnostic requirements
# Platform-specific implementation is handled by the rules themselves

controls:
  # ════════════════════════════════════════════════════════════════════════════
  # ACCESS CONTROL (AC)
  # ════════════════════════════════════════════════════════════════════════════

  "AC-2":
    title: "Account Management"
    rules:
      - root-only-uid0
      - nologin-system-accounts
      - password-inactive
      - root-only-gid0

  "AC-2(1)":
    title: "Account Management | Automated System Account Management"
    rules:
      - nologin-system-accounts
      - password-inactive

  "AC-3":
    title: "Access Enforcement"
    rules:
      - selinux-enforcing
      - selinux-policy-targeted
      - etc-passwd-permissions
      - etc-shadow-permissions
      - etc-group-permissions
      - etc-gshadow-permissions
      - sudo-use-pty
      - pam-wheel-su

  "AC-3(4)":
    title: "Access Enforcement | Discretionary Access Control"
    rules:
      - etc-passwd-permissions
      - etc-passwd-backup-permissions
      - etc-shadow-permissions
      - etc-shadow-backup-permissions
      - etc-group-permissions
      - etc-group-backup-permissions
      - etc-gshadow-permissions
      - etc-gshadow-backup-permissions
      - no-world-writable-files
      - no-unowned-files
      - sticky-bit-world-writable

  "AC-4":
    title: "Information Flow Enforcement"
    rules:
      - service-enable-firewalld
      - selinux-enforcing
      - sysctl-icmp-redirects-disabled
      - sysctl-send-redirects-disabled

  "AC-6":
    title: "Least Privilege"
    rules:
      - ssh-disable-root-login
      - sudo-use-pty
      - sudo-logfile
      - sudo-timeout
      - pam-wheel-su
      - root-only-uid0
      - root-only-gid0
      - root-path-integrity

  "AC-6(1)":
    title: "Least Privilege | Authorize Access to Security Functions"
    rules:
      - sudo-use-pty
      - sudo-logfile
      - pam-wheel-su
      - grub-password

  "AC-6(2)":
    title: "Least Privilege | Non-Privileged Access for Nonsecurity Functions"
    rules:
      - ssh-disable-root-login
      - nologin-system-accounts
      - sudo-use-pty
      - pam-wheel-su

  "AC-6(5)":
    title: "Least Privilege | Privileged Accounts"
    rules:
      - ssh-disable-root-login
      - sudo-use-pty
      - sudo-timeout
      - pam-wheel-su

  "AC-6(9)":
    title: "Least Privilege | Log Use of Privileged Functions"
    rules:
      - sudo-logfile
      - audit-privileged-commands
      - audit-sudoers

  "AC-6(10)":
    title: "Least Privilege | Prohibit Non-Privileged Users from Executing Privileged Functions"
    rules:
      - sudo-use-pty
      - pam-wheel-su
      - audit-suid-files
      - audit-sgid-files

  "AC-7":
    title: "Unsuccessful Logon Attempts"
    rules:
      - pam-faillock-deny
      - pam-faillock-unlock-time
      - pam-faillock-fail-interval
      - pam-faillock-even-deny-root

  "AC-8":
    title: "System Use Notification"
    rules:
      - banner-dod-consent
      - banner-ssh-dod
      - ssh-banner
      - motd-permissions
      - issue-permissions
      - issue-net-permissions

  "AC-10":
    title: "Concurrent Session Control"
    rules:
      - ssh-max-sessions

  "AC-11":
    title: "Device Lock"
    rules:
      - shell-timeout
      - ssh-client-alive-interval
      - ssh-client-alive-count-max

  "AC-11(1)":
    title: "Device Lock | Pattern-Hiding Displays"
    rules:
      - shell-timeout

  "AC-12":
    title: "Session Termination"
    rules:
      - ssh-client-alive-interval
      - ssh-client-alive-count-max
      - shell-timeout

  "AC-17":
    title: "Remote Access"
    rules:
      - ssh-disable-root-login
      - ssh-deny-empty-passwords
      - ssh-disable-hostbased-auth
      - ssh-ignore-rhosts
      - ssh-use-pam
      - ssh-max-auth-tries
      - ssh-login-grace-time
      - ssh-access-control

  "AC-17(1)":
    title: "Remote Access | Monitoring and Control"
    rules:
      - ssh-log-level
      - audit-logins
      - audit-session

  "AC-17(2)":
    title: "Remote Access | Protection of Confidentiality and Integrity Using Encryption"
    rules:
      - ssh-ciphers-fips
      - ssh-macs-fips
      - ssh-kex-fips
      - ssh-crypto-policy
      - crypto-policy-fips

  "AC-17(4)":
    title: "Remote Access | Privileged Commands and Access"
    rules:
      - ssh-disable-root-login
      - sudo-use-pty
      - sudo-logfile

  "AC-18(1)":
    title: "Wireless Access | Authentication and Encryption"
    rules:
      - kmod-disable-bluetooth

  "AC-19(5)":
    title: "Access Control for Mobile Devices | Full Device or Container-Based Encryption"
    rules:
      - kmod-disable-usb-storage

  # ════════════════════════════════════════════════════════════════════════════
  # AUDIT AND ACCOUNTABILITY (AU)
  # ════════════════════════════════════════════════════════════════════════════

  "AU-2":
