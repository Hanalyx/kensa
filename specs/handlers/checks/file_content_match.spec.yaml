kind: CheckHandler
metadata:
  name: FileContentMatch
  module: handlers/checks
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Checks that a file's content matches a regex pattern using grep -qE.
    First verifies the file exists before attempting the pattern match.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check when
    check["method"] == "file_content_match". Implemented in
    runner/handlers/checks/_file.py as _check_file_content_match.
  dependencies:
    - runner.shell_util.quote
    - runner.shell_util.file_exists
    - runner._types.CheckResult
    - runner._types.Evidence
    - runner.ssh.SSHSession
    - datetime
  callers:
    - runner.engine.run_check
  related_specs:
    - file_content_no_match.spec.yaml
    - file_content.spec.yaml
    - file_exists.spec.yaml

objective:
  summary: >
    Verify that a remote file contains a line matching an extended regex
    pattern. First check that the file exists, then run grep -qE to test
    for the pattern. Return a CheckResult with structured Evidence.
  acceptance_criteria:
    AC-1: "Pattern found in file returns passed=True."
    AC-2: "Pattern not found in file returns passed=False."
    AC-3: "File not found returns passed=False with 'not found' in detail."
    AC-4: "Evidence method is always 'file_content_match'."
    AC-5: "Evidence expected includes the pattern string."
    AC-6: "Evidence actual is 'pattern found', 'pattern not found', or 'file not found'."
    AC-7: "Uses shell_util.quote() for both path and pattern in the grep command."
    AC-8: "Uses grep -qE (extended regex, quiet mode)."

constraints:
  - "MUST check file existence via shell_util.file_exists() before running grep."
  - "MUST use shell_util.quote() to escape both path and pattern."
  - "MUST use grep -qE (extended regex, quiet mode)."
  - "MUST capture check_time before executing any SSH commands."
  - "MUST set evidence.method to 'file_content_match' in all code paths."
  - "MUST NOT modify any remote state (pure measurement)."

input_contract:
  - field: path
    type: str
    required: true
    description: Absolute path to the file to search.
  - field: pattern
    type: str
    required: true
    description: Extended regex pattern to match against file content.

behavior:
  - "Extract path from c['path'] and pattern from c['pattern'] (both required keys)."
  - "Capture check_time as datetime.now(timezone.utc)."
  - >
    Check file existence via shell_util.file_exists(ssh, path). If file
    does not exist, return CheckResult(passed=False) with detail
    f"{path}: not found", evidence command=f"test -e {path}",
    evidence actual="file not found".
  - "Build grep command: f'grep -qE {shell_util.quote(pattern)} {shell_util.quote(path)}'."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If result.ok (grep found a match): return CheckResult(passed=True)
    with detail f"{path}: contains pattern" and evidence
    actual="pattern found".
  - >
    If not result.ok (no match): return CheckResult(passed=False) with
    detail f"{path}: pattern not found" and evidence
    actual="pattern not found".

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass:
      passed: true
      detail: "'{path}: contains pattern'"
    fail_no_match:
      passed: false
      detail: "'{path}: pattern not found'"
    fail_file_not_found:
      passed: false
      detail: "'{path}: not found'"
  evidence_fields:
    method: "file_content_match"
    command: "grep -qE {quoted_pattern} {quoted_path} (or test -e {path} on file-not-found path)"
    stdout: Raw stdout (empty for grep -q)
    stderr: Raw stderr
    exit_code: "Actual exit code (0 for match, 1 for no match, 1 for file not found)"
    expected: "contains pattern '{pattern}'"
    actual: "'pattern found', 'pattern not found', or 'file not found'"
    timestamp: UTC datetime captured before command execution
  detail_formats:
    - "{path}: contains pattern"
    - "{path}: pattern not found"
    - "{path}: not found"
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'file_content_match'."
    - "File existence is always checked before grep."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestFileContentMatch
      - TestFileContentMatchSpecDerived
    count: 8
