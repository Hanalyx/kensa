id: audit-watch-kmod
title: Audit access to /bin/kmod
description: >
  Modifications to /bin/kmod must generate an audit record so that kernel module operations
  can be traced to an individual.
rationale: >
  Auditing this path supports detection of unauthorized changes and
  forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, watch]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270814"
      stig_id: "UBTU-24-900740"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260613"
      stig_id: "UBTU-22-654055"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /bin/kmod -p x -k modules"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /bin/kmod -p x -k modules"
      persist_file: "/etc/audit/rules.d/50-watch-kmod.rules"
