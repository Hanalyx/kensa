id: audit-cmd-passwd
title: Audit uses of the passwd command
description: >
  All uses of the passwd command must be audited. The passwd command
  changes user passwords which is critical for authentication security.
rationale: >
  Auditing passwd command usage allows detection of password
  changes including potential unauthorized modifications.
severity: medium
category: audit
tags: [audit, auditd, privileged, passwd]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258198"
      stig_id: "RHEL-09-654240"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F path=/usr/bin/passwd -F perm=x -F auid>=1000 -F auid!=unset -k privileged-passwd"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/usr/bin/passwd -F perm=x -F auid>=1000 -F auid!=unset -k privileged-passwd"
      persist_file: "/etc/audit/rules.d/50-privileged.rules"
