id: pam-password-sha512
title: Ensure pam_unix includes a strong password hashing algorithm
description: >
  PAM must use a strong password hashing algorithm (SHA-512).
rationale: >
  Weak hashing algorithms allow faster offline cracking of password hashes.
severity: medium
category: access-control
tags: [pam, password, hashing]

references:
  cis:
    rhel9: { section: "5.3.3.4.3", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.4.3", level: "L1", type: "Automated" }
    rhel8: { section: "5.3.3.4.3", level: "L1", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281217", stig_id: "RHEL-10-600650", severity: "CAT II" }
    rhel9: { vuln_id: "V-258233", stig_id: "RHEL-09-671025", severity: "CAT II" }
    rhel8:                                                                   # check greps both system-auth (V-244524) and password-auth (V-230237)
      - { vuln_id: "V-244524", stig_id: "RHEL-08-010159", severity: "CAT II" }   # system-auth
      - { vuln_id: "V-230237", stig_id: "RHEL-08-010160", severity: "CAT II" }   # password-auth
  nist_800_53: ["IA-5", "IA-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: 'grep -qE ''^\s*password.*pam_unix\.so.*sha512'' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null'
      expected_exit: 0
    remediation:
      mechanism: pam_module_arg
      action: ensure
      module: pam_unix.so
      arg: sha512
      type: password
      files:
        - /etc/pam.d/system-auth
        - /etc/pam.d/password-auth
