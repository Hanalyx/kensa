id: audit-mount-syscall
title: Audit use of the mount syscall
description: >
  The audit system must record use of the mount syscall by interactive users on
  both the 32-bit and 64-bit ABIs, so filesystem mount operations are
  attributable.
rationale: >
  Mounting a filesystem can introduce untrusted content or shadow a directory to
  hide files. Auditing the mount syscall on both ABIs preserves a record of who
  performed it.
severity: medium
transactional: false
category: audit
tags: [audit, mount, syscall, stig]

references:
  stig:
    rhel10: { vuln_id: "V-281147", stig_id: "RHEL-10-500610", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230425"
      stig_id: "RHEL-08-030302"
      severity: "CAT II"
  nist_800_53: ["AU-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    # Key-agnostic; both ABIs required.
    check:
      method: command
      run: |
        loaded=$(auditctl -l 2>/dev/null)
        miss=""
        echo "$loaded" | grep -Eq 'arch=b32.*-S mount([[:space:],]|$)' || miss="$miss b32"
        echo "$loaded" | grep -Eq 'arch=b64.*-S mount([[:space:],]|$)' || miss="$miss b64"
        if [ -n "$miss" ]; then
          echo "FAIL: missing mount-syscall audit rule(s):$miss"
          exit 1
        fi
        echo "OK: mount syscall is audited on both ABIs"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add to a file under /etc/audit/rules.d/ then 'augenrules --load'
        (reboot if auditd is immutable):
          -a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=unset -k privileged-mount
          -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k privileged-mount
