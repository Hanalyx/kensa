id: audit-module-delete-rhel10
title: Audit kernel-module delete_module unload (RHEL 10)
description: >
  On RHEL 10 the kernel-module audit controls are split per syscall and keyed
  'kernel_modules'. Record use of the delete_module syscall(s) by interactive users.
rationale: >
  Loading, unloading, or querying kernel modules can alter kernel behavior or
  attack surface; auditing provides attribution.
severity: medium
transactional: false
category: audit
tags: [audit, kernel-modules, cis]
references:
  stig:
    rhel10: { vuln_id: "V-281126", stig_id: "RHEL-10-500400", severity: "CAT II" }
  cis:
    rhel10: { section: "6.3.3.33", level: "L2", type: "Automated" }
  nist_800_53: ["AU-12"]
platforms:
  - family: rhel
    min_version: 10
implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=unset"
    remediation:
      mechanism: manual
      note: "Add -S delete_module (b64, auid>=1000, -k kernel_modules) audit rule to /etc/audit/rules.d/ and augenrules --load."
