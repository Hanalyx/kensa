kind: CheckHandler
metadata:
  name: SelinuxBoolean
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Checks a SELinux boolean setting by running getsebool and comparing
    the current value against the expected on/off state.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check via
    CHECK_HANDLERS["selinux_boolean"]. Implemented in
    runner/handlers/checks/_security.py as _check_selinux_boolean.
    Parses getsebool output format "{name} --> {value}" by splitting on
    whitespace and taking the last token. The expected boolean is converted
    to "on"/"off" strings for comparison.
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
  callers:
    - runner.handlers.checks.run_check
  related_specs:
    - selinux_state.spec.yaml

objective:
  summary: >
    Execute getsebool on a remote host to read a SELinux boolean value,
    compare it to the expected on/off state, and return a CheckResult
    with structured Evidence.
  acceptance_criteria:
    AC-1: "Boolean value matching expected returns passed=True with detail '{name} = {actual}'."
    AC-2: "Boolean value not matching expected returns passed=False with detail '{name} = {actual} (expected {expected_str})'."
    AC-3: "Boolean not found or SELinux disabled (command fails) returns passed=False with detail '{name}: not found or SELinux disabled'."
    AC-4: "Unexpected output format (fewer than 3 tokens) returns passed=False with detail '{name}: unexpected output format'."
    AC-5: "Evidence method is always 'selinux_boolean'."
    AC-6: "Evidence expected is 'on' when value=True, 'off' when value=False."

constraints:
  - "MUST read name as a required key (KeyError if absent)."
  - "MUST default value to True when not provided."
  - "MUST convert boolean value to 'on'/'off' string for comparison and evidence.expected."
  - "MUST use shell_util.quote() on the boolean name to prevent shell injection."
  - "MUST redirect stderr to /dev/null in the getsebool command."
  - "MUST parse output by splitting on whitespace and taking the last token."
  - "MUST verify at least 3 tokens in output before extracting value."
  - "MUST use case-insensitive comparison for actual vs expected_str."
  - "MUST set evidence.method to 'selinux_boolean' in all paths."

input_contract:
  - field: name
    type: str
    required: true
    description: SELinux boolean name (e.g., "httpd_can_network_connect").
  - field: value
    type: bool
    required: false
    default: true
    description: "Expected boolean value. True = 'on', False = 'off'."

behavior:
  - "Read name from c['name'] (required key)."
  - "Read expected from c.get('value', True)."
  - "Convert expected to expected_str: 'on' if True, 'off' if False."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: getsebool {quoted_name} 2>/dev/null."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If not result.ok: return FAIL with detail '{name}: not found or SELinux
    disabled' and evidence.actual=None.
  - "Split stripped stdout on whitespace into parts."
  - >
    If fewer than 3 parts: return FAIL with detail '{name}: unexpected
    output format' and evidence.actual=stripped stdout.
  - "Extract actual as the last token in parts."
  - "Compare actual.lower() == expected_str to determine passed."
  - >
    Build detail: if passed, '{name} = {actual}'; if not, '{name} = {actual}
    (expected {expected_str})'.
  - "Return CheckResult with passed, detail, and Evidence."

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass:
      passed: true
      detail: "'{name} = {actual}'"
    fail_mismatch:
      passed: false
      detail: "'{name} = {actual} (expected {expected_str})'"
    fail_not_found:
      passed: false
      detail: "'{name}: not found or SELinux disabled'"
    fail_format:
      passed: false
      detail: "'{name}: unexpected output format'"
  evidence_fields:
    method: "selinux_boolean"
    command: "getsebool {quoted_name} 2>/dev/null"
    stdout: Full raw stdout from getsebool
    stderr: Full raw stderr
    exit_code: Actual exit code from getsebool
    expected: "'on' or 'off' (derived from boolean value)"
    actual: "Last token from getsebool output, None on command failure, or raw output on format error"
    timestamp: UTC time captured before command execution
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'selinux_boolean'."
    - "evidence.expected is always 'on' or 'off', never a Python boolean."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestSelinuxBoolean
      - TestSelinuxBooleanSpecDerived
    count: 6
