spec:
    id: handler-crypto-policy-set
    version: 0.2.0
    status: draft
    tier: 1
    context:
        system: kensa
        feature: handler-crypto-policy-set
        description: |
            The crypto_policy_set handler sets the system-wide RHEL
            crypto policy via `update-crypto-policies --set`. Capture
            records the current policy via `--show`; rollback restores it.
            Crypto-policy changes affect TLS, SSH, and kernel crypto and
            warrant review before production use.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Set the system crypto policy to params.policy. Capture records
            the prior policy so rollback can restore it.
        scope:
            includes:
                - Set the policy via update-crypto-policies --set
                - Capture of the prior policy via --show
                - Rollback restoring the prior policy
                - Rollback verifies the live policy by reading it back with --show
                - Running-daemon staleness reported as a remedy, not a failed restore
            excludes:
                - Custom subpolicy management (use crypto_policy_subpolicy)
                - Restarting long-lived daemons (operator action; reported as remedy)
    constraints:
        - id: C-01
          description: |
              Apply MUST set the system crypto policy to params.policy via
              `update-crypto-policies --set`.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Capture MUST record the current crypto policy via
              `update-crypto-policies --show`, returning
              ErrCaptureIncomplete when that command fails.
          type: security
          enforcement: error
        - id: C-03
          description: |
              Rollback MUST restore the captured prior policy via
              `update-crypto-policies --set`.
          type: security
          enforcement: error
        - id: C-04
          description: |
              decodeParams MUST reject a missing, empty, or non-string
              policy param.
          type: technical
          enforcement: error
        - id: C-05
          description: |
              Crypto-policy changes affect TLS, SSH, and kernel crypto.
              Rules using this handler should be reviewed for
              control-channel sensitivity before running against
              production hosts.
          type: security
          enforcement: warning
        - id: C-06
          description: |
              Rollback MUST verify the restore took by reading the live
              policy back via `update-crypto-policies --show` and comparing
              it to the captured prior policy. A mismatch (or an
              unverifiable read-back) MUST be reported as a failed restore,
              never a silent success. Already-running services that retain
              their startup-time crypto are reported as a remedy in the
              detail, not counted as a restore failure.
          type: security
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: Apply sets the crypto policy via update-crypto-policies --set.
          references_constraints: [C-01, C-05]
          priority: critical
        - id: AC-02
          description: |
              Capture records the prior policy, and returns
              ErrCaptureIncomplete when --show fails.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: Rollback restores the captured prior policy.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: decodeParams rejects a missing or empty policy param.
          references_constraints: [C-04]
          priority: high
        - id: AC-05
          description: |
              Rollback reads the live policy back via --show: a match
              reports success and carries the running-daemon remedy note;
              a mismatch reports a failed (unverified) restore.
          references_constraints: [C-06]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    tags: [handler, capturable, tier-1, crypto]
