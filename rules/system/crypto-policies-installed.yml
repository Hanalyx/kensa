id: crypto-policies-installed
title: Ensure crypto-policies package is installed
description: >
  The crypto-policies package provides system-wide cryptographic
  policy configuration. It must be installed to ensure consistent
  cryptographic settings across all applications.
rationale: >
  Without crypto-policies, individual applications may use inconsistent
  or weak cryptographic settings. The crypto-policies framework ensures
  that all applications use approved algorithms and key sizes.
severity: critical
category: system
tags: [crypto-policies, fips, cryptography]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-279933"
      severity: "CAT I"
  nist_800_53: ["SC-13", "AC-17"]

platforms:
  - family: rhel
    min_version: 8
    max_version: 8

implementations:
  - default: true
    check:
      method: package_state
      name: "crypto-policies"
      state: "present"
    remediation:
      mechanism: package_present
      name: "crypto-policies"
