kind: CheckHandler
metadata:
  name: SelinuxState
  module: handlers/checks
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Checks the current SELinux enforcement mode by running getenforce
    and comparing against an expected state.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check via
    CHECK_HANDLERS["selinux_state"]. Implemented in
    runner/handlers/checks/_security.py as _check_selinux_state.
    Comparison is case-insensitive (actual.lower() == expected.lower()).
  dependencies:
    - runner._types.CheckResult
    - runner._types.Evidence
  callers:
    - runner.handlers.checks.run_check
  related_specs:
    - selinux_boolean.spec.yaml

objective:
  summary: >
    Execute getenforce on a remote host to determine the current SELinux
    mode, compare it case-insensitively to the expected state, and return
    a CheckResult with structured Evidence.
  acceptance_criteria:
    AC-1: "SELinux mode matching expected (case-insensitive) returns passed=True with detail 'SELinux: {actual}'."
    AC-2: "SELinux mode not matching expected returns passed=False with detail 'SELinux: {actual} (expected {expected})'."
    AC-3: "getenforce command failing returns passed=False with detail 'getenforce failed - SELinux may not be installed'."
    AC-4: "Evidence method is always 'selinux_state'."
    AC-5: "Comparison uses case-insensitive matching (e.g., 'enforcing' matches 'Enforcing')."

constraints:
  - "MUST default state to 'Enforcing' when not provided."
  - "MUST use case-insensitive comparison (actual.lower() == expected.lower())."
  - "MUST redirect stderr to /dev/null in the getenforce command."
  - "MUST strip stdout before comparing to expected."
  - "MUST set evidence.method to 'selinux_state' in all paths."
  - "MUST set evidence.actual to None when getenforce command fails."

input_contract:
  - field: state
    type: str
    required: false
    default: "Enforcing"
    description: "Expected SELinux mode (e.g., 'Enforcing', 'Permissive', 'Disabled')."

behavior:
  - "Read expected from c.get('state', 'Enforcing')."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: getenforce 2>/dev/null."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If not result.ok: return FAIL with detail 'getenforce failed - SELinux
    may not be installed' and evidence.actual=None.
  - "Strip result.stdout to get actual mode."
  - "Compare actual.lower() == expected.lower() to determine passed."
  - >
    Build detail: if passed, 'SELinux: {actual}'; if not, 'SELinux: {actual}
    (expected {expected})'.
  - "Return CheckResult with passed, detail, and Evidence."

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass:
      passed: true
      detail: "'SELinux: {actual}'"
    fail_mismatch:
      passed: false
      detail: "'SELinux: {actual} (expected {expected})'"
    fail_getenforce:
      passed: false
      detail: "'getenforce failed - SELinux may not be installed'"
  evidence_fields:
    method: "selinux_state"
    command: "getenforce 2>/dev/null"
    stdout: Full raw stdout from getenforce
    stderr: Full raw stderr
    exit_code: Actual exit code from getenforce
    expected: "The expected state string as provided"
    actual: "Stripped stdout value on success, None on command failure"
    timestamp: UTC time captured before command execution
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'selinux_state'."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestSelinuxState
      - TestSelinuxStateSpecDerived
    count: 5
