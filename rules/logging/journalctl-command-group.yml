id: journalctl-command-group
title: Ensure the journalctl command is group-owned by root
description: >
  The /usr/bin/journalctl command must be group-owned by root so that no
  non-root group can replace or tamper with the binary used to read the
  systemd journal.
rationale: >
  A journalctl binary group-owned by a non-root group could be modified by
  members of that group to hide or alter journal output, undermining the
  integrity of the audit and operational record.
severity: medium
category: logging
tags: [journald, permissions, logging]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270760"
      stig_id: "UBTU-24-700050"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260506"
      stig_id: "UBTU-22-232105"
      severity: "CAT II"
  nist_800_53: ["SI-11", "AC-6"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: file_permission
      path: /usr/bin/journalctl
      group: root
    remediation:
      mechanism: file_permissions
      path: /usr/bin/journalctl
      group: root
