id: mount-var-tmp-nodev
title: Ensure nodev option on /var/tmp partition
description: >
  The nodev mount option prevents device files from being interpreted on
  /var/tmp. Device files should only exist in /dev.
rationale: >
  Allowing device files on /var/tmp could allow an attacker to create special
  devices that access hardware directly.
severity: medium
category: filesystem
tags: [mount, var-tmp, hardening]

references:
  stig:
    rhel8:
      vuln_id: "V-230520"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257876"
      severity: "CAT II"
    rhel10:
      vuln_id: "V-281245"
      severity: "CAT II"
  cis:
    rhel8:  { section: "1.1.2.5.2", level: "L1", type: "Automated" }
    rhel9:  { section: "1.1.2.5.2", level: "L1", type: "Automated" }
    rhel10: { section: "1.1.2.5.2", level: "L1", type: "Automated" }
  nist_800_53: ["CM-6", "AC-3"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: mount_option
      mount_point: "/var/tmp"
      options: ["nodev"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/var/tmp"
      options: ["nodev"]
