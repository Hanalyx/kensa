# Pre-commit hooks for kensa-go.
#
# Install:           pip install pre-commit && pre-commit install
# Run defaults:      pre-commit run --all-files
# Run everything:    pre-commit run --all-files --hook-stage manual
#
# Default-stage hooks are file hygiene only — they run fast and need
# no language toolchain. Manual-stage hooks (Go toolchain, Specter)
# require local installation; CI runs them in dedicated jobs (Lint,
# Spec Sync) instead of through pre-commit. This lets `pre-commit
# install` give every contributor instant local hygiene without
# blocking on a Go install.

repos:
  # ─── Default stage: file hygiene (no language toolchain) ─────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Manual stage: Go toolchain hooks ────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        stages: [manual]
      - id: go-imports
        stages: [manual]
      - id: go-vet
        stages: [manual]
      - id: go-mod-tidy
        stages: [manual]

  # ─── Manual stage: golangci-lint with comment-style suite ────────────
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint
        args: ["--config=.golangci.yml"]
        stages: [manual]

  # ─── Manual stage: Specter spec validation ───────────────────────────
  # Requires `specter` in PATH locally. CI runs spec validation via
  # the dedicated Spec Sync workflow job.
  - repo: local
    hooks:
      - id: specter-doctor
        name: specter doctor
        entry: specter doctor
        language: system
        pass_filenames: false
        files: \.spec\.yaml$|specter\.yaml$
        stages: [manual]
      - id: specter-sync
        name: specter sync
        entry: specter sync
        language: system
        pass_filenames: false
        files: \.spec\.yaml$|specter\.yaml$
        stages: [manual]
