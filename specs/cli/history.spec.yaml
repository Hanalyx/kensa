kind: CLICommand
metadata:
  name: History
  module: cli
  version: 1.0.0
  status: released
  system_spec: system.spec.yaml@1.0.0
  created: "2025-02-10"
  updated: "2025-02-25"

context:
  description: >
    Query compliance scan history from the local SQLite database. Supports
    listing sessions, viewing session details, showing database statistics,
    pruning old data, and querying per-host result history.
  technical_context: >
    Module runner/cli.py -> history(). Click decorators: @main.command(),
    individual options. Four modes: --stats, --prune DAYS, --id ID,
    default (list sessions or per-host result history).
  dependencies:
    - runner.storage.ResultStore
  callers:
    - CLI entry point (kensa history)

objective:
  summary: >
    Query compliance scan history from the local SQLite database. Supports
    listing sessions, viewing session details, showing database statistics,
    pruning old data, and querying per-host result history.
  acceptance_criteria:
    AC-1: "'--stats' exits 0 and displays database statistics table."
    AC-2: "'--prune 30' exits 0 and prints deletion count."
    AC-3: "'--id' with valid session exits 0 and shows session header + results."
    AC-4: "'--id' with nonexistent session exits 1 with 'not found'."
    AC-5: "Default mode (no flags) exits 0 and lists sessions."
    AC-6: "'--host' without '--id' filters session list by host."
    AC-7: "Default mode with no sessions prints 'No sessions found'."
    AC-8: "'--host --rule' shows per-host result history."
    AC-9: "'--host' with no history prints 'No history for host'."
    AC-10: "'--id' with no results for session prints 'No results'."
    AC-11: "'--host --rule' filters by both host and rule."

constraints:
  - "MUST list sessions by default when no mode flag is given."
  - "MUST handle empty result sets gracefully (informational message, exit 0)."
  - "MUST exit 1 only for session-not-found."

input_contract:
  - field: --host / -h
    type: str
    required: false
    default: null
    description: Filter by host
  - field: --rule / -r
    type: str
    required: false
    default: null
    description: Filter by rule ID
  - field: --id / -S
    type: int
    required: false
    default: null
    description: Show specific session results
  - field: --limit / -n
    type: int
    required: false
    default: "20"
    description: Max entries to show
  - field: --stats
    type: bool
    required: false
    default: "false"
    description: Show database statistics
  - field: --prune
    type: int
    required: false
    default: null
    description: Remove results older than N days

behavior:
  - "'--stats': Display database statistics table (session count, result count, oldest/newest, path). Return immediately."
  - "'--prune DAYS': Delete sessions older than N days, print count. Return immediately."
  - "'--id ID': Look up session, display header + results table. Exit 1 if not found."
  - "Default (no mode flag): List sessions. '--host' filters sessions. '--host --rule' shows per-host result history."

exit_codes:
  - code: 0
    condition: "Successful query (including empty results)"
  - code: 1
    condition: "'--id' not found"

output_contract:
  returns: Terminal output
  modes:
    stats: "Rich table with Metric/Value columns."
    prune: "'Deleted N sessions older than N days'."
    session_id: "Session header + results table (Host, Rule, Status, Remediated, Detail)."
    sessions: "Sessions table (ID, Timestamp, Hosts, Rules Path) — shown by default."
    host_history: "History table (Session, Timestamp, Rule, Status, Remediated) — when --host --rule."

side_effects:
  - "SQLite reads: All modes except --prune."
  - "SQLite deletes: --prune removes old sessions and associated data."

testing:
  spec_derived:
    file: tests/test_cli_spec.py
    classes:
      - TestHistorySpecDerived
    count: 9
