id: cron-allow
title: Ensure crontab is restricted to authorized users
description: >
  Access to crontab must be restricted to authorized users via /etc/cron.allow.
rationale: >
  Unrestricted cron access allows any user to schedule tasks, potentially enabling privilege escalation or resource abuse.
severity: medium
category: system
tags: [cron, access-control]

references:
  cis:
    rhel9: { section: "2.4.1.8", level: "L1", type: "Automated" }
    rhel8:  { section: "2.4.1.8", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "CM-6"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "test -f /etc/cron.allow && stat -c '%a %U %G' /etc/cron.allow | grep -q '600 root root'"
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "touch /etc/cron.allow && chmod 600 /etc/cron.allow && chown root:root /etc/cron.allow"
