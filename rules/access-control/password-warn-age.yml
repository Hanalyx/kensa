id: password-warn-age
title: Ensure password expiration warning days is configured
description: >
  The PASS_WARN_AGE setting in /etc/login.defs must be properly configured.
rationale: >
  Improper PASS_WARN_AGE configuration could weaken system security controls.
severity: medium
category: access-control
tags: [password, login-defs, aging]

references:
  cis:
    rhel9_v2: { section: "5.4.1.3", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/login.defs"
      key: "PASS_WARN_AGE"
      expected: "{{ login_defs_pass_warn_age }}"
      comparator: ">="
    remediation:
      mechanism: config_set
      path: "/etc/login.defs"
      key: "PASS_WARN_AGE"
      value: "{{ login_defs_pass_warn_age }}"
      separator: "	"
