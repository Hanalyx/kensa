// kensa agent wire protocol — v1.
//
// L-007 deliverable scaffolded Request/Response/Error/Heartbeat
// with opaque bytes payloads. L-009 replaces the bytes payloads
// with a typed `oneof` covering Apply / Capture / Rollback /
// Heartbeat. Founder ratified protobuf as the wire format
// 2026-05-11 (see ~/.claude/.../memory/l007_wire_protocol.md).
//
// **Versioning policy.** This package is import-path-versioned
// (internal/agent/wirev1). A v2 wire format lands as a parallel
// package (wirev2/), and a transition window has both packages
// importable so the controller can speak either while agents
// catch up. The `schema_version` field on each root message is
// the per-message version handshake L-012 will inspect.
//
// **Field-number convention (L-009 C-07).** Envelope fields
// occupy 1..9. Payload variants start at 10 with gaps of 1
// (10/11/12/13). Future variants (ListMechanisms,
// DetectCapabilities, etc.) use 20+ so the schema can extend
// without renumbering.

syntax = "proto3";

package kensa.agent.wirev1;

option go_package = "github.com/Hanalyx/kensa-go/internal/agent/wirev1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Request is one of the four wire-level root messages
// (controller → agent). The typed `oneof payload` replaces
// L-007's opaque `bytes payload`. Field numbers 1..9 are
// envelope; 10..19 are L-009 payload variants; 20+ are reserved
// for future variants (L-013 binary push, future ListMechanisms,
// etc.).
message Request {
  // 15..19 reserved for future L-009-group payload variants
  // (field 14 was reserved at L-010, repurposed by L-012 for
  // HandshakeRequest below). New non-payload envelope fields
  // use 3..9; new payload variants use 20+.
  reserved 15 to 19;

  uint32 schema_version = 1;
  uint64 correlation_id = 2;
  oneof payload {
    ApplyRequest apply = 10;
    CaptureRequest capture = 11;
    RollbackRequest rollback = 12;
    HeartbeatRequest heartbeat = 13;
    HandshakeRequest handshake = 14;  // L-012
  }
}

// Response is the agent → controller acknowledgment. The
// payload variant MUST correspond to the Request's variant
// (Apply → ApplyResponse, etc.); the L-011 dispatcher enforces
// this. The Error field (envelope-level) carries failures the
// agent could not encode as a typed response (framing error
// surfaced inline, schema-version mismatch caught by L-012).
message Response {
  // 15..19 reserved — see Request note above (14 used by
  // L-012 for HandshakeAck).
  reserved 15 to 19;

  uint32 schema_version = 1;
  uint64 correlation_id = 2;
  oneof payload {
    ApplyResponse apply_resp = 10;
    CaptureResponse capture_resp = 11;
    RollbackResponse rollback_resp = 12;
    HeartbeatAck heartbeat_ack = 13;
    HandshakeAck handshake_ack = 14;  // L-012
  }
  // error at field 99 (well outside the envelope-fields range
  // 1..9) because errors are envelope-level and orthogonal to
  // the payload variant — a Response may carry both a typed
  // payload AND an error (handler ran partially), or just an
  // error (handler couldn't run at all).
  Error error = 99;
}

// Error is the envelope-level failure envelope. Used when the
// agent cannot construct a typed Response (schema mismatch,
// internal panic, decode failure on Request). Per-handler
// failures are surfaced in the typed Response's success/detail
// fields, not here.
//
// `code` is a stable enum-as-string reserved for L-009 schema
// growth (e.g., "schema_mismatch", "panic_recovered",
// "decode_failed").
message Error {
  uint32 schema_version = 1;
  string code = 2;
  string detail = 3;
  bool retryable = 4;
}

// Heartbeat (legacy, L-007 scaffolding). Retained for backward
// compatibility with code written against the L-007 placeholder;
// new code uses HeartbeatRequest / HeartbeatAck inside a
// Request/Response envelope.
message Heartbeat {
  uint32 schema_version = 1;
  uint64 sequence = 2;
  int64 sent_unix_micros = 3;
}

// ─── Handler invocation messages (L-009) ─────────────────────

// ApplyRequest invokes a mechanism's Apply phase on the target.
//   mechanism: handler name from rule YAML (e.g., "file_content")
//   params:    handler-specific parameters as a protobuf Struct
//              (built via wirev1.MapToStruct from api.Params)
//   pre_state: optional captured state for capturable handlers;
//              nil for non-capturable mechanisms
message ApplyRequest {
  string mechanism = 1;
  google.protobuf.Struct params = 2;
  WirePreState pre_state = 3;
}

// ApplyResponse carries the Apply outcome.
message ApplyResponse {
  WireStepResult step_result = 1;
}

// CaptureRequest invokes a mechanism's Capture phase.
message CaptureRequest {
  string mechanism = 1;
  google.protobuf.Struct params = 2;
}

// CaptureResponse carries the captured pre-state.
message CaptureResponse {
  WirePreState pre_state = 1;
}

// RollbackRequest invokes Rollback against a previously-captured
// PreState.
message RollbackRequest {
  WirePreState pre_state = 1;
}

// RollbackResponse carries the rollback outcome.
message RollbackResponse {
  WireRollbackResult rollback_result = 1;
}

// HeartbeatRequest is the controller → agent liveness ping.
//   token: caller-chosen u64 the ack must echo verbatim so the
//          controller can pair acks with outstanding pings
//          (multiple in flight is allowed).
//   sent_unix_micros: advisory clock-skew info; deadman timing
//          uses the controller's local clock, not the agent's
//          (per spec C-06: a compromised agent's clock is not
//          trustworthy).
message HeartbeatRequest {
  uint64 token = 1;
  int64 sent_unix_micros = 2;
}

// HeartbeatAck echoes the token verbatim plus the agent's local
// clock at receipt-time (also advisory).
message HeartbeatAck {
  uint64 token = 1;
  int64 received_unix_micros = 2;
}

// ─── Wire-level mirrors of api/ types ─────────────────────────

// WireStepResult mirrors api.StepResult.
message WireStepResult {
  int32 step_index = 1;
  string mechanism = 2;
  bool capturable = 3;
  bool success = 4;
  string detail = 5;
  bool stranded = 6;
}

// WirePreState mirrors api.PreState. The `data` field carries
// the mechanism-specific map[string]any via
// google.protobuf.Struct (built via wirev1.MapToStruct).
message WirePreState {
  int32 step_index = 1;
  string mechanism = 2;
  bool capturable = 3;
  google.protobuf.Struct data = 4;
  google.protobuf.Timestamp captured_at = 5;
}

// WireRollbackResult mirrors api.RollbackResult.
message WireRollbackResult {
  int32 step_index = 1;
  string mechanism = 2;
  bool success = 3;
  string detail = 4;
  bool partial_restore = 5;
  string source = 6;
  google.protobuf.Timestamp executed_at = 7;
}

// ─── Version handshake (L-012) ───────────────────────────────

// HandshakeRequest is the controller's protocol-version
// declaration. Sent on session start; the agent's
// HandshakeAck either accepts (compatible) or rejects
// (major mismatch). Major bumps mark breaking-change wire
// protocol revisions; minor bumps are additive.
message HandshakeRequest {
  uint32 major = 1;
  uint32 minor = 2;
  string build = 3;  // human-readable build identifier (e.g., "v1.0.0", "dev-abc123")
}

// HandshakeAck reports the agent's protocol identity and
// whether the controller is compatible.
message HandshakeAck {
  uint32 major = 1;
  uint32 minor = 2;
  bool accepted = 3;
  string reason = 4;  // populated only when accepted=false
  string build = 5;
}
