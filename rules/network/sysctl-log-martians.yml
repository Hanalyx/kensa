id: sysctl-log-martians
title: Ensure suspicious packets are logged
description: >
  The kernel parameter(s) net.ipv4.conf.all.log_martians, net.ipv4.conf.default.log_martians must be configured to enforce this network security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]
conflicts_with:
  - sysctl-net-ipv4-conf-all-log-martians
  - sysctl-net-ipv4-conf-default-log-martians

references:
  cis:
    rhel9_v2: { section: "3.3.9", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7", "CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      checks:
        - method: sysctl_value
          key: "net.ipv4.conf.all.log_martians"
          expected: "1"
        - method: sysctl_value
          key: "net.ipv4.conf.default.log_martians"
          expected: "1"
    remediation:
      steps:
        - mechanism: sysctl_set
          key: "net.ipv4.conf.all.log_martians"
          value: "1"
        - mechanism: sysctl_set
          key: "net.ipv4.conf.default.log_martians"
          value: "1"
