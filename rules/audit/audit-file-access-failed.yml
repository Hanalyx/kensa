id: audit-file-access-failed
title: Ensure unsuccessful file access attempts are collected
description: >
  Unsuccessful file access attempts must be collected to detect intrusion attempts.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

supersedes: [audit-unsuccessful-access]
depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9: { section: "6.3.3.7", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-257802"
      stig_id: "RHEL-09-654015"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-k access"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access"
      persist_file: "/etc/audit/rules.d/50-access.rules"
