id: auditd-admin-space-left-action
title: Configure auditd admin_space_left_action
description: >
  The auditd admin_space_left_action parameter must be set to
  single to switch the system to single user mode when audit
  storage reaches a critical threshold.
rationale: >
  When audit storage is nearly exhausted, the system must take
  action to prevent loss of audit records. Switching to single
  user mode ensures continued audit capability while alerting
  administrators to the critical condition.
severity: medium
category: audit
tags: [audit, auditd, storage, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258158"
      severity: "CAT II"
  nist_800_53: ["AU-5"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/audit/auditd.conf"
      key: "admin_space_left_action"
      expected: "single"
    remediation:
      mechanism: config_set
      path: "/etc/audit/auditd.conf"
      key: "admin_space_left_action"
      value: "single"
      separator: " = "
      restart: "auditd"
