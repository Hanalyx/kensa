spec:
    id: footprint-funnel
    version: 0.5.0
    status: draft
    tier: 1

    context:
        system: kensa
        feature: footprint-funnel
        description: |
            The footprint funnel records the concrete set of resources an
            agent-mode transaction touches, so the engine can enforce that a
            handler captured (and can therefore roll back) everything its
            apply actually mutated — converting capture-completeness from a
            human-review promise (CONTRIBUTING.md) into a code-enforced
            precondition.

            Two footprints exist per transaction: the CAPTURED footprint
            (what a handler declared it intends to touch) and the OBSERVED
            footprint (what the recording layer saw the apply touch, one
            entry per mutating syscall, each with the pre-image read
            synchronously BEFORE the mutation). The engine's pre-commit gate
            asserts observed ⊆ captured.

            This spec covers the footprint type, the subset gate logic, and
            the recording layer (internal/agent/footprint). The engine
            pre-commit gate that consumes the two footprints is a separate
            deliverable that builds on it.
        related_specs:
            - kernelio-sysctl
            - engine-transaction

    objective:
        summary: |
            Provide the Footprint type — a path-keyed set of touched
            resources, each with an op (create/modify/delete) and a
            restorable pre-image (absent, or mode + size + content hash +
            owner) — and the Uncovered(observed, captured) gate helper that
            returns the observed paths not present in captured.
        scope:
            includes:
                - Op (create/modify/delete) + String
                - PreImage (absent | mode + size + sha256 + uid/gid + isdir)
                - Entry (canonical path + op + pre-image)
                - Footprint set (path-keyed, deterministic Entries ordering)
                - Add net semantics (first pre-image retained, op advances, create-then-delete nets to untouched)
                - Uncovered(observed, captured) subset gate + Gate (canonicalizes both sides)
                - Recorder wrapping the agent transport (records filesystem mutations to ObservedFootprint)
                - pre-image read synchronously before each mutating syscall; canonical (symlink-resolved) paths
                - MkdirAll decomposed per created level; reads and runtime ops (sysctl/module) forwarded, not recorded
                - Footprinter opt-in interface + SingleFile helper
                - agent dispatchApply pre-commit gate (observed ⊆ captured → fail the step → controller rolls back)
                - pre-apply restorability probe (refuse when a captured resource is immutable)
            excludes:
                - runtime-resource footprint entries (sysctl keys, module names) — forwarded for now
                - RO-fs / ENOSPC / immutable-auditd restorability checks (surface at write time; immutable flag is the proactive check)
                - promoting the footprint into the frozen api/ surface

    constraints:
        - id: C-01
          description: |
              A Footprint MUST key entries by canonical path. Entries() MUST
              return them in a deterministic (path-sorted) order. Adding the
              same path twice MUST retain the FIRST pre-image (it reverses
              the whole transaction) and advance the op to the latest
              mutation; a create followed by a delete MUST net to untouched
              (no entry), because the resource is absent before and after.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Uncovered(observed, captured) MUST return exactly the canonical
              paths present in observed but absent from captured, sorted. An
              empty result means observed ⊆ captured (every touched resource
              was captured for rollback).
          type: security
          enforcement: error
        - id: C-03
          description: |
              The Recorder MUST record each filesystem mutation it funnels
              (AtomicWrite→create, AtomicReplace→modify, AtomicRemove→delete,
              MkdirAll→one create per absent level) with the pre-image read
              synchronously BEFORE delegating to the mutation, using a
              canonical (parent-symlink-resolved) path. Reads
              (ReadFileIfExists/ReadSysctl) and runtime ops
              (WriteSysctl/DeleteModule) MUST be forwarded unchanged and NOT
              recorded. The Recorder MUST transparently satisfy every
              capability interface the wrapped transport offers so a handler's
              agent-mode type assertion still succeeds.
          type: security
          enforcement: error

        - id: C-04
          description: |
              A handler MAY opt into the gate by implementing Footprinter
              (CapturedFootprint, derived from its pre-state). In agent mode
              dispatchApply MUST run the apply through a Recorder and, for an
              opted-in handler whose apply succeeded, assert observed ⊆
              captured (Gate). An uncovered resource MUST fail the step
              (Success=false) so the controller rolls back before commit. A
              handler that does NOT implement Footprinter MUST be left
              ungated (no behavior change), so the gate rolls out per handler
              with no flip-everything-at-once regression.
          type: security
          enforcement: error

        - id: C-05
          description: |
              kernelio.IsImmutable MUST report whether a path has the
              immutable inode flag (FS_IOC_GETFLAGS / FS_IMMUTABLE_FL), with an
              absent path or a filesystem lacking the ioctl treated as not
              immutable. Unrestorable MUST return the captured paths an
              injected check flags immutable (sorted), and MUST NOT treat a
              probe error as unrestorable. In agent mode dispatchApply MUST run
              this probe over an opted-in handler's captured footprint BEFORE
              Apply and, when any resource is immutable, refuse the step
              (Success=false) WITHOUT mutating — a transaction whose rollback
              is impossible is refused, not committed unrollbackable.
          type: security
          enforcement: error

        - id: C-06
          description: |
              The Recorder MUST be a transparent stand-in for EVERY capability
              the wrapped agent transport offers — not only the filesystem
              capabilities it records. Specifically it MUST also satisfy
              systemd.Transport (the service handlers' D-Bus path) and
              auditnl.AuditTransport (audit_rule_set's netlink path), forwarding
              each call to the wrapped transport unchanged (these are not
              filesystem mutations, so nothing is recorded; the audit drop-in
              file IS still recorded via the fsatomic methods). Because every
              agent apply runs through the Recorder, a capability the Recorder
              fails to expose silently routes its handler to the shell fallback
              — so this transparency is a code-enforced invariant, not a
              convenience.
          type: security
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              Footprint keys by path with deterministic ordering; Add retains
              the first pre-image and advances the op; create-then-delete
              nets to untouched; Op.String and PreImage carry the rollback
              fields.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: |
              Uncovered returns the sorted set of observed paths missing from
              captured, and empty when observed is a subset of captured.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: |
              The Recorder records AtomicWrite as create, AtomicReplace as
              modify (with the prior pre-image), AtomicRemove as delete, and
              MkdirAll as one create per absent level; reads and runtime ops
              are forwarded without a footprint entry; realInspect reads a
              true pre-image (absent / file with hash / dir) and refuses a
              symlink.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: |
              Gate catches a write to a resource the handler did not capture
              and passes when observed ⊆ captured; SingleFile builds a
              one-path captured footprint (and errors on a missing key); the
              file_content/file_absent/config_set handlers declare their
              single captured file via Footprinter.
          references_constraints: [C-04]
          priority: critical
        - id: AC-05
          description: |
              kernelio.IsImmutable returns false for an absent/ordinary path;
              Unrestorable returns the injected-immutable captured paths
              sorted and treats a probe error as not-unrestorable; the agent
              refuses to apply (without mutating) when a captured resource is
              immutable.
          references_constraints: [C-05]
          priority: critical
        - id: AC-06
          description: |
              The Recorder satisfies systemd.Transport and
              auditnl.AuditTransport and forwards each call to the wrapped
              transport unchanged (no footprint entry recorded for them), so a
              handler's transport.(systemd.Transport) / .(auditnl.AuditTransport)
              assertion still selects the agent path when wrapped by the
              Recorder.
          references_constraints: [C-06]
          priority: critical

    tags: [agent, footprint, atomicity, tier-1]
