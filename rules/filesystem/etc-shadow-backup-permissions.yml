id: etc-shadow-backup-permissions
title: Ensure permissions on /etc/shadow- are configured
description: 'The /etc/shadow- file must have correct ownership and permissions.

  '
rationale: 'Incorrect permissions on /etc/shadow- could allow unauthorized access
  or modification of sensitive system data.

  '
severity: high
category: filesystem
tags:
- file-permissions
- authentication
references:
  cis:
    rhel9:
      section: 7.1.6
      level: L1
      type: Automated
    rhel8:
      section: 7.1.6
      level: L1
      type: Automated
    rhel10: { section: "7.1.5", level: "L1", type: "Automated" }
  nist_800_53:
  - AC-3
  - MP-2
  - AC-6
  stig:
    rhel9:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-257897", severity: "CAT II" }                          # mode 0000
      - { vuln_id: "V-257912", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257913", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281031", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-281032", severity: "CAT II" }                          # group root
      - { vuln_id: "V-281072", severity: "CAT II" }                          # mode 0000
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: file_permission
    path: /etc/shadow-
    owner: root
    group: root
    mode: '0000'
  remediation:
    mechanism: file_permissions
    path: /etc/shadow-
    owner: root
    group: root
    mode: '0000'
