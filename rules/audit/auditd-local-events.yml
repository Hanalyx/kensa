id: auditd-local-events
title: Configure auditd to audit local events
description: >
  The auditd local_events parameter must be set to yes to
  collect audit events generated on the local system.
rationale: >
  Without auditing local events, security-relevant activity
  on the system would go unrecorded, preventing detection of
  unauthorized access or system compromise.
severity: medium
category: audit
tags: [audit, auditd, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258164"
      severity: "CAT II"
    rhel8_v2r6:
      vuln_id: "V-230393"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/audit/auditd.conf"
      key: "local_events"
      expected: "yes"
    remediation:
      mechanism: config_set
      path: "/etc/audit/auditd.conf"
      key: "local_events"
      value: "yes"
      separator: " = "
      restart: "auditd"
