id: gdm-dconf-database-current
title: Ensure GDM effective dconf policy matches the policy keyfiles
description: 'The GNOME dconf database must be compiled from the current policy keyfiles so that the effective policy matches
  the configured policy.

  '
rationale: 'If the dconf database is not regenerated after policy keyfiles are updated, the effective policy in use may not
  match the intended security configuration. Running dconf update ensures all policy settings take effect immediately.

  '
severity: medium
transactional: false
category: services
tags:
- gdm
- gnome
- dconf
- policy
- security
conflicts_with:
- gdm-removed
references:
  stig:
    rhel9:
      vuln_id: V-258028
      stig_id: RHEL-09-271090
      severity: CAT II
  nist_800_53:
  - CM-6
platforms:
- family: rhel
  min_version: 8
implementations:
- when: gdm
  check:
    method: command
    run: "# Check if dconf database is newer than keyfiles\ndb_file=\"/etc/dconf/db/local\"\nkeyfile_dir=\"/etc/dconf/db/local.d\"\
      \nif [ ! -d \"$keyfile_dir\" ]; then\n  echo \"OK: No local dconf keyfiles found\"\n  exit 0\nfi\nif [ ! -f \"$db_file\"\
      \ ]; then\n  echo \"FAIL: dconf database /etc/dconf/db/local does not exist\"\n  exit 1\nfi\n# Check if any keyfile\
      \ is newer than the database\nif find \"$keyfile_dir\" -newer \"$db_file\" -type f 2>/dev/null | grep -q .; then\n \
      \ echo \"FAIL: dconf keyfiles are newer than compiled database\"\n  exit 1\nfi\necho \"OK: dconf database is current\"\
      \nexit 0\n"
    expected_exit: 0
  remediation:
    mechanism: command_exec
    run: dconf update
- when: apt
  check:
    method: package_state
    name: gdm
    state: absent
  remediation:
    mechanism: apt_absent
    name: gdm
- default: true
  check:
    method: package_state
    name: gdm
    state: absent
  remediation:
    mechanism: package_absent
    name: gdm
