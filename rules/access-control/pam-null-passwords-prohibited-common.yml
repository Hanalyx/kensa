id: pam-null-passwords-prohibited-common
title: Prohibit null passwords in the PAM authentication stack
description: >
  The nullok option must not appear on any active line in
  /etc/pam.d/common-auth or /etc/pam.d/common-password, so that accounts with
  an empty password cannot be used to authenticate.
rationale: >
  The nullok option lets an account with no password authenticate without
  supplying one. On Debian-family systems the PAM stack is configured in
  common-auth / common-password, so null-password acceptance must be denied
  where the platform enforces authentication.
severity: high
transactional: false
category: access-control
tags: [pam, authentication, nullok, null-password, stig]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270714"
      stig_id: "UBTU-24-300028"
      severity: "CAT I"
      cci: ["CCI-000366"]
    ubuntu22:
      vuln_id: "V-260570"
      stig_id: "UBTU-22-611060"
      severity: "CAT I"
      cci: ["CCI-000366"]
  nist_800_53: ["IA-5(1)"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: |
        hits=$(grep -hE 'nullok' /etc/pam.d/common-password /etc/pam.d/common-auth 2>/dev/null | grep -vE '^[[:space:]]*#')
        [ -z "$hits" ] || { echo "FAIL: nullok present in PAM stack:"; printf '%s\n' "$hits"; exit 1; }
        echo "OK: no active nullok in common-auth/common-password"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Remove every 'nullok' option from active lines in
        /etc/pam.d/common-password and /etc/pam.d/common-auth (managed via
        pam-auth-update), so empty passwords cannot be used to authenticate.
