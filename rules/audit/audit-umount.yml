id: audit-umount
title: Audit uses of the umount system call
description: >
  Successful and unsuccessful uses of the umount system call must
  generate an audit record to detect unauthorized filesystem unmounting.
rationale: >
  Auditing umount syscalls detects attempts to remove filesystems that
  may be part of an attack, such as unmounting security monitoring
  partitions or audit log partitions.
severity: medium
category: audit
tags: [audit, auditd, syscall, mount]

depends_on: [auditd-enabled]

references:
  stig:
    rhel9:
      vuln_id: "V-258215"
      stig_id: "RHEL-09-654265"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F arch=b64 -S umount"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S umount -F auid>=1000 -F auid!=unset -k privileged-umount"
      persist_file: "/etc/audit/rules.d/50-mounts.rules"
