id: epel-repos-absent
title: Ensure EPEL repository is not configured
description: >
  Extra Packages for Enterprise Linux (EPEL) repositories must not be
  configured (enabled OR disabled) on RHEL systems. Only DoD-approved repositories should
  be configured.
rationale: >
  EPEL packages are community-maintained and not covered by Red Hat's
  security response process. Installing packages from EPEL bypasses
  the verified software supply chain required for DoD systems.
severity: critical
transactional: false
category: system
tags: [repository, package, supply-chain, attack-surface]

references:
  stig:
    rhel9: { vuln_id: "V-257830", stig_id: "RHEL-09-215035", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230492"
      stig_id: "RHEL-08-040010"
      severity: "CAT II"
  nist_800_53: ["CM-7", "SI-7", "SA-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # Any configured EPEL repo — enabled OR disabled — is a finding.
        if dnf repolist --all 2>/dev/null | grep -qi epel; then
          echo "FAIL: an EPEL repository is configured (repolist)"; exit 1
        fi
        if grep -riqE '(^\\[|baseurl|metalink).*epel' /etc/yum.repos.d/ 2>/dev/null; then
          echo "FAIL: an EPEL repository is present in /etc/yum.repos.d/"; exit 1
        fi
        echo "OK: no EPEL repository configured"; exit 0
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "dnf config-manager --disable epel 2>/dev/null || true; find /etc/yum.repos.d/ -name '*epel*' -exec rm -f {} +"
