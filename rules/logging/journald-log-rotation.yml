id: journald-log-rotation
title: Ensure journald log file rotation is configured
description: >
  journald must have an explicit size or time based rotation limit
  (SystemMaxUse, SystemKeepFree, RuntimeMaxUse, or MaxFileSec) so journals
  cannot grow without bound.
rationale: >
  Unbounded journals can exhaust disk space, causing loss of logs or denial
  of service. Explicit rotation limits keep log storage predictable.
severity: low
transactional: false
category: logging
tags: [journald, logging, rotation]

references:
  cis:
    rhel9:  { section: "6.2.1.3", level: "L1", type: "Manual" }
  nist_800_53: ["AU-4"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        if grep -rhsE '^\s*(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|MaxFileSec)\s*=' \
             /etc/systemd/journald.conf /etc/systemd/journald.conf.d/ 2>/dev/null | grep -q .; then
          echo "OK: journald rotation limit configured"; exit 0
        fi
        echo "FAIL: no journald rotation limit (SystemMaxUse/MaxFileSec/...) set"; exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Set a rotation limit in /etc/systemd/journald.conf (for example
        SystemMaxUse=... or MaxFileSec=1month) and restart systemd-journald.
