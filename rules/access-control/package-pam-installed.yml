id: package-pam-installed
title: Ensure latest version of pam is installed
description: 'The pam package provides the Pluggable Authentication Modules which control authentication and account management.

  '
rationale: 'PAM is essential for system authentication. Keeping it up to date ensures security vulnerabilities are patched.

  '
severity: medium
category: access-control
tags:
- pam
- authentication
- security
references:
  cis:
    rhel9:
      section: 5.3.1.1
      level: L1
      type: Automated
    rhel8: { section: "5.3.1.1", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.3.1.1", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.1.1", level: "L1", type: "Automated" }
  nist_800_53:
  - IA-5
  - CM-6
  - SI-2
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
# On Debian/Ubuntu the PAM runtime ships as libpam-runtime (there is no "pam"
# apt package); CIS Ubuntu 5.3.1.1 audits dpkg-query -s libpam-runtime.
- when: apt
  check:
    method: package_state
    name: libpam-runtime
    state: present
  remediation:
    mechanism: apt_present
    name: libpam-runtime
- default: true
  check:
    method: package_state
    name: pam
    state: present
  remediation:
    mechanism: package_present
    name: pam
