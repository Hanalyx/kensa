id: mount-home-separate-fs
title: Ensure /home is on a separate filesystem
description: >
  User home directories must reside on a separate filesystem or logical volume.
  A dedicated partition for /home prevents user data growth from consuming
  the root filesystem.
rationale: >
  Without a separate /home filesystem, user files could fill the root
  filesystem, causing system instability. A separate partition also allows
  distinct mount options (nodev, nosuid, noexec) to be enforced on home
  directories independently of the root filesystem.
severity: low
transactional: false
category: filesystem
tags: [mount, home, filesystem, hardening]

references:
  cis:
    rhel9:  { section: "1.1.2.3.1", level: "L2", type: "Automated" }
    rhel10: { section: "1.1.2.3.1", level: "L2", type: "Automated" }
    rhel8: { section: "1.1.2.3.1", level: "L2", type: "Automated" }
    ubuntu22: { section: "1.1.2.3.1", level: "L1", type: "Automated" }
    ubuntu24: { section: "1.1.2.3.1", level: "L1", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-280937", stig_id: "RHEL-10-000530", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230328"
      severity: "CAT III"
  nist_800_53: ["CM-6", "SC-5"]

platforms:
  - family: rhel
    min_version: 8

  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: command
      run: "findmnt /home 2>/dev/null | grep -v '^TARGET' | awk '{print $1}' | grep -q '/home$'"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Create a separate partition or logical volume for /home and add it
        to /etc/fstab with nodev and nosuid mount options. Migrate existing
        user home directories to the new partition.
