id: audit-xattr-changes
title: Audit extended attribute changes
description: >
  The system must audit all uses of extended attribute modification
  system calls to track security-relevant attribute changes.
rationale: >
  Extended attributes include SELinux contexts and other security
  metadata. Auditing their modification helps detect attempts to
  bypass security controls.
severity: medium
category: audit
tags: [audit, xattr, selinux, stig]

depends_on: [auditd-enabled]

references:
  cis:
    rhel8: { section: "6.3.3.9", level: "L2", type: "Automated" }
    rhel10: { section: "6.3.3.20", level: "L2", type: "Automated" }
    rhel9: { section: "6.3.3.9", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281117", stig_id: "RHEL-10-500310", severity: "CAT II" }
    rhel9:
      vuln_id: "V-258179"
      stig_id: "RHEL-09-654025"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230413"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270784"
      stig_id: "UBTU-24-900130"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260638"
      stig_id: "UBTU-22-654180"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  # Ubuntu STIG requires the four-line form: both b32 and b64 arches, each
  # for unprivileged (auid>=1000) and root (auid=0) actors.
  - when: apt
    check:
      method: audit_rule_exists
      rule: |
        -a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=unset -k perm_mod
        -a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod
        -a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=unset -k perm_mod
        -a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod
    remediation:
      mechanism: audit_rule_set
      rule: |
        -a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=unset -k perm_mod
        -a always,exit -F arch=b32 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod
        -a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid>=1000 -F auid!=unset -k perm_mod
        -a always,exit -F arch=b64 -S setxattr,fsetxattr,lsetxattr,removexattr,fremovexattr,lremovexattr -F auid=0 -k perm_mod
      persist_file: "/etc/audit/rules.d/50-syscall-perm-mod-setxattr.rules"
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod"
      persist_file: "/etc/audit/rules.d/50-xattr.rules"
