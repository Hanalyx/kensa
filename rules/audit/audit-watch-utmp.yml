id: audit-watch-utmp
title: Audit access to /var/run/utmp (Ubuntu)
description: >
  Modifications to /var/run/utmp must generate an audit record so that current login sessions
  can be traced to an individual.
rationale: >
  Auditing this path supports detection of unauthorized changes and
  forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, watch]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270811"
      stig_id: "UBTU-24-900600"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260643"
      stig_id: "UBTU-22-654205"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /var/run/utmp -p wa -k logins"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /var/run/utmp -p wa -k logins"
      persist_file: "/etc/audit/rules.d/50-watch-utmp.rules"
