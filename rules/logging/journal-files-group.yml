id: journal-files-group
title: Ensure system journal files are group-owned by systemd-journal
description: >
  All files under /run/log/journal and /var/log/journal must be group-owned
  by systemd-journal, the group systemd grants controlled journal access to.
rationale: >
  Journal files group-owned by an unexpected group could be edited or
  deleted by members of that group, destroying or falsifying the operational
  and security record the journal is meant to preserve.
severity: medium
category: logging
tags: [journald, permissions, logging]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270762"
      stig_id: "UBTU-24-700070"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260504"
      stig_id: "UBTU-22-232095"
      severity: "CAT II"
  nist_800_53: ["SI-11", "AC-6"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: "find /run/log/journal /var/log/journal ! -group systemd-journal -type f 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: file_permissions
      find_paths:
        - /run/log/journal
        - /var/log/journal
      find_type: f
      find_args: "! -group systemd-journal"
      group: systemd-journal
