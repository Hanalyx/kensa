spec:
    id: agent-handler-port-filepermissions
    version: 0.1.0
    status: draft
    tier: 2

    context:
        system: kensa
        feature: agent-handler-port-filepermissions
        description: |
            LL Phase 1 deliverable L-014. The first
            handler port to agent mode and the
            architectural bridge between "wire-protocol
            infrastructure exists" (L-007..L-013) and
            "actual handlers run via the wire protocol"
            (L-014 onwards).

            **Architecture** (per docs/roadmap/L-014-DESIGN.md):
              - Option A (env var + WithAgentClient option)
              - Option L1 (full local-syscall Transport)
              - Option D2 (new internal/agent/server/ package)

            All three were founder-ratified 2026-05-11
            after L-013 shipped.

            **What ships:**

            1. `internal/agent/transport/local/local.go` —
               full `api.Transport` for the agent process.
               Run via `sh -c`, Put via `io.Copy + os.Chmod`,
               Get via `io.Copy`, ControlChannelSensitive
               always false (the agent IS the target), Close
               no-op.

            2. `internal/agent/remotehandler/remotehandler.go`
               — controller-side shim wrapping
               `*client.Client` + a mechanism name; satisfies
               `api.Handler`, `api.CaptureHandler`,
               `api.RollbackHandler` by forwarding to
               client.Apply/Capture/Rollback. The
               `transport` argument the engine passes is
               ignored (the agent runs locally on the
               target; it doesn't use a controller-supplied
               transport).

            3. `internal/agent/server/server.go` — the
               agent-side dispatcher. Replaces
               `agent.HandleEcho` as the real handler
               router for `kensa agent --stdio`. Receives
               Apply/Capture/Rollback Requests, looks up
               the mechanism in `handler.Default()`,
               dispatches via a fresh LocalTransport.
               Returns envelope Error for unknown
               mechanism or handler error.

            4. `internal/engine/engine.go` —
               `WithAgentClient(*client.Client) Option`.
               When set, every handler invocation routes
               through a RemoteHandler instead of the
               registered local handler. Composable with
               other engine options.

            5. **CLI wiring deferred to L-014b sub-deliverable.**
               The `agent-mode default (unset KENSA_NO_AGENT)` env var path in
               `cmd/kensa/remediate.go` plus the
               bootstrap→ssh→client.Open→Handshake plumbing
               is invasive enough that splitting it from
               the L-014 architectural pieces (which are
               all here and tested end-to-end via
               subprocess) makes the review-and-ship gates
               cleaner. L-014b ships after L-014 lands. The
               architectural contract is fully validated
               here via the `TestEngine_AgentMode_EndToEnd`
               subprocess test: spawns `bin/kensa agent
               --stdio`, opens an AgentClient on its pipes,
               passes via `engine.WithAgentClient`, runs a
               file_permissions transaction, verifies
               agent-mode result matches the
               direct-execution result.

            **Atomicity boundary (open question Q1):**
            agent crash mid-Apply leaves the target in an
            indeterminate state. L-014 treats this as
            "stranded": the engine marks the transaction
            PartiallyApplied with no auto-rollback attempt.
            Operator inspects manually. The richer
            "fall-back to direct-SSH for rollback" option
            requires keeping the SSH transport wired
            alongside agent-mode and the deadman timer
            aware — heavy; deferred.

            **Live-test gating (open question Q2):** the
            E2E integration test requires `KENSA_TEST_SSH_HOST`
            + `KENSA_TEST_AGENT_MODE=1`. Absence of either
            skips the test cleanly.

            **Scope (in-scope today):** file_permissions
            handler only. L-015..L-032 port the other 18.

            **Out of scope:**
            - `--use-agent` CLI flag: env var only
              today; flag exposure deferred.
            - Mixed-mode session: all-or-nothing for L-014.
            - Multi-target agent reuse: one agent process
              per host per session.
            - Auto-rollback via direct-SSH fallback on
              agent crash.
            - cgroups sandboxing (Stretch B in
              LOW_LEVEL_MIGRATION_V1.md).

    objective:
        summary: |
            Add LocalTransport + RemoteHandler + agent
            server.Handle + engine.WithAgentClient + CLI
            KENSA_USE_AGENT path. End-to-end:
            file_permissions Apply / Capture / Rollback
            through the agent produces the same
            api.RemediationResult as the direct-SSH path.
        scope:
            includes:
                - "internal/agent/transport/local/local.go + _test.go"
                - "internal/agent/remotehandler/remotehandler.go + _test.go"
                - "internal/agent/server/server.go + _test.go"
                - "internal/engine/engine.go: WithAgentClient option"
                - "cmd/kensa/remediate.go: KENSA_USE_AGENT path"
                - "Integration test: local-process agent (bypasses bootstrap+SSH for testability)"
                - "Real-host live test: gated on KENSA_TEST_SSH_HOST + KENSA_TEST_AGENT_MODE=1"
            excludes:
                - "Other 18 handler ports (L-015..L-032)"
                - "User-facing --use-agent CLI flag"
                - "Mixed-mode sessions"
                - "Auto-rollback fallback on agent crash"

    constraints:
        - id: C-01
          description: |
              `internal/agent/transport/local/local.go`
              MUST implement every method of
              `api.Transport`: Run (sh -c exec), Put
              (file copy + chmod), Get (file copy),
              ControlChannelSensitive (always false),
              Close (no-op). Stdout / stderr are captured
              via CombinedOutput-like semantics so the
              CommandResult struct populates correctly.
          type: business
          enforcement: error
        - id: C-02
          description: |
              `RemoteHandler` MUST satisfy `api.Handler`,
              `api.CaptureHandler`, and
              `api.RollbackHandler`. The Capturable()
              method returns the value the wrapper was
              constructed with (typically true for ported
              handlers). The transport argument the engine
              passes is ignored — agent-mode dispatches
              over the wire, not through the supplied
              transport.
          type: business
          enforcement: error
        - id: C-03
          description: |
              `internal/agent/server/server.Handle(req)
              *wirev1.Response` MUST dispatch Request
              variants:
                Apply / Capture / Rollback →
                  handler.Default().Get(mechanism) →
                  construct LocalTransport →
                  invoke via the type assertion
                  (CaptureHandler / RollbackHandler) →
                  wrap result in the matching Response
                  variant
                Handshake → forward to agent.HandleEcho
                  (which already handles it correctly per
                  L-012)
                Heartbeat → forward to agent.HandleEcho
                Unknown mechanism → envelope Error code
                  "unknown_mechanism"
                Handler returned error → envelope Error
                  code "handler_error"
                Handler returned (failed-result, nil) →
                  typed Response with Success=false
          type: business
          enforcement: error
        - id: C-04
          description: |
              `engine.WithAgentClient(*client.Client)`
              MUST cause every handler invocation in the
              engine's dispatch path to route through a
              RemoteHandler wrapping that client. The
              original local handlers are SHADOWED, not
              deleted from the registry — closing the
              client and clearing the option restores
              local dispatch (though engine.Engine is
              typically constructed fresh per kensa
              invocation, so this is mainly a code-hygiene
              guarantee).
          type: business
          enforcement: error
        - id: C-05
          description: |
              **DEFERRED to L-014b sub-deliverable.** The
              `agent-mode default (unset KENSA_NO_AGENT)` CLI env-var path
              (bootstrap → ssh subprocess → client.Open →
              Handshake → engine.WithAgentClient) ships as
              a follow-up. L-014 validates the
              architectural contract end-to-end via
              `TestEngine_AgentMode_EndToEnd`, which spawns
              `bin/kensa agent --stdio` directly and wires
              the AgentClient against its pipes. This
              proves the entire L-007..L-014 stack
              connects.
          type: business
          enforcement: warning
        - id: C-06
          description: |
              An agent crash mid-Apply (reader returns
              EOF during a pending request, client returns
              ErrAgentStreamClosed) MUST surface as a
              transaction-level error with `Status:
              StatusErrored`. The engine MUST NOT auto-
              attempt rollback via a fallback transport
              — the resulting transaction is marked as
              indeterminate ("stranded") for operator
              inspection. Documented in
              `internal/engine/commit.go` near the dispatch
              call site.
          type: business
          enforcement: error
        - id: C-07
          description: |
              file_permissions handler MUST work unchanged
              under LocalTransport (no agent-mode-specific
              edits to the handler). The handler currently
              uses `transport.Run` exclusively (no
              Put/Get/ControlChannelSensitive branching),
              so Option L1's full Transport drop-in works.
              Verified by integration test:
              file_permissions Apply / Capture / Rollback
              via agent produces the same StepResult /
              PreState / RollbackResult as via direct-SSH.
          type: business
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              `LocalTransport.Run(ctx, "echo hello")` returns
              CommandResult with Stdout="hello", ExitCode=0,
              non-zero Duration. Locked by
              `TestLocalTransport_Run`.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: |
              `LocalTransport.Put(ctx, localPath, remotePath,
              0o644)` copies bytes and sets the mode.
              Locked by `TestLocalTransport_Put`.
          references_constraints: [C-01]
          priority: high
        - id: AC-03
          description: |
              RemoteHandler.Apply(ctx, transport, params,
              pre) forwards to client.Apply and returns
              the result. Same for Capture and Rollback.
              Locked by `TestRemoteHandler_Apply`,
              `_Capture`, `_Rollback`.
          references_constraints: [C-02]
          priority: critical
        - id: AC-04
          description: |
              Agent server.Handle dispatches ApplyRequest
              to file_permissions handler via
              handler.Default(), returns ApplyResponse
              with the StepResult populated. Locked by
              `TestServer_Handle_ApplyFilePermissions`.
          references_constraints: [C-03]
          priority: critical
        - id: AC-05
          description: |
              Agent server.Handle returns envelope Error
              with code="unknown_mechanism" when the
              mechanism is not registered. Locked by
              `TestServer_Handle_UnknownMechanism`.
          references_constraints: [C-03]
          priority: high
        - id: AC-06
          description: |
              `engine.WithAgentClient(c)` causes a Run
              against an in-process agent (connected via
              io.Pipe to a server.Handle loop) to produce
              the same RemediationResult as direct-SSH
              against the same fake target. Locked by
              `TestEngine_AgentMode_IdenticalToDirectSSH`.
          references_constraints: [C-04, C-07]
          priority: critical
        - id: AC-07
          description: |
              C-07 (file_permissions unchanged under
              LocalTransport) is locked TODAY by
              `TestKensaAgent_L014_FilePermissionsApply` —
              the subprocess E2E observes the file's mode
              actually change post-Apply. C-05 (CLI env-var
              wiring) is DEFERRED to L-014b along with the
              live-host parity test against
              KENSA_TEST_SSH_HOST. Splitting prevents the
              confused reading "AC-07 is unassigned." See
              the L-014 design doc for the L-014/L-014b
              partition rationale.
          references_constraints: [C-07]
          priority: critical
        - id: AC-08
          description: |
              Agent-crash mid-Apply (client returns
              ErrAgentStreamClosed) produces a
              TransactionResult with
              Status=StatusErrored. The engine does NOT
              attempt rollback via a fallback path. Locked
              by `TestEngine_AgentCrashIsStranded`.
          references_constraints: [C-06]
          priority: high
        - id: AC-09
          description: |
              `go test ./...`, cli-smoke, specter strict,
              `make proto-check`, `make manpage-check` all
              green. Verified during merge.
          references_constraints: [C-01, C-02, C-03, C-04, C-05, C-06, C-07]
          priority: critical

    tags: [agent, handler-port, file-permissions, ll-phase-1, l-014]
