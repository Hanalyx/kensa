id: package-sudo-installed
title: Ensure sudo is installed
description: 'The sudo package must be installed.

  '
rationale: 'The sudo package provides essential functionality. Without it, the system cannot meet the corresponding security
  requirements.

  '
severity: medium
category: access-control
tags:
- sudo
- access-control
- packages
references:
  cis:
    rhel9:
      section: 5.2.1
      level: L1
      type: Automated
    rhel10: { section: "5.2.1", level: "L1", type: "Automated" }
    rhel8: { section: "5.2.1", level: "L1", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-280968", stig_id: "RHEL-10-200590", severity: "CAT II" }
    rhel9:
      vuln_id: V-258083
      stig_id: RHEL-09-432010
      severity: CAT II
  nist_800_53:
  - AC-6
  - AU-12
platforms:
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: sudo
    state: present
  remediation:
    mechanism: apt_present
    name: sudo
- default: true
  check:
    method: package_state
    name: sudo
    state: present
  remediation:
    mechanism: package_present
    name: sudo
