id: audit-syscall-perm-mod-chown
title: Audit ownership changes
description: >
  The system must generate an audit record for ownership changes so that the
  responsible user can be identified.
rationale: >
  Auditing these system calls supports detection of unauthorized changes
  and forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, syscall]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270785"
      stig_id: "UBTU-24-900140"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260634"
      stig_id: "UBTU-22-654160"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: |
        -a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_chng
        -a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_chng
    remediation:
      mechanism: audit_rule_set
      rule: |
        -a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_chng
        -a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_chng
      persist_file: "/etc/audit/rules.d/50-syscall-perm-mod-chown.rules"
