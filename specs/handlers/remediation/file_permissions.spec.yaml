kind: RemediationHandler
metadata:
  name: FilePermissions
  module: handlers/remediation
  version: 2.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-03-23"

context:
  description: >
    Sets file ownership (owner, group) and permissions (mode) on a remote host.
    Supports two modes: (1) direct path mode for single files or glob patterns,
    and (2) bulk find mode for applying changes across directory trees using
    find-based file discovery. Constructs chown and chmod commands as needed.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["file_permissions"]. Implemented in
    runner/handlers/remediation/_file.py as _remediate_file_permissions.
  dependencies:
    - runner.shell_util.is_glob_path
    - runner.shell_util.quote_path
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/file_content_set.spec.yaml

objective:
  summary: >
    Set file ownership and/or permissions on a remote host. In direct mode,
    operates on a single path or glob pattern. In bulk mode (when find_paths
    is present), uses find to discover files in directory trees and applies
    changes via -exec. Supports dry-run preview in both modes.
  acceptance_criteria:
    # --- Direct path mode (v1 ACs, unchanged) ---
    AC-1: >
      Dry-run returns preview: When dry_run=True in direct mode, returns
      (True, "Would run: {commands}") where commands is the chown && chmod
      string, and no SSH commands are executed.
    AC-2: >
      Owner and group set: When both owner and group are provided, chown is
      called with "{owner}:{group}" spec.
    AC-3: >
      Owner only: When only owner is provided (no group), chown is called with
      just the owner name (no colon).
    AC-4: >
      Group only: When only group is provided (no owner), chown is called with
      ":{group}" spec.
    AC-5: >
      Mode set: When mode is provided, chmod is called with the octal or
      symbolic mode string (e.g., "0644", "go-w", "+t").
    AC-6: >
      Combined command: When both ownership and mode are specified, the handler
      constructs "chown ... && chmod ..." as a single compound command.
    AC-7: >
      Glob support via explicit flag: When "glob" key is present in the
      remediation dict, the path is treated as a glob pattern.
    AC-8: >
      Glob auto-detection: When the path contains glob characters and no
      explicit glob flag, shell_util.is_glob_path detects and enables glob
      quoting.
    AC-9: >
      Success path: When the compound command succeeds, returns (True, "Set
      permissions on {path}").
    AC-10: >
      Failure path: When the compound command fails, returns (False, "Failed:
      {stderr}").
    AC-11: >
      Path quoting: The path is quoted via shell_util.quote_path with
      allow_glob set according to glob detection.
    # --- Bulk find mode (v2 ACs) ---
    AC-12: >
      Bulk mode activation: When find_paths is present in the remediation
      dict, the handler switches to bulk find mode. The find_paths field is
      a list of directory paths to search.
    AC-13: >
      Find name filter: When find_name is provided, a -name filter is added
      to the find command with the pattern properly quoted.
    AC-14: >
      Find type filter: When find_type is provided (e.g., "f" or "d"), a
      -type filter is added to the find command.
    AC-15: >
      Find extra arguments: When find_args is provided, the string is
      appended to the find command after built-in filters. This supports
      complex filter expressions like "! -user root" or "-perm /022".
    AC-16: >
      Bulk find with chown: In bulk mode, when owner or group is specified,
      the find command includes -exec chown {spec} {} + to apply ownership
      changes to all matching files.
    AC-17: >
      Bulk find with chmod: In bulk mode, when mode is specified, the find
      command includes -exec chmod {mode} {} + to apply permission changes
      to all matching files.
    AC-18: >
      Bulk combined operations: When both ownership and mode are specified
      in bulk mode, the find command includes both -exec chown and -exec
      chmod clauses.
    AC-19: >
      Bulk dry-run: When dry_run=True in bulk mode, returns (True, "Would
      run: {find_command}") without executing any SSH commands.
    AC-20: >
      Bulk success: When the find command succeeds, returns (True, "Set
      permissions via find in {paths}") where paths is a comma-separated
      list of the search directories.
    AC-21: >
      Bulk failure: When the find command fails, returns (False, "Failed:
      {stderr}").
    AC-22: >
      find_type validation: When find_type is provided, it must be validated
      to be a single character from the set {f, d, l, b, c, p, s} before
      being appended to the find command. An invalid find_type value must
      cause the handler to return (False, error_detail) rather than being
      passed unvalidated to the shell.
    AC-23: >
      chown_spec and mode quoting: In both direct and bulk modes, the
      owner, group, and mode values interpolated into chown and chmod
      commands must be validated or quoted to prevent shell injection.
      Values containing shell metacharacters (;, |, $, backtick, newline)
      must be rejected.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote_path() with allow_glob for safe path quoting in direct mode.
  - MUST use shell_util.quote() for quoting individual directory paths in bulk mode.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The handler does not create parent directories or verify the file exists before modifying permissions.
  - At least one of owner, group, or mode SHOULD be present.
  - In bulk mode, find_paths MUST be a non-empty list.

input_contract:
  # --- Direct mode fields ---
  - field: mechanism
    type: str
    required: true
    description: Must be "file_permissions" (used by dispatch, not by handler directly)
  - field: path
    type: str
    required: false
    description: File path or glob pattern on the remote host (required in direct mode)
  - field: owner
    type: str
    required: false
    description: File owner to set (used in both modes)
  - field: group
    type: str
    required: false
    description: File group to set (used in both modes)
  - field: mode
    type: str
    required: false
    description: File mode — octal (e.g., "0644") or symbolic (e.g., "go-w", "+t")
  - field: glob
    type: bool
    required: false
    description: Explicit flag to treat path as a glob pattern (direct mode only)
  # --- Bulk find mode fields ---
  - field: find_paths
    type: list[str]
    required: false
    description: >
      List of directory paths to search with find. Presence of this field
      activates bulk mode. Mutually exclusive with path.
  - field: find_name
    type: str
    required: false
    description: File name pattern for find -name filter (e.g., "*.so*", "*_key")
  - field: find_type
    type: str
    required: false
    description: File type filter for find -type (e.g., "f" for files, "d" for directories)
  - field: find_args
    type: str
    required: false
    description: >
      Additional find arguments appended after built-in filters. Supports
      complex expressions like "! -user root", "-perm /022", "-xdev".

behavior:
  # --- Mode selection ---
  - "Check for bulk mode: If find_paths is present, use bulk find mode. Otherwise, use direct path mode."
  # --- Direct path mode (unchanged) ---
  - "Extract fields: Read path from the remediation dict. Read optional owner, group, mode, and glob."
  - "Determine glob mode: Set is_glob to True if \"glob\" key is present in the dict OR if shell_util.is_glob_path(path) returns True."
  - "Build chown command: If owner or group is provided, construct chown_spec as \"{owner}:{group}\" (when group is present) or just owner. Quote the path with shell_util.quote_path(path, allow_glob=is_glob). Add \"chown {chown_spec} {quoted_path}\" to the parts list."
  - "Build chmod command: If mode is provided, quote the path again with allow_glob. Add \"chmod {mode} {quoted_path}\" to the parts list."
  - "Dry-run check: If dry_run=True, return (True, \"Would run: {' && '.join(parts)}\")."
  - "Execute compound command: Join parts with \" && \" and execute via ssh.run()."
  - "Check result: If the command fails (not ok), return (False, \"Failed: {stderr}\")."
  - "Success return: Return (True, \"Set permissions on {path}\")."
  # --- Bulk find mode ---
  - "Build find command: Start with \"find\" followed by quoted directory paths from find_paths."
  - "Add filters: Append -name (quoted) if find_name is set. Append -type if find_type is set. Append find_args string if set."
  - "Add exec clauses: If owner/group, append \"-exec chown {spec} {} +\". If mode, append \"-exec chmod {mode} {} +\"."
  - "Dry-run check: If dry_run=True, return (True, \"Would run: {find_command}\")."
  - "Execute find command via ssh.run()."
  - "Check result: If the command fails, return (False, \"Failed: {stderr}\")."
  - "Success return: Return (True, \"Set permissions via find in {comma_separated_paths}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Direct dry-run: \"Would run: {chown && chmod commands}\""
    - "Direct success: \"Set permissions on {path}\""
    - "Bulk dry-run: \"Would run: {find command}\""
    - "Bulk success: \"Set permissions via find in {paths}\""
    - "Failure: \"Failed: {stderr}\""

side_effects:
  - "Changes file ownership via chown on the remote host."
  - "Changes file permissions via chmod on the remote host."
  - "In bulk mode, find traverses directory trees which may be slow on large filesystems."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestFilePermissionsSpecDerived
      - TestFilePermissionsBulkSpecDerived
    count: 26
