id: system-commands-mode
title: Ensure system command files have mode 755 or less
description: >
  All files in /usr/bin, /usr/sbin, /usr/local/bin, and /usr/local/sbin must
  have mode 755 or less permissive to prevent unauthorized modification of
  system commands.
rationale: >
  If system commands are world-writable, local users can replace them with
  malicious versions. Restricting permissions to 755 prevents unauthorized
  modification.
severity: medium
category: filesystem
tags: [file-permissions, system-commands, security]

references:
  stig:
    rhel10: { vuln_id: "V-281058", stig_id: "RHEL-10-400205", severity: "CAT II" }
    rhel9: { vuln_id: "V-257882", stig_id: "RHEL-09-232010", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230257"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270701"
      stig_id: "UBTU-24-300011"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260486"
      stig_id: "UBTU-22-232015"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: "find /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin -perm /022 -type f 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: file_permissions
      find_paths:
        - /usr/bin
        - /usr/sbin
        - /usr/local/bin
        - /usr/local/sbin
      find_type: f
      find_args: "-perm /022"
      mode: "go-w"
