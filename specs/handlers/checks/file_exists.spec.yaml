kind: CheckHandler
metadata:
  name: FileExists
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Verifies that a file exists on a remote host by running a test -e
    command over SSH.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check when
    check["method"] == "file_exists". Implemented in
    runner/handlers/checks/_file.py as _check_file_exists.
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
    - runner.ssh.SSHSession
    - datetime
  callers:
    - runner.engine.run_check
  related_specs:
    - file_not_exists.spec.yaml
    - file_permission.spec.yaml

objective:
  summary: >
    Execute test -e on a remote path to verify the file exists, returning
    a CheckResult with structured Evidence capturing the command output.
  acceptance_criteria:
    AC-1: "File exists (exit code 0) returns passed=True."
    AC-2: "File not found (exit code non-zero) returns passed=False."
    AC-3: "Evidence method is always 'file_exists'."
    AC-4: "Evidence command includes 'test -e'."
    AC-5: "Detail format is '{path}: exists' on pass and '{path}: not found' on fail."
    AC-6: "Evidence timestamp is a UTC datetime captured before the command executes."

constraints:
  - "MUST use shell_util.quote() to escape the path for safe shell interpolation."
  - "MUST capture check_time before executing the SSH command."
  - "MUST set evidence.method to 'file_exists' in all code paths."
  - "MUST set evidence.expected to 'exists' in all code paths."
  - "MUST set evidence.actual to 'exists' on pass and 'not found' on fail."
  - "MUST NOT modify any remote state (pure measurement)."

input_contract:
  - field: path
    type: str
    required: true
    description: Absolute path to the file to check for existence.

behavior:
  - "Extract path from c['path'] (required key)."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: f'test -e {shell_util.quote(path)}'."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If result.ok (exit code 0): return CheckResult(passed=True) with
    detail f"{path}: exists" and evidence actual="exists".
  - >
    If not result.ok: return CheckResult(passed=False) with detail
    f"{path}: not found" and evidence actual="not found".

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass:
      passed: true
      detail: "'{path}: exists'"
    fail_not_found:
      passed: false
      detail: "'{path}: not found'"
  evidence_fields:
    method: "file_exists"
    command: "test -e {quoted_path}"
    stdout: Raw stdout from test command
    stderr: Raw stderr from test command
    exit_code: Actual exit code from test command
    expected: "exists"
    actual: "'exists' on pass, 'not found' on fail"
    timestamp: UTC datetime captured before command execution
  detail_formats:
    - "{path}: exists"
    - "{path}: not found"
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'file_exists'."
    - "evidence.expected is always 'exists'."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestFileExists
      - TestFileExistsSpecDerived
    count: 6
