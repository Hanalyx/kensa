kind: RemediationHandler
metadata:
  name: PamModuleArg
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-03-14"
  updated: "2026-03-14"

context:
  description: >
    Ensures or removes a specific argument on PAM module lines across one or
    more PAM service files. Unlike pam_module_configure (which replaces entire
    PAM lines), this handler performs surgical arg-level edits that preserve
    all other arguments on the line.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["pam_module_arg"]. Implemented in
    runner/handlers/remediation/_security.py as _remediate_pam_module_arg.
  dependencies:
    - runner.shell_util.quote
    - runner.shell_util.read_file
    - runner.shell_util.write_file
  callers:
    - runner.handlers.remediation._dispatch_remediation

objective:
  summary: >
    Add or remove a specific argument on PAM module lines in service files.
    Two actions: "ensure" adds an arg if not present (idempotent), "remove"
    strips an arg from matching lines. Supports optional PAM type filtering
    and regex arg patterns for remove.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True,
      "Would {action} arg '{arg}' on {module} lines in {files}") and
      no SSH commands are executed.
    AC-2: >
      Remove exact arg: When action="remove", removes exact word matches
      of arg from lines containing the module, cleans up extra whitespace,
      and returns (True, "Removed arg '{arg}' from {module} in {n} file(s)").
    AC-3: >
      Remove regex arg: When action="remove" and arg_regex=True, removes
      regex-matched args (e.g., "remember=[0-9]*") from matching lines.
    AC-4: >
      Ensure arg present: When action="ensure", adds arg to matching lines
      that don't already contain it, returns (True, "Ensured arg '{arg}'
      on {module} in {n} file(s)").
    AC-5: >
      Ensure is idempotent: When action="ensure" and arg is already
      present on all matching lines, no modifications are made and
      returns (True, "Ensured arg '{arg}' on {module} in {n} file(s)").
    AC-6: >
      Type filter: When type is provided, only lines matching both the
      PAM type and the module are affected.
    AC-7: >
      Multiple files: All files in the files list are processed. If a
      file does not exist, it is skipped with a warning (not an error).
    AC-8: >
      sed failure: If sed fails on any file, returns (False,
      "Failed to edit {path}: {stderr}").

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for all user-derived values in shell commands.
  - MUST return a 2-tuple (bool, str) from the handler.
  - MUST preserve all other arguments on the PAM line (no full-line replacement).
  - MUST clean up extra whitespace after arg removal.
  - MUST be idempotent for ensure action (no duplicate args).

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "pam_module_arg"
  - field: action
    type: str
    required: true
    description: >
      "ensure" to add arg if missing, "remove" to strip arg from lines.
  - field: module
    type: str
    required: true
    description: >
      PAM module name to match (e.g., "pam_unix.so").
  - field: arg
    type: str
    required: true
    description: >
      Argument to ensure or remove. For remove with arg_regex=True,
      this is a sed-compatible regex pattern (e.g., "remember=[0-9]*").
  - field: files
    type: list[str]
    required: true
    description: >
      List of PAM file paths to edit (e.g., ["/etc/pam.d/system-auth"]).
  - field: type
    type: str
    required: false
    description: >
      PAM type filter (e.g., "password"). When set, only lines matching
      this type AND the module are affected.
  - field: arg_regex
    type: bool
    required: false
    default: "false"
    description: >
      When True, treat arg as a regex pattern for remove action.

behavior:
  - "Extract action, module, arg, files, optional type, optional arg_regex."
  - "Dry-run check: If dry_run=True, return preview message."
  - "For each file in files:"
  - "  Check if file exists (skip if not)."
  - "  For remove action:"
  - "    Build sed pattern to match lines with module (and optional type)."
  - "    If arg_regex, remove regex pattern; else remove exact word boundary match."
  - "    Clean up extra whitespace after removal."
  - "  For ensure action:"
  - "    Build sed pattern: on lines matching type+module that don't contain arg,"
  - "    append arg to end of line."
  - "  Run sed command on the file."
  - "Return success with count of files processed."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would {action} arg '{arg}' on {module} lines in {n} file(s)\""
    - "Remove success: \"Removed arg '{arg}' from {module} in {n} file(s)\""
    - "Ensure success: \"Ensured arg '{arg}' on {module} in {n} file(s)\""
    - "sed failure: \"Failed to edit {path}: {stderr}\""

side_effects:
  - "Modifies PAM configuration files on the remote host via sed."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestPamModuleArgSpecDerived
    count: 8
