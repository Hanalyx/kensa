kind: CheckHandler
metadata:
  name: FileContent
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Reads a file's entire content and compares it (stripped) against an
    expected string. Useful for banner files where the exact wording must
    match.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check when
    check["method"] == "file_content". Implemented in
    runner/handlers/checks/_file.py as _check_file_content.
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
    - runner.ssh.SSHSession
    - datetime
  callers:
    - runner.engine.run_check
  related_specs:
    - file_exists.spec.yaml
    - file_content_match.spec.yaml
    - file_content_no_match.spec.yaml

objective:
  summary: >
    Cat a remote file, strip both the actual content and the expected
    content, perform an exact string comparison, and return a CheckResult
    with Evidence capturing the raw file output for audit trails.
  acceptance_criteria:
    AC-1: "Content matches (after stripping both sides) returns passed=True."
    AC-2: "Content does not match returns passed=False."
    AC-3: "File not readable (cat fails, exit code non-zero) returns passed=False."
    AC-4: "Evidence method is always 'file_content'."
    AC-5: "Both actual content and expected content are stripped before comparison."
    AC-6: "Detail format is '{path}: content matches expected' on pass and '{path}: content does not match expected' on fail."
    AC-7: "Evidence expected is the stripped expected_content value."
    AC-8: "Evidence actual is the stripped stdout value."
    AC-9: "Evidence command includes 'cat'."
    AC-10: "Evidence timestamp is a UTC datetime captured before the command executes."

constraints:
  - "MUST use shell_util.quote() to escape the path in the cat command."
  - "MUST strip both actual stdout and expected_content before comparison."
  - "MUST capture check_time before executing the SSH command."
  - "MUST set evidence.method to 'file_content' in all code paths."
  - "MUST return passed=False with 'not found or not readable' detail when cat fails."
  - "MUST NOT modify any remote state (pure measurement)."

input_contract:
  - field: path
    type: str
    required: true
    description: Absolute path to the file to read.
  - field: expected_content
    type: str
    required: true
    description: Expected full content of the file (stripped before comparison).

behavior:
  - "Extract path from c['path'] and expected from c['expected_content'] (both required keys)."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: f'cat {shell_util.quote(path)}'."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If not result.ok (file not readable): return CheckResult(passed=False)
    with detail f"{path}: not found or not readable" and evidence with
    expected="file readable with expected content" and actual="file not
    found or not readable".
  - "Strip actual content: actual = result.stdout.strip()."
  - "Strip expected content: expected_stripped = expected.strip()."
  - >
    If actual == expected_stripped: return CheckResult(passed=True) with
    detail f"{path}: content matches expected" and evidence with
    expected=expected_stripped and actual=actual.
  - >
    If actual != expected_stripped: return CheckResult(passed=False) with
    detail f"{path}: content does not match expected" and evidence with
    expected=expected_stripped and actual=actual.

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass:
      passed: true
      detail: "'{path}: content matches expected'"
    fail_mismatch:
      passed: false
      detail: "'{path}: content does not match expected'"
    fail_not_readable:
      passed: false
      detail: "'{path}: not found or not readable'"
  evidence_fields:
    method: "file_content"
    command: "cat {quoted_path}"
    stdout: Raw file content (unstripped)
    stderr: Raw stderr
    exit_code: Actual exit code
    expected: "Stripped expected_content on content paths; 'file readable with expected content' on not-readable path"
    actual: "Stripped stdout on content paths; 'file not found or not readable' on not-readable path"
    timestamp: UTC datetime captured before command execution
  detail_formats:
    - "{path}: content matches expected"
    - "{path}: content does not match expected"
    - "{path}: not found or not readable"
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is always 'file_content'."
    - "Comparison is always performed on stripped content."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestFileContent
      - TestFileContentSpecDerived
    count: 10
