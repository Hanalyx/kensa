# CIS Red Hat Enterprise Linux 9 Benchmark v2.0.0
# Reference file for mapping verification and gap analysis
#
# Fields:
#   section: CIS section number
#   title: Control title from benchmark
#   type: Automated or Manual
#   aegis_rule: AEGIS rule ID (if mapped)
#   status: covered | missing | partial | not_applicable
#
# Usage:
#   - Compare against AEGIS rules to verify correct mappings
#   - Identify coverage gaps
#   - Track implementation progress

benchmark:
  name: "CIS Red Hat Enterprise Linux 9 Benchmark"
  version: "2.0.0"
  platform: rhel9

controls:

  # ============================================================================
  # 1 Initial Setup
  # ============================================================================

  # 1.5 Configure System Wide Crypto Policy (partial - SELinux moved here from 1.6)
  - section: "1.5.4"
    title: "Ensure core dump storage is disabled"
    type: Automated
    aegis_rule: null
    status: missing

  # 1.6 Configure System Wide Crypto Policy
  - section: "1.6.1"
    title: "Ensure system wide crypto policy is not set to legacy"
    type: Automated
    aegis_rule: "crypto-policy-no-weak"
    status: verify

  - section: "1.6.2"
    title: "Ensure system wide crypto policy is not set in sshd configuration"
    type: Automated
    aegis_rule: "ssh-crypto-policy"
    status: verify

  - section: "1.6.3"
    title: "Ensure system wide crypto policy disables sha1 hash and signature support"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.6.4"
    title: "Ensure system wide crypto policy disables macs less than 128 bits"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.6.5"
    title: "Ensure system wide crypto policy disables cbc for ssh"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.6.6"
    title: "Ensure system wide crypto policy disables chacha20-poly1305 for ssh"
    type: Manual
    aegis_rule: null
    status: missing

  - section: "1.6.7"
    title: "Ensure system wide crypto policy disables EtM for ssh"
    type: Manual
    aegis_rule: null
    status: missing

  # 1.7 Configure Command Line Warning Banners
  - section: "1.7.1"
    title: "Ensure message of the day is configured properly"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.7.2"
    title: "Ensure local login warning banner is configured properly"
    type: Automated
    aegis_rule: "banner-dod-consent"
    status: verify

  - section: "1.7.3"
    title: "Ensure remote login warning banner is configured properly"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.7.4"
    title: "Ensure access to /etc/motd is configured"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.7.5"
    title: "Ensure access to /etc/issue is configured"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.7.6"
    title: "Ensure access to /etc/issue.net is configured"
    type: Automated
    aegis_rule: null
    status: missing

  # 1.8 Configure GNOME Display Manager
  - section: "1.8.1"
    title: "Ensure GNOME Display Manager is removed"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.2"
    title: "Ensure GDM login banner is configured"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.3"
    title: "Ensure GDM disable-user-list option is enabled"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.4"
    title: "Ensure GDM screen locks when the user is idle"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.5"
    title: "Ensure GDM screen locks cannot be overridden"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.6"
    title: "Ensure GDM automatic mounting of removable media is disabled"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.7"
    title: "Ensure GDM disabling automatic mounting of removable media is not overridden"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.8"
    title: "Ensure GDM autorun-never is enabled"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.9"
    title: "Ensure GDM autorun-never is not overridden"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "1.8.10"
    title: "Ensure XDMCP is not enabled"
    type: Automated
    aegis_rule: null
    status: missing

  # ============================================================================
  # 2 Services
  # ============================================================================

  # 2.1 Configure Server Services
  - section: "2.1.1"
    title: "Ensure autofs services are not in use"
    type: Automated
    aegis_rule: "service-disable-autofs"
    status: verify

  - section: "2.1.2"
    title: "Ensure avahi daemon services are not in use"
    type: Automated
    aegis_rule: "service-disable-avahi"
    status: verify

  - section: "2.1.3"
    title: "Ensure dhcp server services are not in use"
    type: Automated
    aegis_rule: "service-disable-dhcpd"
    status: verify

  - section: "2.1.4"
    title: "Ensure dns server services are not in use"
    type: Automated
    aegis_rule: "service-disable-named"
    status: verify

  - section: "2.1.5"
    title: "Ensure dnsmasq services are not in use"
    type: Automated
    aegis_rule: "service-disable-dnsmasq"
    status: verify

  - section: "2.1.6"
    title: "Ensure samba file server services are not in use"
    type: Automated
    aegis_rule: "service-disable-smb"
    status: verify

  - section: "2.1.7"
    title: "Ensure ftp server services are not in use"
    type: Automated
    aegis_rule: "service-disable-vsftpd"
    status: verify

  - section: "2.1.8"
    title: "Ensure message access server services are not in use"
    type: Automated
    aegis_rule: "service-disable-dovecot"
    status: verify

  - section: "2.1.9"
    title: "Ensure network file system services are not in use"
    type: Automated
    aegis_rule: "service-disable-nfs"
    status: verify

  - section: "2.1.10"
    title: "Ensure nis server services are not in use"
    type: Automated
    aegis_rule: "service-disable-ypserv"
    status: verify

  - section: "2.1.11"
    title: "Ensure print server services are not in use"
    type: Automated
    aegis_rule: "service-disable-cups"
    status: verify

  - section: "2.1.12"
    title: "Ensure rpcbind services are not in use"
    type: Automated
    aegis_rule: "service-disable-rpcbind"
    status: verify

  - section: "2.1.13"
    title: "Ensure rsync services are not in use"
    type: Automated
    aegis_rule: "service-disable-rsyncd"
    status: verify

  - section: "2.1.14"
    title: "Ensure snmp services are not in use"
    type: Automated
    aegis_rule: "service-disable-snmpd"
    status: verify

  - section: "2.1.15"
    title: "Ensure telnet server services are not in use"
    type: Automated
    aegis_rule: "service-disable-telnet"
    status: verify

  - section: "2.1.16"
    title: "Ensure tftp server services are not in use"
    type: Automated
    aegis_rule: "service-disable-tftp"
    status: verify

  - section: "2.1.17"
    title: "Ensure web proxy server services are not in use"
    type: Automated
    aegis_rule: "service-disable-squid"
    status: verify

  - section: "2.1.18"
    title: "Ensure web server services are not in use"
    type: Automated
    aegis_rule: "service-disable-httpd"
    status: verify

  - section: "2.1.19"
    title: "Ensure xinetd services are not in use"
    type: Automated
    aegis_rule: "service-disable-xinetd"
    status: verify

  - section: "2.1.20"
    title: "Ensure X window server services are not in use"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "2.1.21"
    title: "Ensure mail transfer agents are configured for local-only mode"
    type: Automated
    aegis_rule: "postfix-local-only"
    status: verify

  - section: "2.1.22"
    title: "Ensure only approved services are listening on a network interface"
    type: Manual
    aegis_rule: null
    status: not_applicable

  # 2.2 Configure Client Services
  - section: "2.2.1"
    title: "Ensure ftp client is not installed"
    type: Automated
    aegis_rule: "package-ftp-removed"
    status: verify

  - section: "2.2.2"
    title: "Ensure ldap client is not installed"
    type: Automated
    aegis_rule: "package-openldap-clients-removed"
    status: verify

  - section: "2.2.3"
    title: "Ensure nis client is not installed"
    type: Automated
    aegis_rule: "package-ypbind-removed"
    status: verify

  - section: "2.2.4"
    title: "Ensure telnet client is not installed"
    type: Automated
    aegis_rule: "package-telnet-removed"
    status: verify

  - section: "2.2.5"
    title: "Ensure tftp client is not installed"
    type: Automated
    aegis_rule: "package-tftp-removed"
    status: verify

  # 2.3 Configure Time Synchronization
  - section: "2.3.1"
    title: "Ensure time synchronization is in use"
    type: Automated
    aegis_rule: "chrony-enabled"
    status: verify

  - section: "2.3.2"
    title: "Ensure chrony is configured"
    type: Automated
    aegis_rule: "chrony-sources"
    status: verify

  - section: "2.3.3"
    title: "Ensure chrony is not run as the root user"
    type: Automated
    aegis_rule: null
    status: missing

  # 2.4 Job Schedulers
  # 2.4.1 Configure cron
  - section: "2.4.1.1"
    title: "Ensure cron daemon is enabled and active"
    type: Automated
    aegis_rule: "cron-enabled"
    status: verify

  - section: "2.4.1.2"
    title: "Ensure permissions on /etc/crontab are configured"
    type: Automated
    aegis_rule: "crontab-permissions"
    status: verify

  - section: "2.4.1.3"
    title: "Ensure permissions on /etc/cron.hourly are configured"
    type: Automated
    aegis_rule: "cron-hourly-permissions"
    status: verify

  - section: "2.4.1.4"
    title: "Ensure permissions on /etc/cron.daily are configured"
    type: Automated
    aegis_rule: "cron-daily-permissions"
    status: verify

  - section: "2.4.1.5"
    title: "Ensure permissions on /etc/cron.weekly are configured"
    type: Automated
    aegis_rule: "cron-weekly-permissions"
    status: verify

  - section: "2.4.1.6"
    title: "Ensure permissions on /etc/cron.monthly are configured"
    type: Automated
    aegis_rule: "cron-monthly-permissions"
    status: verify

  - section: "2.4.1.7"
    title: "Ensure permissions on /etc/cron.d are configured"
    type: Automated
    aegis_rule: "cron-d-permissions"
    status: verify

  - section: "2.4.1.8"
    title: "Ensure crontab is restricted to authorized users"
    type: Automated
    aegis_rule: "cron-allow"
    status: verify

  # 2.4.2 Configure at
  - section: "2.4.2.1"
    title: "Ensure at is restricted to authorized users"
    type: Automated
    aegis_rule: "at-allow"
    status: verify

  # ============================================================================
  # 3 Network
  # ============================================================================

  # 3.1 Configure Network Devices
  - section: "3.1.1"
    title: "Ensure IPv6 status is identified"
    type: Manual
    aegis_rule: null
    status: not_applicable

  - section: "3.1.2"
    title: "Ensure wireless interfaces are disabled"
    type: Automated
    aegis_rule: "wireless-disabled"
    status: verify

  - section: "3.1.3"
    title: "Ensure bluetooth services are not in use"
    type: Automated
    aegis_rule: "kmod-disable-bluetooth"
    status: verify

  # 3.2 Configure Network Kernel Modules
  - section: "3.2.1"
    title: "Ensure dccp kernel module is not available"
    type: Automated
    aegis_rule: "kmod-disable-dccp"
    status: verify

  - section: "3.2.2"
    title: "Ensure tipc kernel module is not available"
    type: Automated
    aegis_rule: "kmod-disable-tipc"
    status: verify

  - section: "3.2.3"
    title: "Ensure rds kernel module is not available"
    type: Automated
    aegis_rule: "kmod-disable-rds"
    status: verify

  - section: "3.2.4"
    title: "Ensure sctp kernel module is not available"
    type: Automated
    aegis_rule: "kmod-disable-sctp"
    status: verify

  # 3.3 Configure Network Kernel Parameters
  - section: "3.3.1"
    title: "Ensure ip forwarding is disabled"
    type: Automated
    aegis_rule: "sysctl-ip-forward-disabled"
    status: verify

  - section: "3.3.2"
    title: "Ensure packet redirect sending is disabled"
    type: Automated
    aegis_rule: "sysctl-send-redirects-disabled"
    status: verify

  - section: "3.3.3"
    title: "Ensure bogus icmp responses are ignored"
    type: Automated
    aegis_rule: "sysctl-ignore-bogus-icmp"
    status: verify

  - section: "3.3.4"
    title: "Ensure broadcast icmp requests are ignored"
    type: Automated
    aegis_rule: "sysctl-ignore-broadcast-icmp"
    status: verify

  - section: "3.3.5"
    title: "Ensure icmp redirects are not accepted"
    type: Automated
    aegis_rule: "sysctl-icmp-redirects-disabled"
    status: verify

  - section: "3.3.6"
    title: "Ensure secure icmp redirects are not accepted"
    type: Automated
    aegis_rule: "sysctl-secure-redirects-disabled"
    status: verify

  - section: "3.3.7"
    title: "Ensure reverse path filtering is enabled"
    type: Automated
    aegis_rule: "sysctl-rp-filter"
    status: verify

  - section: "3.3.8"
    title: "Ensure source routed packets are not accepted"
    type: Automated
    aegis_rule: "sysctl-source-route-disabled"
    status: verify

  - section: "3.3.9"
    title: "Ensure suspicious packets are logged"
    type: Automated
    aegis_rule: "sysctl-log-martians"
    status: verify

  - section: "3.3.10"
    title: "Ensure tcp syn cookies is enabled"
    type: Automated
    aegis_rule: "sysctl-tcp-syncookies"
    status: verify

  - section: "3.3.11"
    title: "Ensure ipv6 router advertisements are not accepted"
    type: Automated
    aegis_rule: "sysctl-ipv6-ra-disabled"
    status: verify

  # ============================================================================
  # 4 Host Based Firewall
  # ============================================================================

  # 4.1 Configure a firewall utility
  - section: "4.1.1"
    title: "Ensure nftables is installed"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "4.1.2"
    title: "Ensure a single firewall configuration utility is in use"
    type: Automated
    aegis_rule: null
    status: missing

  # 4.2 Configure FirewallD
  - section: "4.2.1"
    title: "Ensure firewalld drops unnecessary services and ports"
    type: Manual
    aegis_rule: null
    status: not_applicable

  - section: "4.2.2"
    title: "Ensure firewalld loopback traffic is configured"
    type: Automated
    aegis_rule: null
    status: missing

  # 4.3 Configure NFTables
  - section: "4.3.1"
    title: "Ensure nftables base chains exist"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "4.3.2"
    title: "Ensure nftables established connections are configured"
    type: Manual
    aegis_rule: null
    status: not_applicable

  - section: "4.3.3"
    title: "Ensure nftables default deny firewall policy"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "4.3.4"
    title: "Ensure nftables loopback traffic is configured"
    type: Automated
    aegis_rule: null
    status: missing

  # ============================================================================
  # 5 Access Control
  # ============================================================================

  # 5.1 Configure SSH Server
  - section: "5.1.1"
    title: "Ensure permissions on /etc/ssh/sshd_config are configured"
    type: Automated
    aegis_rule: "sshd-config-permissions"
    status: verify

  - section: "5.1.2"
    title: "Ensure permissions on SSH private host key files are configured"
    type: Automated
    aegis_rule: "ssh-private-key-permissions"
    status: verify

  - section: "5.1.3"
    title: "Ensure permissions on SSH public host key files are configured"
    type: Automated
    aegis_rule: "ssh-public-key-permissions"
    status: verify

  - section: "5.1.4"
    title: "Ensure sshd Ciphers are configured"
    type: Automated
    aegis_rule: "ssh-approved-ciphers"
    status: verify

  - section: "5.1.5"
    title: "Ensure sshd KexAlgorithms is configured"
    type: Automated
    aegis_rule: "ssh-approved-kex"
    status: verify

  - section: "5.1.6"
    title: "Ensure sshd MACs are configured"
    type: Automated
    aegis_rule: "ssh-approved-macs"
    status: verify

  - section: "5.1.7"
    title: "Ensure sshd access is configured"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.1.8"
    title: "Ensure sshd Banner is configured"
    type: Automated
    aegis_rule: "ssh-banner"
    status: verify

  - section: "5.1.9"
    title: "Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured"
    type: Automated
    aegis_rule: "ssh-client-alive-interval"
    status: verify

  - section: "5.1.10"
    title: "Ensure sshd DisableForwarding is enabled"
    type: Automated
    aegis_rule: "ssh-disable-forwarding"
    status: verify

  - section: "5.1.11"
    title: "Ensure sshd GSSAPIAuthentication is disabled"
    type: Automated
    aegis_rule: "ssh-disable-gssapi"
    status: verify

  - section: "5.1.12"
    title: "Ensure sshd HostbasedAuthentication is disabled"
    type: Automated
    aegis_rule: "ssh-disable-hostbased-auth"
    status: verify

  - section: "5.1.13"
    title: "Ensure sshd IgnoreRhosts is enabled"
    type: Automated
    aegis_rule: "ssh-ignore-rhosts"
    status: verify

  - section: "5.1.14"
    title: "Ensure sshd LoginGraceTime is configured"
    type: Automated
    aegis_rule: "ssh-login-grace-time"
    status: verify

  - section: "5.1.15"
    title: "Ensure sshd LogLevel is configured"
    type: Automated
    aegis_rule: "ssh-log-level"
    status: verify

  - section: "5.1.16"
    title: "Ensure sshd MaxAuthTries is configured"
    type: Automated
    aegis_rule: "ssh-max-auth-tries"
    status: verify

  - section: "5.1.17"
    title: "Ensure sshd MaxStartups is configured"
    type: Automated
    aegis_rule: "ssh-max-startups"
    status: verify

  - section: "5.1.18"
    title: "Ensure sshd MaxSessions is configured"
    type: Automated
    aegis_rule: "ssh-max-sessions"
    status: verify

  - section: "5.1.19"
    title: "Ensure sshd PermitEmptyPasswords is disabled"
    type: Automated
    aegis_rule: "ssh-deny-empty-passwords"
    status: verify

  - section: "5.1.20"
    title: "Ensure sshd PermitRootLogin is disabled"
    type: Automated
    aegis_rule: "ssh-disable-root-login"
    status: verify

  - section: "5.1.21"
    title: "Ensure sshd PermitUserEnvironment is disabled"
    type: Automated
    aegis_rule: "ssh-disable-user-environment"
    status: verify

  - section: "5.1.22"
    title: "Ensure sshd UsePAM is enabled"
    type: Automated
    aegis_rule: "ssh-use-pam"
    status: verify

  # 5.2 Configure privilege escalation
  - section: "5.2.1"
    title: "Ensure sudo is installed"
    type: Automated
    aegis_rule: "package-sudo-installed"
    status: verify

  - section: "5.2.2"
    title: "Ensure sudo commands use pty"
    type: Automated
    aegis_rule: "sudo-use-pty"
    status: verify

  - section: "5.2.3"
    title: "Ensure sudo log file exists"
    type: Automated
    aegis_rule: "sudo-logfile"
    status: verify

  - section: "5.2.4"
    title: "Ensure users must provide password for escalation"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.2.5"
    title: "Ensure re-authentication for privilege escalation is not disabled globally"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.2.6"
    title: "Ensure sudo authentication timeout is configured correctly"
    type: Automated
    aegis_rule: "sudo-timeout"
    status: verify

  - section: "5.2.7"
    title: "Ensure access to the su command is restricted"
    type: Automated
    aegis_rule: "pam-wheel-su"
    status: verify

  # 5.3 Pluggable Authentication Modules
  # 5.3.1 Configure PAM software packages
  - section: "5.3.1.1"
    title: "Ensure latest version of pam is installed"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.3.1.2"
    title: "Ensure latest version of authselect is installed"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.3.1.3"
    title: "Ensure latest version of libpwquality is installed"
    type: Automated
    aegis_rule: null
    status: missing

  # 5.3.2 Configure authselect
  - section: "5.3.2.1"
    title: "Ensure active authselect profile includes pam modules"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.3.2.2"
    title: "Ensure pam_faillock module is enabled"
    type: Automated
    aegis_rule: "pam-faillock-enabled"
    status: verify

  - section: "5.3.2.3"
    title: "Ensure pam_pwquality module is enabled"
    type: Automated
    aegis_rule: "pam-pwquality-enabled"
    status: verify

  - section: "5.3.2.4"
    title: "Ensure pam_pwhistory module is enabled"
    type: Automated
    aegis_rule: null
    status: missing

  - section: "5.3.2.5"
    title: "Ensure pam_unix module is enabled"
    type: Automated
    aegis_rule: null
    status: missing

  # 5.3.3 Configure PAM Arguments
  # 5.3.3.1 Configure pam_faillock module
  - section: "5.3.3.1.1"
    title: "Ensure password failed attempts lockout is configured"
    type: Automated
    aegis_rule: "pam-faillock-deny"
    status: verify

  - section: "5.3.3.1.2"
    title: "Ensure password unlock time is configured"
    type: Automated
    aegis_rule: "pam-faillock-unlock-time"
    status: verify

