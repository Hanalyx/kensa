id: mount-var-nosuid
title: Mount /var with nosuid option
description: >
  The /var filesystem must be mounted with the nosuid option to prevent
  setuid and setgid binaries from being executed from the variable data
  tree.
rationale: >
  /var holds variable data such as caches, spools, and logs that should
  never contain setuid/setgid executables. The nosuid mount option
  prevents an attacker who can write to /var from staging a setuid
  binary there to escalate privileges.
severity: medium
category: filesystem
tags: [mount, var, nosuid, security]

references:
  cis:
    rhel9:  { section: "1.1.2.4.3", level: "L1", type: "Automated" }
    rhel8: { section: "1.1.2.4.3", level: "L1", type: "Automated" }
    rhel10: { section: "1.1.2.4.3", level: "L1", type: "Automated" }
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: mount_option
      mount_point: "/var"
      options: ["nosuid"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/var"
      options: ["nosuid"]
