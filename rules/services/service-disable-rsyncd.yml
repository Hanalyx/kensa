id: service-disable-rsyncd
title: Ensure rsync services are not in use
description: >
  The rsyncd service should be stopped and masked unless required by the organization.
rationale: >
  Unnecessary services increase the attack surface. Disabling unused services reduces the number of potential entry points.
severity: medium
category: services
tags: [service, attack-surface]

conflicts_with: [service-disable-rsync]

references:
  cis:
    rhel9_v2: { section: "2.1.13", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: service_state
      name: "rsyncd"
      active: false
      enabled: false
    remediation:
      mechanism: service_masked
      name: "rsyncd"
