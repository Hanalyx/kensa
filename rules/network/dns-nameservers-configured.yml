id: dns-nameservers-configured
title: Configure at least two DNS name servers
description: >
  For RHEL 8 systems using DNS resolution, at least two name servers must
  be configured in /etc/resolv.conf to provide redundancy. If DNS is managed
  by NetworkManager or systemd-resolved, the resolver configuration must
  include at least two nameserver entries.
rationale: >
  Relying on a single DNS server creates a single point of failure for name
  resolution. Configuring at least two name servers ensures continued DNS
  resolution if one server becomes unavailable.
severity: medium
category: network
tags: [dns, nameserver, redundancy, resolv.conf, stig]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230316"
      severity: "CAT II"
  nist_800_53: ["SC-20", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: >
        count=$(grep -c '^\s*nameserver\s' /etc/resolv.conf 2>/dev/null || echo 0)
        [ "$count" -ge 2 ]
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add at least two nameserver entries to /etc/resolv.conf or configure
        NetworkManager/systemd-resolved to use multiple DNS servers. Example:
          nameserver <primary-dns-ip>
          nameserver <secondary-dns-ip>
