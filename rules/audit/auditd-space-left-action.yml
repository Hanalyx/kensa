id: auditd-space-left-action
title: Ensure system is disabled when audit logs are full
description: 'The space_left_action setting in /etc/audit/auditd.conf must be properly
  configured.

  '
rationale: 'Improper space_left_action configuration could weaken system security
  controls.

  '
severity: medium
category: audit
tags:
- audit
- auditd
- storage
depends_on:
- auditd-enabled
references:
  cis:
    rhel9:
      section: 6.3.2.3
      level: L1
      type: Automated
    rhel10: { section: "6.3.2.3", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.2.3", level: "L2", type: "Automated" }
  stig:
    rhel9:
      vuln_id: V-258157
      stig_id: RHEL-09-653040
      severity: CAT II
    rhel8:
      vuln_id: V-244543
      severity: CAT II
    rhel10:
      vuln_id: "V-281113"
      stig_id: "RHEL-10-500205"
      severity: "CAT II"
    ubuntu24:                                                                # u22 equivalent phrases differently; deferred
      vuln_id: "V-270818"
      stig_id: "UBTU-24-900960"
      severity: "CAT III"
      cci: ["CCI-001855"]
  nist_800_53:
  - AU-5
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    method: config_value
    path: /etc/audit/auditd.conf
    key: space_left_action
    expected: email
  remediation:
    mechanism: config_set
    path: /etc/audit/auditd.conf
    key: space_left_action
    value: email
    separator: ' = '
    restart: auditd
