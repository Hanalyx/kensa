spec:
    id: cli-password-flag
    version: 0.1.0
    status: draft
    tier: 1

    context:
        system: kensa-go
        feature: cli-password-prompt
        description: |
            CLI Phase 3 deliverable C-026. Adds --password / -p to
            detect, check, and remediate. Three operator-facing
            modes:
              kensa check --password=hunter2 ...   (literal)
              kensa check --password ...            (TTY prompt)
              kensa check ...                       (no password;
                                                     key-based auth)

            Wires through to api.HostConfig.Password and
            ssh.Config.Password. The SSH transport invokes
            `sshpass -e ssh ...` when Password is non-empty,
            passing the password through the SSHPASS environment
            variable (NOT argv) to avoid /proc-visible exposure.

            Without sshpass on PATH, Connect returns a clear
            error directing the operator to install it. sshpass
            is widely available (apt-get install sshpass /
            yum install sshpass / brew install hudochenkov/sshpass/sshpass).

            pflag's NoOptDefVal mechanism captures the
            "--password without a value" form: the literal
            "<prompt>" is stored in the password variable as a
            documented reserved sentinel. pflag renders it in the
            auto-generated help text where it reads as a natural
            placeholder. The runtime detects the sentinel and
            prompts on the controlling TTY via
            golang.org/x/term.ReadPassword. A non-TTY stdin
            produces a usage error rather than blocking forever.

            Reserved-literal note: an operator whose actual
            password is the eight-character string "<prompt>" must
            either change their password or use SSHPASS=...; this
            is a documented edge case.

    objective:
        summary: |
            Add Password field to api.HostConfig and ssh.Config.
            Wire sshpass into ssh.Connect when Password is non-
            empty. Add --password/-p flag to runDetect, runCheck,
            runRemediate. Implement resolvePassword helper for
            sentinel→prompt or literal→pass-through behavior.
        scope:
            includes:
                - api.HostConfig.Password (api/ field add — backward-compatible)
                - ssh.Config.Password and Connect-time sshpass routing
                - --password / -p flag on detect, check, remediate, plan
                - registerPasswordFlag helper (single source of truth for the wiring)
                - resolvePassword helper using golang.org/x/term
                - passwordPromptSentinel constant (printable reserved literal "<prompt>"; renders cleanly in --help)
                - sshpass detection at Connect time with helpful error if missing
                - Non-TTY guard so piped stdin doesn't hang
                - "Stderr scrubbing in ssh.Connect — any literal copy of cfg.Password in sshpass/ssh stderr is replaced with *** before being surfaced to the operator"
                - "--password + --inventory mutual-exclusion — rejected with usage error (per-host passwords differ; broadcasting is a footgun)"
            excludes:
                - Native Go SSH password auth (kensa-go uses system OpenSSH; sshpass is the established tool)
                - Password storage in evidence envelopes (passwords MUST NOT appear in the audit trail)
                - --password on history/rollback (no SSH connection in those flows)
                - Plumbing password through inventory entries (Ansible's ansible_password isn't honored; defer)

    constraints:
        - id: C-01
          description: |
              Password MUST flow via the SSHPASS environment
              variable, never argv. /proc/PID/cmdline is
              world-readable on most Linuxes; argv exposure
              would leak the credential to any local user.
          type: security
          enforcement: error
        - id: C-02
          description: |
              Empty Password MUST defer to key-based auth
              (KeyPath, ssh-agent, ~/.ssh/config). Adding
              the field MUST NOT break any caller that doesn't
              set it. The field is backward-compatible add to
              api.HostConfig.
          type: technical
          enforcement: error
        - id: C-03
          description: |
              When Password is non-empty but sshpass is not
              found on PATH, Connect MUST return an error
              that names the missing dependency and suggests
              the install command. Operators must not see
              opaque "command not found" stderr.
          type: business
          enforcement: error
        - id: C-04
          description: |
              The prompt sentinel is a documented reserved
              literal ("<prompt>"). It is printable so pflag
              renders it cleanly in --help output, and the angle
              brackets read as a placeholder. Operators whose
              actual password is the eight-character string
              "<prompt>" must use SSHPASS=... instead; this edge
              case is documented in spec context.
          type: technical
          enforcement: error
        - id: C-05
          description: |
              Sentinel + non-TTY stdin MUST surface as a usage
              error. CI scripts that accidentally pass --password
              without a value (because the operator forgot the
              =VALUE form) must not hang waiting for input.
          type: business
          enforcement: error
        - id: C-06
          description: |
              An empty password from the prompt is rejected
              (not silently treated as "no password"). An
              operator who hits Enter at the prompt without
              typing gets a clear "empty password rejected"
              error rather than a connection that fails on
              the host with a less-helpful auth-rejected
              message.
          type: business
          enforcement: error

    acceptance_criteria:
        - id: AC-01
          description: |
              resolvePassword("") returns ("", nil) regardless
              of stdin/stderr. Locked by TestResolvePassword_Empty.
          references_constraints: [C-02]
          priority: critical
        - id: AC-02
          description: |
              resolvePassword("hunter2") returns ("hunter2", nil)
              without consulting stdin. Locked by
              TestResolvePassword_LiteralValue.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: |
              resolvePassword(sentinel) on non-TTY stdin returns
              an error mentioning "TTY". Locked by
              TestResolvePassword_SentinelOnNonTTY.
          references_constraints: [C-05]
          priority: critical
        - id: AC-04
          description: |
              The sentinel is the printable literal "<prompt>".
              Locked by TestResolvePassword_SentinelValue_NotMistakenForLiteral
              which rejects any drift from this documented value.
          references_constraints: [C-04]
          priority: high
        - id: AC-05
          description: |
              api.HostConfig has a Password field; backward-
              compatible add (no required-field break for
              callers that didn't set it). Verified by
              go build of the existing engine + scan + remediate
              paths.
          references_constraints: [C-02]
          priority: critical
        - id: AC-06
          description: |
              ssh.Config has a Password field; ssh.Connect
              routes through sshpass when non-empty. The
              SSHPASS env var carries the credential, not argv.
              Verified by code inspection at
              internal/transport/ssh/ssh.go (cmd.Env contains
              SSHPASS=...; argv contains "sshpass -e ssh ...").
          references_constraints: [C-01]
          priority: critical
        - id: AC-07
          description: |
              Missing sshpass at Connect time produces an
              error that mentions sshpass and includes
              install guidance. Verified by code inspection;
              full live-test would require uninstalling
              sshpass from the dev box.
          references_constraints: [C-03]
          priority: high
        - id: AC-08
          description: |
              `kensa detect|check|remediate --password` (no
              value) sets the password variable to the prompt
              sentinel via pflag's NoOptDefVal. cmd/kensa
              calls resolvePassword which then either prompts
              (TTY) or errors (non-TTY).
          references_constraints: [C-04, C-05]
          priority: critical
        - id: AC-09
          description: |
              An empty password entered at the prompt is
              rejected. Cannot be unit-tested without a TTY
              fixture; spec-locked at code-inspection level
              (resolvePassword line that checks len(pw) == 0).
          references_constraints: [C-06]
          priority: medium

    tags: [cli, target-options, password, ssh, tier-1, c-026]
