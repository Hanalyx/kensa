id: pwquality-root-enforce
title: Enforce password complexity rules for root account
description: >
  The enforce_for_root option must be set in /etc/security/pwquality.conf
  to ensure that password complexity rules apply even when the root
  account changes its own password.
rationale: >
  Without enforce_for_root, the root account can bypass password complexity
  requirements. Requiring complex root passwords reduces the risk of
  root account compromise.
severity: medium
category: access-control
tags: [pam, pwquality, password-complexity, root]

references:
  cis:
    rhel9: { section: "5.3.3.2.7", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.2.7", level: "L1", type: "Automated" }
    rhel8: { section: "5.3.3.2.7", level: "L1", type: "Automated" }
    # CIS Ubuntu numbers enforce_for_root as 5.3.3.2.8 (RHEL uses .7); mapped by content, SOT-verified.
    ubuntu22: { section: "5.3.3.2.8", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.3.2.8", level: "L1", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281193", stig_id: "RHEL-10-600405", severity: "CAT II" }
    rhel9:
      vuln_id: "V-258101"
      stig_id: "RHEL-09-611060"
      severity: "CAT II"
  nist_800_53: ["IA-5", "IA-5(1)"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: 'grep -rqsE "^\s*enforce_for_root" /etc/security/pwquality.conf /etc/security/pwquality.conf.d/ 2>/dev/null'
      expected_exit: 0
    remediation:
      mechanism: config_append
      path: "/etc/security/pwquality.conf"
      line: "enforce_for_root"
