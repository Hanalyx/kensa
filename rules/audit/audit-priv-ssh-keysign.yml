id: audit-priv-ssh-keysign
title: Audit privileged execution of /usr/lib/openssh/ssh-keysign
description: >
  All uses of the /usr/lib/openssh/ssh-keysign command must generate an audit record so that
  ssh-keysign use can be traced to an individual.
rationale: >
  Auditing execution of privileged commands allows detection of misuse
  and supports forensic investigation of privilege escalation.
severity: medium
category: audit
tags: [audit, auditd, privileged]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270783"
      stig_id: "UBTU-24-900120"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260621"
      stig_id: "UBTU-22-654095"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-a always,exit -F path=/usr/lib/openssh/ssh-keysign -F perm=x -F auid>=1000 -F auid!=unset -k privileged-ssh"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/usr/lib/openssh/ssh-keysign -F perm=x -F auid>=1000 -F auid!=unset -k privileged-ssh"
      persist_file: "/etc/audit/rules.d/50-priv-ssh-keysign.rules"
