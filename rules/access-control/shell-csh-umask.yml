id: shell-csh-umask
title: Ensure c shell defines restrictive default permissions
description: >
  The C shell (csh/tcsh) default umask must be configured to restrict
  permissions on newly created files and directories.
rationale: >
  A restrictive C shell umask of 077 ensures files created during
  a csh session are not readable by other users, protecting user data.
severity: medium
category: access-control
tags: [shell, csh, umask, permissions]

references:
  stig:
    rhel9:
      vuln_id: "V-258073"
      stig_id: "RHEL-09-412090"
      severity: "CAT II"
  nist_800_53: ["AC-6(1)", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # Check /etc/csh.cshrc and /etc/csh.login for umask
        if grep -qE '^\s*umask\s+0?0?7[57]' /etc/csh.cshrc 2>/dev/null; then
          exit 0
        fi
        if grep -qE '^\s*umask\s+0?0?7[57]' /etc/csh.login 2>/dev/null; then
          exit 0
        fi
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/csh.cshrc"
      key: "umask"
      value: "077"
