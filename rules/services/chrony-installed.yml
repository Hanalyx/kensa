id: chrony-installed
title: Ensure chrony is installed
description: 'Chrony is a versatile NTP implementation that provides accurate time synchronization. Accurate system time is
  critical for security logging, authentication, and forensic analysis.

  '
rationale: 'Time synchronization is essential for correlating events across systems, validating Kerberos tickets, and ensuring
  accurate timestamps in audit logs. Chrony is the recommended time synchronization daemon for RHEL.

  '
severity: medium
category: services
tags:
- service
- time
- ntp
- chrony
references:
  cis:
    rhel9:
      section: 2.3.1
      level: L1
      type: Automated
    rhel8:
      section: 2.3.1
      level: L1
      type: Automated
  stig:
    ubuntu24:
      vuln_id: V-270664
      stig_id: UBTU-24-100700
      severity: CAT III
    ubuntu22:
      vuln_id: V-260479
      stig_id: UBTU-22-215015
      severity: CAT III
  nist_800_53:
  - AU-8
platforms:
- family: ubuntu
  min_version: 22
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: chrony
    state: present
  remediation:
    mechanism: apt_present
    name: chrony
- default: true
  check:
    method: package_state
    name: chrony
    state: present
  remediation:
    mechanism: package_present
    name: chrony
