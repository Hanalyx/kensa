id: package-libpwquality-installed
title: Ensure latest version of libpwquality is installed
description: >
  The libpwquality package provides a library for password quality
  checking and generation of random passwords.
rationale: >
  libpwquality enforces password complexity requirements. It is
  essential for implementing strong password policies.
severity: medium
category: access-control
tags: [libpwquality, password, authentication, security]

references:
  cis:
    rhel9_v2: { section: "5.3.1.3", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5", "CM-6"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: package_state
      name: "libpwquality"
      state: "installed"
    remediation:
      mechanism: package_present
      name: "libpwquality"
