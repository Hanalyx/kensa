id: cockpit-not-in-use
title: Ensure cockpit web services are not in use
description: >
  The cockpit web console (cockpit.socket / cockpit.service) must not be enabled
  or active unless the host is explicitly managed through it.
rationale: >
  A network-facing management console is additional attack surface and remote
  entry point; it must be disabled where unused.
severity: medium
transactional: false
category: services
tags: [cockpit, attack-surface, services, cis]
references:
  cis:
    rhel8: { section: "2.1.3", level: "L2", type: "Automated" }
    rhel10: { section: "2.1.3", level: "L2", type: "Automated" }
  nist_800_53: ["CM-7"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        # not in use = cockpit.socket neither active nor enabled (absent is fine)
        act=$(systemctl is-active cockpit.socket 2>/dev/null)
        en=$(systemctl is-enabled cockpit.socket 2>/dev/null)
        if [ "$act" = "active" ] || [ "$en" = "enabled" ]; then
          echo "FAIL: cockpit.socket is in use (active=$act enabled=$en)"
          exit 1
        fi
        echo "OK: cockpit web services are not in use"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "systemctl stop cockpit.socket && systemctl disable cockpit.socket (or dnf remove cockpit)"
