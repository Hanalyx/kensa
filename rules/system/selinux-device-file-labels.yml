id: selinux-device-file-labels
title: Ensure all system device files are correctly labeled by SELinux
description: >
  All system device files must have correct SELinux labels to prevent
  unauthorized modification and enforce mandatory access controls on
  device access.
rationale: >
  Incorrectly labeled device files may allow processes to access them
  in ways not intended by the SELinux policy. Unlabeled device files
  can bypass SELinux access controls entirely, undermining the
  mandatory access control system.
severity: medium
transactional: false
category: system
tags: [selinux, device-files, labels, mandatory-access-control]

references:
  stig:
    rhel10: { vuln_id: "V-281046", stig_id: "RHEL-10-400145", severity: "CAT II" }
    rhel9:
      vuln_id: "V-257932"
      stig_id: "RHEL-09-232260"
      severity: "CAT II"
  nist_800_53: ["AC-3", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # Mislabeled device files are those typed unlabeled_t or device_t.
        # NOTE: the find type/context clauses MUST be grouped with \( \) — an
        # ungrouped "-type b -o -type c -context X" binds as "(b) OR (c AND X)",
        # matching every char device unconditionally.
        # /dev/vmci legitimately requires device_t on VMware guests — the STIG
        # explicitly excludes it, so it is not a finding.
        bad=$(find /dev \( -type b -o -type c \) \
                \( -context '*:unlabeled_t:*' -o -context '*:device_t:*' \) \
                ! -name vmci 2>/dev/null | head -5)
        if [ -z "$bad" ]; then
          echo "OK: no mislabeled device files"
          exit 0
        fi
        echo "FAIL: mislabeled device files: $bad"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "restorecon -R /dev"
