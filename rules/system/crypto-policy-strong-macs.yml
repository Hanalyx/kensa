id: crypto-policy-strong-macs
title: Ensure system wide crypto policy disables MACs less than 128 bits
description: >
  The system-wide crypto policy should disable Message Authentication Codes
  (MACs) that use less than 128 bits, as they provide insufficient security.
rationale: >
  MACs with less than 128 bits of security are vulnerable to brute force
  attacks with modern computing resources. Using stronger MACs ensures
  message integrity and authenticity.
severity: medium
category: system
tags: [crypto-policy, mac, security, cryptography]

references:
  cis:
    rhel9: { section: "1.6.4", level: "L1", type: "Automated" }
    rhel8: { section: "1.6.3", level: "L1", type: "Automated" }
  nist_800_53: ["SC-13", "SC-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # CIS: the system-wide crypto policy's MAC list must contain no 64-bit
        # truncated MAC (e.g. UMAC-64). Audit the effective policy directly, not
        # an sshd proxy (sshd can be hardened while the policy still allows a
        # weak MAC).
        pol=/etc/crypto-policies/state/CURRENT.pol
        if [ -f "$pol" ]; then
          if grep -iE '^[[:space:]]*mac[[:space:]]*=' "$pol" | grep -qiE '\-64([^0-9]|$)'; then
            echo "FAIL: a 64-bit MAC is enabled in the system crypto policy ($pol)"
            exit 1
          fi
          echo "OK: no 64-bit MACs in the system crypto policy"
          exit 0
        fi
        # No CURRENT.pol: fall back to the named policy (FIPS/FUTURE carry no -64 MAC).
        case "$(update-crypto-policies --show 2>/dev/null)" in
          FUTURE*|FIPS*) echo "OK: named policy has no 64-bit MACs"; exit 0 ;;
        esac
        echo "FAIL: cannot verify the system crypto policy MAC list"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: crypto_policy_subpolicy
      subpolicy: "NO-WEAKMAC"
      unless: "update-crypto-policies --show | grep -q ':NO-WEAKMAC'"
