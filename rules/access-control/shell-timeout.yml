id: shell-timeout
title: Set default shell timeout
description: >
  Idle sessions must be terminated after a period of inactivity. The TMOUT
  shell variable (CIS approach) or StopIdleSessionSec in logind.conf (STIG
  approach) must be configured to 900 seconds or less.
rationale: >
  Automatic session timeout prevents unauthorized access to unattended
  terminals. A timeout of 900 seconds (15 minutes) provides a balance
  between security and usability.
severity: medium
category: access-control
tags: [shell, session, timeout, security]

references:
  cis:
    rhel8_v4:  { section: "5.6.3", level: "L1", type: "Automated" }
    rhel9_v2:  { section: "5.4.3.2", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-258100"
      stig_id: "RHEL-09-412015"
      severity: "CAT II"
    rhel8_v2r6:
      vuln_id: "V-257258"
      severity: "CAT II"
  nist_800_53: ["AC-11", "AC-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        pass=0
        # Check systemd-logind idle session timeout (STIG approach)
        idle_sec=$(systemd-analyze cat-config systemd/logind.conf 2>/dev/null |
          grep -E '^\s*StopIdleSessionSec\s*=' | tail -1 |
          sed 's/^[^=]*=\s*//')
        if [ -n "$idle_sec" ] && [ "$idle_sec" != "infinity" ] && [ "$idle_sec" -gt 0 ] 2>/dev/null && [ "$idle_sec" -le 900 ] 2>/dev/null; then
          pass=1
        fi
        # Check TMOUT shell variable (CIS approach)
        tmout_val=$(grep -rhE '^(export\s+)?TMOUT=' /etc/profile /etc/profile.d/*.sh /etc/bashrc 2>/dev/null | tail -1 | grep -oE '[0-9]+')
        if [ -n "$tmout_val" ] && [ "$tmout_val" -gt 0 ] 2>/dev/null && [ "$tmout_val" -le 900 ] 2>/dev/null; then
          pass=1
        fi
        if [ "$pass" -eq 1 ]; then
          echo "OK: idle timeout configured (logind=${idle_sec:-unset}, TMOUT=${tmout_val:-unset})"
          exit 0
        fi
        echo "FAIL: no idle session timeout configured"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      directory: "/etc/profile.d"
      filename: "kensa-tmout.sh"
      content: "TMOUT=900\nreadonly TMOUT\nexport TMOUT"
