id: password-hashing-algorithm
title: Ensure strong password hashing algorithm is configured
description: 'The system should use a strong password hashing algorithm such as yescrypt
  or SHA512 for storing passwords.

  '
rationale: 'Weak hashing algorithms can be cracked more easily. Modern algorithms
  like yescrypt provide better resistance to brute-force attacks.

  '
severity: high
category: access-control
tags:
- password
- hashing
- encryption
- security
references:
  cis:
    rhel9:
      section: 5.4.1.4
      level: L1
      type: Automated
    rhel8:  { section: "5.4.1.4", level: "L1", type: "Automated" }
    rhel10: { section: "5.4.1.4", level: "L1", type: "Automated" }
  nist_800_53:
  - IA-5
  - IA-5(1)(c)
  stig:
    rhel9:
      vuln_id: V-258231
      stig_id: RHEL-09-671015
      severity: CAT II
    rhel8:
      vuln_id: V-230231
      severity: CAT II
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: command
    run: |
      encrypt=$(grep -E '^ENCRYPT_METHOD' /etc/login.defs 2>/dev/null | awk '{print $2}')
      case "$encrypt" in
        YESCRYPT|SHA512)
          echo "OK: Password hashing algorithm is $encrypt"
          exit 0
          ;;
        "")
          # CIS FAILs when ENCRYPT_METHOD is unset; do not assume a default.
          echo "FAIL: ENCRYPT_METHOD not set in /etc/login.defs"
          exit 1
          ;;
        *)
          echo "FAIL: Weak hashing algorithm: $encrypt"
          exit 1
          ;;
      esac
    expected_exit: 0
  remediation:
    mechanism: config_set
    path: /etc/login.defs
    key: ENCRYPT_METHOD
    value: YESCRYPT
    separator: " "
