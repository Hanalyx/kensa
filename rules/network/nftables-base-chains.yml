id: nftables-base-chains
title: Ensure nftables base chains exist
description: >
  When using nftables directly, base chains for input, forward, and
  output traffic must be configured.
rationale: >
  Base chains are required to process network traffic. Without them,
  nftables rules cannot be applied to filter network traffic.
severity: medium
category: network
tags: [firewall, nftables, security]

references:
  cis:
    rhel9_v2: { section: "4.3.1", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: nftables_active
    check:
      method: command
      run: |
        # Check for base chains in nftables
        chains=$(nft list ruleset 2>/dev/null | grep -E "type filter hook (input|forward|output)")
        if [ -z "$chains" ]; then
          echo "FAIL: nftables base chains not configured"
          exit 1
        fi
        echo "OK: nftables base chains exist"
        exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Configure nftables base chains. Example:
        nft add table inet filter
        nft add chain inet filter input { type filter hook input priority 0 \; }
        nft add chain inet filter forward { type filter hook forward priority 0 \; }
        nft add chain inet filter output { type filter hook output priority 0 \; }

  - default: true
    check:
      method: command
      run: "echo 'OK: nftables not active (using firewalld)'; exit 0"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "nftables service is not active."
