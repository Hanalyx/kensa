# FedRAMP Moderate Baseline Mapping for Aegis
#
# Source: FedRAMP Rev 5 Moderate Baseline (OSCAL Profile)
# URL: https://github.com/GSA/fedramp-automation/blob/master/dist/content/rev5/baselines/json/FedRAMP_rev5_MODERATE-baseline_profile.json
# Catalog: NIST SP 800-53 Rev 5
# Last synced: 2026-02-16
#
# This mapping associates FedRAMP Moderate baseline controls with Aegis rules.
# FedRAMP builds on NIST SP 800-53 with additional parameters for cloud systems.
#
# FedRAMP Moderate is appropriate for systems where the loss of confidentiality,
# integrity, or availability would have a serious adverse effect.
#
# The control_ids manifest lists all 323 controls from the official OSCAL profile.
# Every control must appear in either 'controls' (implemented with rules) or
# 'unimplemented' (explicitly not implemented with reason).
#
# Control families covered (17 families, 323 controls):
#   AC  - Access Control (43)
#   AT  - Awareness and Training (6)
#   AU  - Audit and Accountability (16)
#   CA  - Assessment, Authorization, and Monitoring (14)
#   CM  - Configuration Management (27)
#   CP  - Contingency Planning (23)
#   IA  - Identification and Authentication (27)
#   IR  - Incident Response (17)
#   MA  - Maintenance (10)
#   MP  - Media Protection (7)
#   PE  - Physical and Environmental Protection (19)
#   PL  - Planning (7)
#   PS  - Personnel Security (10)
#   RA  - Risk Assessment (11)
#   SA  - System and Services Acquisition (21)
#   SC  - System and Communications Protection (29)
#   SI  - System and Information Integrity (24)
#   SR  - Supply Chain Risk Management (12)

id: fedramp-moderate
framework: fedramp
title: "FedRAMP Moderate Baseline"
published: 2023-01-31
baseline: moderate

# FedRAMP parameters that differ from or extend NIST 800-53
parameters:
  AC-2:
    inactive_days: 90
  AC-7:
    unsuccessful_attempts: 3
    time_period: 15_minutes
    lockout_duration: 60_minutes
  AU-4:
    storage_capacity: sufficient_for_retention
  IA-5:
    password_min_length: 12
    password_complexity: "upper, lower, numeric, special"
    password_lifetime_days: 60
    password_history: 24
  SC-7:
    deny_by_default: true

