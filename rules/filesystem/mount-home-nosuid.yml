id: mount-home-nosuid
title: Mount /home with nosuid option
description: >
  The /home filesystem must be mounted with the nosuid option to prevent
  setuid and setgid files from being executed from user home directories.
rationale: >
  Allowing setuid/setgid execution from /home could allow a user to place
  a setuid binary in their home directory and escalate privileges. The nosuid
  mount option prevents this attack vector on user home directories.
severity: medium
category: filesystem
tags: [mount, home, nosuid, security]

references:
  stig:
    rhel8:
      vuln_id: "V-230299"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: mount_option
      mount_point: "/home"
      options: ["nosuid"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/home"
      options: ["nosuid"]
