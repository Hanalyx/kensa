id: pkg-openssh-server-present
title: Ensure openssh-server package is installed
description: 'The openssh-server package must be installed to provide secure remote access to the system.

  '
rationale: 'SSH provides encrypted remote administration capabilities and is required for secure system management.

  '
severity: medium
category: services
tags:
- package
- ssh
- remote-access
references:
  stig:
    rhel9:
      vuln_id: V-257978
      stig_id: RHEL-09-255010
      severity: CAT II
    rhel8:
      - vuln_id: V-230526
        severity: CAT II
      - vuln_id: V-244549
        stig_id: RHEL-08-040159
        severity: CAT II
    ubuntu24:
      vuln_id: V-270665
      stig_id: UBTU-24-100800
      severity: CAT I
    ubuntu22:
      vuln_id: V-260523
      stig_id: UBTU-22-255010
      severity: CAT I
  nist_800_53:
  - SC-8
  - AC-17
platforms:
- family: ubuntu
  min_version: 22
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: openssh-server
    state: present
  remediation:
    mechanism: apt_present
    name: openssh-server
- default: true
  check:
    method: package_state
    name: openssh-server
    state: present
  remediation:
    mechanism: package_present
    name: openssh-server
