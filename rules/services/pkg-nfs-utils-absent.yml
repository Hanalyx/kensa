id: pkg-nfs-utils-absent
title: Ensure nfs-utils package is not installed
description: 'The nfs-utils package must not be installed unless NFS is required. NFS can expose sensitive data if not properly
  secured.

  '
rationale: 'Removing NFS when not required reduces the attack surface and eliminates risk of misconfigured network shares.

  '
severity: medium
category: services
tags:
- package
- nfs
- attack-surface
references:
  stig:
    rhel9:
      vuln_id: V-257828
      stig_id: RHEL-09-215025
      severity: CAT II
    ubuntu24:
      vuln_id: V-279938
      stig_id: UBTU-24-100050
      severity: CAT I
    ubuntu22:
      vuln_id: V-279937
      stig_id: UBTU-22-215040
      severity: CAT I
  nist_800_53:
  - CM-7
platforms:
- family: ubuntu
  min_version: 22
- family: rhel
  min_version: 8
implementations:
- when: apt
  check:
    method: package_state
    name: nfs-kernel-server
    state: absent
  remediation:
    mechanism: apt_absent
    name: nfs-kernel-server
- default: true
  check:
    method: package_state
    name: nfs-utils
    state: absent
  remediation:
    mechanism: package_absent
    name: nfs-utils
