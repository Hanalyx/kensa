id: audit-config-owner
title: Ensure audit configuration files owner is configured
description: >
  Audit configuration files must be owned by root.
rationale: >
  Incorrect ownership or permissions on audit files could allow unauthorized users to tamper with audit evidence.
severity: medium
category: audit
tags: [audit, permissions]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9: { section: "6.3.4.6", level: "L1", type: "Automated" }
  nist_800_53: ["AU-9"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: 'find /etc/audit/ -type f \( -name ''*.conf'' -o -name ''*.rules'' \) ! -user root 2>/dev/null | head -1'
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: 'find /etc/audit/ -type f \( -name ''*.conf'' -o -name ''*.rules'' \) -exec chown root {} +'
