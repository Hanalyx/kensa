id: pam-pwquality-difok
title: Require changed characters from previous password
description: 'The difok parameter in /etc/security/pwquality.conf sets the minimum
  number of characters that must differ from the previous password.

  '
rationale: 'Requiring a minimum number of changed characters prevents users from making
  trivial changes to their existing password, such as incrementing a number at the
  end.

  '
severity: medium
category: access-control
tags:
- pam
- password
- authentication
- pwquality
depends_on:
- package-libpwquality-installed
references:
  cis:
    rhel8:  { section: "5.3.3.2.1", level: "L1", type: "Automated" }
    rhel9:  { section: "5.3.3.2.1", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.2.1", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.3.3.2.1", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.3.2.1", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: V-258112
      stig_id: RHEL-09-611115
      severity: CAT II
    rhel8:
      vuln_id: V-230363
      severity: CAT II
    ubuntu24:
      vuln_id: V-270729
      stig_id: UBTU-24-400290
      severity: CAT II
    ubuntu22:
      vuln_id: V-260566
      stig_id: UBTU-22-611040
      severity: CAT II
    rhel10:
      vuln_id: "V-281185"
      stig_id: "RHEL-10-600260"
      severity: "CAT II"
  nist_800_53:
  - IA-5(1)(b)
  - IA-5
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    # Effective difok (base + pwquality.conf.d/ drop-ins, last wins) must be >=
    # the threshold var: default 8 (STIG DoD); a CIS operator sets --var
    # pam_pwquality_difok=2 (CIS 5.3.3.2.1 requires only >= 2). Absent -> FAIL.
    method: config_value
    path: /etc/security/pwquality.conf
    key: difok
    expected: '{{ pam_pwquality_difok }}'
    comparator: '>='
    dropin_dir: /etc/security/pwquality.conf.d
  remediation:
    # Write to a drop-in so the value wins the last-wins read (matches CIS
    # remediation guidance; keeps check + remediate on the same effective value).
    mechanism: config_set_dropin
    dir: /etc/security/pwquality.conf.d
    file: 50-kensa-difok.conf
    key: difok
    value: '{{ pam_pwquality_difok }}'
    separator: ' = '
