id: coredump-socket-disabled
title: Disable systemd-coredump socket
description: >
  The systemd-coredump.socket must be masked to prevent the system
  from acquiring, saving, and processing core dumps through systemd.
rationale: >
  Even with core dump storage disabled, the systemd-coredump socket
  can still acquire and process core dumps. Masking the socket
  prevents any core dump collection through systemd.
severity: medium
category: system
tags: [coredump, systemd, security]

references:
  stig:
    rhel8:
      vuln_id: "V-230312"
      severity: "CAT II"
  nist_800_53: ["SC-7"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: service_state
      name: "systemd-coredump.socket"
      expected_enabled: "masked"
    remediation:
      mechanism: service_masked
      name: systemd-coredump.socket
