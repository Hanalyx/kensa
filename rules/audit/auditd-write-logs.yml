id: auditd-write-logs
title: Configure auditd to write audit records to disk
description: >
  The auditd write_logs parameter must be set to yes to ensure
  audit records are written to disk.
rationale: >
  If audit records are not written to disk, evidence of system
  activity may be lost and unavailable for forensic analysis
  or compliance verification.
severity: medium
category: audit
tags: [audit, auditd, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258170"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AU-12"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: config_value
      path: "/etc/audit/auditd.conf"
      key: "write_logs"
      expected: "yes"
    remediation:
      mechanism: config_set
      path: "/etc/audit/auditd.conf"
      key: "write_logs"
      value: "yes"
      separator: " = "
      restart: "auditd"
