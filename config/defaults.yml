# Kensa Rule Variable Defaults
#
# This file defines default values for rule variables and framework-specific
# overrides. Variables can be used in rules with {{ variable_name }} syntax.
#
# Priority (highest first):
#   1. CLI --var KEY=VALUE
#   2. config/hosts/<hostname>.yml (per-host overrides)
#   3. config/groups/<group>.yml (per-group overrides, last group wins)
#   4. config/conf.d/*.yml (alphabetical, later overrides earlier)
#   5. frameworks.<name> section (when --framework specified)
#   6. variables section below
#
# To override values for your environment, create files in config/conf.d/
# Example: config/conf.d/99-custom.yml

variables:
  # Password quality - pwquality.conf
  # Default to STIG values (most restrictive)
  pam_pwquality_minlen: 15
  pam_pwquality_minclass: 4
  pam_pwquality_difok: 8
  pam_pwquality_maxrepeat: 3
  pam_pwquality_maxclassrepeat: 4
  pam_pwquality_dcredit: -1
  pam_pwquality_ucredit: -1
  pam_pwquality_lcredit: -1
  pam_pwquality_ocredit: -1

  # Password aging - login.defs
  pam_faillock_deny: 3
  pam_faillock_fail_interval: 900
  pam_faillock_unlock_time: 0
  login_defs_pass_max_days: 60
  login_defs_pass_min_days: 1
  login_defs_pass_warn_age: 7
  login_defs_umask: "077"
  shadow_crypt_min_rounds: 5000
  password_remember: 5

  # Login banner — displayed before authentication via /etc/issue and /etc/issue.net
  # Override in config/conf.d/ with your organization's consent text.
  # Default is a generic authorized-use warning suitable for most environments.
  banner_text: |
    Authorized uses only. All activity may be monitored and reported.

  # Rsyslog remote server — address:port for remote log forwarding.
  # Override in config/conf.d/ with your organization's log aggregation server.
  rsyslog_remote_server: "logserver.example.com:514"

  # SSH settings
  ssh_client_alive_interval: 900
  ssh_client_alive_count_max: 1
  ssh_max_auth_tries: 4
  ssh_max_sessions: 10
  ssh_login_grace_time: 60

  # SSH approved algorithms — intersection of CIS, STIG, and NIST guidance.
  # Override in config/conf.d/ to match your organization's crypto policy.
  ssh_approved_ciphers: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"
  ssh_approved_kex: "curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256,diffie-hellman-group14-sha256,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,ecdh-sha2-nistp256,ecdh-sha2-nistp384,ecdh-sha2-nistp521,sntrup761x25519-sha512@openssh.com"
  ssh_approved_macs: "hmac-sha2-256,hmac-sha2-512,hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com"

rollback:
  # Snapshot mode: all (default) | risk_based | none
  snapshot: all
  # When snapshot=risk_based, minimum risk level to capture
  # Options: high | medium | low
  risk_threshold: medium
  # Additional paths that elevate risk to 'high'
  # (merged with built-in high-risk paths)
  high_risk_paths: []
  # Retention — full rollback available within active window
  snapshot_active_days: 7
  # Pre-state data pruned after archive window (metadata retained)
  snapshot_archive_days: 90

frameworks:
  # CIS Benchmark values (generally less restrictive than STIG)
  cis:
    pam_pwquality_minlen: 14
    pam_faillock_deny: 5
    pam_faillock_unlock_time: 900
    login_defs_pass_max_days: 365
    login_defs_umask: "027"
    ssh_client_alive_interval: 900
    ssh_client_alive_count_max: 0

  # DISA STIG values (most restrictive)
  stig:
    pam_pwquality_minlen: 15
    pam_faillock_deny: 3
    pam_faillock_unlock_time: 0
    login_defs_pass_max_days: 60
    login_defs_umask: "077"
    shadow_crypt_min_rounds: 5000
    ssh_client_alive_interval: 600
    ssh_client_alive_count_max: 1

  # NIST 800-53 (baseline values)
  nist:
    pam_pwquality_minlen: 8
    login_defs_pass_max_days: 90
