id: coredump-core-pattern
title: Disable core dumps via kernel.core_pattern
description: >
  The kernel.core_pattern sysctl must be configured to pipe core dumps
  to /bin/false, effectively discarding them. This prevents core dump
  data from being written to disk.
rationale: >
  Core dumps can contain sensitive information from application memory.
  Setting core_pattern to pipe to /bin/false ensures no core dump data
  is stored, even if other core dump restrictions are bypassed.
severity: medium
category: system
tags: [coredump, sysctl, security, kernel]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230311"
      severity: "CAT II"
  nist_800_53: ["SC-4"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: "kernel.core_pattern"
      expected: "|/bin/false"
    remediation:
      mechanism: sysctl_set
      key: "kernel.core_pattern"
      value: "|/bin/false"
      file: "/etc/sysctl.d/50-coredump.conf"
