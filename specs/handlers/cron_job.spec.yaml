spec:
    id: handler-cron-job
    version: 0.2.0
    status: draft
    tier: 1
    context:
        system: kensa
        feature: handler-cron-job
        description: |
            The cron_job handler writes a scheduled job to /etc/cron.d/.
            Capture records prior file state for rollback.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Write a cron job file to /etc/cron.d/. Rollback restores
            or removes the prior file.
        scope:
            includes:
                - Write to /etc/cron.d/ (path from optional file/name, else derived)
                - capture of prior file state
                - rollback restoring prior state
            excludes:
                - User crontabs (crontab -e)
    constraints:
        - id: C-01
          description: Apply MUST write a valid cron.d file. Idempotent.
          type: technical
          enforcement: error
        - id: C-02
          description: Capture records file_existed and prior_content.
          type: security
          enforcement: error
        - id: C-03
          description: Rollback restores or removes the cron file.
          type: security
          enforcement: error
        - id: C-04
          description: |
              In agent mode (transport implements kernelio.FileTransport),
              Apply MUST write the cron file atomically through the funnel
              (kernelio.WriteFile at mode 0644) so the footprint recorder
              observes it, and Rollback MUST restore prior_content (or remove
              the file when it did not exist) through the funnel.
              CapturedFootprint MUST declare the single cron file for the
              pre-commit gate. The direct-SSH printf + chmod fallback is
              preserved.
          type: security
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: Apply writes cron file with schedule/user/command.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: Capture records prior file state.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: Rollback removes file when absent at capture.
          references_constraints: [C-03]
          priority: critical
        - id: AC-04
          description: |
              Agent-mode Apply writes the cron file through the funnel;
              round-trip rollback removes a file absent at capture and
              restores a pre-existing one byte-perfect; CapturedFootprint
              declares the single cron file.
          references_constraints: [C-04]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    tags: [handler, capturable, tier-1, cron]
