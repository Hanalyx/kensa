id: ssh-permit-empty-passwords
title: Disallow empty passwords for SSH
description: >
  The SSH daemon must not allow authentication using accounts with empty
  passwords. When PermitEmptyPasswords is enabled, any account without a
  password set becomes accessible over the network without any credential.

rationale: >
  Allowing empty password authentication provides a trivial path for
  unauthorized access. An attacker can log in to any account that lacks a
  password without any brute-force effort, completely bypassing the
  authentication mechanism that SSH is designed to enforce.

severity: critical
category: access-control
tags: [ssh, authentication, passwords]

references:
  cis:
    rhel10_v1:  { section: "5.1.19", level: "L1", type: "Automated" }
    rhel8_v4:  { section: "5.1.21", level: "L1", type: "Automated" }
    rhel9_v2:  { section: "5.1.19", level: "L1", type: "Automated" }
  stig:
    rhel8_v2r6:
      vuln_id: "V-230380"
      stig_id: "RHEL-08-020330"
      severity: "CAT I"
      cci: ["CCI-000366"]
    rhel9_v2r7:
      vuln_id: "V-257984"
      stig_id: "RHEL-09-255040"
      severity: "CAT I"
      cci: ["CCI-000766"]
  nist_800_53: ["AC-3", "IA-2"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: sshd_config_d
    check:
      method: config_value
      path: "/etc/ssh/sshd_config.d"
      key: "PermitEmptyPasswords"
      expected: "no"
      scan_pattern: "*.conf"
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/ssh/sshd_config.d"
      file: "00-aegis-permit-empty-passwords.conf"
      key: "PermitEmptyPasswords"
      value: "no"
      reload: "sshd"

  - default: true
    check:
      method: config_value
      path: "/etc/ssh/sshd_config"
      key: "PermitEmptyPasswords"
      expected: "no"
    remediation:
      mechanism: config_set
      path: "/etc/ssh/sshd_config"
      key: "PermitEmptyPasswords"
      value: "no"
      separator: " "
      reload: "sshd"
