id: pam-pwquality-maxrepeat
title: Limit consecutive repeating characters in password
description: 'The maxrepeat parameter in /etc/security/pwquality.conf sets the maximum
  number of allowed consecutive same characters in a password.

  '
rationale: 'Limiting consecutive repeating characters prevents weak patterns like
  "aaaa" or "1111" in passwords, increasing resistance to pattern-based attacks.

  '
severity: medium
category: access-control
tags:
- pam
- password
- authentication
- pwquality
depends_on:
- package-libpwquality-installed
references:
  cis:
    rhel8:  { section: "5.3.3.2.4", level: "L1", type: "Automated" }
    rhel9:  { section: "5.3.3.2.4", level: "L1", type: "Automated" }
    rhel10: { section: "5.3.2.2.4", level: "L1", type: "Automated" }
    ubuntu22: { section: "5.3.3.2.4", level: "L1", type: "Automated" }
    ubuntu24: { section: "5.3.3.2.4", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: V-258114
      stig_id: RHEL-09-611125
      severity: CAT II
    rhel8:
      vuln_id: V-230361
      severity: CAT II
    rhel10:
      vuln_id: "V-281188"
      stig_id: "RHEL-10-600290"
      severity: "CAT II"
  nist_800_53:
  - IA-5(1)(a)
  - IA-5
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    # Reads base file + pwquality.conf.d/ drop-ins (last wins). CIS 5.3.3.2.4
    # requires 1..3 — 0 DISABLES the check, so 0 (and absent, the libpwquality
    # default) is non-compliant. Upper bound is the variable (default 3).
    method: command
    run: |
      val=$(grep -hE '^[[:space:]]*maxrepeat[[:space:]]*=' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null | tail -n1 | sed 's/^[^=]*=[[:space:]]*//; s/[[:space:]].*$//')
      [ -n "$val" ] || { echo "maxrepeat not set"; exit 1; }
      if [ "$val" -ge 1 ] 2>/dev/null && [ "$val" -le {{ pam_pwquality_maxrepeat }} ] 2>/dev/null; then
        echo "maxrepeat=$val (1..{{ pam_pwquality_maxrepeat }})"; exit 0
      fi
      echo "maxrepeat=$val (not in 1..{{ pam_pwquality_maxrepeat }}; 0 disables the check)"; exit 1
    expected_exit: 0
  remediation:
    # Write to a drop-in so the value wins the check's last-wins read.
    mechanism: config_set_dropin
    dir: /etc/security/pwquality.conf.d
    file: 50-kensa-maxrepeat.conf
    key: maxrepeat
    value: '{{ pam_pwquality_maxrepeat }}'
    separator: ' = '
