id: password-encrypt-method-sha512
title: Ensure login.defs ENCRYPT_METHOD is SHA512 (RHEL 10 STIG)
description: >
  The RHEL 10 STIG requires /etc/login.defs ENCRYPT_METHOD to be "SHA512" so that
  the shadow file stores only SHA-512 encrypted password representations. This is
  stricter than the CIS benchmark (which also accepts YESCRYPT, the RHEL 10
  default) — a host may satisfy CIS while failing this STIG requirement.
rationale: >
  FIPS 140-3 validated deployments require SHA-512 password hashing. Although
  YESCRYPT is cryptographically strong and is the RHEL 10 default, the STIG
  mandates SHA-512 specifically, so ENCRYPT_METHOD must be set to SHA512.
severity: high
transactional: false
category: access-control
tags: [password, hashing, sha512, login-defs, fips, stig]

references:
  stig:
    rhel10:
      vuln_id: "V-281222"
      stig_id: "RHEL-10-600740"
      severity: "CAT I"
  nist_800_53: ["IA-5(1)(c)", "IA-7"]

platforms:
  - family: rhel
    min_version: 10

implementations:
  - default: true
    check:
      method: command
      run: |
        m=$(grep -iE '^[[:space:]]*ENCRYPT_METHOD[[:space:]]' /etc/login.defs 2>/dev/null \
              | awk '{print $2}' | tail -1)
        if [ "$m" = "SHA512" ]; then
          echo "OK: ENCRYPT_METHOD is SHA512"
          exit 0
        fi
        echo "FAIL: ENCRYPT_METHOD is '${m:-unset}' (the RHEL 10 STIG requires SHA512)"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/login.defs"
      key: "ENCRYPT_METHOD"
      value: "SHA512"
      separator: " "
