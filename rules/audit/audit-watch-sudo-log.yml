id: audit-watch-sudo-log
title: Audit access to /var/log/sudo.log
description: >
  Modifications to /var/log/sudo.log must generate an audit record so that administrative (sudo) actions
  can be traced to an individual.
rationale: >
  Auditing this path supports detection of unauthorized changes and
  forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, watch]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270740"
      stig_id: "UBTU-24-500010"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260649"
      stig_id: "UBTU-22-654235"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /var/log/sudo.log -p wa -k maintenance"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /var/log/sudo.log -p wa -k maintenance"
      persist_file: "/etc/audit/rules.d/50-watch-sudo-log.rules"
