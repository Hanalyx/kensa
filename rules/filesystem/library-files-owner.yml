id: library-files-owner
title: Ensure library files are owned by root
description: >
  All shared library files in /lib, /lib64, /usr/lib, and /usr/lib64 must
  be owned by root.
rationale: >
  Library files not owned by root could be modified by non-privileged users
  to inject malicious code into any application that loads those libraries.
severity: medium
category: filesystem
tags: [file-permissions, library-files, security]

references:
  stig:
    rhel8:
      vuln_id: "V-230261"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "find /lib /lib64 /usr/lib /usr/lib64 -name '*.so*' ! -user root -type f 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "find /lib /lib64 /usr/lib /usr/lib64 -name '*.so*' ! -user root -type f -exec chown root {} +"
