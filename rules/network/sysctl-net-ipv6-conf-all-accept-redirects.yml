id: sysctl-net-ipv6-conf-all-accept-redirects
title: Ensure net.ipv6.conf.all.accept_redirects is set to 0
description: >
  The kernel parameter net.ipv6.conf.all.accept_redirects must be set to 0 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  cis:
    rhel8: { section: "3.3.2.3", level: "L1", type: "Automated" }
    rhel10: { section: "3.3.2.3", level: "L1", type: "Automated" }
  stig:
    rhel10:
      vuln_id: "V-281355"
      stig_id: "RHEL-10-800230"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230544"
      stig_id: "RHEL-08-040280"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257972"
      stig_id: "RHEL-09-254015"
      severity: "CAT II"

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv6.conf.all.accept_redirects
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv6.conf.all.accept_redirects
      value: "0"
