id: sysctl-tcp-syncookies
title: Ensure tcp syn cookies is enabled
description: 'The kernel parameter(s) net.ipv4.tcp_syncookies must be configured to
  enforce this network security control.

  '
rationale: 'Improper network kernel parameters can allow network-based attacks including
  packet redirection, source routing, and denial of service.

  '
severity: medium
category: network
tags:
- sysctl
- networking
- hardening
