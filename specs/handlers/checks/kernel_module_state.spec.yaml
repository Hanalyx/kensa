kind: CheckHandler
metadata:
  name: KernelModuleState
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Verifies whether a kernel module is in the expected load state:
    blacklisted/disabled (not loaded and prevented from loading) or
    loaded (currently in the kernel).
  technical_context: >
    Dispatched by runner.handlers.checks.run_check via
    CHECK_HANDLERS["kernel_module_state"]. Implemented in
    runner/handlers/checks/_system.py as _check_kernel_module_state.
    Uses lsmod to check loaded state and modprobe -n -v to verify
    blacklist/disable directives. "disabled" and "blacklisted" are
    treated as equivalent states.
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
  callers:
    - runner.handlers.checks.run_check
  related_specs:
    - sysctl_value.spec.yaml
    - grub_parameter.spec.yaml

objective:
  summary: >
    Check whether a kernel module is loaded or properly blacklisted/disabled
    on a remote host by running lsmod and modprobe, then return a CheckResult
    with structured Evidence.
  acceptance_criteria:
    AC-1: "Module not loaded and blacklist directive present returns passed=True with detail '{name}: blacklisted'."
    AC-2: "Module still loaded when state is blacklisted/disabled returns passed=False with detail '{name}: still loaded'."
    AC-3: "Module not loaded but no blacklist directive returns passed=False with detail '{name}: not blacklisted'."
    AC-4: "Module loaded when state='loaded' returns passed=True with detail '{name}: loaded'."
    AC-5: "Module not loaded when state='loaded' returns passed=False with detail '{name}: not loaded'."
    AC-6: "Unknown state value returns passed=False with detail 'Unknown module state: {state}' and evidence.method='error'."
    AC-7: "Evidence method is 'kernel_module_state' for valid states, 'error' for unknown state."
    AC-8: "'disabled' and 'blacklisted' states are treated identically (both check not-loaded + directive)."

constraints:
  - "MUST read name as a required key (KeyError if absent)."
  - "MUST default state to 'blacklisted' when not provided."
  - "MUST treat 'disabled' and 'blacklisted' as equivalent states."
  - "MUST use shell_util.quote() on the module name in modprobe commands."
  - "MUST check that module is not loaded via lsmod before checking blacklist directives."
  - "MUST verify blacklist directive via modprobe -n -v output containing 'install /bin/true', 'install /bin/false', or 'blacklist'."
  - "MUST set evidence.method to 'error' and evidence.exit_code to -1 for unknown states."
  - "MUST NOT assume lsmod grep failure means module is properly disabled (must also verify directive)."

input_contract:
  - field: name
    type: str
    required: true
    description: Kernel module name (e.g., "cramfs", "usb-storage").
  - field: state
    type: str
    required: false
    default: "blacklisted"
    description: "Desired state: 'blacklisted', 'disabled', or 'loaded'. 'disabled' and 'blacklisted' are equivalent."

behavior:
  - "Read name from c['name'] (required key)."
  - "Read state from c.get('state', 'blacklisted')."
  - "Capture check_time as datetime.now(timezone.utc)."
  - >
    If state is 'blacklisted' or 'disabled': run lsmod | grep -q '^{name} '
    via SSH. If module is loaded (exit 0), return FAIL with detail
    '{name}: still loaded'. If not loaded, run modprobe -n -v {quoted_name}
    2>&1 and also pipe through grep for 'install /bin/true|install /bin/false|blacklist'.
    If grep fails, return FAIL with detail '{name}: not blacklisted'. If grep
    succeeds, return PASS with detail '{name}: blacklisted'.
  - >
    If state is 'loaded': run lsmod | grep -q '^{name} ' via SSH. If exit 0,
    return PASS with detail '{name}: loaded'. Otherwise return FAIL with
    detail '{name}: not loaded'.
  - >
    If state is none of the above: return FAIL with detail 'Unknown module
    state: {state}' and evidence.method='error'.

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass_blacklisted:
      passed: true
      detail: "'{name}: blacklisted'"
    pass_loaded:
      passed: true
      detail: "'{name}: loaded'"
    fail_still_loaded:
      passed: false
      detail: "'{name}: still loaded'"
    fail_not_blacklisted:
      passed: false
      detail: "'{name}: not blacklisted'"
    fail_not_loaded:
      passed: false
      detail: "'{name}: not loaded'"
    fail_unknown_state:
      passed: false
      detail: "'Unknown module state: {state}'"
  evidence_fields:
    method: "'kernel_module_state' for valid states, 'error' for unknown"
    command: "The lsmod or modprobe command string used"
    stdout: Full raw stdout from the executed command
    stderr: Full raw stderr
    exit_code: "Actual exit code, or -1 for unknown state"
    expected: "The requested state string"
    actual: "'loaded', 'blacklisted', 'not blacklisted', 'not loaded', or None"
    timestamp: UTC time captured before commands execute
  invariants:
    - "Evidence is always populated in all code paths."
    - "For blacklisted/disabled state, both lsmod and modprobe checks must pass."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestKernelModuleState
      - TestKernelModuleStateSpecDerived
    count: 8
