kind: CLICommand
metadata:
  name: Detect
  module: cli
  version: 1.0.0
  status: released
  system_spec: system.spec.yaml@1.0.0
  created: "2025-02-10"
  updated: "2025-02-25"

context:
  description: >
    Probe capabilities on one or more remote hosts over SSH. Display platform
    info and a table of detected capabilities per host, with optional capability
    overrides.
  technical_context: >
    Module runner/cli.py -> detect(). Click decorators: @main.command(),
    @target_options. Option groups: target_options (--host, --inventory, --limit,
    --user, --key, --password, --port, --verbose, --sudo, --strict-host-keys,
    --capability, --workers).
  dependencies:
    - runner._host_runner (connect, detect_platform, detect_capabilities, apply_capability_overrides)
    - runner.inventory (resolve_targets)
  callers:
    - CLI entry point (kensa detect)

objective:
  summary: >
    Probe capabilities on one or more remote hosts over SSH. Display platform
    info and a table of detected capabilities per host, with optional capability
    overrides.
  acceptance_criteria:
    AC-1: "Detect with a single reachable host exits 0 and prints platform + capability table."
    AC-2: "Detect with an unreachable host exits 0 and prints 'Connection failed:' error."
    AC-3: "Detect with no target hosts (no --host, no --inventory, no auto-discovery) exits 1."
    AC-4: "Capability override '-C key=true' appears as magenta 'yes (override)' in output."
    AC-5: "Capability override '-C key=false' appears as magenta 'no (override)' in output."
    AC-6: "Invalid '-C' format (no '=') exits 1 with 'Invalid capability format' error."
    AC-7: "Invalid '-C' value (not true/false) exits 1 with 'Invalid capability value' error."
    AC-8: "Parallel execution ('--workers 2') with two hosts prints both host outputs."

constraints:
  - "MUST always exit 0 when target resolution succeeds, regardless of per-host failures."
  - "MUST print connection failures and continue to next host."
  - "MUST sort capabilities alphabetically in the table."
  - "MUST mark overridden capabilities distinctly (magenta) from detected ones."

input_contract:
  - field: --host / -h
    type: str
    required: false
    default: null
    description: Comma-separated host list
  - field: --inventory / -i
    type: str
    required: false
    default: null
    description: Inventory file path
  - field: --limit / -l
    type: str
    required: false
    default: null
    description: Host glob pattern
  - field: --user / -u
    type: str
    required: false
    default: null
    description: SSH username
  - field: --key / -k
    type: str
    required: false
    default: null
    description: SSH private key path
  - field: --password / -p
    type: str
    required: false
    default: null
    description: SSH password
  - field: --port / -P
    type: int
    required: false
    default: "22"
    description: SSH port
  - field: --verbose / -v
    type: bool
    required: false
    default: "false"
    description: Show capability detection detail
  - field: --sudo
    type: bool
    required: false
    default: "false"
    description: Run commands via sudo
  - field: --strict-host-keys / --no-strict-host-keys
    type: bool
    required: false
    default: "false"
    description: Verify SSH host keys
  - field: --capability / -C
    type: str (multiple)
    required: false
    default: "()"
    description: Capability overrides KEY=VALUE
  - field: --workers / -w
    type: int (1-50)
    required: false
    default: "1"
    description: Parallel SSH connections

behavior:
  - "Resolve target hosts via _resolve_hosts(host, inventory, limit, user, key, port)."
  - "Parse capability overrides from -C flags via _parse_capability_overrides()."
  - "If workers == 1: iterate hosts sequentially, printing directly to console."
  - "If workers > 1: use ThreadPoolExecutor with buffered output, printing results under a lock."
  - >
    For each host:
    (a) Print host header rule.
    (b) Open SSH connection via connect().
    (c) Detect platform via detect_platform().
    (d) Detect capabilities via detect_capabilities().
    (e) Apply overrides via apply_capability_overrides().
    (f) Print platform info.
    (g) Print capability table sorted by name, marking overrides in magenta.
  - "On connection failure: print error message, continue to next host."

exit_codes:
  - code: 0
    condition: "Always -- even when connection failures occur"
  - code: 1
    condition: "Only for target resolution errors (no hosts) or invalid -C format"

output_contract:
  returns: Terminal output only
  modes:
    terminal: >
      Per-host Rich-formatted output: Host header rule (Host: <hostname>),
      Platform line (Platform: <FAMILY> <version> or Platform: unknown),
      Capability table with columns: Capability, Available (yes/no, overrides
      in magenta). No --json, --quiet, or -o options.

side_effects:
  - "None. No database writes, no file writes."

testing:
  spec_derived:
    file: tests/test_cli_spec.py
    classes:
      - TestDetectSpecDerived
    count: 8
