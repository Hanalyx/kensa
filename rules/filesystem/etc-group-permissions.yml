id: etc-group-permissions
title: Ensure permissions on /etc/group are configured
description: 'The /etc/group file must have correct ownership and permissions.

  '
rationale: 'Incorrect permissions on /etc/group could allow unauthorized access or
  modification of sensitive system data.

  '
severity: medium
category: filesystem
tags:
- file-permissions
- authentication
references:
  cis:
    rhel9:
      section: 7.1.3
      level: L1
      type: Automated
    rhel8:
      section: 7.1.3
      level: L1
      type: Automated
    rhel10: { section: "7.1.3", level: "L1", type: "Automated" }
  nist_800_53:
  - AC-3
  - MP-2
  - AC-6
  stig:
    rhel9:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-257891", severity: "CAT II" }                          # mode 0644
      - { vuln_id: "V-257898", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257899", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281017", stig_id: "RHEL-10-400000", severity: "CAT II" }  # owner root
      - { vuln_id: "V-281018", severity: "CAT II" }                          # group root
      - { vuln_id: "V-281066", severity: "CAT II" }                          # mode 0644
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: file_permission
    path: /etc/group
    owner: root
    group: root
    mode: '0644'
  remediation:
    mechanism: file_permissions
    path: /etc/group
    owner: root
    group: root
    mode: '0644'
