id: gdm-lock-enabled
title: Ensure GDM session lock is enabled when screensaver is activated
description: 'If GNOME Display Manager is in use, the session must be locked when the screensaver is activated to prevent
  unauthorized access.

  '
rationale: 'When a screensaver activates without enabling session lock, the session remains accessible to anyone who wakes
  the display. Requiring lock-enabled ensures that screensaver activation triggers a session lock requiring re-authentication.

  '
severity: medium
category: services
tags:
- gdm
- gnome
- screen-lock
- screensaver
- security
conflicts_with:
- gdm-removed
references:
  stig:
    rhel10: { vuln_id: "V-281280", stig_id: "RHEL-10-700770", severity: "CAT II" }
    rhel9:
      vuln_id: V-258025
      stig_id: RHEL-09-271075
      severity: CAT II
  nist_800_53:
  - AC-11
platforms:
- family: rhel
  min_version: 8
implementations:
- when: gdm
  check:
    method: command
    run: "# Check if lock-enabled is set to true in dconf policy\nif grep -qr \"^lock-enabled=true\" /etc/dconf/db/local.d/\
      \ 2>/dev/null; then\n  echo \"OK: GDM session lock is enabled on screensaver activation\"\n  exit 0\nfi\necho \"FAIL:\
      \ GDM session lock on screensaver activation is not configured\"\nexit 1\n"
    expected_exit: 0
  remediation:
    mechanism: dconf_set
    schema: org/gnome/desktop/screensaver
    key: lock-enabled
    value: 'true'
    file: 00-screensaver
