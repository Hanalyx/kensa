id: system-commands-group
title: Ensure system command files are group-owned by root or system account
description: >
  All files in /usr/bin and /usr/sbin must be group-owned by root or a
  system account to prevent unauthorized modification.
rationale: >
  System commands group-owned by non-system accounts could be modified by
  members of those groups. Root or system group ownership prevents this.
severity: medium
category: filesystem
tags: [file-permissions, system-commands, security]

references:
  stig:
    rhel8_v2r6:
      vuln_id: "V-230259"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "find /usr/bin /usr/sbin -type f ! -group root 2>/dev/null | xargs -r stat --format='%G %n' | grep -v '^bin ' | grep -v '^sys ' | head -1"
      expected_stdout: ""
    remediation:
      mechanism: command_exec
      run: "find /usr/bin /usr/sbin ! -group root -type f -exec chgrp root {} +"
