id: ssh-approved-kex
title: Ensure sshd KexAlgorithms is configured
description: >
  The sshd KexAlgorithms directive must specify only approved key exchange
  algorithms. Every configured algorithm is validated against a configurable
  allowlist of secure algorithms.
rationale: >
  Improper SSH KexAlgorithms configuration could weaken the security of
  remote access to the system. Weak or unapproved key exchange algorithms
  may be vulnerable to eavesdropping or man-in-the-middle attacks.
severity: medium
category: access-control
tags: [ssh, sshd, access-control, cryptography]

depends_on: [pkg-openssh-server-present]

references:
  cis:
    rhel9: { section: "5.1.5", level: "L1", type: "Automated" }
  nist_800_53: ["AC-17", "SC-8"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        approved="{{ ssh_approved_kex }}"
        configured=$(sshd -T 2>/dev/null | grep -i '^kexalgorithms ' | awk '{print $2}')
        if [ -z "$configured" ]; then echo "FAIL: kexalgorithms not configured"; exit 1; fi
        bad=""
        for alg in $(echo "$configured" | tr ',' ' '); do
          case ",$approved," in
            *",$alg,"*) ;;
            *) bad="$bad $alg" ;;
          esac
        done
        if [ -n "$bad" ]; then
          echo "FAIL: unapproved kex algorithm(s):$bad"
          exit 1
        fi
        echo "OK: all kex algorithms approved ($configured)"
      expected_exit: 0
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/ssh/sshd_config.d"
      file: "00-kensa-kex.conf"
      key: "KexAlgorithms"
      value: "{{ ssh_approved_kex }}"
      restart: sshd
