id: package-rsh-server-removed
title: Ensure rsh-server package is not installed
description: >
  The rsh-server package provides insecure rsh, rlogin, and rexec services
  that transmit credentials in cleartext.
rationale: >
  rsh-server allows unencrypted remote access. Must be removed per STIG
  requirements.
severity: high
category: services
tags: [package, rsh, security, remote-access]

references:
  stig:
    rhel8:
      vuln_id: "V-230492"
      severity: "CAT I"
  nist_800_53: ["CM-7", "IA-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: package_state
      name: "rsh-server"
      state: "absent"
    remediation:
      mechanism: package_absent
      name: "rsh-server"
