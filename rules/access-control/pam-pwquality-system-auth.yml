id: pam-pwquality-system-auth
title: Enable pam_pwquality module in /etc/pam.d/system-auth
description: >
  The pam_pwquality.so module must be enabled in /etc/pam.d/system-auth
  to enforce password complexity requirements during password changes.
rationale: >
  Without pam_pwquality in the system-auth PAM configuration, password
  complexity rules will not be enforced for authentication paths that use
  system-auth, allowing weak passwords to be set.
severity: medium
category: access-control
tags: [pam, pwquality, password-complexity, system-auth]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-258098"
      stig_id: "RHEL-09-611020"
      severity: "CAT II"
    rhel8_v2r6:
      vuln_id: "V-251713"
      severity: "CAT II"
  nist_800_53: ["IA-5(1)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - when: authselect
    check:
      method: command
      run: 'authselect current 2>/dev/null | grep -q with-pwquality'
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "authselect enable-feature with-pwquality"
  - default: true
    check:
      method: command
      run: >
        grep -qE '^\s*password\s+.*pam_pwquality\.so'
        /etc/pam.d/system-auth 2>/dev/null
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Add pam_pwquality.so to the password stack in
        /etc/pam.d/system-auth. Preferred: authselect enable-feature with-pwquality.
