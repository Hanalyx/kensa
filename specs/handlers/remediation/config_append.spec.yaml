kind: RemediationHandler
metadata:
  name: ConfigAppend
  module: handlers/remediation
  version: 1.0.0
  status: approved
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-03-13"
  updated: "2026-03-13"

context:
  description: >
    Idempotent "add line if not present" handler for flat config files
    that lack key=value structure. Checks if an exact line exists in
    the file; if absent, appends it. Unlike config_set, this handler
    does not do key-based replacement — it operates on whole lines.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["config_append"]. Implemented in
    runner/handlers/remediation/_config.py as _remediate_config_append.
  dependencies:
    - runner.shell_util.quote
    - runner.shell_util.service_action
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/config_set.spec.yaml

objective:
  summary: >
    Append a line to a configuration file if the line is not already
    present. Idempotent: if the exact line already exists (matched via
    grep -Fxq), no modification is made. Optionally reload or restart
    a service after modification.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True,
      "Would append '{line}' to {path}") and no SSH commands are
      executed.
    AC-2: >
      Idempotent skip: When the exact line already exists in the file
      (matched by grep -Fxq), returns (True, "Line already present in
      {path}") and no modification is made.
    AC-3: >
      Append when absent: When the line is not present in the file,
      appends it via echo-redirect and returns (True, "Appended
      '{line}' to {path}").
    AC-4: >
      Append failure: When the echo-append command fails, returns
      (False, "Failed to append to {path}: {stderr}").
    AC-5: >
      Service action on modification: When the line was appended and
      reload or restart is specified, calls service_action after the
      modification.
    AC-6: >
      No service action on skip: When the line already exists (no
      modification), service_action is NOT called.
    AC-7: >
      No service action without reload/restart: When neither reload
      nor restart is specified, no systemctl command is issued.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() when interpolating values into shell commands.
  - MUST NOT call service_action when no modification was made.
  - MUST return a 2-tuple (bool, str) from the handler.
  - Line matching uses grep -Fxq for exact fixed-string whole-line match.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "config_append"
  - field: path
    type: str
    required: true
    description: Absolute path to the config file on the remote host
  - field: line
    type: str
    required: true
    description: The exact line to append if not present
  - field: reload
    type: str
    required: false
    description: Service name to reload after modification
  - field: restart
    type: str
    required: false
    description: Service name to restart after modification

behavior:
  - "Extract fields: Read path and line from the remediation dict."
  - "Dry-run check: If dry_run=True, return (True, \"Would append '{line}' to {path}\")."
  - "Line existence check: Run grep -Fxq {quoted_line} {quoted_path} to check for exact whole-line match."
  - "Already present: If grep succeeds (exit 0), return (True, \"Line already present in {path}\")."
  - "Append: Run echo {quoted_line} >> {quoted_path}. If it fails, return (False, \"Failed to append to {path}: {stderr}\")."
  - "Service action: Call shell_util.service_action(ssh, r) if modification succeeded."
  - "Success return: Return (True, \"Appended '{line}' to {path}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would append '{line}' to {path}\""
    - "Already present: \"Line already present in {path}\""
    - "Success: \"Appended '{line}' to {path}\""
    - "Failure: \"Failed to append to {path}: {stderr}\""

side_effects:
  - "Appends a line to a remote configuration file via echo-redirect."
  - "Optionally reloads or restarts a systemd service via systemctl."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestConfigAppendSpecDerived
    count: 7
