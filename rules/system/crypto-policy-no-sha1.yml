id: crypto-policy-no-sha1
title: Ensure system wide crypto policy disables SHA1 hash and signature support
description: 'The effective system-wide crypto policy must disable SHA1 for hashing,
  signatures, and certificate validation. This is verified by inspecting the compiled
  policy state in /etc/crypto-policies/state/CURRENT.pol, not the policy name. HMAC-SHA1
  is not affected per CIS guidance, as HMAC does not rely on collision resistance.

  '
rationale: 'SHA-1 collision attacks are practical and publicly demonstrated. Allowing
  SHA-1 for hashing or signatures enables forgery of certificates, code signatures,
  and other authenticated data. The sha1_in_certs directive must also be disabled
  to prevent acceptance of SHA-1-signed certificates.

  '
severity: medium
category: system
tags:
- crypto-policy
- sha1
- security
- cryptography
depends_on:
- crypto-policy-no-weak
references:
  cis:
    rhel8:
      section: 1.6.2
      level: L1
      type: Automated
    rhel9:
      section: 1.6.3
      level: L1
      type: Automated
  nist_800_53:
  - SC-13
  - SC-12
  - MA-4(6)
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    checks:
    - method: command
      run: awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\s*-\s*([^#\n\r]+)?SHA1/){print}'
        /etc/crypto-policies/state/CURRENT.pol
      expected_exit: 0
      expected_stdout: ''
    - method: command
      run: grep -Psi -- '^\h*sha1_in_certs\h*=\h*' /etc/crypto-policies/state/CURRENT.pol
        | grep -q '= 0'
      expected_exit: 0
  remediation:
    steps:
    - mechanism: file_content
      path: /etc/crypto-policies/policies/modules/NO-SHA1.pmod
      content: '# Subpolicy dropping SHA1 hash and signature support

        hash = -SHA1

        sign = -*-SHA1

        sha1_in_certs = 0

        '
      owner: root
      group: root
      mode: '0644'
    - mechanism: crypto_policy_subpolicy
      subpolicy: NO-SHA1
      unless: update-crypto-policies --show | grep -q ':NO-SHA1'
