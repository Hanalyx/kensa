id: audit-perm-mod
title: Ensure discretionary access control permission modification events are collected
description: >
  Discretionary access control permission changes must be collected.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

supersedes: [audit-permission-changes]
depends_on: [auditd-service-enabled]

references:
  cis:
    rhel8_v4: { section: "4.1.3.9", level: "L2", type: "Automated" }
    rhel9_v2: { section: "6.3.3.9", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-257874"
      stig_id: "RHEL-09-654030"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12", "AC-3"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-k perm_mod"
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=unset -k perm_mod"
      persist_file: "/etc/audit/rules.d/50-perm_mod.rules"
