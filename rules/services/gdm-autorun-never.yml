id: gdm-autorun-never
title: Ensure GDM autorun-never is enabled
description: >
  If GNOME Display Manager is in use, automatic execution of programs
  on removable media should be disabled.
rationale: >
  Autorun can be exploited to execute malicious code from removable
  media. Disabling it prevents this attack vector.
severity: medium
category: services
tags: [gdm, gnome, autorun, security]

references:
  cis:
    rhel9_v2: { section: "1.8.8", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - when: gdm_installed
    check:
      method: command
      run: |
        # Check if autorun-never is configured
        if grep -qr "autorun-never=true" /etc/dconf/db/local.d/ 2>/dev/null; then
          echo "OK: GDM autorun-never is enabled"
          exit 0
        fi
        echo "FAIL: GDM autorun-never is not enabled"
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Disable autorun in /etc/dconf/db/local.d/00-media-autorun:
        [org/gnome/desktop/media-handling]
        autorun-never=true
        Then run: dconf update

  - default: true
    check:
      method: command
      run: "echo 'OK: GDM not installed'; exit 0"
      expected_exit: 0
    remediation:
      mechanism: manual
      note: "GDM is not installed."
