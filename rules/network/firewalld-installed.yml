id: firewalld-installed
title: Ensure firewalld is installed
description: >
  The firewalld package must be installed so the host has a manageable host-based
  firewall.
rationale: >
  A host firewall is a core defense-in-depth control; firewalld must be present
  before it can be configured to filter traffic.
severity: medium
transactional: false
category: network
tags: [firewalld, firewall, package, cis]
references:
  cis:
    rhel8: { section: "4.1.1", level: "L1", type: "Automated" }
  nist_800_53: ["SC-7"]
platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: package_state
      name: firewalld
      state: present
    remediation:
      mechanism: package_present
      name: firewalld
