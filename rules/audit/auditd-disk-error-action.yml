id: auditd-disk-error-action
title: Configure action on critical audit processing failure
description: >
  The disk_error_action parameter in /etc/audit/auditd.conf must be
  set to SYSLOG, SINGLE, or HALT to take appropriate action when a
  critical audit processing failure occurs.
rationale: >
  When a disk error occurs during audit logging, the system must take
  appropriate action to preserve the integrity of the audit trail.
  Silently ignoring disk errors could allow audit data to be lost.
severity: medium
category: audit
tags: [audit, auditd, disk-error, failure-action]

depends_on: [auditd-enabled]

references:
  stig:
    rhel9:
      vuln_id: "V-258227"
      stig_id: "RHEL-09-653085"
      severity: "CAT II"
  nist_800_53: ["AU-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: "grep -qiE '^\\s*disk_error_action\\s*=\\s*(SYSLOG|SINGLE|HALT)' /etc/audit/auditd.conf"
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/audit/auditd.conf"
      key: "disk_error_action"
      value: "SYSLOG"
      separator: " = "
      restart: "auditd"
