id: audit-identity-change
title: Ensure events that modify user/group information are collected
description: >
  Changes to user and group identity files must be audited.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.3.8", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: |
        missing=""
        for f in /etc/group /etc/passwd /etc/gshadow /etc/shadow /etc/security/opasswd; do
          if ! auditctl -l 2>/dev/null | grep -q "\-w $f "; then
            missing="$missing $f"
          fi
        done
        if [ -n "$missing" ]; then
          echo "FAIL: identity files not watched:$missing"
          exit 1
        fi
        echo "OK: all identity files are watched"
      expected_exit: 0
    remediation:
      steps:
        - mechanism: audit_rule_set
          rule: "-w /etc/group -p wa -k identity"
          persist_file: "/etc/audit/rules.d/50-identity.rules"
        - mechanism: audit_rule_set
          rule: "-w /etc/passwd -p wa -k identity"
          persist_file: "/etc/audit/rules.d/50-identity.rules"
        - mechanism: audit_rule_set
          rule: "-w /etc/gshadow -p wa -k identity"
          persist_file: "/etc/audit/rules.d/50-identity.rules"
        - mechanism: audit_rule_set
          rule: "-w /etc/shadow -p wa -k identity"
          persist_file: "/etc/audit/rules.d/50-identity.rules"
