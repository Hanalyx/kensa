id: sysctl-kptr-restrict
title: Restrict access to kernel symbol addresses
description: >
  The kernel.kptr_restrict sysctl parameter must be set to 1 or higher
  to restrict access to kernel symbol addresses via /proc/kallsyms and
  similar interfaces.
rationale: >
  Exposing kernel symbol addresses allows attackers to bypass kernel
  address space layout randomization (KASLR). Restricting access to
  kernel pointers prevents information disclosure that could aid
  exploitation of kernel vulnerabilities.
severity: medium
category: kernel
tags: [kernel, sysctl, kaslr, security, information-disclosure]

references:
  stig:
    rhel8:
      vuln_id: "V-230547"
      severity: "CAT II"
  nist_800_53: ["CM-6", "SC-4"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: "kernel.kptr_restrict"
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: "kernel.kptr_restrict"
      value: "1"
      persist_file: "/etc/sysctl.d/99-kensa-kptr.conf"
