id: sysctl-net-ipv4-conf-all-rp-filter
title: Ensure net.ipv4.conf.all.rp_filter is set to 1
description: >
  The kernel parameter net.ipv4.conf.all.rp_filter must be set to 1 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  stig:
    rhel10:
      vuln_id: "V-281345"
      stig_id: "RHEL-10-800130"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230549"
      stig_id: "RHEL-08-040285"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257962"
      stig_id: "RHEL-09-253035"
      severity: "CAT II"
  cis:
    rhel9:
      section: 3.3.7
      level: L1
      type: Automated
    rhel8:
      section: 3.3.1.12
      level: L1
      type: Automated
    rhel10: { section: "3.3.1.12", level: "L1", type: "Automated" }
    ubuntu22: { section: "3.3.1.12", level: "L1", type: "Automated" }
    ubuntu24: { section: "3.3.1.12", level: "L1", type: "Automated" }
  nist_800_53:

platforms:
  - family: rhel
    min_version: 8

  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.all.rp_filter
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.all.rp_filter
      value: "1"
