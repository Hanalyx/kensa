id: kernel-dmesg-restrict
title: Restrict access to kernel message buffer
description: >
  The kernel.dmesg_restrict sysctl must be set to prevent unprivileged
  users from reading the kernel message buffer.
rationale: >
  The kernel message buffer (dmesg) may contain sensitive information
  about system configuration and potential vulnerabilities. Restricting
  access prevents information leakage.
severity: low
category: system
tags: [sysctl, dmesg, kernel, privacy, stig]

references:
  stig:
    rhel8:
      vuln_id: "V-230269"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257797"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270749"
      stig_id: "UBTU-24-600140"
      severity: "CAT III"
    ubuntu22:
      vuln_id: "V-260472"
      stig_id: "UBTU-22-213010"
      severity: "CAT III"
    rhel10:
      vuln_id: "V-281305"
      stig_id: "RHEL-10-701030"
      severity: "CAT II"
  nist_800_53: ["SI-11"]

platforms:
  - family: ubuntu
    min_version: 22
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: "kernel.dmesg_restrict"
      expected: "1"
    remediation:
      mechanism: sysctl_set
      key: "kernel.dmesg_restrict"
      value: "1"
