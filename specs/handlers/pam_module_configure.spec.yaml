spec:
    id: handler-pam-module-configure
    version: 0.1.0
    status: draft
    tier: 1
    context:
        system: kensa-go
        feature: handler-pam-module-configure
        description: |
            The pam_module_configure handler adds or replaces a PAM
            module line in /etc/pam.d/<service>. PAM changes can
            affect authentication and are flagged for control-channel
            review before production use.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Configure a PAM module line in a service file. Rollback
            restores the full prior file content.
        scope:
            includes:
                - Edit /etc/pam.d/<service>
                - capture of full prior file content
                - rollback restoring full prior content
            excludes:
                - authselect (use config_set instead)
    constraints:
        - id: C-01
          description: Apply MUST be idempotent.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Capture MUST record the full prior PAM file content.
              Returns ErrCaptureIncomplete when the file does not exist.
          type: security
          enforcement: error
        - id: C-03
          description: Rollback MUST restore the full prior content verbatim.
          type: security
          enforcement: error
        - id: C-04
          description: |
              PAM changes affect authentication. Rules using this handler
              should be reviewed for control-channel sensitivity before
              running against production hosts.
          type: security
          enforcement: warning
    acceptance_criteria:
        - id: AC-01
          description: Apply adds or replaces the PAM module line.
          references_constraints: [C-01, C-04]
          priority: critical
        - id: AC-02
          description: |
              Capture returns ErrCaptureIncomplete when the PAM service
              file does not exist.
          references_constraints: [C-02]
          priority: critical
        - id: AC-03
          description: Rollback restores prior file content verbatim.
          references_constraints: [C-03]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    trust_level: human_required
    tags: [handler, capturable, tier-1, pam, auth]
