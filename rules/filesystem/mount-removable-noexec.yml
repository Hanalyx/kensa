id: mount-removable-noexec
title: Ensure noexec option on removable media
description: >
  The noexec mount option must be set on all removable media filesystems
  to prevent execution of programs directly from removable storage.
rationale: >
  Removable media may contain malicious executables. The noexec option
  prevents running programs directly from removable media, reducing the
  risk of malware execution from untrusted storage devices.
severity: medium
transactional: false
category: filesystem
tags: [mount, removable-media, noexec, hardening]

references:
  stig:
    rhel9: { vuln_id: "V-257857", stig_id: "RHEL-09-231080", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230304"
      severity: "CAT II"
  nist_800_53: ["CM-6", "AC-3"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      # A removable-media mount (under /media, /mnt or /run/media) that lacks
      # noexec. Scoping to the removable mount points instead of blocklisting
      # fixed disks avoids flagging fixed LVM/root filesystems; a host with no
      # removable media mounted vacuously passes.
      method: command
      run: "grep -E ' /(media|mnt|run/media)' /proc/mounts 2>/dev/null | grep -v noexec | head -1"
      expected_stdout: ""
    remediation:
      mechanism: manual
      note: >
        Add the noexec option to all removable media mount points in /etc/fstab.
        For automounted media, configure udev rules or autofs to include noexec.
