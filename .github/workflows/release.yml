name: Release

# Tag-triggered: pushing a v* tag (e.g. v0.2.0) builds and publishes
# the release. The workflow hard-fails if any signing secret is missing
# — no silent unsigned ship per founder posture 2026-05-28.
#
# Required secrets (all four MUST be set in repo settings before tagging):
#   GPG_PRIVATE_KEY     ASCII-armored Hanalyx signing key (private)
#   GPG_PASSPHRASE      Unlock password for the GPG key
#   COSIGN_PRIVATE_KEY  cosign keypair (private half)
#   COSIGN_PASSWORD     Unlock password for the cosign key
#
# Build discipline matches CI: CGO_ENABLED=0, -tags netgo, Go from go.mod.
# See .goreleaser.yaml for the artifact layout and signing config.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the GitHub release + upload assets

env:
  CGO_ENABLED: '0'
  GODEBUG: 'netdns=go'
  # v2.10.x onward has `archives.formats` (plural), `archives.ids`,
  # and `nfpms.ids` — the post-rename field names this config uses.
  # v2.5.1 is too old and rejects them at `goreleaser check`. Pin to
  # the version verified locally so the release-snapshot job in ci.yml
  # exercises the same binary.
  GORELEASER_VERSION: 'v2.15.4'
  NFPM_VERSION: 'v2.41.0'
  COSIGN_VERSION: 'v2.4.1'
  SYFT_VERSION: 'v1.46.0'

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for goreleaser)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Hard-fail preflight: every signing secret MUST be set. We refuse
      # to ship unsigned. The empty-string default + length check catches
      # both "secret missing" and "secret set to empty".
      - name: Preflight — verify signing secrets present
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          missing=0
          for var in GPG_PRIVATE_KEY GPG_PASSPHRASE COSIGN_PRIVATE_KEY COSIGN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::required secret '$var' is unset; refusing to ship unsigned"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            exit 1
          fi
          echo "All four signing secrets present."

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Install nfpm (for goreleaser's internal package signing)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}
          nfpm --version

      - name: Install goreleaser
        run: |
          go install github.com/goreleaser/goreleaser/v2@${GORELEASER_VERSION}
          goreleaser --version

      # syft generates the CycloneDX SBOM via goreleaser's sboms block.
      # Pinned to match the version verified locally so the release SBOM
      # is reproducible. Installed to /usr/local/bin (on PATH for
      # goreleaser's sbom cmd).
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          syft version

      # nfpm signs rpm + deb at package-build time by reading the GPG key
      # from a file path (signature.key_file in .goreleaser.yaml). We
      # materialize the ASCII-armored secret to a tempfile, set
      # GPG_PRIVATE_KEY_PATH to that path, and let goreleaser/nfpm read
      # it directly. The file is mode 0600 and lives in a runner-local
      # tempdir destroyed when the job ends. We do NOT load it into a
      # GPG keyring on the runner — nfpm's signing reads the file
      # directly, no keyring needed.
      - name: Stage GPG key for nfpm signing
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          key_path="$(mktemp -t kensa-gpg.XXXXXX.asc)"
          printf '%s' "$GPG_PRIVATE_KEY" > "$key_path"
          chmod 0600 "$key_path"
          echo "GPG_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: GoReleaser release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # nfpm v2 reads the GPG passphrase from these env vars (in
          # order): NFPM_PASSPHRASE > NFPM_<PACKAGER>_PASSPHRASE. The
          # initial v0.2.0 run set NFPM_DEFAULT_PASSPHRASE (wrong name
          # — that var doesn't exist in nfpm) which is why the run
          # failed with "openpgp: invalid argument: signing key is
          # encrypted". Set all three names belt-and-suspenders so
          # future nfpm renames don't silently break us again.
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          NFPM_RPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          NFPM_DEB_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          # cosign reads its key + password from these env vars; the
          # signs: block in .goreleaser.yaml passes --key=env://COSIGN_PRIVATE_KEY
          # and pipes COSIGN_PASSWORD on stdin.
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          goreleaser release --clean

      - name: Shred the staged GPG key
        if: always()
        run: |
          if [ -n "${GPG_PRIVATE_KEY_PATH:-}" ] && [ -f "$GPG_PRIVATE_KEY_PATH" ]; then
            shred -u "$GPG_PRIVATE_KEY_PATH" || rm -f "$GPG_PRIVATE_KEY_PATH"
          fi
