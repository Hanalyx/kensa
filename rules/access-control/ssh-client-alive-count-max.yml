id: ssh-client-alive-count-max
title: Set SSH client alive count maximum
description: >
  The SSH daemon must terminate sessions after a defined number of missed
  keepalive responses. ClientAliveCountMax sets how many client-alive
  messages can be sent without receiving a response before the server
  disconnects the session.

rationale: >
  A high ClientAliveCountMax allows sessions to persist long after the
  client has become unresponsive, leaving open sessions that an attacker
  could hijack. Setting the count to 1 ensures that a session is terminated
  promptly after the first missed keepalive, working in conjunction with
  ClientAliveInterval to enforce a strict idle timeout.

severity: medium
category: access-control
tags: [ssh, session-management, timeout, idle]

depends_on: [pkg-openssh-server-present]

references:
  stig:
    rhel8:                                                                   # this check verifies ClientAliveCountMax (V-244525/010201); V-230244/010200 (interval) retained pending review
      - { vuln_id: "V-230244", stig_id: "RHEL-08-010200", severity: "CAT II", cci: ["CCI-001133"] }
      - { vuln_id: "V-244525", stig_id: "RHEL-08-010201", severity: "CAT II", cci: ["CCI-001133"] }
    ubuntu24:
      vuln_id: "V-270742"
      stig_id: "UBTU-24-600000"
      severity: "CAT II"
      cci: ["CCI-001133"]
    ubuntu22:
      vuln_id: "V-260527"
      stig_id: "UBTU-22-255030"
      severity: "CAT II"
      cci: ["CCI-001133"]
    rhel10:
      vuln_id: "V-281269"
      stig_id: "RHEL-10-700660"
      severity: "CAT II"
  nist_800_53: ["AC-12", "SC-10"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - when: sshd_config_d
    check:
      method: sshd_effective_config
      key: "clientalivecountmax"
      expected: "1"
    remediation:
      mechanism: config_set_dropin
      dir: "/etc/ssh/sshd_config.d"
      file: "00-kensa-client-alive-count-max.conf"
      key: "ClientAliveCountMax"
      value: "1"
      reload: "sshd"

  - default: true
    check:
      method: sshd_effective_config
      key: "clientalivecountmax"
      expected: "1"
    remediation:
      mechanism: config_set
      path: "/etc/ssh/sshd_config"
      key: "ClientAliveCountMax"
      value: "1"
      separator: " "
      reload: "sshd"
