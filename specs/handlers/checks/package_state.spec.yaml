kind: CheckHandler
metadata:
  name: PackageState
  module: handlers/checks
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Checks RPM package installation state, verifying whether a package
    is installed or absent as expected.
  technical_context: >
    Dispatched by runner.handlers.checks.run_check via
    CHECK_HANDLERS["package_state"]. Implemented in
    runner/handlers/checks/_package.py as _check_package_state.
    Uses rpm -q to query package state. Supports two desired states:
    "present" (package should be installed) and "absent" (package should
    not be installed).
  dependencies:
    - runner.shell_util.quote
    - runner._types.CheckResult
    - runner._types.Evidence
  callers:
    - runner.handlers.checks.run_check
  related_specs:
    - service_state.spec.yaml

objective:
  summary: >
    Execute rpm -q on a remote host to check whether a package is installed,
    compare against the expected state (present or absent), and return a
    CheckResult with structured Evidence.
  acceptance_criteria:
    AC-1: "Package installed when state='present' returns passed=True with detail '{name}: {version_string}'."
    AC-2: "Package not installed when state='present' returns passed=False with detail '{name}: not installed'."
    AC-3: "Package not installed when state='absent' returns passed=True with detail '{name}: not installed (as required)'."
    AC-4: "Package installed when state='absent' returns passed=False with detail '{name}: installed (should be absent)'."
    AC-5: "Unknown state value returns passed=False with detail 'Unknown package state: {state}' and evidence.method='error'."
    AC-6: "Evidence method is 'package_state' for valid states, 'error' for unknown state."

constraints:
  - "MUST read name as a required key (KeyError if absent)."
  - "MUST default state to 'present' when not provided."
  - "MUST use shell_util.quote() on the package name to prevent shell injection."
  - "MUST redirect stderr to /dev/null in the rpm command."
  - "MUST set evidence.method to 'error' and evidence.exit_code to -1 for unknown states."
  - "MUST set evidence.method to 'package_state' for valid states."
  - "MUST include the full version string from rpm -q output in the pass detail for state='present'."

input_contract:
  - field: name
    type: str
    required: true
    description: RPM package name (e.g., "audit", "telnet-server").
  - field: state
    type: str
    required: false
    default: "present"
    description: "Expected state: 'present' (installed) or 'absent' (not installed)."

behavior:
  - "Read name from c['name'] (required key)."
  - "Read state from c.get('state', 'present')."
  - "Capture check_time as datetime.now(timezone.utc)."
  - "Build command: rpm -q {quoted_name} 2>/dev/null."
  - "Execute ssh.run(cmd) to get a Result."
  - >
    If state == 'present': if result.ok, strip stdout to get the version
    string and return PASS with detail '{name}: {version_string}'. If not
    result.ok, return FAIL with detail '{name}: not installed'.
  - >
    If state == 'absent': if not result.ok, return PASS with detail
    '{name}: not installed (as required)'. If result.ok, strip stdout and
    return FAIL with detail '{name}: installed (should be absent)'.
  - >
    If state is neither 'present' nor 'absent': return FAIL with detail
    'Unknown package state: {state}' and evidence.method='error'.

output_contract:
  returns: "CheckResult(passed, detail, evidence)"
  paths:
    pass_present:
      passed: true
      detail: "'{name}: {version_string}'"
    pass_absent:
      passed: true
      detail: "'{name}: not installed (as required)'"
    fail_not_installed:
      passed: false
      detail: "'{name}: not installed'"
    fail_installed:
      passed: false
      detail: "'{name}: installed (should be absent)'"
    fail_unknown_state:
      passed: false
      detail: "'Unknown package state: {state}'"
  evidence_fields:
    method: "'package_state' for valid states, 'error' for unknown"
    command: "rpm -q {quoted_name} 2>/dev/null, or None for unknown state"
    stdout: Full raw stdout from rpm
    stderr: Full raw stderr
    exit_code: "Actual exit code, or -1 for unknown state"
    expected: "The requested state string"
    actual: "Version string when installed, 'not installed' when absent, None for unknown"
    timestamp: UTC time captured before command execution
  invariants:
    - "Evidence is always populated in all code paths."
    - "evidence.method is 'package_state' for all valid state values."

testing:
  spec_derived:
    file: tests/test_engine_checks.py
    classes:
      - TestPackageState
      - TestPackageStateSpecDerived
    count: 6
