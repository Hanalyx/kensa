id: sysctl-ignore-broadcast-icmp
title: Ensure broadcast icmp requests are ignored
description: 'The kernel parameter(s) net.ipv4.icmp_echo_ignore_broadcasts must be
  configured to enforce this network security control.

  '
rationale: 'Improper network kernel parameters can allow network-based attacks including
  packet redirection, source routing, and denial of service.

  '
severity: medium
category: network
tags:
- sysctl
- networking
- hardening
references:
  cis:
    rhel9:
      section: 3.3.4
      level: L1
      type: Automated
    rhel8:
      section: 3.3.1.7
      level: L1
      type: Automated
  nist_800_53:
  - SC-7
  - CM-7
  - SC-5
  stig:
    rhel8:
      vuln_id: V-230537
      severity: CAT II
    rhel9:
      vuln_id: V-257966
      stig_id: RHEL-09-253025
      severity: CAT II
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: sysctl_value
    key: net.ipv4.icmp_echo_ignore_broadcasts
    expected: '1'
  remediation:
    mechanism: sysctl_set
    key: net.ipv4.icmp_echo_ignore_broadcasts
    value: '1'
