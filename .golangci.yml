version: "2"
# run.go is intentionally unset: golangci-lint reads the target Go version
# from go.mod (currently 1.26.4). Keeping it unset means the linter tracks
# go.mod automatically, the same sync-free principle as GOTOOLCHAIN=local in CI.
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - godot
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    gocritic:
      enabled-checks:
        - commentFormatting
        - commentedOutCode
        - deferInLoop
        - emptyStringTest
        - sloppyReassign
        - typeAssertChain
        - unnecessaryBlock
        - whyNoLint
      settings:
        commentedOutCode:
          minLength: 30
    godot:
      scope: declarations
      exclude:
        - ^\s*@spec\b
        - ^\s*@ac\b
        - ^\s*@c\b
      capital: true
      period: true
    misspell:
      locale: US
      ignore-rules:
        - kensa
        - openwatch
        - hanalyx
        - rhel
        - sshd
        - sysctl
        - selinux
        - authselect
        - faillock
        - fapolicyd
        - usbguard
        - dnf
        - oscal
    revive:
      severity: error
      enable-all-rules: false
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
        - name: package-comments
        - name: comment-spacings
          arguments:
            - TODO
            - FIXME
            - NOTE
            - Deprecated
        - name: var-naming
        - name: receiver-naming
        - name: unexported-return
        - name: dot-imports
        - name: error-strings
        - name: error-naming
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration
    staticcheck:
      # v2 merged the former standalone gosimple (S*) and stylecheck (ST*)
      # linters into staticcheck, and `all` also pulls in the quickfix (QF*)
      # category. v1.64.8 ran only the SA* bug-detection checks here, so this
      # upgrade preserves that exact behavior: keep SA* (real-bug analysis —
      # nil derefs, impossible assertions, stdlib misuse) and drop the
      # simplify/style/quickfix tiers. Those surface ~22 trivial-but-cosmetic
      # findings (pointless fmt.Sprintf, Db->DB naming, De Morgan rewrites);
      # enabling them is a deliberate opt-in cleanup, tracked separately, not
      # part of this tooling swap. It also keeps the migration from editing
      # handler/engine rollback code for purely stylistic reasons.
      checks:
        - all
        - -S1*
        - -ST1*
        - -QF1*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        path: _test\.go
        text: exported
      - linters:
          - godot
        path: internal/
      - linters:
          - godot
        path: cmd/
    paths:
      - vendor
      - bin
      - dist
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/Hanalyx/kensa
  exclusions:
    generated: lax
    paths:
      - vendor
      - bin
      - dist
      - third_party$
      - builtin$
      - examples$
