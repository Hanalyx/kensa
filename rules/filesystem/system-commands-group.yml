id: system-commands-group
title: Ensure system command files are group-owned by root or system account
description: >
  All files in /usr/bin, /usr/sbin, /usr/local/bin, and /usr/local/sbin must
  be group-owned by root or a system account to prevent unauthorized
  modification.
rationale: >
  System commands group-owned by non-system accounts could be modified by
  members of those groups. Root or system group ownership prevents this.
severity: medium
transactional: false
category: filesystem
tags: [file-permissions, system-commands, security]

references:
  stig:
    rhel10: { vuln_id: "V-281038", stig_id: "RHEL-10-400105", severity: "CAT II" }
    rhel9: { vuln_id: "V-257919", stig_id: "RHEL-09-232195", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230259"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270703"
      stig_id: "UBTU-24-300013"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260496"
      stig_id: "UBTU-22-232055"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      # The control requires system commands to be group-owned by root OR a
      # system account. sgid helpers legitimately carry a system group (write
      # -> tty, locate -> slocate, postdrop/postqueue -> postdrop), so only a
      # USER group (gid >= 1000) is a finding — not any non-root group.
      method: command
      run: "find /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin -type f ! -group root 2>/dev/null | while IFS= read -r f; do g=$(stat -c %g \"$f\" 2>/dev/null); [ -n \"$g\" ] && [ \"$g\" -ge 1000 ] && printf '%s\\n' \"$f\"; done | head -1"
      expected_stdout: ""
    remediation:
      # Not auto-remediated: the only safe flag set is "user-group-owned", which
      # the file_permissions find_args cannot express — a blanket "! -group root"
      # would also re-group the legitimate sgid system helpers. An operator fixes
      # the offending files individually.
      mechanism: manual
      note: >
        Change the group owner of any system command file group-owned by a
        non-system (user) group to root: 'chgrp root <file>'. Leave sgid system
        helpers (e.g. write:tty, locate:slocate, postdrop:postdrop) unchanged.
