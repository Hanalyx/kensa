id: opasswd-permissions
title: Ensure permissions on /etc/security/opasswd are configured
description: >
  The /etc/security/opasswd file stores password history and should
  have restrictive permissions to prevent unauthorized access.
rationale: >
  The opasswd file contains hashed previous passwords. If readable by
  non-root users, it could be used for offline password cracking.
severity: medium
category: filesystem
tags: [permissions, opasswd, password, security]
conflicts_with:
  - fs-permissions-opasswd

references:
  cis:
    rhel9: { section: "7.1.10", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "IA-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/security/opasswd"
      mode: "0600"
      owner: "root"
      group: "root"
    remediation:
      mechanism: file_permissions
      path: "/etc/security/opasswd"
      mode: "0600"
      owner: "root"
      group: "root"
