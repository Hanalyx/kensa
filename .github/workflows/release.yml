# Automatic Release - runs on push to main with conventional commits
#
# Uses conventional commits to determine version bumps:
#   - feat: -> minor version bump (0.1.0 -> 0.2.0)
#   - fix:  -> patch version bump (0.1.0 -> 0.1.1)
#   - feat!: or BREAKING CHANGE: -> major version bump (0.1.0 -> 1.0.0)
#
# Manual trigger available to force a specific version bump.

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - 'rules/**'
      - 'schema/**'
      - 'mappings/**'
      - 'pyproject.toml'
      - 'setup.cfg'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force version bump type'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic Release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine version bump
          if [ -n "${{ inputs.force_version }}" ]; then
            echo "Forcing ${{ inputs.force_version }} version bump"
            semantic-release version --${{ inputs.force_version }} --no-push
          else
            semantic-release version --no-push
          fi

          # Get the new version if created
          NEW_VERSION=$(semantic-release version --print 2>/dev/null || echo "")
          if [ -n "$NEW_VERSION" ]; then
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
            echo "New version: $NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No release needed"
          fi

      - name: Build package
        if: steps.semrel.outputs.released == 'true'
        run: python -m build

      - name: Push version bump
        if: steps.semrel.outputs.released == 'true'
        run: |
          git push origin main
          git push origin --tags

      - name: Create GitHub Release
        if: steps.semrel.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semrel.outputs.version }}
          name: Release v${{ steps.semrel.outputs.version }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.semrel.outputs.released == 'true'
        run: |
          # Create pip-installable release asset info
          echo "Package can be installed with:"
          echo "  pip install git+https://github.com/${{ github.repository }}.git@v${{ steps.semrel.outputs.version }}"

  rpm:
    name: Build RPM (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: el8
            image: rockylinux:8
          - distro: el9
            image: rockylinux:9
          - distro: el10
            image: almalinux:10
          - distro: fc
            image: fedora:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install RPM build tools
        run: |
          # Enable EPEL and CRB/PowerTools on EL distros
          if [ "${{ matrix.distro }}" != "fc" ]; then
            dnf install -y epel-release || true
            /usr/bin/crb enable 2>/dev/null \
              || dnf config-manager --set-enabled powertools 2>/dev/null \
              || true
          fi

          # Base RPM build tools
          dnf install -y rpm-build python3-devel python3-pip python3-wheel \
            python3-setuptools pyproject-rpm-macros

          # EL8/EL9: system python3 is too old (3.6/3.9) for requires-python>=3.10
          # Install Python 3.11 from AppStream and use it for the build
          if [ "${{ matrix.distro }}" = "el8" ] || [ "${{ matrix.distro }}" = "el9" ]; then
            dnf install -y python3.11-devel
            dnf install -y python3.11-pip || python3.11 -m ensurepip
            python3.11 -m pip install --prefix=/usr hatchling wheel setuptools
          else
            dnf install -y python3-hatchling 2>/dev/null || pip3 install hatchling wheel
          fi

      - name: Prepare sources and build RPM
        run: |
          VERSION="${{ needs.release.outputs.version }}"

          # Set up rpmbuild directory structure
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}

          # Create source tarball matching spec expectations
          TARDIR="aegis-${VERSION}"
          mkdir -p "/tmp/${TARDIR}"
          cp -a . "/tmp/${TARDIR}/"
          tar czf ~/rpmbuild/SOURCES/aegis-${VERSION}.tar.gz -C /tmp "${TARDIR}"

          # Copy spec with correct version
          sed "s/^Version:.*/Version:        ${VERSION}/" aegis.spec > ~/rpmbuild/SPECS/aegis.spec

          # Remove python3-hatchling BuildRequires if installed via pip (not RPM)
          if ! rpm -q python3-hatchling &>/dev/null; then
            sed -i '/BuildRequires:.*python3-hatchling/d' ~/rpmbuild/SPECS/aegis.spec
          fi

          # Build RPM
          if [ "${{ matrix.distro }}" = "el8" ] || [ "${{ matrix.distro }}" = "el9" ]; then
            rpmbuild --define '__python3 /usr/bin/python3.11' -ba ~/rpmbuild/SPECS/aegis.spec
          else
            rpmbuild -ba ~/rpmbuild/SPECS/aegis.spec
          fi

      - name: Attach RPM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dnf install -y gh
          gh release upload "v${{ needs.release.outputs.version }}" \
            ~/rpmbuild/RPMS/noarch/*.rpm \
            --repo "${{ github.repository }}"
