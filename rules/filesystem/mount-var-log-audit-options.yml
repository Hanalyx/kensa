id: mount-var-log-audit-options
title: Set mount options on /var/log/audit
description: >
  The /var/log/audit partition should have nodev, nosuid, and noexec
  mount options set to prevent device files, setuid binaries, and
  executable files in the audit log directory.
rationale: >
  Restrictive mount options on /var/log/audit prevent execution of
  malicious code that might be placed in log files and limit potential
  privilege escalation vectors.
severity: medium
category: filesystem
tags: [mount, audit, logging, security]

references:
  cis:
    # one rule sets nodev+nosuid+noexec -> three CIS sub-controls
    rhel9:
      - { section: "1.1.2.7.2", level: "L1", type: "Automated" }   # nodev
      - { section: "1.1.2.7.3", level: "L1", type: "Automated" }   # nosuid
      - { section: "1.1.2.7.4", level: "L1", type: "Automated" }   # noexec
    rhel10: { section: "1.1.2.7.2", level: "L1", type: "Automated" }
    rhel8: { section: "1.1.2.7.2", level: "L1", type: "Automated" }
  stig:
    rhel8:                                                                   # one mount rule sets nodev+nosuid+noexec -> three STIG controls
      - { vuln_id: "V-230517", stig_id: "RHEL-08-040129", severity: "CAT II" }   # nodev
      - { vuln_id: "V-230518", stig_id: "RHEL-08-040130", severity: "CAT II" }   # nosuid
      - { vuln_id: "V-230519", stig_id: "RHEL-08-040131", severity: "CAT II" }   # noexec
    rhel9:
      - { vuln_id: "V-257873", stig_id: "RHEL-09-231160", severity: "CAT II" }   # nodev
      - { vuln_id: "V-257874", stig_id: "RHEL-09-231165", severity: "CAT II" }   # noexec
      - { vuln_id: "V-257875", stig_id: "RHEL-09-231170", severity: "CAT II" }   # nosuid
    rhel10:
      - { vuln_id: "V-281091", stig_id: "RHEL-10-400400", severity: "CAT II" }   # nodev
      - { vuln_id: "V-281092", stig_id: "RHEL-10-400405", severity: "CAT II" }   # noexec
      - { vuln_id: "V-281093", stig_id: "RHEL-10-400410", severity: "CAT II" }   # nosuid
  nist_800_53: ["AC-6", "CM-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      checks:
        - method: mount_option
          mount_point: "/var/log/audit"
          options: ["nodev"]
        - method: mount_option
          mount_point: "/var/log/audit"
          options: ["nosuid"]
        - method: mount_option
          mount_point: "/var/log/audit"
          options: ["noexec"]
    remediation:
      mechanism: mount_option_set
      mount_point: "/var/log/audit"
      options: ["nodev", "nosuid", "noexec"]
