id: shadow-password-sha512
title: Ensure stored passwords use the SHA-512 hashing algorithm
description: >
  Every interactive account with a password in /etc/shadow must store it as a
  SHA-512 hash (a field beginning with $6$). Accounts that are locked or have no
  password ($!, $*, or empty) are not evaluated.
rationale: >
  Weaker hash algorithms (MD5, SHA-256, or DES) are more susceptible to offline
  cracking. SHA-512 is the FIPS-approved algorithm required for stored
  authenticators on RHEL 8.
severity: medium
transactional: false
category: access-control
tags: [passwords, hashing, sha512, fips, shadow, stig]

references:
  stig:
    rhel8:
      vuln_id: "V-230232"
      stig_id: "RHEL-08-010120"
      severity: "CAT II"
  nist_800_53: ["IA-5"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        fail=0
        while IFS=: read -r user hash _; do
          case "$hash" in
            ''|'!'*|'*'*) continue ;;   # no password / locked — not evaluated
            '$6$'*) continue ;;         # SHA-512 — compliant
            *) echo "FAIL: $user has a non-SHA-512 password hash"; fail=1 ;;
          esac
        done < /etc/shadow
        if [ "$fail" -eq 0 ]; then
          echo "OK: all stored passwords use SHA-512"
          exit 0
        fi
        exit 1
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Force affected accounts to reset their password so it is re-hashed with
        SHA-512 (ensure ENCRYPT_METHOD SHA512 is set in /etc/login.defs first):
          passwd --expire <user>
        or lock accounts that should not have a password:
          passwd -l <user>
