id: fips-mode-enabled
title: Enable FIPS 140-2 mode
description: >
  The system must be configured to use FIPS 140-2 validated cryptographic
  modules for all cryptographic operations.
rationale: >
  FIPS 140-2 compliance ensures that only validated cryptographic algorithms
  are used, which is required for processing sensitive government data
  and meeting federal security requirements.
severity: high
transactional: false
category: system
tags: [fips, cryptography, compliance, stig]

references:
  stig:
    rhel10: { vuln_id: "V-281009", stig_id: "RHEL-10-000500", severity: "CAT I" }
    rhel9:
      vuln_id: "V-258230"
      severity: "CAT I"
    # NOTE: no rhel8 cite — rhel8 has no /proc/sys/crypto/fips_enabled control;
    # its FIPS control is the crypto-policy one (V-230223, RHEL-08-010020),
    # which belongs on the crypto-policy-fips rule, not this /proc-flag rule.
    # (The prior V-230224 cite was RHEL-08-010030 = disk encryption — wrong.)
  nist_800_53: ["SC-12", "SC-13"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # STIG-canonical: the kernel FIPS flag. Robust vs hosts lacking the
        # fips-mode-setup binary (crypto-policies-scripts not installed).
        [ "$(cat /proc/sys/crypto/fips_enabled 2>/dev/null)" = "1" ] || {
          echo "FAIL: /proc/sys/crypto/fips_enabled is not 1"; exit 1; }
        echo "OK: FIPS mode enabled"; exit 0
      expected_exit: 0
    remediation:
      mechanism: manual
      note: >
        Enable FIPS mode using:
        fips-mode-setup --enable
        A system reboot is required after enabling FIPS mode.
        WARNING: Enabling FIPS may break some applications that rely on
        non-FIPS approved algorithms.
