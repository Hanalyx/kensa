id: gdm-autorun-never
title: Ensure GDM autorun-never is enabled
description: 'If GNOME Display Manager is in use, automatic execution of programs on removable media should be disabled.

  '
rationale: 'Autorun can be exploited to execute malicious code from removable media. Disabling it prevents this attack vector.

  '
severity: medium
category: services
tags:
- gdm
- gnome
- autorun
- security
conflicts_with:
- gdm-removed
references:
  cis:
    rhel9:
      section: 1.8.8
      level: L1
      type: Automated
    rhel8: { section: "1.8.5", level: "L1", type: "Automated" }
    rhel10: { section: "1.8.5", level: "L1", type: "Automated" }
  nist_800_53:
  - CM-7
platforms:
- family: rhel
  min_version: 8
implementations:
- when: gdm
  check:
    method: command
    run: "# Check if autorun-never is configured\nif grep -qr \"autorun-never=true\" /etc/dconf/db/local.d/ 2>/dev/null; then\n\
      \  echo \"OK: GDM autorun-never is enabled\"\n  exit 0\nfi\necho \"FAIL: GDM autorun-never is not enabled\"\nexit 1\n"
    expected_exit: 0
  remediation:
    mechanism: dconf_set
    schema: org/gnome/desktop/media-handling
    key: autorun-never
    value: 'true'
    file: 00-media-autorun
