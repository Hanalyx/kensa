id: package-authselect-installed
title: Ensure latest version of authselect is installed
description: >
  The authselect package provides a utility for configuring system
  authentication and identity sources.
rationale: >
  authselect is the recommended tool for configuring PAM on RHEL 9.
  It ensures consistent and secure PAM configuration.
severity: medium
category: access-control
tags: [authselect, pam, authentication, security]

references:
  cis:
    rhel9_v2: { section: "5.3.1.2", level: "L1", type: "Automated" }
  nist_800_53: ["IA-5", "CM-6"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: package_state
      name: "authselect"
      state: "installed"
    remediation:
      mechanism: package_present
      name: "authselect"
