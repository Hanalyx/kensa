id: grub-audit-enabled
title: Enable auditing in GRUB kernel parameters
description: >
  The audit=1 kernel parameter must be set to enable auditing for processes
  that start before auditd. This ensures all system activity is captured
  from boot.
rationale: >
  Without audit=1, processes started early in the boot sequence before
  auditd loads are not audited. This could allow early compromise activities
  to go unrecorded.
severity: high
transactional: false
category: system
tags: [grub, audit, boot, kernel]

references:
  cis:
    rhel9:  { section: "6.3.1.2", level: "L2", type: "Automated" }
    rhel10: { section: "6.3.1.2", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.1.2", level: "L2", type: "Automated" }
  stig:
    rhel10: { vuln_id: "V-281097", stig_id: "RHEL-10-500005", severity: "CAT II" }
    rhel9: { vuln_id: "V-257796", stig_id: "RHEL-09-212055", severity: "CAT III" }
    rhel8:
      vuln_id: "V-230468"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: grub_parameter
      key: "audit"
      expected: "1"
    remediation:
      mechanism: grub_parameter_set
      key: "audit"
      value: "1"
