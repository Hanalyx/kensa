id: audit-cmd-chcon
title: Audit uses of the chcon command
description: >
  All uses of the chcon command must be audited. The chcon command
  changes SELinux security context of files.
rationale: >
  Auditing chcon usage allows detection of SELinux context changes
  that could bypass mandatory access controls.
severity: medium
category: audit
tags: [audit, auditd, privileged, selinux]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel8: { section: "6.3.3.15", level: "L2", type: "Automated" }
    rhel9: { section: "6.3.3.15", level: "L1", type: "Automated" }
  stig:
    rhel9:
      vuln_id: "V-258183"
      stig_id: "RHEL-09-654165"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230419"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        rule=$(auditctl -l 2>/dev/null | grep 'path=/usr/bin/chcon')
        if [ -z "$rule" ]; then
          echo "FAIL: no audit rule for /usr/bin/chcon"
          exit 1
        fi
        if ! echo "$rule" | grep -q 'perm=x'; then
          echo "FAIL: audit rule for /usr/bin/chcon missing perm=x"
          exit 1
        fi
        echo "OK: /usr/bin/chcon is audited"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng"
      persist_file: "/etc/audit/rules.d/50-perm_chng.rules"
