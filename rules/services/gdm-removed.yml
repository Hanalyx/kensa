id: gdm-removed
title: Ensure GNOME Display Manager is removed
description: >
  The GNOME Display Manager (GDM) provides a graphical login interface.
  On servers, a graphical interface is unnecessary and increases attack surface.
rationale: >
  Removing the graphical display manager reduces the attack surface and
  resource consumption. Servers should be administered via SSH or console.
severity: medium
category: services
tags: [gdm, gnome, gui, attack-surface, server]

references:
  cis:
    rhel9_v2: { section: "1.8.1", level: "L1", type: "Automated" }
  nist_800_53: ["CM-7"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: package_state
      name: "gdm"
      state: "absent"
    remediation:
      mechanism: package_absent
      name: "gdm"
