id: pkg-pcsc-lite-present
title: Ensure pcsc-lite package is installed
description: >
  The pcsc-lite package must be installed to provide smart card
  reader support.
rationale: >
  Smart card authentication requires the pcsc-lite middleware to
  communicate with smart card readers. Without it, PKI-based
  multifactor authentication cannot function.
severity: medium
category: services
tags: [package, smartcard, authentication, pki]

references:
  stig:
    rhel9:
      vuln_id: "V-258124"
      severity: "CAT II"
  nist_800_53: ["IA-2(1)", "IA-2(2)"]

platforms:
  - family: rhel
    min_version: 9

implementations:
  - default: true
    check:
      method: package_state
      name: "pcsc-lite"
      state: "present"
    remediation:
      mechanism: package_present
      name: "pcsc-lite"
