id: sysctl-net-ipv4-conf-default-send-redirects
title: Ensure net.ipv4.conf.default.send_redirects is set to 0
description: >
  The kernel parameter net.ipv4.conf.default.send_redirects must be set to 0 to enforce this
  network/kernel security control.
rationale: >
  Improper network kernel parameters can allow network-based attacks including packet redirection, source routing, and denial of service.
severity: medium
category: network
tags: [sysctl, networking, hardening]

references:
  cis:
    rhel8: { section: "3.3.1.5", level: "L1", type: "Automated" }
  stig:
    rhel10:
      vuln_id: "V-281352"
      stig_id: "RHEL-10-800200"
      severity: "CAT II"
    rhel8:
      vuln_id: "V-230543"
      stig_id: "RHEL-08-040270"
      severity: "CAT II"
    rhel9:
      vuln_id: "V-257969"
      stig_id: "RHEL-09-253070"
      severity: "CAT II"

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: sysctl_value
      key: net.ipv4.conf.default.send_redirects
      expected: "0"
    remediation:
      mechanism: sysctl_set
      key: net.ipv4.conf.default.send_redirects
      value: "0"
