id: pam-pwquality-difok
title: Require changed characters from previous password
description: 'The difok parameter in /etc/security/pwquality.conf sets the minimum
  number of characters that must differ from the previous password.

  '
rationale: 'Requiring a minimum number of changed characters prevents users from making
  trivial changes to their existing password, such as incrementing a number at the
  end.

  '
severity: medium
category: access-control
tags:
- pam
- password
- authentication
- pwquality
depends_on:
- package-libpwquality-installed
references:
  cis:
    rhel8:  { section: "5.3.3.2.1", level: "L1", type: "Automated" }
    rhel9:
      section: 5.4.1
      level: L1
      type: Automated
  stig:
    rhel9:
      vuln_id: V-258112
      stig_id: RHEL-09-611115
      severity: CAT II
    rhel8:
      vuln_id: V-230363
      severity: CAT II
    ubuntu24:
      vuln_id: V-270729
      stig_id: UBTU-24-400290
      severity: CAT II
    ubuntu22:
      vuln_id: V-260566
      stig_id: UBTU-22-611040
      severity: CAT II
    rhel10:
      vuln_id: "V-281185"
      stig_id: "RHEL-10-600260"
      severity: "CAT II"
  nist_800_53:
  - IA-5(1)(b)
  - IA-5
platforms:
- family: rhel
  min_version: 8
- family: ubuntu
  min_version: 22
implementations:
- default: true
  check:
    method: config_value
    path: /etc/security/pwquality.conf
    key: difok
    expected: '{{ pam_pwquality_difok }}'
    comparator: '>='
  remediation:
    mechanism: config_set
    path: /etc/security/pwquality.conf
    key: difok
    value: '{{ pam_pwquality_difok }}'
    separator: ' = '
