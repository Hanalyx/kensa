id: at-allow
title: Ensure at is restricted to authorized users
description: >
  Access to at must be restricted to authorized users via /etc/at.allow.
rationale: >
  Unrestricted at access allows any user to schedule one-time tasks, potentially enabling privilege escalation.
severity: medium
category: system
tags: [at, access-control]

references:
  cis:
    rhel9_v2: { section: "2.4.2.1", level: "L1", type: "Automated" }
  nist_800_53: ["AC-3", "CM-6"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "test -f /etc/at.allow && stat -c '%a %U %G' /etc/at.allow | grep -q '600 root root'"
      expected_exit: 0
    remediation:
      mechanism: command_exec
      run: "touch /etc/at.allow && chmod 600 /etc/at.allow && chown root:root /etc/at.allow"
