id: audit-config-dir-group
title: Ensure /etc/audit/ is group-owned by root
description: >
  The /etc/audit/ directory must be group-owned by root to
  prevent unauthorized modification of audit configuration.
rationale: >
  Group ownership by root restricts directory access to
  authorized administrators, protecting audit configuration
  from unauthorized changes.
severity: medium
category: audit
tags: [audit, permissions, configuration]

depends_on: [auditd-service-enabled]

references:
  stig:
    rhel9_v2r7:
      vuln_id: "V-270176"
      severity: "CAT II"
    rhel8_v2r6:
      vuln_id: "V-230401"
      severity: "CAT II"
  nist_800_53: ["AU-9", "AC-6"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: file_permission
      path: "/etc/audit"
      group: "root"
    remediation:
      mechanism: file_permissions
      path: "/etc/audit"
      group: "root"
