kind: CLICommand

metadata:
  name: ManPages
  module: scripts.generate_man_pages
  version: 1.0.0
  status: released
  system_spec: system.spec.yaml@1.0.0
  created: "2026-03-22"
  updated: "2026-03-23"

context:
  description: >
    Generate groff-formatted man pages from Click CLI introspection. Produces
    kensa.1 (main) and kensa-<command>.1 for each subcommand. Man pages are
    generated by a Python script and installed via the RPM spec.
  technical_context: >
    scripts/generate_man_pages.py introspects runner.cli:main using Click's
    command tree API (get_command, list_commands, get_params). Generates
    groff/nroff .1 files to a configurable output directory. Each page
    includes NAME, SYNOPSIS, DESCRIPTION, OPTIONS, and SEE ALSO sections.
  dependencies:
    - runner.cli (main Click group)
    - click (command introspection API)
  callers:
    - RPM %build section
    - "Developer: python3 scripts/generate_man_pages.py -o man/"

objective:
  summary: >
    Auto-generate man pages from Click CLI definitions so they stay in sync
    with the CLI and can be installed via RPM.
  acceptance_criteria:
    AC-1: >
      The generator produces a main man page (kensa.1) that lists all
      non-hidden subcommands with one-line descriptions.
    AC-2: >
      The generator produces a per-subcommand man page (kensa-<cmd>.1) for
      each non-hidden, non-deprecated command.
    AC-3: >
      Each subcommand man page includes a SYNOPSIS with the command
      invocation pattern and an OPTIONS section listing every option with
      its help text.
    AC-4: >
      Hidden and deprecated commands (lookup, list-frameworks) do not
      produce man pages.
    AC-5: >
      The generator writes files to a configurable output directory
      specified via command-line argument.
    AC-6: >
      Generated man pages are valid groff that can be rendered by
      `man -l <file>` without errors.
    AC-7: >
      The main man page includes a SEE ALSO section referencing all
      subcommand man pages.

behavior:
  - "Introspect runner.cli:main Click group to discover non-hidden, non-deprecated commands."
  - "Generate kensa.1 main page with NAME, SYNOPSIS, DESCRIPTION, COMMANDS, and SEE ALSO sections."
  - "Generate kensa-<cmd>.1 per-subcommand page with NAME, SYNOPSIS, DESCRIPTION, OPTIONS, and SEE ALSO sections."
  - "Skip hidden commands (cmd.hidden=True) and deprecated commands (cmd.deprecated=True)."
  - "Write all .1 files to the output directory specified via -o (default: man/)."

constraints:
  - "MUST use Click introspection only — no hardcoded command names or options."
  - "MUST produce groff/nroff format (.1 files) suitable for man(1)."
  - "MUST NOT require any third-party dependencies beyond Click."
  - "Output directory MUST be configurable (default: man/)."

input_contract:
  - field: output_dir
    type: str
    required: false
    description: "Directory to write .1 files to. Default: man/"

output_contract:
  returns: >
    One .1 file per non-hidden command plus kensa.1 main page, written to
    the output directory.

exit_codes:
  - code: 0
    condition: "All man pages generated successfully"
  - code: 1
    condition: "Import error or output directory creation failure"

testing:
  spec_derived:
    file: tests/spec/cli/test_man_pages_spec.py
    classes:
      - TestManPagesSpecDerived
    count: 7
