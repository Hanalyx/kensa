id: library-files-mode
title: Ensure library files have mode 755 or less
description: >
  All shared library files in /lib, /lib64, /usr/lib, and /usr/lib64 must
  have mode 755 or less permissive.
rationale: >
  World-writable library files could be replaced with malicious versions
  that are loaded by any application that uses them. Restrictive permissions
  prevent this.
severity: medium
category: filesystem
tags: [file-permissions, library-files, security]

references:
  stig:
    rhel9: { vuln_id: "V-257884", stig_id: "RHEL-09-232020", severity: "CAT II" }
    rhel8:
      vuln_id: "V-230260"
      severity: "CAT II"
    ubuntu24:
      vuln_id: "V-270696"
      stig_id: "UBTU-24-300006"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260487"
      stig_id: "UBTU-22-232020"
      severity: "CAT II"
  nist_800_53: ["AC-6", "CM-5"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: command
      run: "find /lib /lib64 /usr/lib /usr/lib64 -name '*.so*' -perm /022 -type f 2>/dev/null | head -1"
      expected_stdout: ""
    remediation:
      mechanism: file_permissions
      find_paths:
        - /lib
        - /lib64
        - /usr/lib
        - /usr/lib64
      find_name: "*.so*"
      find_type: f
      find_args: "-perm /022"
      mode: "go-w"
