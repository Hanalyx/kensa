kind: RemediationHandler
metadata:
  name: PackagePresent
  module: handlers/remediation
  version: 1.0.0
  status: released
  owner: kensa-core
  system_spec: system.spec.yaml@1.0.0
  created: "2026-02-25"
  updated: "2026-02-25"

context:
  description: >
    Installs a package on a remote RHEL host using dnf. The handler does not
    check if the package is already installed; dnf handles idempotency
    natively by treating already-installed packages as a no-op.
  technical_context: >
    Dispatched by runner.handlers.remediation._dispatch_remediation
    via REMEDIATION_HANDLERS["package_present"]. Implemented in
    runner/handlers/remediation/_package.py as _remediate_package_present.
  dependencies:
    - runner.shell_util.quote
  callers:
    - runner.handlers.remediation._dispatch_remediation
  related_specs:
    - specs/handlers/remediation/package_absent.spec.yaml

objective:
  summary: >
    Install a named package on a remote RHEL host using dnf install -y. In
    dry-run mode, describe the intended action without installing.
  acceptance_criteria:
    AC-1: >
      Dry-run returns preview: When dry_run=True, returns (True, "Would install
      {name}") and no SSH commands are executed.
    AC-2: >
      Success path: When dnf install succeeds, returns (True, "Installed
      {name}").
    AC-3: >
      Install failure: When dnf install fails (non-zero exit), returns (False,
      "dnf install failed: {stderr}").
    AC-4: >
      Shell quoting: The package name is passed through shell_util.quote()
      before interpolation into the dnf command.
    AC-5: >
      Extended timeout: The dnf install command uses a 300-second timeout to
      accommodate large package downloads.

constraints:
  - MUST NOT execute any remote commands when dry_run=True.
  - MUST use shell_util.quote() for the package name to prevent shell injection.
  - MUST return a 2-tuple (bool, str) from the handler; the 3-tuple wrapping is done by the caller.
  - The handler does not check whether the package is already installed; dnf install -y is idempotent.
  - The handler uses -y flag for non-interactive installation.

input_contract:
  - field: mechanism
    type: str
    required: true
    description: Must be "package_present" (used by dispatch, not by handler directly)
  - field: name
    type: str
    required: true
    description: Package name to install (e.g., "aide", "rsyslog")

behavior:
  - "Extract fields: Read name from the remediation dict."
  - "Dry-run check: If dry_run=True, return (True, \"Would install {name}\") immediately."
  - "Install package: Execute dnf install -y {quoted_name} via SSH with a 300-second timeout."
  - "Check result: If dnf returns non-zero exit code, return (False, \"dnf install failed: {stderr}\")."
  - "Success return: Return (True, \"Installed {name}\")."

output_contract:
  returns: "tuple[bool, str]"
  detail_formats:
    - "Dry-run: \"Would install {name}\""
    - "Success: \"Installed {name}\""
    - "Failure: \"dnf install failed: {stderr}\""

side_effects:
  - "Installs an RPM package on the remote host via dnf."

testing:
  spec_derived:
    file: tests/test_engine_remediation.py
    classes:
      - TestPackagePresentSpecDerived
    count: 7
