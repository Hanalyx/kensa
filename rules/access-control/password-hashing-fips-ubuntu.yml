id: password-hashing-fips-ubuntu
title: Encrypt stored passwords with a FIPS 140-3 hashing algorithm
description: >
  /etc/login.defs ENCRYPT_METHOD must be set to SHA512 so that stored
  passwords use a FIPS 140-3 approved hashing algorithm.
rationale: >
  yescrypt (the Ubuntu default) is not FIPS 140-3 validated. SHA512 is the
  approved algorithm for storing password hashes in a FIPS posture.
severity: medium
category: access-control
tags: [password, hashing, fips, login.defs]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270739"
      stig_id: "UBTU-24-400400"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260572"
      stig_id: "UBTU-22-611070"
      severity: "CAT II"
  nist_800_53: ["IA-5", "IA-5(1)(c)"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: config_value
      path: /etc/login.defs
      key: ENCRYPT_METHOD
      expected: SHA512
      delimiter: " "
    remediation:
      mechanism: config_set
      path: /etc/login.defs
      key: ENCRYPT_METHOD
      value: SHA512
      separator: " "
