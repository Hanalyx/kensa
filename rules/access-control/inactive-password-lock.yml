id: inactive-password-lock
title: Lock inactive user accounts
description: >
  The INACTIVE parameter in /etc/default/useradd controls how many days
  after a password expires that the account is permanently disabled.
rationale: >
  Disabling inactive accounts reduces the attack surface by removing
  accounts that are no longer actively used but may still have valid
  credentials.
severity: medium
category: access-control
tags: [password, user-accounts, inactive]

references:
  cis:
    rhel8_v4:  { section: "5.6.1.4", level: "L1", type: "Automated" }
    rhel9_v2:  { section: "5.6.1.4", level: "L1", type: "Automated" }
  stig:
    rhel9_v2r7:
      vuln_id: "V-258099"
      stig_id: "RHEL-09-411035"
      severity: "CAT II"
  nist_800_53: ["AC-2(3)"]

platforms:
  - family: rhel
    min_version: 8

implementations:
  - default: true
    check:
      method: command
      run: |
        # Check effective useradd default for INACTIVE
        inactive=$(useradd -D 2>/dev/null | grep -i '^INACTIVE' | cut -d= -f2)
        if [ -z "$inactive" ]; then
          # Fallback to static file
          inactive=$(grep -E '^INACTIVE=' /etc/default/useradd 2>/dev/null | cut -d= -f2)
        fi
        if [ -z "$inactive" ] || [ "$inactive" -lt 0 ] || [ "$inactive" -gt 30 ] 2>/dev/null; then
          echo "FAIL: INACTIVE=${inactive:-(not set)} (expected 0-30)"
          exit 1
        fi
        echo "OK: INACTIVE=$inactive"
      expected_exit: 0
    remediation:
      mechanism: config_set
      path: "/etc/default/useradd"
      key: "INACTIVE"
      value: "30"
      separator: "="
