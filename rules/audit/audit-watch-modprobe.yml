id: audit-watch-modprobe
title: Audit access to /sbin/modprobe (Ubuntu)
description: >
  Modifications to /sbin/modprobe must generate an audit record so that kernel module loads
  can be traced to an individual.
rationale: >
  Auditing this path supports detection of unauthorized changes and
  forensic reconstruction of events.
severity: medium
category: audit
tags: [audit, auditd, watch]

depends_on: [auditd-enabled]

references:
  stig:
    ubuntu24:
      vuln_id: "V-270813"
      stig_id: "UBTU-24-900730"
      severity: "CAT II"
    ubuntu22:
      vuln_id: "V-260614"
      stig_id: "UBTU-22-654060"
      severity: "CAT II"
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: ubuntu
    min_version: 22

implementations:
  - default: true
    check:
      method: audit_rule_exists
      rule: "-w /sbin/modprobe -p x -k modules"
    remediation:
      mechanism: audit_rule_set
      rule: "-w /sbin/modprobe -p x -k modules"
      persist_file: "/etc/audit/rules.d/50-watch-modprobe.rules"
