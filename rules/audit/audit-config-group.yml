id: audit-config-group
title: Ensure audit configuration files group owner is configured
description: >
  Audit configuration files must be group-owned by root.
rationale: >
  Incorrect ownership or permissions on audit files could allow unauthorized users to tamper with audit evidence.
severity: medium
category: audit
tags: [audit, permissions]

depends_on: [auditd-enabled]

references:
  cis:
    rhel9: { section: "6.3.4.7", level: "L1", type: "Automated" }
    rhel10: { section: "6.3.4.7", level: "L2", type: "Automated" }
    rhel8: { section: "6.3.4.7", level: "L2", type: "Automated" }
  stig:
    ubuntu24:
      vuln_id: "V-270777"
      stig_id: "UBTU-24-900060"
      severity: "CAT II"
      cci: ["CCI-000171"]
    ubuntu22:
      vuln_id: "V-260603"
      stig_id: "UBTU-22-653075"
      severity: "CAT II"
      cci: ["CCI-000171"]
  nist_800_53: ["AU-9"]

platforms:
  - family: rhel
    min_version: 8
  - family: ubuntu
    min_version: 22
implementations:
  - default: true
    check:
      method: command
      run: 'find /etc/audit/ -type f \( -name ''*.conf'' -o -name ''*.rules'' \) ! -group root 2>/dev/null | head -1'
      expected_exit: 0
      expected_stdout: ""
    remediation:
      mechanism: file_permissions
      find_paths:
        - /etc/audit/
      find_type: f
      find_args: "\\( -name '*.conf' -o -name '*.rules' \\)"
      group: root
