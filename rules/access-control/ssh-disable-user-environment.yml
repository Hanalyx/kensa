id: ssh-disable-user-environment
title: Ensure sshd PermitUserEnvironment is disabled
description: 'The sshd PermitUserEnvironment directive must be properly configured.

  '
rationale: 'Improper SSH PermitUserEnvironment configuration could weaken the security
  of remote access to the system.

  '
severity: medium
category: access-control
tags:
- ssh
- sshd
- access-control
depends_on:
- pkg-openssh-server-present
references:
  cis:
    rhel9:
      section: 5.1.21
      level: L1
      type: Automated
    rhel10:
      section: 5.1.21
      level: L1
      type: Automated
    rhel8:
      section: 5.1.23
      level: L1
      type: Automated
  nist_800_53:
  - AC-17
  - SC-8
  - CM-6
  stig:
    rhel8:
      vuln_id: V-230330
      stig_id: RHEL-08-010830
      severity: CAT II
      cci:
      - CCI-000366
    rhel9:
      vuln_id: V-257993
      stig_id: RHEL-09-255085
      severity: CAT II
      cci:
      - CCI-000366
platforms:
- family: rhel
  min_version: 8
implementations:
- when: sshd_config_d
  check:
    method: sshd_effective_config
    key: permituserenvironment
    expected: 'no'
  remediation:
    mechanism: config_set_dropin
    dir: /etc/ssh/sshd_config.d
    file: 00-kensa-permit-user-environment.conf
    key: PermitUserEnvironment
    value: 'no'
    reload: sshd
- default: true
  check:
    method: sshd_effective_config
    key: permituserenvironment
    expected: 'no'
  remediation:
    mechanism: config_set
    path: /etc/ssh/sshd_config
    key: PermitUserEnvironment
    value: 'no'
    separator: ' '
    reload: sshd
