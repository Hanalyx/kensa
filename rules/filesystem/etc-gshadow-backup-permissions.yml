id: etc-gshadow-backup-permissions
title: Ensure permissions on /etc/gshadow- are configured
description: 'The /etc/gshadow- file must have correct ownership and permissions.

  '
rationale: 'Incorrect permissions on /etc/gshadow- could allow unauthorized access
  or modification of sensitive system data.

  '
severity: high
category: filesystem
tags:
- file-permissions
- authentication
references:
  cis:
    rhel9:
      section: 7.1.8
      level: L1
      type: Automated
    rhel8:
      section: 7.1.8
      level: L1
      type: Automated
    rhel10: { section: "7.1.7", level: "L1", type: "Automated" }
  nist_800_53:
  - AC-3
  - MP-2
  - AC-6
  stig:
    rhel9:                                                                   # grouped: one file_permissions rule, three STIG controls
      - { vuln_id: "V-257894", severity: "CAT II" }                          # mode 0000
      - { vuln_id: "V-257904", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-257905", severity: "CAT II" }                          # group root
    rhel10:
      - { vuln_id: "V-281023", severity: "CAT II" }                          # owner root
      - { vuln_id: "V-281024", severity: "CAT II" }                          # group root
      - { vuln_id: "V-281069", severity: "CAT II" }                          # mode 0000
platforms:
- family: rhel
  min_version: 8
implementations:
- default: true
  check:
    method: file_permission
    path: /etc/gshadow-
    owner: root
    group: root
    mode: '0000'
  remediation:
    mechanism: file_permissions
    path: /etc/gshadow-
    owner: root
    group: root
    mode: '0000'
