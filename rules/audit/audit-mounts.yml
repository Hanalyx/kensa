id: audit-mounts
title: Ensure successful file system mounts are collected
description: >
  Successful file system mounts must be collected.
rationale: >
  Without auditing these events, malicious activity could go undetected, compromising forensic capabilities.
severity: medium
category: audit
tags: [audit, auditd]

depends_on: [auditd-service-enabled]

references:
  cis:
    rhel9_v2: { section: "6.3.3.10", level: "L1", type: "Automated" }
  nist_800_53: ["AU-2", "AU-12"]

platforms:
  - family: rhel
    min_version: 8
implementations:
  - default: true
    check:
      method: command
      run: "auditctl -l 2>/dev/null | grep -qE 'mounts'"
      expected_exit: 0
    remediation:
      mechanism: audit_rule_set
      rule: "-a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k mounts"
      persist_file: "/etc/audit/rules.d/50-mounts.rules"
