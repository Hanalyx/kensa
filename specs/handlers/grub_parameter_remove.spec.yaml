spec:
    id: handler-grub-parameter-remove
    version: 0.1.0
    status: draft
    tier: 2
    context:
        system: kensa
        feature: handler-grub-parameter-remove
        description: |
            The grub_parameter_remove handler strips a kernel command-line
            parameter (key or key=value) from GRUB_CMDLINE_LINUX in
            /etc/default/grub and regenerates the GRUB configuration via
            grub2-mkconfig (falling back to grub-mkconfig). The change takes
            effect only after a reboot.

            This handler is non-capturable: it implements only Handler, not
            CaptureHandler or RollbackHandler. A GRUB config edit cannot be
            atomically rolled back in the running kernel, so rules using it
            must declare transactional: false and the engine marks the step
            skipped for rollback.
        related_specs:
            - handler-interface
    objective:
        summary: |
            Remove params.key from GRUB_CMDLINE_LINUX in /etc/default/grub and
            regenerate the boot configuration. No pre-state is captured and no
            rollback is offered.
        scope:
            includes:
                - sed strip of key= and bare key from GRUB_CMDLINE_LINUX
                - grub config regeneration via grub2-mkconfig / grub-mkconfig
                - validation of the required key param
                - the non-capturable nature of the handler
            excludes:
                - capture of prior GRUB state
                - rollback of the removed parameter
                - rebooting the host (operator responsibility)
    constraints:
        - id: C-01
          description: |
              Apply MUST strip both key=value and bare-key occurrences of
              params.key from /etc/default/grub via sed, then regenerate the
              GRUB configuration in a single chained pipeline.
          type: technical
          enforcement: error
        - id: C-02
          description: |
              Apply MUST reject a missing, non-string, or empty key param,
              and reject a nil params map, returning an error before running
              any command.
          type: technical
          enforcement: error
        - id: C-03
          description: |
              When the underlying pipeline exits non-zero, Apply MUST return
              a StepResult with Success=false (not an error), surfacing the
              exit code and stderr in Detail.
          type: technical
          enforcement: error
        - id: C-04
          description: |
              grub_parameter_remove is non-capturable: Capturable() MUST
              return false and the type MUST NOT satisfy CombinedHandler at
              runtime, so the engine never attempts capture or rollback.
          type: security
          enforcement: error
    acceptance_criteria:
        - id: AC-01
          description: |
              Apply strips key= and bare key from /etc/default/grub via sed
              and regenerates the GRUB config.
          references_constraints: [C-01]
          priority: critical
        - id: AC-02
          description: Apply rejects a missing, empty, non-string, or nil key param.
          references_constraints: [C-02]
          priority: high
        - id: AC-03
          description: |
              Apply reports Success=false (no error) when the pipeline exits
              non-zero.
          references_constraints: [C-03]
          priority: high
        - id: AC-04
          description: |
              The handler is non-capturable — Capturable() is false and a
              runtime type-assert to CombinedHandler returns false.
          references_constraints: [C-04]
          priority: critical
    depends_on:
        - spec_id: handler-interface
          relationship: requires
    tags: [handler, non-capturable, tier-2, grub, boot]
